const RESTRICT=["No Dairy","No Gluten","No Sugar","No Salt","No Pre-made Sauces","No Butter","No Alcohol","No Nuts","Raw Only","Vegetarian","Vegan"];
/** Collapse "No No …" from duplicated prefixes (e.g. AI returns "No No Butter") and match built-in casing. */
function normalizeRestrictionKey(s){
  let t=String(s==null?"":s).trim();
  if(!t) return t;
  while(/^no\s+no(\s|$)/i.test(t)) t=t.replace(/^no\s+/i,"").trim();
  const low=t.toLowerCase();
  for(const r of RESTRICT) if(r.toLowerCase()===low) return r;
  return t;
}
function sanitizeRestrictionList(arr){
  const out=[], seen=new Set();
  for(const x of arr||[]){
    const k=normalizeRestrictionKey(x);
    if(!k||seen.has(k)) continue;
    seen.add(k); out.push(k);
  }
  return out;
}
function sanitizeSpinConstraints(arr){
  return (arr||[]).map(x=>{
    const s=String(x==null?"":x);
    if(s.startsWith("✕ ")) return s;
    return normalizeRestrictionKey(s);
  });
}

const BASKET_API_KEY = "";

let _serverAnthropicConfigured = false;
let _configPromise = null;
function loadAppConfig() {
  if (_configPromise) return _configPromise;
  _configPromise = fetch("/api/config")
    .then(r => r.json())
    .then(j => {
      _serverAnthropicConfigured = !!j.anthropicConfigured;
    })
    .catch(() => {
      _serverAnthropicConfigured = false;
    });
  return _configPromise;
}

function getAnthropicKey() {
  const fromConst = (typeof BASKET_API_KEY === "string" && BASKET_API_KEY.trim()) ? BASKET_API_KEY.trim() : "";
  if (fromConst) return fromConst;
  const stored = (localStorage.getItem("basket_anthropic_key_v1") || "").trim();
  if (stored) return stored;
  if (_serverAnthropicConfigured) return "";
  let k = prompt("Anthropic API key is required for rival chef & Look Up.\n\nCreate one at https://console.anthropic.com\n\nStored only in this browser unless your host already configured the server key.") || "";
  if (k.trim()) localStorage.setItem("basket_anthropic_key_v1", k.trim());
  return (k || "").trim();
}

function pantryPool() { return window.USER_PANTRY && window.USER_PANTRY.length ? window.USER_PANTRY : PANTRY; }

function refreshAfterModalAdd() {
  if ($("screen-build") && !$("screen-build").classList.contains("hidden")) renderBuild();
  else renderPantry();
}

function escapeHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function truncateStr(s,max){
  const t=String(s||"").trim();
  if(!t) return "";
  if(t.length<=max) return t;
  return t.slice(0,max)+"…";
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const pick = (arr,n) => {
  let c = Number(n);
  if (!Number.isFinite(c) || c < 0) c = 0;
  c = Math.min(c, arr.length | 0);
  if (c <= 0) return [];
  return [...arr].sort(() => Math.random() - 0.5).slice(0, c);
};
function drawUnifiedConstraints(count){
  const n=Math.max(0, Number(count)||0);
  const candidates=[
    ...RESTRICT.map(r=>({type:"res",label:r})),
    ...EQUIP.map(e=>({type:"forb",label:"✕ "+e,raw:e})),
  ];
  const chosen=pick(candidates,n);
  return {
    spinConstraints: chosen.map(c=>c.label),
    restrictions: chosen.filter(c=>c.type==="res").map(c=>c.label),
    forbEquip: chosen.filter(c=>c.type==="forb").map(c=>c.raw),
  };
}

/** How many pantry names remain valid under these dietary restrictions */
function pantryFeasibleCount(pool, restrictions){
  const r=restrictions||[];
  const filtered=filterPoolByRestrictions([...new Set((pool||[]).filter(Boolean))],r);
  return filtered.length;
}

/** Re-roll unified draws until the pantry can still fill required slots (avoids No dairy + heavy cream style impossibilities). */
function drawUnifiedConstraintsFeasible(n, pool, needSlots){
  const need=Math.max(0, Number(needSlots)||0);
  const count=Math.max(0, Number(n)||0);
  if(need<=0) return drawUnifiedConstraints(count);
  let best=null, bestScore=-1;
  for(let attempt=0; attempt<55; attempt++){
    const draw=drawUnifiedConstraints(count);
    const fc=pantryFeasibleCount(pool, draw.restrictions);
    if(fc>=need) return draw;
    if(fc>bestScore){ bestScore=fc; best=draw; }
  }
  for(let attempt=0; attempt<35; attempt++){
    const k=Math.max(0, Math.min(count, EQUIP.length));
    const fe=pick(EQUIP,k);
    const draw={
      spinConstraints:fe.map(e=>"✕ "+e),
      restrictions:[],
      forbEquip:fe,
    };
    if(pantryFeasibleCount(pool, [])>=need) return draw;
  }
  if(best&&bestScore>0){
    while(best.restrictions.length&&pantryFeasibleCount(pool,best.restrictions)<need)
      best.restrictions.pop();
    best.forbEquip=pick(EQUIP,Math.min(count-best.restrictions.length,EQUIP.length));
    best.spinConstraints=[...best.restrictions,...best.forbEquip.map(e=>"✕ "+e)];
    if(pantryFeasibleCount(pool,best.restrictions)>=need) return best;
  }
  return {spinConstraints:[],restrictions:[],forbEquip:[]};
}

// Extract one JSON object from model text (handles ```json fences, braces inside strings, trailing commas).
function stripCodeFences(text) {
  const t = String(text || "").trim();
  const m = t.match(/```(?:json)?\s*([\s\S]*?)```/);
  return m ? m[1].trim() : t;
}
function stripTrailingCommas(jsonStr) {
  return jsonStr.replace(/,(\s*[\}\]])/g, "$1");
}
function extractBalancedJsonObject(text) {
  const s = stripCodeFences(text);
  const start = s.indexOf("{");
  if (start === -1) return null;
  let depth = 0, inStr = false, esc = false;
  for (let i = start; i < s.length; i++) {
    const c = s[i];
    if (esc) { esc = false; continue; }
    if (inStr) {
      if (c === "\\") esc = true;
      else if (c === '"') inStr = false;
      continue;
    }
    if (c === '"') { inStr = true; continue; }
    if (c === "{") depth++;
    else if (c === "}") {
      depth--;
      if (depth === 0) return s.slice(start, i + 1);
    }
  }
  return null;
}
function normalizeJsonText(s) {
  return String(s || "")
    .replace(/[\u201c\u201d\u00ab\u00bb]/g, '"')
    .replace(/[\u2018\u2019]/g, "'");
}
function parseModelJsonObject(raw) {
  let candidate = extractBalancedJsonObject(raw);
  if (!candidate) {
    const s = String(raw || "").indexOf("{"), e = String(raw || "").lastIndexOf("}");
    if (s !== -1 && e > s) candidate = String(raw).slice(s, e + 1);
  }
  if (!candidate) throw new Error("Model returned no JSON object");
  candidate = normalizeJsonText(candidate);
  try {
    return JSON.parse(candidate);
  } catch (e1) {
    try {
      return JSON.parse(stripTrailingCommas(candidate));
    } catch (_e2) {
      throw new Error(e1.message + " — Recipe JSON was malformed or cut off. Click Try Again.");
    }
  }
}

// ── Daily free tier (no login): caps AI rounds to protect host API & reduce abuse ──
const PW_DAILY_AI_STORAGE_KEY = "pw_daily_ai_rounds_v1";
/** Target band ~10–20/day; feels generous, blocks 100+ round abuse */
const PW_DAILY_AI_LIMIT = 18;
const PW_DAILY_LIMIT_MESSAGE = "You've used today's battles — come back tomorrow or unlock more soon.";

function pwLocalDateKey() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function pwGetDailyAiCount() {
  try {
    const raw = localStorage.getItem(PW_DAILY_AI_STORAGE_KEY);
    const j = raw ? JSON.parse(raw) : null;
    const today = pwLocalDateKey();
    if (!j || j.d !== today) return { d: today, n: 0 };
    return { d: today, n: Math.max(0, Math.min(PW_DAILY_AI_LIMIT + 50, Number(j.n) || 0)) };
  } catch (_e) {
    return { d: pwLocalDateKey(), n: 0 };
  }
}

function pwDailyAiRemaining() {
  return Math.max(0, PW_DAILY_AI_LIMIT - pwGetDailyAiCount().n);
}

function pwCanUseAiRound() {
  return pwGetDailyAiCount().n < PW_DAILY_AI_LIMIT;
}

function pwRecordSuccessfulAiRound() {
  const today = pwLocalDateKey();
  const cur = pwGetDailyAiCount();
  const next = cur.d === today ? cur.n + 1 : 1;
  localStorage.setItem(PW_DAILY_AI_STORAGE_KEY, JSON.stringify({ d: today, n: next }));
  try {
    if (!sessionStorage.getItem("pw_session_started_v1")) {
      sessionStorage.setItem("pw_session_started_v1", "1");
      if (typeof gtag === "function") gtag("event", "pw_play_session", {});
    }
    if (typeof gtag === "function") {
      gtag("event", "pw_ai_round_ok", {
        daily_total: next,
        daily_remaining: Math.max(0, PW_DAILY_AI_LIMIT - next),
        limit: PW_DAILY_AI_LIMIT,
      });
    }
  } catch (_e) {}
}

function pwTrackDailyLimitHit(context) {
  try {
    if (typeof gtag === "function") {
      gtag("event", "pw_daily_limit_hit", {
        context: context || "ai",
        daily_count: pwGetDailyAiCount().n,
        limit: PW_DAILY_AI_LIMIT,
      });
    }
  } catch (_e) {}
}

// ── AI CALL ───────────────────────────────────────────────────────────────────
async function ai(prompt, tokens=300) {
  await loadAppConfig();
  const apiKey = getAnthropicKey();
  if (!apiKey && !_serverAnthropicConfigured) throw new Error("No API key — cancelled or empty");
  if (!pwCanUseAiRound()) {
    pwTrackDailyLimitHit("blocked_precheck");
    throw new Error(PW_DAILY_LIMIT_MESSAGE);
  }
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    const timer = setTimeout(() => { xhr.abort(); reject(new Error("Request timed out (60s)")); }, 60000);
    xhr.open("POST", "/api/anthropic");
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.onload = () => {
      clearTimeout(timer);
      if (xhr.status !== 200) {
        let detail = xhr.responseText.slice(0, 400);
        try {
          const errJ = JSON.parse(xhr.responseText);
          if (errJ.error && errJ.error.message) detail = errJ.error.message;
        } catch (_e) {}
        reject(new Error("HTTP " + xhr.status + (detail ? ": " + detail : "")));
        return;
      }
      try {
        const d = JSON.parse(xhr.responseText);
        const txt = (d.content || []).find(b => b.type === "text")?.text || "";
        if (d.stop_reason === "max_tokens" && txt && !extractBalancedJsonObject(txt)) {
          reject(new Error("Response ran out of space — click Try Again, or use fewer required ingredients."));
          return;
        }
        const parsed = parseModelJsonObject(txt);
        pwRecordSuccessfulAiRound();
        resolve(parsed);
      } catch (err) {
        reject(err);
      }
    };
    xhr.onerror = () => {
      clearTimeout(timer);
      reject(new Error("Cannot reach Pantry Wars server — check that the app is running (npm start) or your live site is up."));
    };
    xhr.onabort = () => { clearTimeout(timer); reject(new Error("aborted")); };
    xhr.send(JSON.stringify({
      api_key: apiKey,
      payload: {
        model: "claude-haiku-4-5",
        max_tokens: tokens,
        messages: [{ role: "user", content: prompt }]
      }
    }));
  });
}

function toggleFromModal(id) {
  if (state.pantryItems.includes(id)) state.pantryItems = state.pantryItems.filter(x=>x!==id);
  else state.pantryItems.push(id);
  const item = $("modal-overlay")._currentItem;
  if (item) showItemDetail(item);
  renderPantry();
}

/** Snapshot current builder into challenge shape (for AI prompts before launch). */
function challengeFromBuilder(){
  const pool=pantryPool();
  return{
    diff:state.diff,
    ctype:state.ctype,
    totalTime:state.total,
    prepTime:state.prep,
    cookTime:state.cook,
    surpriseCut:state.cut,
    required:[...state.req],
    restrictions:sanitizeRestrictionList(state.res),
    reqEquip:[...state.reqEq],
    forbEquip:[...state.forbEq],
    limitBurners:state.lim,
    pantry:pool.filter(p=>!state.req.includes(p)),
  };
}

function doLaunch() {
  const cfg=DIFF[state.diff];
  if(state.req.length<cfg.req){
    alert(`This difficulty needs ${cfg.req} required ingredients that fit your restrictions — you have ${state.req.length}. Add pantry items or ease restrictions.`);
    return;
  }
  if(state.req.some(n=>ingredientConflictsWithAny(n,state.res))){
    alert("A required ingredient still conflicts with a restriction. Check your basket.");
    return;
  }
  if(!pwCanUseAiRound()){
    pwTrackDailyLimitHit("launch_blocked");
    alert(PW_DAILY_LIMIT_MESSAGE);
    return;
  }
  state.res=sanitizeRestrictionList(state.res);
  const pool = pantryPool();
  state.challenge={diff:state.diff,ctype:state.ctype,totalTime:state.total,prepTime:state.prep,cookTime:state.cook,surpriseCut:state.cut,required:state.req,restrictions:state.res,reqEquip:state.reqEq,forbEquip:state.forbEq,limitBurners:state.lim,pantry:pool.filter(p=>!state.req.includes(p))};
  trackPWEvent("start_battle", pwParamsChallenge(state.challenge));
  state.userCookPlan={dish:"",techniques:"",timing:""};
  state.contestRecipe=null;
  showScreen("screen-recipe");
  renderRecipe();
}

function clampScore(v){
  const n=Math.round(Number(v)||0);
  return Math.min(10,Math.max(1,n));
}

async function runAutoBattleScoring(){
  if(state.duelAutoScoring) return;
  const ch=state.challenge, uc=state.userCookPlan, r=state.recipe;
  if(!ch||!r) return;
  state.duelAutoScoring=true;
  const st=$("score-auto-status");
  if(st) st.textContent="Auto-judging duel...";
  try{
    const prompt=`You are a fair cooking competition judge. Compare two competitors from the same basket.
Return ONLY compact JSON with this shape:
{"you":{"taste":1-10,"creativity":1-10,"presentation":1-10,"difficulty":1-10},"ai":{"taste":1-10,"creativity":1-10,"presentation":1-10,"difficulty":1-10},"summary":"2-4 sentences with winner + why"}

SCORING RUBRIC:
- Taste: flavor logic, balance, plausibility
- Creativity: originality without nonsense
- Presentation: plating clarity from described dish
- Difficulty: technical ambition that fits time

Challenge:
- Type: ${ch.ctype.label}
- Time: ${ch.totalTime} minutes
- Required: ${ch.required.join(", ")}
- Restrictions: ${(ch.restrictions||[]).join(", ")||"none"}

USER PLAN:
- Dish: ${(uc.dish||"").slice(0,1200)}
- Techniques: ${(uc.techniques||"").slice(0,1200)}
- Timing: ${(uc.timing||"").slice(0,1200)}

AI ENTRY:
${JSON.stringify({
  title:r.title||"",
  tagline:r.tagline||"",
  balance:r.balance||{},
  ingredients:(r.ingredients||[]).slice(0,20),
  steps:(r.steps||[]).slice(0,16),

})}`;
    const out=await ai(prompt,1400);
    if(out&&out.you&&out.ai){
      state.scoresYou={
        taste:clampScore(out.you.taste),
        creativity:clampScore(out.you.creativity),
        presentation:clampScore(out.you.presentation),
        difficulty:clampScore(out.you.difficulty),
      };
      state.scoresAI={
        taste:clampScore(out.ai.taste),
        creativity:clampScore(out.ai.creativity),
        presentation:clampScore(out.ai.presentation),
        difficulty:clampScore(out.ai.difficulty),
      };
      state.duelAutoSummary=String(out.summary||"").slice(0,700);

function analyzeBasketForRecipe(required) {
  const low = required.map(s => String(s).toLowerCase());
  const junkRx = /\b(frosting|icing|chocolate\s*syrup|corn\s*syrup|candy|marshmallow|soda|cola|potato\s*chips|cereal|pizza\b|snack|twinkie|pop[\s-]?tart|spray\s*cheese|velveeta|cool\s*whip|hot\s*fudge|nesquik|hershey'?s?\s*syrup)\b/;
  const sweetShelfRx = /\b(frosting|icing|chocolate\s*syrup|syrup|candy|marshmallow|hot\s*fudge)\b/;
  const junkHits = low.filter(s => junkRx.test(s)).length;
  const processedSweet = low.some(s => sweetShelfRx.test(s));
  const hardBasket = junkHits >= 2 || required.length >= 5 || (junkHits >= 1 && required.length >= 4);
  const cleanBasket = junkHits === 0 && required.length <= 4;
  return { hardBasket, cleanBasket, processedSweet, junkHits };
}

/** Prompt block: enforce challenge course identity (esp. dessert vs savory hybrid failures). */
function courseEnforcementBlock(ch, sig) {
  const id = String((ch.ctype && ch.ctype.id) || "");
  const label = String((ch.ctype && ch.ctype.label) || "").toLowerCase();
  const isDessert = id === "dessert" || /\bdessert\b/.test(label);
  const reqBlob = (ch.required || []).map(s => String(s).toLowerCase()).join(" ");
  const savoryHeavyRx = /\b(bacon|pancetta|guanciale|mushroom|miso|chicken|beef|pork|lamb|fish|salmon|trout|cod|shrimp|prawn|scallop|garlic|onion|stock|demi|soy\s*sauce|fish\s*sauce|parmesan|pecorino|anchov|sardine)\b/;
  const savoryHeavyDessert = isDessert && savoryHeavyRx.test(reqBlob);

  if (isDessert) {
    let s = `COURSE LOCK — DESSERT (hard rule):
- A judge must instantly read the plate as dessert (title + tagline + story). It must NOT scan as a savory main with sugar on top.
- BANNED center of the plate: savory entree or tart identity (e.g. mushroom cream filling, bacon-fat-forward base, miso-heavy savory broth/ganache) as the "dessert." Umami/salt may only support the sweet story (accent, garnish, tiny shard, trace in caramel) — not dominate.
- REQUIRED sweet backbone (choose what fits the basket): honest pastry/tart shell, cake/cookie, custard/pudding, fruit compote, chocolate dessert use, caramel/butterscotch with real sugar cook, mousse, ice cream/sorbet if time allows. If the basket skews savory, pivot ingredients with CLEAR sweet technique (candied bacon crumb, tiny mushroom only in dulce-adjacent base, etc.) — still dessert-first, fewer parts.
- No fake "hybrid" excuse: do not label a confused savory plate as dessert.
- Texture honesty: only call it brittle if sugar/syrup is cooked to snap; "dust" is fine powder — not chopped nuts renamed.
- In balance.complete, one sentence must state why this READS as dessert (not why it's clever).
`;
    if (sig.hardBasket || savoryHeavyDessert) {
      s += `SIMPLICITY OVERRIDE (hard or savory-leaning basket + dessert): Cap yourself at 3 composed elements on the plate. ONE dessert idea only — no spaghetti crusts, no nested starches, no six-layer stunt. Do less; be legible.\n`;
    }
    return s;
  }

  if (id === "appetizer") {
    return `COURSE LOCK — APPETIZER: Starter scale and pacing — not a full entree, not dessert unless label clearly asks.\n`;
  }
  if (id === "entree") {
    return `COURSE LOCK — ENTREE: Clear main-course identity — satisfying center-of-plate, not a snack or dessert unless basket forces sweet mains.\n`;
  }
  if (id === "snack") {
    return `COURSE LOCK — SNACK: Hand food or casual small plate — not a composed restaurant entree.\n`;
  }
  if (id === "elevate" || id === "recreate") {
    const L = String((ch.ctype && ch.ctype.label) || id).toUpperCase();
    return `COURSE LOCK — ${L}: Deliver the promise of the challenge name in one readable sentence — no genre drift.\n`;
  }
  return "";
}

async function generateRecipe() {
  const ch=state.challenge;
  try {
    const res=ch.restrictions.length?`RESTRICTIONS (hard rules — the dish must comply; no cheating): ${ch.restrictions.join("; ")}.`:"RESTRICTIONS: none.";
    const fe=ch.forbEquip.length?`Forbidden: ${ch.forbEquip.join(", ")}.`:"";
    const re=ch.reqEquip.length?`Must use equipment: ${ch.reqEquip.join(", ")}.`:"";
    const bl=ch.limitBurners?"1 burner only.":"";
    const pantryLines=ch.pantry.length<=35?ch.pantry.join(", "):ch.pantry.slice(0,35).join(", ")+", …";
    const sig=analyzeBasketForRecipe(ch.required);
    let maxSteps=Math.min(8,Math.max(5,Math.floor(ch.totalTime/4)));
    if(sig.hardBasket) maxSteps=Math.min(maxSteps,7);
    const maxComponents=ch.totalTime<=35?3:ch.totalTime<=50?4:5;
    const simplicityGoal=sig.hardBasket
      ?Math.min(3,maxComponents)
      :sig.cleanBasket
        ?Math.min(ch.totalTime<=35?3:4,maxComponents)
        :Math.min(4,maxComponents);
    let executionMode="";
    if(sig.cleanBasket)
      executionMode=`EXECUTION MODE — CLEAN CLASSIC: Basket reads like a natural pairing. Execute cleanly with textbook technique. Prefer ${simplicityGoal} on-plate elements (max ${maxComponents}). Do NOT force fusion, stunts, or extra texture layers — trust the ingredients.`;
    else if(sig.hardBasket)
      executionMode=`EXECUTION MODE — HARD / CHAOTIC BASKET: Simplify aggressively. Target ${simplicityGoal} on-plate elements (never more than ${maxComponents}). ONE idea only — do NOT add bonus structure (extra cakes, grains, nested bases) to "save" a weird basket. Lean into clarity; downshift cleverness. If junk-food or shelf-sweet items are present, use them in SUPPORTING roles (accent, small glaze, restrained dose) — not as the dish's identity unless the challenge is dessert.`;
    else
      executionMode=`EXECUTION MODE — STANDARD: Prefer ${simplicityGoal} clear components (cap ${maxComponents}). One starring technique max.`;
    const productSweetNote=sig.processedSweet
      ?` PROCESSED SWEET ALERT: At least one required item is shelf-sweet. It must read as that product in use (squeeze, scoop, from bottle) — not re-labeled as artisan chocolate. Keep it a supporting player unless dessert.`
      :"";
    const courseBlock=courseEnforcementBlock(ch,sig);
    const m=ch.totalTime;
    const techniquePolicy=m<=30
      ?`TECHNIQUE vs TIME (${m} min, tight): Nothing is "banned." Finicky work (foam/aeration, spherification, fluid gels, LN2, long-setting gels) may ONLY appear if your step times prove each stage fits inside Prep+Cook with a realistic buffer. If the math is doubtful, use a simpler method (crema, reduction, melted cheese, pan sauce, vinaigrette).`
      :m<=45
        ?`TECHNIQUE vs TIME (${m} min, moderate): Advanced techniques are fine when step durations add up honestly and the dish still respects the component budget. If a foam or refined emulsion is marginal on time, prefer a stable sauce that delivers the same flavor intent.`
        :`TECHNIQUE vs TIME (${m} min, generous): Full cheffy range is allowed — foams, refined emulsions, more layers — as long as the timeline proves feasibility (no fantasy minutes). Technique must earn its place; avoid empty showboating.`;
    const prompt=`CHOPPED-style competition recipe. ONE valid JSON object only — no markdown, no code fences, no extra text. ASCII quotes. No trailing commas. Step "how" max ~90 chars.

CHALLENGE: ${ch.ctype.label} | DIFFICULTY: ${ch.diff} | TIME: ${ch.totalTime}min (Prep ${ch.prepTime}, Cook ${ch.cookTime})
REQUIRED BASKET (each must CARRY the dish, not garnish-only): ${ch.required.join(", ")}
PANTRY you may use (only these + basics like salt/oil/water): ${pantryLines}
${res}
${fe} ${re} ${bl}

${courseBlock}
${executionMode}
${productSweetNote}

FOOD PRODUCT TRUTH (material honesty — not vocabulary checks):
- Naming a required ingredient is NOT enough. For EACH required item: (1) ingredients[] must list it in the honest starting form from the store (or a clear portion of that package); (2) at least one step must show physical handling of that real product (squeeze bottle, scoop from tub, tear crust, chop whole fruit, grate from block).
- balance.basket must include one concrete sensory/material note per required item (too sweet, thin vs thick, fake vanilla, waxy chocolate, salty pickle brine, etc.) so a judge recognizes the actual SKU — not a re-branded "chef version" with only the label in common.
- The dish fails if a competitor could swap in a finer product without changing your steps — steps must be specific to what was in the basket.

BASKET INTEGRITY (mandatory):
- The plate's STAR (main story: protein/starch/veg focal point) must come from REQUIRED + PANTRY above. Do NOT add a new centerpiece (chicken, beef, pork, salmon, etc.) unless that exact protein appears in REQUIRED or PANTRY.
- Each REQUIRED item: name its PRIMARY role (filling, crust, sauce base, relish, main veg, etc.).
- Prefer one bold coherent idea — at most ${maxSteps} steps before PLATE, believable in ${ch.totalTime} min.
- RICHNESS: oily fish + aged cheese + heavy cream is usually overload; choose at most one fat-forward anchor unless you explicitly lighten the others.

STRUCTURE / ONE BASE (control creativity — avoid "AI fusion" that fights itself):
- ONE PRIMARY STARCH OR GRAIN ANCHOR for the plate body: do not run two full starch systems as co-equal bases (e.g. arborio risotto + pizza crust both bulking the "rice"; pasta + potato both the chew; rice + big bread chunks in the same cohesive base). Judges get gummy, heavy, or confused textures. Pick ONE path OR make the second element clearly minor (thin crumble, crisp topper, dust) and state in balance.complete why it will not turn stodgy.
- If the basket supplies items that imply two starches (pizza + rice): choose a SINGLE cleaner story — e.g. crisped crust with beer-braised veg and sauce OR a true risotto with only a whisper of crust; not "risotto that is also loaded with bread."
- LIMIT COMPOUND CLEVERNESS: at most ONE high-concept move per dish (the big idea). Do not stack multiple wow-fusions; prefer what a confident competitor would pitch in one clear sentence — natural beats over-constructed.
- DISH CLARITY: In one breath, a competitor could say what this IS ("custard tart," "seared fish with X," "composed appetizer"). If you cannot name it plainly, simplify until you can.
- SWEET LAYERING: dried fruit (prunes, raisins), malty beer, honey/maple/brown sugar are cumulative — do not add extra concentrated sweetness without trimming elsewhere. Default: if prunes anchor the sauce, skip added honey/syrup unless balance.flavor explains the bitter/acid/salt hammer you are using and why it stays savory.

BASKET IDENTITY (no "laundering" ugly or processed items):
- Do not silently upgrade a required item into a fancier product. If the basket says chocolate frosting, canned soup, neon candy, etc., the ingredients list and at least one step must name that real starter. You may transform it — but a judge must see you used what was in the basket, not conceptually swapped it for couverture or demi-glace.
- If a required item is very sweet or artificial-vanilla-heavy (frosting, icing, candy), balance.richness MUST be realistic: supermarket sweetness does not fully vanish — spell out limits (thin sauce, small amount, bitter/acid/salt forward, taste as you go). Avoid magical wording like "kill all sweetness" without concrete guardrails. If the combo could still read dessert-heavy, say what you'd watch for at the pass.

PLAIN LANGUAGE (kitchen dock, not press release):
- No purple prose or packaging clichés. Avoid terms like: "flavor arc", "cream liaison", "controlled pool", "jewel-toned", "symphony", "tapestry", "nest the...", "hero element", "elevate", "celebrate the ingredient" when plain words work.
- tagline, step labels ("what"), plating, and step "how" lines: short, direct, competitor voice — like you're calling it to the judges' table, not writing a press kit.

TIMELINE REALISM:
- The work in your steps must honestly fit ~${ch.totalTime} min total challenge time (your ${ch.prepTime} prep + ${ch.cookTime} cook narrative). If tasks run in parallel, say so. Do not compress a full entrée into a obviously too-short window unless timing is explained.
- Do not oversell "easy" or relaxed pacing when the sequence is tight — tip or balance.complete may note that the clock is aggressive but doable with parallel work (if true).

REAL COOK / TIME-FIRST (judges hate fantasy timing, not ambition):
${techniquePolicy}

async function generateContestRecipe(){
  // Always snapshot the live builder — state.challenge is only set at Launch and goes stale after edits or Back.
  const ch=challengeFromBuilder();
  if(!(ch.required&&ch.required.length)){alert("Pick at least one required ingredient (or spin the mystery basket) first.");return;}
  const setContestStatus=(text,color)=>{
    const el=$("contest-plan-status");
    if(!el) return;
    el.textContent=text||"";
    el.style.color=color||"#64748b";
  };
  const resetContestBtn=()=>{
    const b=$("contest-live-btn");
    if(b){b.disabled=false;b.innerHTML="🔴 Competition game plan";}
  };
  const bStart=$("contest-live-btn");
  if(bStart){bStart.disabled=true;bStart.innerHTML="⏳ Calling the pass…";}
  setContestStatus("Contacting AI…","#64748b");
  try{
    const courseLabel=(ch.ctype&&ch.ctype.label)?String(ch.ctype.label):"Entree";
    const prepT=Number(ch.prepTime)||0;
    const cookT=Number(ch.cookTime)||0;
    const totT=Number(ch.totalTime)||45;
    const pantryArr=Array.isArray(ch.pantry)?ch.pantry:[];
    const pantryLines=pantryArr.length<=28?pantryArr.join(", "):pantryArr.slice(0,28).join(", ")+", …";
    const rr=state.recipe;
    const rivalBlock=rr
      ? `RIVAL DRAFT (do not plagiarize; out-execute on clarity and clock fit):
Title: ${(rr.title||"").slice(0,120)}
Tagline: ${(rr.tagline||"").slice(0,160)}
`
      : `No rival draft loaded yet — build the plan from the basket and rules only.\n`;
    const prompt=`You are a competition cooking coach for a timed TV-style FOOD cook-off. The cook will REALLY cook this on the clock — edible plate only, not drinks-only.
Write a WINNING, execution-tight plan — not a copy of any rival draft. Different angles, clearer priorities, fewer moving parts.

${rivalBlock}
MUST USE: ${ch.required.join(", ")}
RESTRICTIONS (mandatory — same binding rules as the rival chef): ${(ch.restrictions||[]).length?(ch.restrictions||[]).join("; "):"none"}
EQUIPMENT: must ${(ch.reqEquip||[]).join(", ")||"—"} · forbidden ${(ch.forbEquip||[]).join(", ")||"—"}${ch.limitBurners?" · 1 burner only":""}
COURSE: ${courseLabel} | ${totT} min (prep ${prepT}, cook ${cookT})
PANTRY ADD-ONS: ${pantryLines}

Return ONLY valid JSON — no markdown, no code fences. ASCII quotes. Short strings — no essays.
{"title":"","tagline":"","atThePass":"2-3 short sentences: what hits the plate and how judges read it","flavorBalance":"2 short sentences: acid/salt/sweet/fat balance","ingredients":[{"item":"","amount":"","prep":""}],"steps":[{"phase":"PREP","what":"","how":""}],"lastMinuteTip":"one sentence"}
Max 8 steps. Phases: PREP, COOK, SAUCE, ASSEMBLE, PLATE — last must be PLATE. Each "how" under 90 chars. Honor every MUST USE; if any RESTRICTIONS are listed, the dish must fully comply — no rule-breaking shortcuts.`;
    const data=await ai(prompt,4096);
    state.contestRecipe=data;
    if(state.recipe){
      try{
        const sr=$("screen-recipe");
        const onRecipeScreen=sr && !sr.classList.contains("hidden");
        if(onRecipeScreen) showRecipeData(state.recipe);
      }catch(err){
        console.error("showRecipeData after contest",err);
      }
    }else{
      renderBuild();
    }
    renderContestRecipeBox();
    setContestStatus("Done — your plan is below.","#15803d");
    const planBox=$("contest-recipe-inline");
    if(planBox) planBox.scrollIntoView({behavior:"smooth",block:"nearest"});
  }catch(e){
    console.error("Competition game plan",e);
    const msg=(e&&e.message)?String(e.message):String(e);
    setContestStatus("Failed: "+msg.slice(0,220),"#b91c1c");
    alert("Competition game plan failed: "+msg);
  }finally{
    resetContestBtn();
  }
}

function formatTime(s){const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");}

function toggleTimer(){
  if(state.timerRunning){clearInterval(state.timerInterval);state.timerRunning=false;$("timer-toggle").textContent="Resume";$("timer-toggle").style.background="#22c55e";}
  else{
    state.timerRunning=true;$("timer-toggle").textContent="Pause";$("timer-toggle").style.background="#ef4444";
    const total=state.challenge.totalTime*60;
    state.timerInterval=setInterval(()=>{
      state.timerRem=Math.max(0,state.timerRem-1);
      const pct=state.timerRem/total;
      const col=pct>0.5?"#22c55e":pct>0.25?"#f59e0b":"#ef4444";
      const td=$("timer-display");const tb=$("timer-bar");
      if(td){td.textContent=formatTime(state.timerRem);td.style.color=col;}
      if(tb){tb.style.width=(pct*100)+"%";tb.style.background=col;}
      if(state.timerRem===0){clearInterval(state.timerInterval);state.timerRunning=false;const tu=$("timeup-banner");if(tu)tu.style.display="block";}
    },1000);
  }
}
function resetTimer(){clearInterval(state.timerInterval);state.timerRunning=false;state.timerRem=state.challenge.totalTime*60;const td=$("timer-display");const tb=$("timer-bar");if(td){td.textContent=formatTime(state.timerRem);td.style.color="#22c55e";}if(tb){tb.style.width="100%";tb.style.background="#22c55e";}$("timer-toggle").textContent="Start";$("timer-toggle").style.background="#22c55e";}

function resetDuelScores(){
  const d={taste:7,creativity:7,presentation:7,difficulty:7};
  state.scoresYou={...d};state.scoresAI={...d};
}

function updateDuelScore(side,k,v){
  const key=side==="you"?"scoresYou":"scoresAI";
  state[key][k]=+v;
  const el=$(`score-${side}-val-${k}`);
  if(el) el.textContent=v;
  updateScoreDisplay();
}
function calcTotal(s){return Math.round(s.taste*3.5+s.creativity*2.5+s.presentation*2+s.difficulty*2);}
function gradeTotal(t){return {g:t>=90?"A+":t>=80?"A":t>=70?"B":t>=60?"C":"D",gc:t>=80?"#22c55e":t>=60?"#f59e0b":"#ef4444"};}
function updateScoreDisplay(){

"name": STANDARD ENGLISH pantry label (US grocery / competition basket), Title Case — e.g. Chicken, Chicken Breast, Boneless Skinless Chicken Breast. NEVER translate (no Poulet, Suprema de Pollo, etc.) unless the user's text was in that language. Match specificity: vague input → simple name (chicken → Chicken); specific cut → that cut in English.
"notes": 1-2 sentence competition tip.
"tags": array of flavor tags (salty, umami, etc.).`,
  pantry_item:i=>`Culinary expert. User is stocking their home pantry for "${i}". Return ONLY compact JSON — no markdown, no extra text.
"name": STANDARD ENGLISH pantry label (US grocery), Title Case — same rules as competition baskets.
"category": ONE short shelf label, Title Case — choose the best fit from typical store sections (e.g. Proteins, Vegetables, Dairy, Canned & Jarred, Baking & Bases, Snacks, Spices & Herbs) or use "${CUSTOM_PANTRY_CAT}" if unsure.
"notes": 1-2 sentence competition tip for cooking with it.
"tags": array of flavor tags from: sweet, salty, sour, bitter, umami, savory, gamey, rich, briny, smoky, mild (use 1-4 that fit).`,
  restriction:i=>`Culinary expert. "${i}" as a cooking restriction. Return ONLY JSON no markdown: {"label":"short name","description":"what it eliminates","tags":["affected"]}`,
  equipment: i=>`Culinary expert. "${i}" as kitchen equipment. Return ONLY JSON no markdown: {"label":"equipment name","description":"how it affects cooking","tags":["techniques"]}`,

      <button type="button" onclick="doModalLookup()" style="background:#fff;border:2px solid #fecaca;border-radius:5px;padding:4px 10px;cursor:pointer;font-size:11px">Try Again</button>
    </div>`;

function doModalAdd(data){
  const t=state.modalType;
  if(t==="type"){const nt={id:"c"+Date.now(),label:data.label||data.name,emoji:data.emoji||"🍴",custom:true};state.customTypes.push(nt);state.ctype=nt;}
  else if(t==="ingredient"){const n=data.name||data.label;if(n&&!state.req.includes(n)){if(ingredientConflictsWithAny(n,state.res)){alert("That ingredient conflicts with a restriction (e.g. dairy under No Dairy).");return;}state.req.push(n);}}
  else if(t==="pantry_item"){
    const n=(data.name||data.label||"").trim();
    if(!n){closeModal();refreshAfterModalAdd();return;}
    const low=n.toLowerCase();
    if(pantryCatalog().some(x=>x.name.toLowerCase()===low)){alert("That ingredient is already in the list (built-in or yours).");closeModal();refreshAfterModalAdd();return;}
    const allowed=new Set(["sweet","salty","sour","bitter","umami","savory","gamey","rich","briny","smoky","mild"]);
    const flavor=(data.tags||[]).map(x=>String(x).toLowerCase()).filter(x=>allowed.has(x));
    const flavor2=flavor.length?flavor.slice(0,4):["mild"];
    const cat=(data.category||CUSTOM_PANTRY_CAT).trim()||CUSTOM_PANTRY_CAT;
    const id="pc_"+Date.now();
    state.customPantryItems.push({
      id,name:n,cat,flavor:flavor2,texture:[],richness:"lean",acidity:"none",intensity:"mild",
      notes:(data.notes||"Added to your pantry.").slice(0,500),custom:true
    });
    if(!state.pantryItems.includes(id))state.pantryItems.push(id);
  }
  else if(t==="restriction"){
    const n=normalizeRestrictionKey(data.label);
    if(n&&!state.res.includes(n)){state.res=sanitizeRestrictionList([...state.res,n]);}
    pruneConflictingReq(DIFF[state.diff]);
  }
  else if(t==="equipment"){const n=data.label;if(n&&!state.reqEq.includes(n))state.reqEq.push(n);}
  closeModal();refreshAfterModalAdd();
}

function doModalAddFromPending(){
  const data=window.__basketPendingModal;
  delete window.__basketPendingModal;
  if(data) doModalAdd(data);
}

function ingredientConflictsWithRestriction(ingName, restriction){
  restriction=normalizeRestrictionKey(restriction);
  const n=String(ingName||"").toLowerCase();
  const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===n);
  const cat=String((m&&m.cat)||"").toLowerCase();

  if(restriction==="No Dairy"){
    if(/\b(heavy cream|half\s*and\s*half|cream cheese|sour cream|cream|milk|buttermilk|butter|cheese|yogurt|kefir|mozzarella|feta|parmesan|pecorino|goat cheese|ricotta|cheddar|brie|halloumi|crema|queso|ghee|whey|paneer)\b/i.test(n)) return true;
    if(/dairy|cheese/.test(cat)) return true;
    return false;
  }
  if(restriction==="No Butter"){
    if(/\bbutter\b|ghee|brown butter/i.test(n)) return true;
    return false;
  }
  if(restriction==="No Gluten"){
    if(/\b(flour|wheat|pasta|spaghetti|bread|couscous|barley|rye|semolina|udon|ramen|noodle|farro|bulgur)\b/i.test(n)) return true;
    if(/\ball[\s-]?purpose\b/i.test(n)) return true;
    if(/\bsoy sauce\b/i.test(n)) return true;
    return false;
  }
  if(restriction==="No Sugar"){
    if(/\b(honey|sugar|maple|molasses|candy|frosting|icing|marshmallow|nesquik|syrup|caramel sauce|jam)\b/i.test(n)) return true;
    if(/\b(chocolate|dark chocolate)\b/i.test(n)) return true;
    return false;
  }
  if(restriction==="No Pre-made Sauces"){
    if(/\b(soy sauce|fish sauce|worcestershire|oyster sauce|hoisin|sriracha|ketchup|bbq sauce|teriyaki)\b/i.test(n)) return true;
    if(/\b(crushed tomatoes|tomato paste|mustard|vinegar)\b/i.test(n) && /\b(canned|jarred|bottle)\b/i.test(cat)) return true;
    return false;
  }
  if(restriction==="No Alcohol"){
    if(/\bvinegar\b/i.test(n)) return false;
    if(/\b(beer|bourbon|whiskey|rum|vodka|brandy|sake|liqueur|alcohol)\b/i.test(n)) return true;
    if(/\bwine\b/i.test(n)) return true;
    return false;
  }
  if(restriction==="No Nuts"){
    if(/\b(almond|peanut|cashew|pistachio|pecan|walnut|hazelnut|pine nut|macadamia|pesto)\b/i.test(n)) return true;
    if(/nuts\s*&\s*seeds/i.test(cat)) return true;
    return false;
  }
  if(restriction==="Vegetarian"){
    if(/\b(chicken|beef|pork|lamb|turkey|duck|salmon|tuna|cod|halibut|trout|fish|shrimp|prawn|crab|lobster|scallops?|mussels?|clams?|anchov(?:y|ies)|sardines?|bacon|sausage|prosciutto|chorizo|ground beef|steak|oxtail|veal)\b/i.test(n)) return true;
    if(cat==="proteins" && !/\b(egg|tofu|tempeh|bean|chickpea|lentil)\b/i.test(n)) return true;
    return false;
  }
  if(restriction==="Vegan"){
    if(ingredientConflictsWithRestriction(ingName,"No Dairy")) return true;
    if(ingredientConflictsWithRestriction(ingName,"No Butter")) return true;
    if(/\b(egg|eggs|honey|gelatin|mayo)\b/i.test(n)) return true;
    if(ingredientConflictsWithRestriction(ingName,"Vegetarian")) return true;
    return false;
  }
  if(restriction==="Raw Only"){
    // True = needs thorough cooking / unsafe "raw on the plate" for typical comp judging
    if(/\b(ground|sausage|hot dog|kielbasa|chorizo|bratwurst|mortadella|salami)\b/i.test(n)) return true;
    if(/\bprosciutto\b/i.test(n) && !/\bcotto\b/i.test(n)) return false;
    if(/\b(bacon|pancetta|guanciale|prosciutto cotto)\b/i.test(n)) return true;
    if(/\b(chicken|turkey|duck|goose|quail|pheasant|cornish|wing|drumstick)\b/i.test(n)) return true;
    if(/\b(whole chicken|turkey breast)\b/i.test(n)) return true;
    if(/\bpork\b/i.test(n)) return true;
    if(/\b(lamb|veal|rabbit|bison|buffalo)\b/i.test(n)) return true;
    if(/\b(brisket|short rib|oxtail|beef liver|chicken liver|offal)\b/i.test(n)) return true;
    if(/\bground beef\b/i.test(n)) return true;
    if(/\b(swordfish|lobster tail|crab meat|squid|octopus|mussels?|clams?)\b/i.test(n)) return true;
    if(/\bduck breast\b/i.test(n)) return true;
    if(cat==="proteins" && /\b(tofu|tempeh|seitan)\b/i.test(n)) return false;
    if(/\b(eggs?|egg)\b/i.test(n)) return false;
    if(/\b(salmon|tuna|hamachi|yellowtail|cod|halibut|sea bass|mahi|snapper|arctic char|trout)\b/i.test(n)) return false;
    if(/\bfillet\b/i.test(n) && !/\b(chicken|pork|turkey|duck)\b/i.test(n)) return false;
    if(/\b(scallops?|shrimp|prawn)\b/i.test(n)) return false;
    if(/\b(ribeye|flank|skirt|sirloin|tenderloin|filet|striploin|wagyu|ny strip|new york)\b/i.test(n)) return false;
    if(/\bsteak\b/i.test(n) && !/\b(chicken|pork|fish|swordfish)\b/i.test(n)) return false;
    if(cat==="proteins") return true;
    return false;
  }
  if(restriction==="No Salt") return false;
  return false;
}

function ingredientConflictsWithAny(ingName, restrictions){
  return (restrictions||[]).some(r=>ingredientConflictsWithRestriction(ingName,r));
}

function filterPoolByRestrictions(pool, restrictions){
  const r=restrictions||[];
  if(!r.length) return [...new Set((pool||[]).filter(Boolean))];
  return [...new Set((pool||[]).filter(Boolean))].filter(n=>!ingredientConflictsWithAny(n,r));
}

function pruneConflictingReq(cfg){
  const need=cfg.req;
  state.req=state.req.filter(n=>!ingredientConflictsWithAny(n,state.res));
  const pool=filterPoolByRestrictions(pantryPool(),state.res).filter(x=>!state.req.includes(x));
  while(state.req.length<need && pool.length){
    const i=Math.floor(Math.random()*pool.length);
    state.req.push(pool.splice(i,1)[0]);
  }
  const p=pantryPool();
  state.req=ensureCourseBasketViability(state.req,state.ctype,state.diff,p,state.res,pwChaosOrInsane());
}

function classifyRequiredBucket(name){
  const n=String(name||"").toLowerCase();
  const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===n);
  const cat=String((m&&m.cat)||"").toLowerCase();
  const wildcardRx=/\b(candy|frosting|icing|syrup|caramel|chocolate|soda|cola|chips|cereal|cookie|marshmallow|dessert|sweet)\b/;
  if(wildcardRx.test(n)||/sweet items|snacks/.test(cat)) return "wildcard";

  // Cheese / cream / butter = flavor driver — NOT the "protein" basket slot (meat/fish/eggs/beans).
  if(/dairy\s*&\s*cheese|dairy|cheese/.test(cat) || /\b(butter|cream|milk|yogurt|mozzarella|feta|parmesan|pecorino|goat cheese|ricotta|cheddar|brie|halloumi|crema)\b/.test(n)) return "flavor";

  // Pulses / legumes: basket "vegetable" slot — not the animal/tofu/egg protein slot (Chopped-style).
  const legumeRx=/\b(chickpea|chickpeas|garbanzo|black bean|black beans|kidney bean|kidney beans|navy bean|navy beans|pinto bean|pinto beans|cannellini|great northern beans|white beans|lima bean|lima beans|fava bean|fava beans|lentil|lentils|split pea|split peas)\b/i;
  if(legumeRx.test(n)) return "produce";

  // Stocks, broths, fonds — liquid savory bases, not a centerpiece protein (Chicken Stock ≠ chicken on the plate).
  if(/\b(stock|broth|bone\s*broth|bouillon|consomm[ée]|consomme|fumet|dashi)\b/i.test(n)) return "flavor";

  // Primary protein: meat, seafood, eggs, tofu/tempeh/seitan — not legumes (handled above).
  const primaryRx=/\b(chicken|beef|pork|lamb|turkey|duck|salmon|tuna|cod|halibut|trout|fish|shrimp|prawn|crab|lobster|scallops?|mussels?|clams?|tofu|tempeh|seitan|egg|eggs|anchov(?:y|ies)|sardines?|ground beef|steak|bacon|sausage|prosciutto|chorizo|kielbasa|andouille)\b/;
  if(cat==="proteins" || /seafood|meat|poultry/.test(cat) || primaryRx.test(n)) return "protein";

  // Produce: veg, fruit, aromatics (onion family, etc.)
  const produceRx=/\b(tomato|tomatoes|onion|shallot|garlic|ginger|pepper|jalape|spinach|kale|cauliflower|asparagus|corn|beet|brussels|carrot|scallion|lemon|lime|avocado|mango|apple|banana|orange|berry|grape|melon|mushroom|potato|zucchini|eggplant|herb|basil|thyme|rosemary|fiddlehead|rambutan)\b/;
  if(/vegetables|fruits|aromatics/.test(cat) || produceRx.test(n)) return "produce";

  return "flavor";
}

/** Chaos toggle or Insane difficulty → skip course-vs-basket viability fixes. */
function pwChaosOrInsane(){
  return !!(state.chaosBasket||state.diff==="insane");
}

function courseIsDessert(ctype){
  if(!ctype) return false;
  if(ctype.id==="dessert") return true;
  return /\bdessert\b/i.test(String(ctype.label||""));
}

function classifyRequiredBasketType(name){
  const b=classifyRequiredBucket(name);
  if(b==="wildcard") return "wildcard";
  if(b==="protein") return "protein";
  if(b==="produce") return "produce";
  const n=String(name||"").toLowerCase();
  const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===n);
  const cat=String((m&&m.cat)||"").toLowerCase();
  if(/dairy\s*&\s*cheese|dairy|cheese/.test(cat)) return "dairy";
  return "flavor";
}

function getIngredientCompatibilityMeta(name){
  const n=String(name||"").toLowerCase();
  const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===n);
  const cat=String((m&&m.cat)||"").toLowerCase();
  const flavors=(m&&m.flavor)||[];
  const hasFlavor=f=>flavors.some(x=>String(x).toLowerCase()===String(f).toLowerCase());
  const isFruit=/fruits/i.test(cat);
  const isDairy=/dairy\s*&\s*cheese|dairy|cheese/.test(cat)
    ||/\b(butter|cream|milk|yogurt|mozzarella|feta|parmesan|pecorino|goat cheese|ricotta|cheddar|brie|halloumi|crema|mascarpone|paneer)\b/.test(n);
  const isSugarSource=/\b(honey|sugar|maple|molasses|caramel|marshmallow|chocolate|nesquik|frosting|icing|agave|jam|jelly|sweetener|vanilla bean|toffee|butterscotch)\b/.test(n)||/sweet items|snacks/i.test(cat);
  const hasSweetNote=hasFlavor("sweet");
  let dessertCompatibility=3;
  if(/sweet items/i.test(cat)||/\b(dark chocolate|white chocolate|caramel|marshmallow|vanilla bean)\b/.test(n)||isSugarSource) dessertCompatibility=5;
  else if(isFruit) dessertCompatibility=4;
  else if(isDairy) dessertCompatibility=4;
  else if(hasSweetNote) dessertCompatibility=4;
  if(classifyRequiredBucket(name)==="protein"&&!/\b(egg|eggs)\b/.test(n)) dessertCompatibility=Math.min(dessertCompatibility,2);
  if(/\b(soy sauce|fish sauce|fish stock|anchov)\b/.test(n)) dessertCompatibility=Math.min(dessertCompatibility,2);
  const basketType=classifyRequiredBasketType(name);
  return {basketType,isFruit,isDairy,isSugarSource,hasSweetNote,dessertCompatibility};
}

function dessertBasketHasPath(req, restrictions){
  const noSugar=(restrictions||[]).includes("No Sugar");
  const r=restrictions||[];
  const noDairy=r.includes("No Dairy")||r.includes("Vegan");
  for(const name of req||[]){
    const m=getIngredientCompatibilityMeta(name);
    if(m.isFruit) return true;
    if(!noDairy&&m.isDairy) return true;
    if(!noSugar&&m.isSugarSource) return true;
    if(!noSugar&&m.dessertCompatibility>=4&&(m.hasSweetNote||m.dessertCompatibility>=5)) return true;
  }
  return false;
}

const PW_SAVORY_LEGUME_RX=/\b(chickpea|chickpeas|garbanzo|black bean|black beans|kidney bean|kidney beans|navy bean|navy beans|pinto bean|pinto beans|cannellini|great northern beans|white beans|lima bean|lima beans|fava bean|fava beans|lentil|lentils|split pea|split peas)\b/i;

function savoryBasketHasPath(req){
  for(const name of req||[]){
    const b=classifyRequiredBucket(name);
    const n=String(name||"");
    if(b==="protein") return true;
    if(/\b(egg|eggs|tofu|tempeh|seitan)\b/i.test(n)) return true;
    if(PW_SAVORY_LEGUME_RX.test(n)) return true;
  }
  return false;
}

function pickDessertAnchorFromPool(candidates, restrictions){
  if(!candidates||!candidates.length) return null;
  const noSugar=(restrictions||[]).includes("No Sugar");
  const r=restrictions||[];
  const noDairy=r.includes("No Dairy")||r.includes("Vegan");
  const ok=candidates.filter(n=>{
    const m=getIngredientCompatibilityMeta(n);
    if(m.isFruit) return true;
    if(!noDairy&&m.isDairy) return true;
    if(!noSugar&&m.isSugarSource) return true;
    if(!noSugar&&m.dessertCompatibility>=4&&(m.hasSweetNote||m.isFruit)) return true;
    if(!noSugar&&m.dessertCompatibility>=5) return true;
    return false;
  });
  if(!ok.length) return null;
  return ok[Math.floor(Math.random()*ok.length)];
}

function pickSavoryAnchorFromPool(candidates){
  if(!candidates||!candidates.length) return null;
  const ok=candidates.filter(n=>{
    const s=String(n||"");
    if(classifyRequiredBucket(n)==="protein") return true;
    if(/\b(egg|eggs|tofu|tempeh|seitan)\b/i.test(s)) return true;
    if(PW_SAVORY_LEGUME_RX.test(s)) return true;
    return false;
  });
  if(!ok.length) return null;
  return ok[Math.floor(Math.random()*ok.length)];
}

function pickLeastUsefulIndexForCourse(req, ctype){
  const scored=(req||[]).map((name,i)=>({i,name,meta:getIngredientCompatibilityMeta(name),bucket:classifyRequiredBucket(name)}));
  if(!scored.length) return 0;
  if(courseIsDessert(ctype)){
    scored.sort((a,b)=>a.meta.dessertCompatibility-b.meta.dessertCompatibility);
    return scored[0].i;
  }
  const rank=x=>{
    const nm=String(x.name||"");
    if(x.bucket==="protein"||/\b(egg|eggs|tofu|tempeh|seitan)\b/i.test(nm)||PW_SAVORY_LEGUME_RX.test(nm)) return 3;
    if(x.bucket==="produce") return 2;
    return 1;
  };
  scored.sort((a,b)=>rank(a)-rank(b));
  return scored[0].i;
}

function viabilitySwapAttempts(diffKey, chaos){
  if(chaos||diffKey==="insane") return 0;
  if(diffKey==="easy") return 5;
  if(diffKey==="medium") return 3;
  return 2;
}

function ensureCourseBasketViability(req, ctype, diffKey, pool, restrictions, chaos){
  if(!req||!req.length) return req||[];
  if(chaos) return req.slice();
  const filt=filterPoolByRestrictions(pool||[],restrictions||[]);
  let out=req.slice();
  const tries=viabilitySwapAttempts(diffKey,chaos);
  for(let t=0;t<tries;t++){
    let needFix=false;
    if(courseIsDessert(ctype)&&!dessertBasketHasPath(out,restrictions)) needFix=true;
    if(!courseIsDessert(ctype)&&!savoryBasketHasPath(out)) needFix=true;
    if(!needFix) break;
    const spare=filt.filter(x=>!out.includes(x));
    const anchor=courseIsDessert(ctype)
      ?pickDessertAnchorFromPool(spare,restrictions)
      :pickSavoryAnchorFromPool(spare);
    if(!anchor) break;
    const replaceIdx=pickLeastUsefulIndexForCourse(out,ctype);
    out[replaceIdx]=anchor;
  }
  return out;
}

function pickRequiredPattern(pool,count,resList){
  const r=resList!==undefined?resList:state.res;
  const filtered=filterPoolByRestrictions(pool||[],r||[]);
  const uniq=[...new Set(filtered.filter(Boolean))];
  if(uniq.length===0){
    alert("Nothing in your pantry matches the current restrictions. Clear a restriction or add compatible ingredients.");
    return [];
  }
  const by={protein:[],produce:[],wildcard:[],flavor:[]};
  uniq.forEach(n=>by[classifyRequiredBucket(n)].push(n));
  const ordered=count>=4?["protein","produce","wildcard","flavor"]:count===3?["protein","produce","flavor"]:["protein","produce"];
  const out=[];
  const pickOne=(k)=>{
    const avail=by[k].filter(x=>!out.includes(x));
    if(!avail.length) return;
    if(k==="produce"&&avail.length>1){
      const vegFruit=avail.filter(n=>{
        const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===String(n).toLowerCase());
        return m&&/vegetables|fruits/i.test(String(m.cat||""));
      });
      const pickPool=vegFruit.length?vegFruit:avail;
      out.push(pickPool[Math.floor(Math.random()*pickPool.length)]);
    } else {
      out.push(avail[Math.floor(Math.random()*avail.length)]);
    }
  };
  ordered.forEach(k=>pickOne(k));
  const leftovers=uniq.filter(x=>!out.includes(x));
  while(out.length<count&&leftovers.length) out.push(leftovers.splice(Math.floor(Math.random()*leftovers.length),1)[0]);
  return out.slice(0,count);
}

function mysterySpinResultPanelHtml(){
  const cfg=DIFF[state.diff];
  const need=cfg.req;
  const nConstraints=Math.max(Number(cfg.res)||0, Number(cfg.forb)||0);
  const parts=[];
  for(let i=0;i<need;i++){
    const name=state.req[i]||"—";
    parts.push(`<div class="basket-spin-cell"><span class="basket-spin-lbl">Must use ${i+1}</span><div class="rnd-slot rnd-done-ing">${escapeHtml(name)}</div></div>`);
  }
  for(let j=0;j<nConstraints;j++){
    const txt=state.spinConstraints[j]||"—";
    const isForb=txt.startsWith("✕ ");
    parts.push(`<div class="basket-spin-cell"><span class="basket-spin-lbl">Restriction ${j+1}</span><div class="rnd-slot ${isForb?"rnd-done-forb":"rnd-done-res"}">${escapeHtml(txt)}</div></div>`);
  }
  parts.push(`<div class="basket-spin-cell"><span class="basket-spin-lbl">AI clock</span><div class="rnd-slot rnd-done-time">${Number(state.total)||30} min</div></div>`);
  const ct=`${state.ctype.emoji} ${state.ctype.label}`;
  parts.push(`<div class="basket-spin-cell"><span class="basket-spin-lbl">Challenge</span><div class="rnd-slot rnd-done-ct">${escapeHtml(ct)}</div></div>`);
  return `<div class="basket-spin-wrap">
    <div class="basket-spin-h"><span>🎰 Mystery basket</span><span style="font-size:11px;font-weight:700;color:#64748b">${escapeHtml(cfg.label)} · locked in</span></div>
    <div class="basket-spin-slots">${parts.join("")}</div>
    <div style="font-size:11px;color:#64748b;margin-top:10px;text-align:center;line-height:1.45"><strong>AI clock</strong> is how long the rival-chef recipe assumes (20–45 min). Edit chips below or spin again for a new haul.</div>
  </div>`;
}

function runMysteryRandomize(){
  const host=$("spin-host");
  if(!host)return;
  state.mysterySpinLocked=false;
  const pool=(window.USER_PANTRY&&window.USER_PANTRY.length)?window.USER_PANTRY:PANTRY;
  const cfg=DIFF[state.diff];
  const need=cfg.req;
  const nConstraints=Math.max(Number(cfg.res)||0, Number(cfg.forb)||0);
  const ctypePool=[...CTYPES,...state.customTypes];
  const totalSlots=need+nConstraints+2;
  const slotMeta=[];
  for(let i=0;i<need;i++) slotMeta.push({kind:"ing",lbl:"Must use "+(i+1)});
  for(let j=0;j<nConstraints;j++) slotMeta.push({kind:"con",lbl:"Restriction "+(j+1)});
  slotMeta.push({kind:"time",lbl:"AI clock"});
  slotMeta.push({kind:"ct",lbl:"Challenge"});
  const cells=slotMeta.map((m,i)=>`<div class="basket-spin-cell" data-i="${i}"><span class="basket-spin-lbl">${m.lbl}</span><div class="rnd-slot" data-kind="${m.kind}" aria-label="${escapeHtml(m.lbl)}">—</div></div>`).join("");
  host.innerHTML=`<div class="basket-spin-wrap">
    <div class="basket-spin-h"><span>🎰 Mystery basket</span><span style="font-size:11px;font-weight:700;color:#64748b">${escapeHtml(cfg.label)} · spinning…</span></div>
    <div class="basket-spin-slots" id="rnd-slots">${cells}</div>
    <div class="basket-spin-bar"><i></i></div>
  </div>`;
  try{ host.scrollIntoView({behavior:"smooth",block:"nearest"}); }catch(_e){}
  const slots=[...host.querySelectorAll(".rnd-slot")];
  if(slots.length!==slotMeta.length){
    console.error("Mystery basket: slot mismatch", {slots:slots.length,meta:slotMeta.length});
    alert("Spinner UI out of sync — refresh the page.");
    return;
  }
  const idxTime=need+nConstraints;
  const idxChallenge=need+nConstraints+1;
  const stopOrder=[]
    .concat(idxChallenge)
    .concat(Array.from({length:need},(_,i)=>i))
    .concat(Array.from({length:nConstraints},(_,j)=>need+j))
    .concat(idxTime);
  const locked=new Array(slots.length).fill(false);
  const tickMs=48;
  const maxTicks=36+totalSlots*4;
  const stopGapMs=340;
  function spinUnlockedPreview(){
    slots.forEach((s,idx)=>{
      if(locked[idx]) return;
      const k=slotMeta[idx].kind;
      if(k==="ing") s.textContent=pool[Math.floor(Math.random()*pool.length)];
      else if(k==="con"){
        const preview=Math.random()<0.5;
        s.textContent=preview
          ? RESTRICT[Math.floor(Math.random()*RESTRICT.length)]
          : "✕ "+EQUIP[Math.floor(Math.random()*EQUIP.length)];
      }
      else if(k==="time") s.textContent=String(SPIN_AI_TIMES[Math.floor(Math.random()*SPIN_AI_TIMES.length)])+" min";
      else { const ct=ctypePool[Math.floor(Math.random()*ctypePool.length)]; s.textContent=ct.emoji+" "+ct.label; }
      s.style.animation="none";
      void s.offsetWidth;
      s.style.animation="rndSpin .1s ease";
    });
  }
  function finalizeSlot(idx){
    const s=slots[idx];
    const k=slotMeta[idx].kind;
    s.style.animation="none";
    void s.offsetWidth;
    s.style.animation="rndSpin .18s ease";
    if(k==="ing"){
      const name=state.req[idx];
      if(name){ s.textContent=name; s.classList.add("rnd-done-ing"); }
      else { s.textContent="—"; s.style.opacity="0.5"; }
    }else if(k==="con"){
      const txt=state.spinConstraints[idx-need]||"—";
      s.textContent=txt;
      s.classList.add(txt.startsWith("✕ ")?"rnd-done-forb":"rnd-done-res");
    }else if(k==="time"){
      s.textContent=(Number(state.total)||0)+" min";
      s.classList.add("rnd-done-time");
    }else{
      s.textContent=state.ctype.emoji+" "+state.ctype.label;
      s.classList.add("rnd-done-ct");
    }
    locked[idx]=true;
  }
  function finishSpinSequence(){
    const bar=host.querySelector(".basket-spin-h span:last-child");
    if(bar) bar.textContent=cfg.label+" · locked in";
    state.mysterySpinLocked=true;
    trackPWEvent("spin_basket", pwParamsBuilder());
    renderBuild();
  }
  try{
    doRandomize();
  }catch(err){
    console.error("Mystery basket spin failed", err);
    state.mysterySpinLocked=false;
    alert("Mystery basket hit an error: "+(err&&err.message?err.message:String(err)));
    renderBuild();
    return;
  }
  let ticks=0;
  const iv=setInterval(()=>{
    ticks++;
    spinUnlockedPreview();
    if(ticks<maxTicks) return;
    clearInterval(iv);
    let step=0;
    function runStopStep(){
      if(step>=stopOrder.length){
        finishSpinSequence();
        return;
      }
      finalizeSlot(stopOrder[step]);
      step++;
      if(step>=stopOrder.length) finishSpinSequence();
      else setTimeout(runStopStep,stopGapMs);
    }
    runStopStep();
  },tickMs);
}

function doRandomize(){
  const d=DIFF[state.diff];
  const nConstraints=Math.max(Number(d.res)||0, Number(d.forb)||0);
  const pool=window.USER_PANTRY||PANTRY;
  const draw=drawUnifiedConstraintsFeasible(nConstraints, pool, d.req);
  state.spinConstraints=sanitizeSpinConstraints(draw.spinConstraints);
  state.res=sanitizeRestrictionList(draw.restrictions);
  state.forbEq=draw.forbEquip;
  state.lim=d.burners;state.cut=d.cut;
  const allTypes=[...CTYPES,...state.customTypes];
  state.ctype=allTypes[Math.floor(Math.random()*allTypes.length)];
  state.req=pickRequiredPattern(pool,d.req,state.res);
  state.req=ensureCourseBasketViability(state.req,state.ctype,state.diff,pool,state.res,pwChaosOrInsane());
  const t=SPIN_AI_TIMES[Math.floor(Math.random()*SPIN_AI_TIMES.length)];
  state.total=t;state.prep=Math.round(t*0.35);state.cook=Math.round(t*0.65);
}

loadAppConfig().then(() => renderLanding());
