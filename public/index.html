<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#0f172a;min-height:100vh;}

  .contest-coach-hero{position:relative;}

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const CTYPES = [
  {id:"appetizer",label:"Appetizer",emoji:"🥗"},
  {id:"entree",label:"Entree",emoji:"🍽️"},
  {id:"dessert",label:"Dessert",emoji:"🍮"},
  {id:"snack",label:"Snack",emoji:"🥨"},
  {id:"elevate",label:"Elevate a Cheap Meal",emoji:"⬆️"},
  {id:"recreate",label:"Recreate a Classic",emoji:"🔄"},
  {id:"diner_classic",label:"Diner Classic",emoji:"🍔"},
  {id:"street_food",label:"Street Food",emoji:"🌮"},
  {id:"fine_dining",label:"Fine Dining",emoji:"✨"},
  {id:"comfort_reinvented",label:"Comfort Food Reinvented",emoji:"🥧"},
  {id:"global_cuisine",label:"Global Cuisine",emoji:"🌍"},
];
const EQUIP=[
  "Chef's Knife","Paring Knife","Bread Knife","Mandoline Slicer","Bench Scraper",
  "Frying Pan","Cast Iron","Cast Iron Skillet","Carbon Steel Pan","Saute Pan","Saucepan","Stockpot","Dutch Oven","Braising Pan","Grill Pan","Wok","Roasting Pan","Double Boiler",
  "Pressure Cooker","Slow Cooker","Rice Cooker","Multi-Cooker","Instant Pot","Sous Vide","Sous Vide Machine","Sous Vide Circulator","Deep Fryer","Air Fryer",
  "Oven","Stovetop","Range (Gas/Electric)","Induction Cooktop","Electric Griddle","Hot Plate",
  "Food Processor","Blender","Immersion Blender","Mortar and Pestle",
  "Box Grater","Microplane","Peeler","Zester","Garlic Press","Potato Masher","Food Mill","Ricer","Spiralizer",
  "Stand Mixer","Hand Mixer","Rolling Pin","Pastry Cutter",
  "Sheet Pan","Baking Sheet","Muffin Tin","Cake Pan","Springform Pan","Loaf Pan","Pie Dish","Tart Pan","Pizza Stone",
  "Meat Grinder","Meat Slicer","Pasta Maker",
  "Tea Kettle","Electric Kettle",
  "Ice Cream Maker","Dehydrator","Fermentation Crock","Smoker",
  "Grill","Charcoal Grill","Gas Grill","Pellet Grill",
  "Vacuum Sealer","Vacuum Chamber Sealer",
  "Whipping Siphon","Torch","Culinary Torch","Heat Gun (Culinary)",
  "Salamander Broiler","Flat-Top Griddle","Commercial Fryer","Steam Table",
  "Juicer","Citrus Press","Microwave"
];

/** Map user/AI strings to canonical EQUIP label (empty if unknown). */
function normalizeEquipmentCatalogName(s){
  const t=String(s||"").trim().toLowerCase().replace(/\s+/g," ");
  if(!t) return "";
  for(const e of EQUIP){
    if(e.toLowerCase()===t) return e;
  }
  return "";
}

/** Prompt block: declare process equipment + machine validation against forbidden / must-use. */
function processEquipmentPromptBlock(ch){
  const fe=(ch&&ch.forbEquip&&ch.forbEquip.length)?ch.forbEquip.join(", "):"none";
  const re=(ch&&ch.reqEquip&&ch.reqEquip.length)?ch.reqEquip.join(", "):"none";
  return `PROCESS EQUIPMENT (JSON key **processEquipment**): array of strings for tools used.
- List every tool the method **actually requires** for this dish (e.g. baked tart / quiche / roast protein ⇒ include **Oven**; stir-fry spine ⇒ **Wok** or **Stovetop** as honest; immersion blend ⇒ **Blender**).
- **Must include** all must-use tools: ${re}.
- **Must not include** any forbidden tool: ${fe}.
- If you cannot execute the dish without a forbidden tool, **change the dish** (different format) — do not hide forbidden gear in prose.
`;
}

/** Ways to use each must-use tool — often overlaps ingredient techniques (sear, roast, emulsify). Injected into rival + coach prompts. */
const EQUIPMENT_TECHNIQUE_SHEET={
  Oven:"Roast, bake, broil, gratin/crust finish, toast nuts or spices; pairs with sheet meals, proteins, and anything needing even dry heat.",
  Stovetop:"Sauté, boil, simmer, reduce sauces, steam; control for pasta water, pan sauces, eggs — core for most savory timelines.",
  "Air Fryer":"Crisp with less oil — veg, tofu, wings, reheats; fast browning when oven time is tight.",
  Grill:"Char, smoke-kissed protein/veg, grill marks; same Maillard story as a ripping-hot skillet.",
  Microwave:"Steam or par-cook veg, soften squash, melt, gentle reheat — honest shortcut when clock is tight.",
  "Instant Pot":"Pressure tenderize collagen (beans, stew, tough cuts) when rules allow; then reduce or sear to finish.",
  Blender:"Soups, sauces, emulsions, spice pastes, smooth purées — ties to wet ingredients and silky body.",
  "Food Processor":"Shred, slice, rough paste, pesto, crumb; matches heavy prep for veg, nuts, cheese.",
  "Cast Iron":"Sear, shallow fry, bake in pan, fond + deglaze, cornbread; overlaps with beef/pork/aromatic sears.",
  Wok:"Stir-fry, high-heat toss, dry-toast spices, quick steam-fry; matches fast veg + protein + aromatics.",
  "Sous Vide":"Even edge-to-edge temp; finish with sear/torch — steps must match real time on the clock.",
  Torch:"**Pan-inaccessible finish** — brûlée sugar, caramelize **brine/pickle syrup/honey brush** into a lacquer (vinegar lifts; sugars brown), blister meringue/cheese tops, spot-melt fat. **Weak:** re-torching **already-seared meat slices** for edge char — cast iron already delivered Maillard; that reads cosmetic. Prefer flame that changes **flavor register**, not only color.",
  "Sheet Pan":"Tray roast, one-pan dinners, even browning for veg + protein together; aligns with oven timing.",
  "Rice Cooker":"Hands-off rice/grain cooking with auto shutoff; reliable but not fast for short rounds.",
  "Slow Cooker":"Low-and-slow braise/stew tool; usually too slow for competition clocks.",
  "Pressure Cooker":"Rapid tenderizing for grains/collagen; account for pressurize + release time.",
  "Multi-Cooker":"Pressure/saute/slow-cook combo; choose one mode that fits the round.",
  "Sous Vide Machine":"Precise low-temp bath; best for long windows plus finishing sear.",
  "Sous Vide Circulator":"Immersion bath control; quality tool but often clock-heavy.",
  "Dehydrator":"Drying and crisping over long cycles; generally incompatible with short rounds.",
  "Fermentation Crock":"Long fermentation vessel; not an in-round cook method.",
  "Ice Cream Maker":"Churn/freeze dessert textures; usually needs pre-chilled base/time buffer.",
  "Smoker":"Smoke layering over longer windows; hard to fit <45 min unless tiny components only.",
  "Meat Grinder":"Fast texture pivot for tough cuts and fillings; minutes, not hours.",
  "Pasta Maker":"Fresh noodle sheets/shapes; excellent texture but prep-heavy on short clocks.",
};

/**
 * Typical active cook windows for **heat / primary-cook** equipment — competition clock planning.
 * Omit prep-only tools (peeler) — not in EQUIP. Blender/FP get prep-only notes, not "sear minutes."
 */

function equipmentCookTimeLine(name){
  const n=String(name||"").trim();
  if(!n) return "";
  if(EQUIPMENT_COOK_TIME_HINTS[n]) return EQUIPMENT_COOK_TIME_HINTS[n];

    if(k.toLowerCase()===low) return EQUIPMENT_COOK_TIME_HINTS[k];
  }

}

const RESTRICT=["No Dairy","No Gluten","No Sugar","No Salt","No Pre-made Sauces","No Butter","No Alcohol","No Nuts","Vegetarian","Vegan"];
/** Collapse "No No …" from duplicated prefixes (e.g. AI returns "No No Butter") and match built-in casing. */
function normalizeRestrictionKey(s){
  let t=String(s==null?"":s).trim();
  if(!t) return t;
  if(/^raw\s*only$/i.test(t)) return "";
  while(/^no\s+no(\s|$)/i.test(t)) t=t.replace(/^no\s+/i,"").trim();
  const low=t.toLowerCase();
  for(const r of RESTRICT) if(r.toLowerCase()===low) return r;
  return t;
}
function sanitizeRestrictionList(arr){
  const out=[], seen=new Set();
  for(const x of arr||[]){
    const k=normalizeRestrictionKey(x);
    if(!k||seen.has(k)) continue;
    seen.add(k); out.push(k);
  }
  return out;
}
function challengeHasNoGluten(ch){
  const r=sanitizeRestrictionList((ch&&ch.restrictions)||[]);
  return r.some(x=>normalizeRestrictionKey(x)==="No Gluten");
}
/** Lowercase blob of required names — physics / prompt flags. */
function requiredChallengeBlob(ch){
  return ((ch&&ch.required)||[]).map(s=>String(s).toLowerCase()).join(" ");
}
function sanitizeSpinConstraints(arr){
  return (arr||[]).map(x=>{
    const s=String(x==null?"":x);
    if(s.startsWith("✕ ")) return s;
    return normalizeRestrictionKey(s);
  });
}

  {id:140,name:"Whole Chicken",       cat:"Proteins",                flavor:["rich","savory"],        texture:["juicy","varied"],    richness:"medium", acidity:"none", intensity:"medium", notes:"Spatchcock for even roast; stock bones.",cookSheet:"Spatchcock roast ~45–70 min; parts roast 35–50 min. Joint for faster pieces. Pressure ~25–35 min fall-off if allowed.",clockPlaybookAi:"Whole bird: full roast rarely fits short comp. Viable: breakdown + sear parts 15–25 min; strip meat + cook 10–15 min; spatchcock only if clock allows ~45–70 min written honestly.",clockPlaybook:"🍗 WHOLE CHICKEN\n1 Full roast — ~45–70+ min · often impossible on short clock\n2 Breakdown + sear parts — 15–25 min · realistic comp path\n3 Strip meat + quick cook — 10–15 min · faster service\n\n🧠 Don’t promise whole roast + rest in under ~40 min without pressure cheat."},

  {id:144,name:"Ground Pork",         cat:"Proteins",                flavor:["rich","sweet"],        texture:["loose","juicy"],     richness:"medium", acidity:"none", intensity:"medium", notes:"Meatballs; dumpling filling."},
  {id:145,name:"Pork Belly",          cat:"Proteins",                flavor:["rich","sweet"],         texture:["crispy","tender"],   richness:"rich",   acidity:"none", intensity:"strong", notes:"Low roast; crackling; braise.",cookSheet:"Crispy roast 1–2+ hr low then blast; braise 2–3 hr; pressure ~45–60 min then glaze. Cubes stir-fry faster than whole slab.",clockPlaybookAi:"Fat cut: render + crisp needs 15–25+ min for real texture; dice/stir-fry fast lane. Slow roast hours = not viable short round. Pressure ~45–60 min if IP allowed — not 10 min crackling slab.",clockPlaybook:"🐖 FAT CUT (belly)\n1 Render + crisp — 15–25 min · best texture when you have the window\n2 Slice thin + sear — 6–10 min · faster bite\n3 Dice small + render — 10–15 min · bacon-style\n4 Quick braise — 20–30 min · softer · may still be chewy if underdone fat\n5 Deep fry — 10–15 min · crisp outside\n6 Slow cook — hours · not viable on comp clock\n\nvs game clock: cubes / pressure / braise — not full slab crackling in minutes."},
  {id:146,name:"Pork Chop",           cat:"Proteins",                flavor:["mild","sweet"],         texture:["juicy","firm"],      richness:"medium", acidity:"none", intensity:"medium", notes:"Brine; pull at 145F with rest.",clockPlaybookAi:"Pork chop: same family as tenderloin — thin cutlet / medallions / butterfly beats thick chop sear on short clock. Brine helps; rest after ~145°F.",clockPlaybook:"🐖 CHOPS / TENDERLOIN\n1 Sear whole chop — 6–10 min · easy to dry\n2 Slice thin + sear — 4–6 min · safer\n3 Butterfly — 5–7 min\n4 Medallions — 6–8 min\n5 Quick braise — 15–25 min\n6 Grind — 5–8 min · filling\n\n🧠 Brine if time; control thickness."},
  {id:147,name:"Baby Back Ribs",      cat:"Proteins",                flavor:["rich","smoky"],        texture:["tender","sticky"],   richness:"rich",   acidity:"none", intensity:"strong", notes:"Low and slow; foil wrap stall.",cookSheet:"BBQ low 3–5 hr or oven 2½–4 hr; pressure ~35–45 min + glaze/broil. Not tender in 20 min open grill.",clockPlaybookAi:"Full rack tender: hours low or pressure ~35–45 min + glaze — not 20 min open grill alone. Short clock: pulled leftover, single rib pieces, or pressure written honestly.",clockPlaybook:"vs game clock\n· Competition rack: 3–5h low or 2.5–4h oven\n· Pressure + broil: ~35–45 min if IP allowed\n· Short round: leftover pulled, single bones, or pressure bites — not full rack off grill in minutes"},
  {id:148,name:"Beef Short Rib",      cat:"Proteins",                flavor:["rich","beefy"],        texture:["tender","silky"],    richness:"rich",   acidity:"none", intensity:"strong", notes:"Braise until fork-tender.",cookSheet:"Bone-in braise 2½–4 hr; pressure ~45–55 min. Quick sear only = tough — need moist heat or pressure for collagen.",clockPlaybookAi:"Tough/collagen: grind/mince 5–8 min if allowed = competition gold; else shave, thin-slice + sear, or 20–30 min quick braise. Full braise 2.5–4h or pressure ~45–55 min if IP. No fork-tender from raw thick sear in minutes.",clockPlaybook:"🐂 TOUGH CUT\n1 Slice thin + sear — 6–10 min · chewy if thick\n2 Grind / fine mince — 5–8 min · solves toughness · gold if allowed\n3 Shave / mince — 5–7 min · tender enough\n4 Quick braise — 20–30 min · partial tender\n5 Pressure — ~45–55 min · tender · often forbidden\n6 Full braise bone-in — 2.5–4h · ideal · not short round\n\nvs game clock: leftover, pressure, or honest thin/grind — not bone-in tender from raw sear alone."},
  {id:149,name:"Ribeye Steak",        cat:"Proteins",                flavor:["rich","beefy"],        texture:["juicy","tender"],    richness:"rich",   acidity:"none", intensity:"strong", notes:"Hot sear; rest; fat cap flavor.",clockPlaybookAi:"Steak cut: hard sear 4–10 min (overcook risk on lean areas) OR thin slice + flash 3–5 min (strong comp). Cheesesteak chop 5–7 min. Quick braise sliced 15–25 min. Sous vide 20–40 min = clock risk.",clockPlaybook:"🥩 STEAK CUTS\n1 Hard sear — 4–10 min · best flavor · overcook risk\n2 Thin slice + flash — 3–5 min · faster, more tender · best competition move\n3 Chop / cheesesteak — 5–7 min · tenderizes · loses steak identity\n4 Quick braise (sliced) — 15–25 min · more tender · less crust\n5 Sous vide + sear — 20–40 min · perfect · time risk\n6 Raw carpaccio — ~5 min · elegant · precision + safety\n\n🧠 Ribeye: manage fat cap heat; rest before slice."},
  {id:150,name:"Flank Steak",         cat:"Proteins",                flavor:["beefy","minerally"],    texture:["firm","fibrous"],    richness:"medium", acidity:"none", intensity:"strong", notes:"Slice across grain; marinade helps.",clockPlaybookAi:"Flank: always slice thin across grain; marinade helps. Same steak playbook as ribeye — flash / tacos / quick braise shine; thick rare chew can read tough.",clockPlaybook:"🥩 STEAK CUTS (flank — slice across grain)\n1 Hard sear — 4–10 min\n2 Thin slice + flash — 3–5 min · best comp move\n3 Chop / cheesesteak — 5–7 min\n4 Quick braise (sliced) — 15–25 min\n5 Sous vide + sear — 20–40 min · time risk\n6 Raw carpaccio — ~5 min · if safe\n\n🧠 Across the grain is mandatory — not optional."},
  {id:151,name:"Skirt Steak",         cat:"Proteins",                flavor:["beefy","minerally"],    texture:["loose","juicy"],     richness:"medium", acidity:"none", intensity:"strong", notes:"High heat; rare; tacos.",clockPlaybookAi:"Skirt: high heat, rare/med-rare, slice across grain for tacos/fajitas. Thin + flash 3–5 min or hot grill 4–7 min — same steak playbook; avoid well-done (tough).",clockPlaybook:"🥩 STEAK CUTS (skirt — tacos / high heat)\n1 Hard sear / grill — 4–10 min · rare side wins\n2 Thin slice + flash — 3–5 min · comp-friendly\n3 Chop / cheesesteak — 5–7 min\n4 Quick braise (sliced) — 15–25 min\n5 Sous vide + sear — 20–40 min · time risk\n\n🧠 Rare + thin slices; well-done skirt = shoe leather."},
  {id:152,name:"Brisket",             cat:"Proteins",                flavor:["beefy","smoky"],        texture:["tender","shreddy"],  richness:"rich",   acidity:"none", intensity:"strong", notes:"Smoke or braise; rest sliced.",cookSheet:"Not a 5–10 min cut from raw — collagen needs hours open-pot, or pressure ~70–90 min, or use leftover/shredded/smoked brisket or paper-thin hot slices of pre-cooked meat. Raw cubes + short sear = tough.",clockPlaybookAi:"Tough cut: grind 5–8 min if grinder allowed = solves chew. Else shaved/mince/leftover; sear + paper-thin; quick braise 20–30 min; pressure ~60–90 min only if IP allowed. IF tough → grind or slice thin; IF time <10 min → sear-only thin; forbidden: tender cubes from raw in minutes.",clockPlaybook:"Methods vs typical Pantry Wars clock\n\n1 Low & slow braise (classic) — 3–6h · fall-apart · not viable on game clock\n2 Smoked brisket — 8–16h · impossible in-round\n3 Pressure / Instant Pot — ~60–90 min · tender, less bark · only if IP is allowed & you write it\n4 Oven roast (even “fast”) — ~1.5–2h minimum · too slow for most rounds\n5 Cast-iron sear (steak method) — 5–10 min · crusty, NOT pull-apart · slice thin against grain · primary for raw brisket\n6 Quick hybrid braise — thin slice, sear, liquid, covered simmer 20–30 min · often best balance\n7 Shaved / minced / leftover — 5–8 min warm-through · safest (tacos, hash, bowls)\n8 Grind (if allowed) — 5–8 min · solves toughness · competition gold\n\n🐂 TOUGH CUT logic\n· Slice thin + sear — 6–10 min · chewy if thick\n· Grind — best hack when equipment allows\n\nDecision frame\n· Under ~20 min: shaved, minced, paper-thin, hard sear — no “tender cubes” lie.\n· ~20–35 min: quick braise / sear → simmer covered.\n· 45+ min: deeper partial braise — still not full pit smoke without time."},
  {id:153,name:"Oxtail",              cat:"Proteins",                flavor:["rich","beefy"],        texture:["gelatinous","tender"], richness:"rich",   acidity:"none", intensity:"strong", notes:"Collagen-rich — classic stew needs long braise OR pressure cooker for a fast tender result; otherwise use as flavor accent / inspired-by plates on a short clock.",cookSheet:"Stew/braise 2½–4 hr stovetop; pressure ~40–55 min. Grill raw = chewy. Shred after pressure for tacos; grind raw not typical.",clockPlaybookAi:"Oxtail: stew hours or pressure ~40–55 min for tender. Grind uncommon — prefer shred from pre-braise or fine mince if allowed. Short round: stew meat accent, not tender from raw flash.",clockPlaybook:"🐂 TOUGH CUT (oxtail)\n1 Slice thin + sear — chewy if not pre-tender\n2 Fine mince / ragù meat — if pre-braised\n3 Shave / pull — after pressure or long stew\n4 Quick techniques — fail from raw (gelatin not broken)\n5 Pressure — ~40–55 min if IP allowed\n6 Stew/braise — 2.5–4h · ideal\n\nvs game clock: use post-braise meat; raw quick cook = chewy."},
  {id:154,name:"Halibut Fillet",      cat:"Proteins",                flavor:["mild","sweet"],         texture:["firm","flaky"],      richness:"lean",   acidity:"none", intensity:"mild",   notes:"Don’t overcook; brown butter capers.",clockPlaybookAi:"Firm fillet: same pan-sear / steam / poach window as salmon; do not overcook — dry = fail. Flake+mix safe. Sous vide optional but clock-heavy.",clockPlaybook:"🐟 FILLET\n1 Pan sear — 5–10 min\n2 Steam — 5–8 min\n3 Poach — 6–10 min\n4 Sous vide — 15–30 min · time risk\n5 Raw crudo — ~5 min · if safe\n6 Flake + mix — 5–8 min · fallback\n\n🧠 Halibut: firm — still pull before chalky."},
  {id:155,name:"Cod Fillet",          cat:"Proteins",                flavor:["mild","sweet"],         texture:["flaky","delicate"],  richness:"lean",   acidity:"none", intensity:"mild",   notes:"Fish and chips; gentle poach.",cookSheet:"Pan-fry 3–5 min/side; bake 10–14 min; poach 5–8 min. Flakes when done — easy to overcook.",clockPlaybookAi:"Delicate fillet: shorter pan time; flakes easily — IF fish → don’t overcook. Beer batter fry fits longer but manage oil temp.",clockPlaybook:"🐟 FILLET (delicate)\n1 Pan sear — 5–10 min · gentle flip\n2 Steam — 5–8 min\n3 Poach — 6–10 min\n4 Bake / fry — watch time · easy to dry\n5 Flake + mix — 5–8 min · safest\n\n🧠 Cod: forgiving only until it’s not — dry window is small."},
  {id:156,name:"Sea Bass",            cat:"Proteins",                flavor:["mild","sweet"],         texture:["buttery","flaky"],   richness:"medium", acidity:"none", intensity:"mild",   notes:"Crispy skin; Asian steam.",clockPlaybookAi:"Fillet: crispy skin sear or Asian steam 5–10 min; don’t overcook. Same master rule as other finfish.",clockPlaybook:"🐟 FILLET\n1 Pan sear skin-down — 5–10 min\n2 Steam — 5–8 min\n3 Poach — 6–10 min\n4 Sous vide — 15–30 min · time risk\n5 Crudo — if safe\n6 Flake + mix — 5–8 min\n\n🧠 Skin-side down first for crisp."},
  {id:157,name:"Mahi Mahi",           cat:"Proteins",                flavor:["mild","sweet"],         texture:["firm","steaky"],     richness:"lean",   acidity:"none", intensity:"mild",   notes:"Grill; holds up to salsa.",clockPlaybookAi:"Firm steaky fillet: grill or sear 5–10 min; holds salsa; still avoid overcook to dry.",clockPlaybook:"🐟 FILLET (firm)\n1 Grill / pan sear — 5–10 min\n2 Steam / poach — 5–10 min\n3 Flake + mix — 5–8 min\n\n🧠 Firm but not bulletproof — dry if pushed."},
  {id:158,name:"Swordfish Steak",     cat:"Proteins",                flavor:["mild","meaty"],         texture:["firm","steaky"],     richness:"medium", acidity:"none", intensity:"medium", notes:"Grill like steak; don’t dry out.",clockPlaybookAi:"Treat like steak thickness: grill/sear but fish still dries — aim moist, not chalky; rest helps.",clockPlaybook:"🐟 STEAKY FISH\n1 Grill / sear — 5–12 min depending on thickness\n2 Avoid dry — carryover cooks\n\n🧠 More like meat timing — still a fish window."},
  {id:159,name:"Tuna Steak",          cat:"Proteins",                flavor:["rich","meaty"],         texture:["dense","steaky"],    richness:"rich",   acidity:"none", intensity:"strong", notes:"Sear rare; slice thin.",clockPlaybookAi:"Tuna: rare sear 1–2 min/side max or raw slice if quality-safe; well-done = dry. Best comp = minimal heat + sharp knife.",clockPlaybook:"🐟 TUNA\n1 Rare sear — 1–2 min · best\n2 Raw — instant · sashimi/poke · quality + safety\n3 Fully cooked through — dries · avoid unless recipe demands\n\n🧠 Nothing between rare and ruined — don’t walk the plank on clock."},

  {id:164,name:"Squid",               cat:"Proteins",                flavor:["mild","briny"],         texture:["snappy","tender"],   richness:"lean",   acidity:"none", intensity:"mild",   notes:"30 seconds high heat or low braise.",clockPlaybookAi:"Squid: flash 1–2 min high heat OR long braise 1+ hr — middle zone = rubber. No lukewarm simmer ‘just a few minutes’.",clockPlaybook:"🦑 SQUID\n1 Flash fry / sear — 1–2 min · very hot\n2 Long braise — 1+ hr · tender\n3 Nothing between — rubber zone\n\n🧠 Pick a lane: blast or braise."},
  {id:165,name:"Octopus",             cat:"Proteins",                flavor:["sweet","briny"],        texture:["tender","snappy"],   richness:"lean",   acidity:"none", intensity:"medium", notes:"Tenderize; char on grill.",clockPlaybookAi:"Octopus: pre-tenderize (pressure, long simmer, or trusted pre-cooked) then char quick — or long braise. Raw quick grill without tender = chew toy.",clockPlaybook:"🐙 OCTOPUS\n1 Tenderize first — then flash char 2–4 min\n2 Long cook — 1+ hr braise · soft\n3 Avoid half measures — chewy middle\n\n🧠 Same squid rule: blast after tender or go long."},
  {id:166,name:"Tofu (Firm)",       cat:"Proteins",                flavor:["mild","nutty"],         texture:["firm","crispy"],    richness:"lean",   acidity:"none", intensity:"mild",   notes:"Press; cornstarch dredge for crunch.",cookSheet:"Press 15–30 min; pan-fry cubes 8–12 min; bake 20–30 min. Crumble for scramble; matchstick for fast stir-fry.",clockPlaybookAi:"Firm tofu: press, sear 5–10 min, crumble for fast, or deep-fry 5–8 min. Marinate + sear 10–20 min if clock allows. Bake 20–30 min = slower path.",clockPlaybook:"🌱 PLANT PROTEIN (firm tofu)\n1 Sear — 5–10 min · pressed\n2 Deep fry — 5–8 min · crisp\n3 Crumble — 5–8 min · scramble / taco\n4 Bake — 20–30 min\n5 Marinate + sear — 10–20 min\n\n🧠 Dry + hot = crust; wet = steam."},
  {id:167,name:"Tofu (Silken)",     cat:"Proteins",                flavor:["mild","creamy"],        texture:["silky","soft"],      richness:"lean",   acidity:"none", intensity:"mild",   notes:"Soups; mapo; gentle heat.",clockPlaybookAi:"Silken: gentle heat, soups, sauces — ‘raw’ cold use if recipe fits; not a sear block like firm.",clockPlaybook:"🌱 SILKEN TOFU\n1 Gentle simmer / mapo — few minutes\n2 Cold — instant · soft bowls\n3 Avoid aggressive sear — falls apart\n\n🧠 Not interchangeable with firm block."},
  {id:168,name:"Tempeh",              cat:"Proteins",                flavor:["nutty","earthy"],       texture:["firm","crumbly"],    richness:"medium", acidity:"none", intensity:"medium", notes:"Steam slice; marinate; sear.",clockPlaybookAi:"Tempeh: steam slice optional, then sear 5–10 min or crumble 5–8 min; marinate if time.",clockPlaybook:"🌱 TEMPEH\n1 Slice + sear — 5–10 min\n2 Crumble + brown — 5–8 min\n3 Marinate + sear — 10–20 min\n\n🧠 Absorbs flavor — give it a minute."},
  {id:169,name:"Seitan",              cat:"Proteins",                flavor:["savory","meaty"],       texture:["chewy","firm"],      richness:"lean",   acidity:"none", intensity:"strong", notes:"Wheat gluten — braise or fry.",clockPlaybookAi:"Seitan: pan-fry or deep-fry 5–10 min; simmer in sauce 15–25 min; slice thin for sandwiches. Already ‘chewy’ — don’t double overcook to rubber.",clockPlaybook:"🌱 SEITAN\n1 Sear / fry — 5–10 min\n2 Simmer in sauce — 15–25 min · moist\n3 Slice thin — fast sandwiches\n\n🧠 Sauced = better than dry blast alone."},

/**
 * Minimum round length (minutes) for a credible **default** braise/roast story for this cut — vs challenge totalTime when the item is MUST USE.
 * Honest short-clock paths (grind, paper-thin sear, leftover, pressure if allowed) skip the check via getProteinMinClockViolations.
 * Custom pantry rows can set `minClockMinutes` to override or extend.
 */
const PROTEIN_MIN_CLOCK_MINUTES={
  "Brisket":48,
  "Beef Short Rib":44,
  "Oxtail":44,
  "Whole Chicken":38,
};
const GRAIN_MIN_CLOCK_MINUTES={
  "Barley (Pearl)":25,
  "Arborio Rice":18,
};

function minClockMinutesForPantryName(name){
  const meta=pantryMetaByName(name);
  if(meta&&Number.isFinite(Number(meta.minClockMinutes))){
    const n=Math.round(Number(meta.minClockMinutes));
    if(n>0&&n<=600) return n;
  }
  const key=String(name||"").trim();
  if(!key) return null;
  if(PROTEIN_MIN_CLOCK_MINUTES[key]!=null) return PROTEIN_MIN_CLOCK_MINUTES[key];
  const low=key.toLowerCase();
  for(const k of Object.keys(PROTEIN_MIN_CLOCK_MINUTES)){
    if(k.toLowerCase()===low) return PROTEIN_MIN_CLOCK_MINUTES[k];
  }
  if(GRAIN_MIN_CLOCK_MINUTES[key]!=null) return GRAIN_MIN_CLOCK_MINUTES[key];
  for(const k of Object.keys(GRAIN_MIN_CLOCK_MINUTES)){
    if(k.toLowerCase()===low) return GRAIN_MIN_CLOCK_MINUTES[k];
  }
  return null;
}

/** Prose signals that the plan uses a competition-viable fast lane for collagen / whole-bird cuts. */
function recipeProseSuggestsShortClockCompPath(low){
  return /\b(grind|ground|mince|minced|thinly\s+sliced|thin\s+slices?|paper[\s-]*thin|shaved|leftover|pre[\s-]?(?:cooked|braised|smoked)|deli|corned|pastrami|pressure|instant\s*pot|spatchcock|joint(?:ed|ing)?|break\s*down|parts\s+only|boneless|chicken\s+parts|thighs?\s+and|drumsticks?|wing\s+only)\b/i.test(String(low||""));
}

function techniqueMatrixForName(name){
  const meta=pantryMetaByName(name);
  if(meta&&meta.techniqueMatrix&&typeof meta.techniqueMatrix==="object") return meta.techniqueMatrix;
  const key=meta?String(meta.name||"").trim():String(name||"").trim();

  if(PROTEIN_TECHNIQUE_MATRIX[key]) return PROTEIN_TECHNIQUE_MATRIX[key];
  const low=key.toLowerCase();
  for(const k of Object.keys(PROTEIN_TECHNIQUE_MATRIX)){
    if(k.toLowerCase()===low) return PROTEIN_TECHNIQUE_MATRIX[k];

}

/** Universal ingredient cook matrix (all ingredient classes, not proteins only). */
function defaultCookMatrixAiForMeta(meta,name){
  const n=String(name||"");
  const cat=String((meta&&meta.cat)||"").toLowerCase();
  const cook=String((meta&&meta.cookSheet)||"").trim();
  const clk=String((meta&&meta.clockPlaybookAi)||"").trim();
  const merged=(cook+" "+clk).toLowerCase();
  const minuteMatches=[...merged.matchAll(/(\d+)\s*(?:[-–]\s*(\d+))?\s*min/g)];
  let minM=null,maxM=null;
  for(const m of minuteMatches){
    const a=Number(m[1]),b=Number(m[2]||m[1]);
    if(!Number.isFinite(a)||!Number.isFinite(b)) continue;
    const lo=Math.min(a,b),hi=Math.max(a,b);
    minM=minM==null?lo:Math.min(minM,lo);
    maxM=maxM==null?hi:Math.max(maxM,hi);
  }
  const hasRaw=/\b(raw|cold|no[\s-]?cook|finish|garnish|sprinkle)\b/.test(merged)||/spices?\s*&\s*herbs|oils\s*&\s*vinegars/.test(cat);
  const isProtein=/\bproteins?\b/.test(cat)||/\b(chicken|beef|pork|lamb|duck|fish|shrimp|scallop|egg|tofu|tempeh|seitan)\b/i.test(n);
  const isGrain=/\bgrains?\s*&\s*legumes\b/.test(cat)||/\b(rice|barley|quinoa|couscous|lentil|bean|pasta|spaghetti)\b/i.test(n);
  const isProduce=/\bvegetables|fruits|aromatics\b/.test(cat);
  let fast="3–10 min";
  let medium="10–20 min";
  let long="20+ min";
  if(minM!=null&&maxM!=null){
    fast=`${Math.max(1,Math.min(minM,10))}–${Math.max(Math.min(maxM,12),Math.max(4,Math.min(minM+4,12)))} min`;
    medium=`${Math.max(8,Math.min(minM+4,16))}–${Math.max(14,Math.max(minM+10,Math.min(maxM+6,28)))} min`;
    long=`${Math.max(20,Math.max(maxM,20))}+ min`;
  }else if(isGrain){
    fast="toast/garnish 2–8 min";
    medium="simmer 15–30 min";
    long="30+ min";
  }else if(isProtein){
    fast="sear/slice 3–10 min";
    medium="braise/roast 12–30 min";
    long="30+ min";
  }else if(isProduce){
    fast="raw/quick saute 2–8 min";
    medium="roast/simmer 10–25 min";
    long="25+ min";
  }
  const best=isProtein
    ?"slice thin or high-heat sear"
    :isGrain
      ?"pre-cook or garnish role on short rounds"
      :isProduce
        ?"raw + one fast heat move"
        :"small-dose bloom/finish";
  const avoid=isGrain
    ?"long tender simmer as sole centerpiece on tight clocks"
    :isProtein
      ?"slow braise/sous-vide when clock is short"
      :"long multi-stage prep without payoff";
  return `fast ${fast} | medium ${medium} | long ${long} | no-cook ${hasRaw?"yes":"limited"} | best_short_clock ${best} | avoid_short_clock ${avoid}`;
}

function ingredientCookMatrixForName(name){
  const meta=pantryMetaByName(name);
  const explicit=meta&&String(meta.cookMatrixAi||"").trim();
  if(explicit) return explicit;
  const tm=techniqueMatrixForName(name);
  if(tm) return compactTechniqueMatrixForAi(tm);
  return defaultCookMatrixAiForMeta(meta,name);
}

/** Form-aware transformation rules (exact SKU × technique). Keys match FULL_PANTRY `name`; extend for more proteins. */
const PROTEIN_TRANSFORMATION_RULES={
  "Tofu (Silken)":{
    allowedSummary:"Blend, purée, fold into sauces or layers, gentle simmer (mapo-style), cold soft bowls, custard/set — soft and fragile.",
    forbiddenBullets:["Dredge / bread / panko + fry (falls apart)","Deep-fry or crisp-fry a block","Crumble or grind like ground meat"],
    violations(low, req){
      const msgs=[];
      const hasSilken=req.some(n=>/\bsilken\b/i.test(String(n)));
      if(!hasSilken) return msgs;
      const hasFirm=req.some(n=>/\btofu\b/i.test(String(n))&&/\bfirm\b/i.test(String(n))&&!/\bsilken\b/i.test(String(n)));
      if(/\b(silken|soft\s+tofu)\b[\s\S]{0,260}?\b(dredge|dredged|breaded|bread\s+and|panko|batter|cornstarch\s+dredge)\b/i.test(low)||/\b(dredge|dredged|breaded|panko|batter)\b[\s\S]{0,260}?\b(silken|soft\s+tofu)\b/i.test(low))
        msgs.push(`Transformation (silken tofu): **no dredge/bread/batter** — silken falls apart; use blended, simmered, or cold soft applications.`);
      if(/\b(silken|soft\s+tofu)\b[\s\S]{0,260}?\b(deep[\s-]*fry|double[\s-]?fry|fry\s+until\s+crisp)\b/i.test(low))
        msgs.push(`Transformation (silken tofu): **no deep-fry / crisp-fry block** — pivot to **cream / sauce / set**; use **firm tofu** for crunch.`);
      if(/\b(silken|soft\s+tofu)\b[\s\S]{0,220}?\b(crumble|crumbled|ground)\b/i.test(low)||/\b(crumble|crumbled|ground)\b[\s\S]{0,120}?\b(silken|soft\s+tofu)\b/i.test(low))
        msgs.push(`Transformation (silken tofu): **no crumble/grind like ground meat** — blend into a cream/cheese layer or set gently.`);
      if(!hasFirm&&/\btofu\b/i.test(low)&&/\b(dredge|breaded|panko)\b/i.test(low)&&/\b(fry|frying|deep)\b/i.test(low))
        msgs.push(`Transformation: basket is **silken tofu** — do not write generic **breaded fried tofu**; if you mean crisp fry, put **firm tofu** in the basket, otherwise use silken as **cream/sauce/set**.`);
      return msgs;
    }
  },
  "Tofu (Firm)":{
    allowedSummary:"Press/dry, sear whole slab or patty, cubes, hand-crumble for scramble, bake, cornstarch pan-fry — whole-piece or crumble, not meat-grinder mince.",
    forbiddenBullets:["Meat-grinder / “ground beef” texture story without honest binders"],
    violations(low, req){
      const msgs=[];
      const hasFirm=req.some(n=>/\btofu\b/i.test(String(n))&&/\bfirm\b/i.test(String(n))&&!/\bsilken\b/i.test(String(n)));
      if(!hasFirm) return msgs;
      if(/\b(meat\s+grinder|through\s+the\s+grinder)\b/i.test(low)&&/\btofu\b/i.test(low))
        msgs.push(`Transformation (firm tofu): **not meat-grinder ground beef** — hand-crumble, or press and **sear slab/patty**; matrix “grind” is **—** (not meat mince).`);
      return msgs;
    }
  }
};
function transformationRulesForIngredient(name){
  const raw=String(name||"").trim();
  if(!raw) return null;
  if(PROTEIN_TRANSFORMATION_RULES[raw]) return PROTEIN_TRANSFORMATION_RULES[raw];
  const low=raw.toLowerCase();
  for(const k of Object.keys(PROTEIN_TRANSFORMATION_RULES)){
    if(k.toLowerCase()===low) return PROTEIN_TRANSFORMATION_RULES[k];
  }
  const meta=pantryMetaByName(raw);
  if(meta&&meta.name&&PROTEIN_TRANSFORMATION_RULES[meta.name]) return PROTEIN_TRANSFORMATION_RULES[meta.name];
  return null;
}
function basketTransformationPreflightBlock(ch){
  const req=(ch&&ch.required)||[];
  if(!req.length) return "";
  const lines=[];
  for(const name of req){
    const r=transformationRulesForIngredient(name);
    if(!r) continue;
    lines.push(`• ${name}: ALLOWED — ${r.allowedSummary}`);
    if(Array.isArray(r.forbiddenBullets)&&r.forbiddenBullets.length)
      lines.push(`  DO NOT — ${r.forbiddenBullets.join("; ")}`);
  }
  if(!lines.length) return "";
  const t=Math.max(1, Number((ch&&ch.totalTime)||30));
  return `PROTEIN FORM & TRANSFORMATION (mandatory — app gate checks technique vs this exact SKU; ~${t} min):
${lines.join("\n")}
Rule: **Identify form (e.g. silken vs firm tofu) before picking techniques.** Protein form dictates technique — not the dish idea. Forbidden pairs fail generation.

`;
}
function transformationValidatorPanelHtml(reqArr, totalMinutes){
  const req=reqArr||[];
  if(!req.length) return "";
  const parts=[];
  const tmLabel=Number.isFinite(Number(totalMinutes))&&Number(totalMinutes)>0?`${totalMinutes} min`:"";
  for(const name of req){
    const r=transformationRulesForIngredient(name);
    if(!r) continue;
    const tm=techniqueMatrixForName(name);
    const matrixBlock=tm?`<div style="font-size:10px;color:#475569;font-family:ui-monospace,Menlo,Consolas,monospace;white-space:pre-wrap;margin-top:6px;line-height:1.4">${escapeHtml(formatTechniqueMatrixDisplay(tm))}</div>`:"";
    const forbid=r.forbiddenBullets&&r.forbiddenBullets.length?`<ul style="margin:6px 0 0 16px;padding:0;font-size:11px;color:#9a3412;line-height:1.4">${r.forbiddenBullets.map(b=>`<li>${escapeHtml(b)}</li>`).join("")}</ul>`:"";
    parts.push(`<div style="border:1px solid #ddd6fe;border-radius:10px;padding:10px 12px;margin-bottom:8px;background:#faf5ff">
      <div style="font-size:11px;font-weight:800;color:#5b21b6">${escapeHtml(name)}${tmLabel?` <span style="font-weight:600;color:#9333ea">· ${escapeHtml(tmLabel)}</span>`:""}</div>
      <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#15803d;margin-top:8px">Allowed</div>
      <div style="font-size:11px;color:#334155;line-height:1.45">${escapeHtml(r.allowedSummary)}</div>
      <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#c2410c;margin-top:8px">Do not</div>
      ${forbid||'<div style="font-size:11px;color:#64748b">—</div>'}
      <div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#64748b;margin-top:8px">Technique matrix</div>
      ${matrixBlock||'<div style="font-size:11px;color:#94a3b8">No matrix row for this item.</div>'}
    </div>`);
  }
  if(!parts.length) return "";
  return `<details class="pw-transform-panel" style="margin-top:12px;background:#f5f3ff;border:2px solid #c4b5fd;border-radius:12px;padding:12px 14px">
    <summary style="cursor:pointer;font-size:12px;font-weight:800;color:#5b21b6;list-style:none">Transformation checker — protein form vs technique</summary>
    <p style="font-size:11px;color:#64748b;margin:8px 0 10px;line-height:1.45">Use techniques that match the <strong>exact</strong> must-use SKU. Rival/coach JSON is checked against these rules.</p>
    ${parts.join("")}
  </details>`;
}
function getProteinFormTransformationViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  const req=ch.required||[];
  for(const name of req){
    const rules=transformationRulesForIngredient(name);
    if(!rules||typeof rules.violations!=="function") continue;
    msgs.push(...rules.violations(low, req));
  }
  return [...new Set(msgs)];
}

function categoryFallbackIdentity(meta){
  const n=String(meta.name||"Item");
  const c=String(meta.cat||"");
  const T={
    "Baking & Bases":`${n} — a core baking or pantry staple (flour, sugar, eggs, fats, etc.).`,
    "Grains & Legumes":`${n} — a grain, pasta, noodle, or legume; usually cooked in water or broth until tender.`,
    "Aromatics":`${n} — an aromatic vegetable or chile used to build savory flavor.`,
    "Vegetables":`${n} — a fresh vegetable from produce; wash, trim, and cook or serve raw as needed.`,
    "Fruits":`${n} — fresh fruit; eat raw, juice, zest, or cook.`,
    "Proteins":`${n} — a meat, seafood, egg, or plant protein for mains or substantial bites.`,
    "Dairy & Cheese":`${n} — a dairy or cheese product from the refrigerated case.`,
    "Oils & Vinegars":`${n} — a cooking oil, vinegar, or bottled condiment for heat or finishing.`,
    "Spices & Herbs":`${n} — a dried spice or herb (or blend); use in small amounts for aroma and flavor.`,
    "Canned & Jarred":`${n} — a shelf-stable canned or jarred pantry item for quick depth.`,
    "Nuts & Seeds":`${n} — edible nuts or seeds; toast for flavor or use for crunch.`,
    "Sweet Items":`${n} — a sweet ingredient for desserts or finishing.`,
  };
  return T[c]||`${n} — ${c?c.toLowerCase()+" ingredient":"pantry ingredient"}.`;
}
function pantryIdentityLine(meta){
  if(!meta) return "";

  if(o) return o;

/** Resolve built-in or custom pantry row by exact or case-insensitive name. */
function pantryMetaByName(name){
  const n=String(name||"").trim();
  if(!n) return null;
  if(PANTRY_BY_NAME[n]) return PANTRY_BY_NAME[n];
  const low=n.toLowerCase();
  for(const it of state.customPantryItems||[]){
    if(String(it.name||"").toLowerCase()===low) return it;
  }
  return null;
}

/** Compact time/prep hints for required basket items — injected into rival + coach prompts only. */
function basketCookFundamentalsBlock(ch){
  const req=(ch&&ch.required)||[];
  if(!req.length) return "";
  const t=Math.max(1, Number((ch&&ch.totalTime)||30));
  const lines=[];
  for(const name of req){
    const meta=pantryMetaByName(name);
    const cs=meta&&meta.cookSheet!=null?String(meta.cookSheet).trim():"";
    const mcm=minClockMinutesForPantryName(name);
    const bits=[];
    if(cs) bits.push(cs);
    if(mcm&&t<mcm) bits.push(`**Clock:** classic braise/roast for this cut often needs ~${mcm}+ min; this round is ${t} min — use grind, thin sear, leftover/deli, breakdown + parts, or pressure (if allowed).`);
    if(bits.length) lines.push(`• ${name}: ${bits.join(" ")}`);
  }
  if(!lines.length) return "";
  return `BASKET COOK FUNDAMENTALS (typical times & prep — your round is ${t} min total; pick methods that fit; dice/grind/shave change surface area and time):
${lines.join("\n")}

`;
}

/** Multiple valid uses for must-use equipment — can align with techniques already suggested by basket ingredients. */
function basketEquipmentTechniquesBlock(ch){
  const req=(ch&&ch.reqEquip)||[];
  if(!req.length) return "";
  const t=Math.max(1, Number((ch&&ch.totalTime)||30));
  const lines=[];
  const fallback="Include in a primary COOK/SAUCE (or tool-appropriate) step with the gear named and a concrete verb — often the same story as your ingredient technique (sear, roast, blend, pressure).";
  for(const name of req){
    const tip=equipTechniqueSheetLine(name)||fallback;

  return `MUST-USE EQUIPMENT — TECHNIQUES (~${t} min round; **match protein/technique to gear time** — e.g. grill = open high heat + smoke/char, not baked tart; **torch = selective finish that does pan-inaccessible work** (brûlée, brine lacquer), not duplicate sear on sliced meat; blender = prep not sear):
${lines.join("\n")}

`;
}

/** Classify must-use ingredient for constraint intersection (engine picks valid paths; model composes prose). */
function classifyIngredientForEngine(name){
  const n=String(name||"").toLowerCase();
  if(/\b(brisket|beef short rib|short\s+rib|oxtail|beef\s+shank|shank|chuck\s+roast|beef\s+cheek)\b/.test(n))
    return {cls:"COLLAGEN_CUT",hint:"Viable: **grind**, paper-thin sear/shave, **leftover/pre-cooked**, pressure **only if IP allowed**. Not: thick raw cubes → fork-tender in a few minutes."};
  if(/\b(cod|salmon|halibut|trout|sea\s+bass|mahi|snapper|tuna\s+steak)\b/.test(n))
    return {cls:"FISH",hint:"Hot sear / short cook; **wet dredge or fragile crumb on open grill grates = invalid** — use **cast-iron or plancha ON the grill** if Grill is must-use."};
  if(/\b(shrimp|prawn|scallop)\b/.test(n))
    return {cls:"SHELLFISH_FAST",hint:"~90s–4 min total; **C-curve not O-curve** — rubber if overcooked."};
  if(/\b(tempeh|seitan)\b/.test(n))
    return {cls:"PLANT_BLOCK",hint:"Sear, crumble, grind, quick braise — **worked into** the dish, not soft garnish-only."};
  if(/\btofu\b/.test(n)&&/\bsilken\b/.test(n))
    return {cls:"TOFU_SILKEN",hint:"Blend, simmer gently, set — **no dredge-fry block** (see transformation gates)."};
  if(/\btofu\b/.test(n)&&/\bfirm\b/.test(n))
    return {cls:"TOFU_FIRM",hint:"Press/dry; sear, cornstarch pan-fry, bake — not meat-grinder **ground beef** story."};
  if(/\b(chicken|duck)\s+breast\b/.test(n)||/\bturkey\s+cutlet\b/.test(n))
    return {cls:"LEAN_POULTRY",hint:"Thin slice, cutlet, butterfly — avoid thick whole roast on short clock."};
  if(/\b(pork belly|belly slab)\b/.test(n))
    return {cls:"FAT_CUT",hint:"Dice/render or pressure path — full crackling slab rarely fits short clock without honest time."};
  return {cls:"GENERAL",hint:"Follow technique matrix + cook fundamentals; match method to clock."};
}

/** Equipment × technique intersection rules (hard bans on impossible combos). */
function equipmentIntersectionLines(ch){
  const req=(ch.reqEquip||[]).map(s=>String(s));
  const forb=(ch.forbEquip||[]).map(s=>String(s));
  const lines=[];
  const R=req.map(s=>s.toLowerCase());
  const F=forb.map(s=>s.toLowerCase());
  if(R.some(x=>/\bgrill\b/.test(x))){
    lines.push("• **Grill** must-use: open grates + **wet batter** or **fragile crumb crust** as the **main** fish/protein cook = **invalid** — use **cast-iron / griddle / plancha ON the grill** (flat + oil), OR grill foods suited to grates (veg planks, bone-in).");
  }
  if(R.some(x=>/cast|iron/i.test(x))){
    lines.push("• **Cast iron** must-use: star the pan in a **primary** step (sear, shallow fry, gratin finish, covered bake) — not only a side wilt.");
  }
  if(F.some(x=>/food\s*processor|processor/i.test(x))){
    lines.push("• **Food processor forbidden** — chop, grate, mortar, or immersion blender only; name the substitute.");
  }
  if(F.some(x=>/instant\s*pot/i.test(x))){
    lines.push("• **Instant Pot forbidden** — no pressure / multicooker story.");
  }
  if(F.some(x=>/\bsous/i.test(x))){
    lines.push("• **Sous vide forbidden** — no circulator / long water-bath.");
  }
  if(R.some(x=>/\bwok\b/.test(x))){
    lines.push("• **Wok** must-use: starring stir-fry / toss / high-heat — not only wilting garnish while the oven carries the plate.");
  }
  if(R.some(x=>/\btorch\b/.test(x))){
    lines.push("• **Torch** must-use: flame must earn its line — **brûlée**, **caramelize pickle/brine/syrup** into a lacquer on veg or crust, blister meringue/cheese, spot-melt — work a **skillet cannot** do without wrecking texture. **Avoid:** torching **already-seared meat slices** “for char” (cast iron already handled Maillard) unless you pair it with a **second** torch move that is clearly chemical (brine glaze, sugar, cheese).");
  }
  return lines;
}

/** Compare basket vs pantry for missing flavor roles; suggest **only** pantry names (no invented ingredients). */
function pantryRoleGapFillLines(ch){
  const reqJoined=(ch.required||[]).map(s=>String(s).toLowerCase()).join(" ");
  const pool=ch.pantry||[];
  const gaps=[];
  if(!/\b(vinegar|lemon|lime|citrus|pickle|kimchi|tomato|tamarind|sherry|yuzu|orange|grapefruit|caper)\b/i.test(reqJoined))
    gaps.push({role:"acid",rx:/\b(lemon|lime|vinegar|pickle|shallot|mustard|caper|yuzu|orange|grapefruit|verjuice)\b/i});
  if(!/\b(oil|butter|cream|mayo|avocado|sesame|tahini|lard|coconut\s+milk)\b/i.test(reqJoined))
    gaps.push({role:"fat",rx:/\b(olive oil|vegetable oil|butter|sesame oil|mayo|cream|avocado|tahini|almond|coconut milk|ghee)\b/i});
  if(!/\b(almond|walnut|pecan|cashew|seed|panko|cracker|fried|crisp|toasted)\b/i.test(reqJoined))
    gaps.push({role:"crunch",rx:/\b(almond|walnut|pecan|cashew|pine nut|sesame|panko|cracker|chip|fried onion)\b/i});
  if(!/\b(garlic|onion|shallot|ginger|scallion|leek|cilantro|parsley|basil|thyme|rosemary)\b/i.test(reqJoined))
    gaps.push({role:"aromatic",rx:/\b(garlic|onion|shallot|ginger|scallion|leek|cilantro|parsley|basil|thyme|rosemary|oregano)\b/i});
  if(!gaps.length)
    return ["• Roles: basket may already cover acid/fat/crunch — still **name** balance (acid/heat/umami) in balance.flavor."];
  const out=[];
  for(const g of gaps){
    const picks=pool.filter(p=>g.rx.test(String(p).toLowerCase())).slice(0,5);
    if(picks.length) out.push(`• Missing **${g.role}** in basket — prefer from pantry: ${picks.join(", ")}.`);
    else out.push(`• Missing **${g.role}** signal — pick a **pantry** item that fills it (do not invent new SKUs).`);
  }
  return out;
}

/**
 * Matrix + constraint intersection + pantry gap fill — short authoritative brief.
 * Model job: compose JSON + chef prose; **do not** invent techniques that violate these rows.
 */
function culinaryEngineBrief(ch){
  if(!ch) return "";
  const t=Math.max(1, Number(ch.totalTime)||30);
  const lines=[];
  lines.push("═══ CULINARY ENGINE (authoritative) ═══");
  lines.push("Your job: **compose** title, steps, balance.*, and timing — the engine below already constrained **what is physically valid** for this haul.");
  lines.push(`• **Clock:** ${t} min total — tough cuts → grind / thin / leftover / pressure(if allowed); fish → do not overcook.`);
  lines.push("• **Intersection:** must-use + forbidden equipment + restrictions must **all** agree before you write.");
  const eq=equipmentIntersectionLines(ch);
  if(eq.length) lines.push(...eq);
  else lines.push("• **Equipment:** follow must-use / forbidden exactly.");
  lines.push("• **Required ingredients** — pick **one** path per line consistent with matrix + equipment:");
  for(const name of (ch.required||[])){
    const c=classifyIngredientForEngine(name);
    const row=ingredientCookMatrixForName(name);
    lines.push(`  – **${name}** [${c.cls}] ${c.hint}${row?` | ${row}`:""}`);
  }
  lines.push("• **Pantry = role completion** (only if basket leaves a gap):");
  lines.push(...pantryRoleGapFillLines(ch));
  lines.push("• **End state:** one coherent dish that satisfies every row above + posted restrictions.");
  lines.push("══════════════════════════════════════");
  return lines.join("\n")+"\n\n";
}

MASTER RULE (decision engine): Prefer safe comp methods — slice thin, cook fast, control texture. IF tough/collagen cut → grind or shave if allowed, pressure (if allowed & written), or long braise — never claim fork-tender from raw thick sear in minutes. IF time under ~10 min → sear/flash/shave paths only. IF fish or shellfish → do not overcook. IF lean chicken breast → thin slice or cutlet.

`;

/** Uniform integer in [0, max) — uses crypto when available. */
function randomIndex(max){
  const n=Math.floor(Number(max))||0;
  if(n<=0) return 0;
  if(typeof crypto!=="undefined"&&crypto.getRandomValues){
    const buf=new Uint32Array(1);
    crypto.getRandomValues(buf);
    return buf[0]%n;
  }
  return Math.floor(Math.random()*n);
}
/** ~Uniform on [0, 1) for probability gates. */
function randomUnit(){
  if(typeof crypto!=="undefined"&&crypto.getRandomValues){
    const buf=new Uint32Array(1);
    crypto.getRandomValues(buf);
    return buf[0]/4294967296;
  }
  return Math.random();
}
const PW_REQUIRED_USAGE_KEY="pw_required_usage_v1";
function getRequiredUsageMap(){
  try{
    const raw=sessionStorage.getItem(PW_REQUIRED_USAGE_KEY);
    const j=raw?JSON.parse(raw):{};
    return (j&&typeof j==="object"&&!Array.isArray(j))?j:{};
  }catch(_e){ return {}; }
}
function setRequiredUsageMap(map){
  try{ sessionStorage.setItem(PW_REQUIRED_USAGE_KEY, JSON.stringify(map||{})); }catch(_e){}
}
function pickUsageBalanced(candidates){
  if(!Array.isArray(candidates)||!candidates.length) return null;
  const usage=getRequiredUsageMap();
  const min=Math.min(...candidates.map(n=>Number(usage[n]||0)));
  const nearMin=candidates.filter(n=>Number(usage[n]||0)<=min+1);
  const pool=nearMin.length?nearMin:candidates;
  return pool[randomIndex(pool.length)];
}
function recordRequiredUsage(req){
  if(!Array.isArray(req)||!req.length) return;
  const usage=getRequiredUsageMap();
  for(const n of req){
    if(!n) continue;
    usage[n]=Number(usage[n]||0)+1;
  }
  setRequiredUsageMap(usage);
}
function shuffleArray(arr){
  const a=(arr||[]).slice();
  for(let i=a.length-1;i>0;i--){
    const j=randomIndex(i+1);
    const t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}
/** Unbiased distinct pick of n items (Fisher–Yates — never sort(() => Math.random()). */
const pick = (arr,n) => {
  let c = Number(n);
  if (!Number.isFinite(c) || c < 0) c = 0;
  const src=[...(arr||[])];
  c = Math.min(c, src.length);
  if (c <= 0) return [];
  return shuffleArray(src).slice(0,c);
};

/** Mystery wheel: same ingredient / restriction / equipment cannot repeat until N full spins later (persisted). */
const PW_MYSTERY_SPIN_COOLDOWN_SPINS=7;
const PW_MYSTERY_COOLDOWN_STORAGE_KEY="pw_mystery_spin_cooldown_v1";

function loadMysterySpinCooldown(){
  try{
    const j=localStorage.getItem(PW_MYSTERY_COOLDOWN_STORAGE_KEY);
    if(!j) return {serial:0,hot:{}};
    const o=JSON.parse(j);
    if(!o||typeof o.hot!=="object") return {serial:0,hot:{}};
    return {serial:Math.max(0,+o.serial||0),hot:o.hot};
  }catch(_e){ return {serial:0,hot:{}}; }
}
function saveMysterySpinCooldown(cd){
  try{ localStorage.setItem(PW_MYSTERY_COOLDOWN_STORAGE_KEY, JSON.stringify(cd)); }catch(_e){}
}

function mysterySpinCooldownEligible(key, serial, hot){
  if(serial==null||serial===undefined||!hot) return true;
  const k=String(key||"").trim();
  if(!k) return true;
  const last=hot[k];
  if(last==null||last===undefined) return true;
  return serial-last>PW_MYSTERY_SPIN_COOLDOWN_SPINS;
}

function filterOrFallback(arr, pred){
  const f=(arr||[]).filter(pred);
  return f.length?f:arr.slice();
}

function mysteryFilterConstraintsForCooldown(all, serial, hot){
  if(serial==null||!hot) return all.slice();
  const filtered=all.filter(c=>{
    if(c.type==="res") return mysterySpinCooldownEligible("res:"+normalizeRestrictionKey(c.label), serial, hot);
    return mysterySpinCooldownEligible("forb:"+String(c.raw).toLowerCase(), serial, hot);
  });
  return filtered.length?filtered:all.slice();
}

function mysteryFilterEquipListForCooldown(equipArr, serial, hot, kind){
  if(serial==null||!hot) return equipArr.slice();
  const prefix=kind==="forb"?"forb:":"must:";
  const pred=e=>mysterySpinCooldownEligible(prefix+String(e).toLowerCase(), serial, hot);
  return filterOrFallback(equipArr||[], pred);
}

function filterIngredientsForCooldown(pool, serial, hot){
  if(serial==null||!hot) return pool.slice();
  const pred=n=>mysterySpinCooldownEligible("ing:"+String(n).trim().toLowerCase(), serial, hot);
  return filterOrFallback(pool||[], pred);
}

/** Increment spin serial and persist; return { serial, hotSnapshot } for this turn. */
function beginMysterySpinCooldownTurn(){
  const cd=loadMysterySpinCooldown();
  const serial=(cd.serial||0)+1;
  const hot={...(cd.hot||{})};
  saveMysterySpinCooldown({serial, hot});
  return {serial, hot};
}

/** Record picks for this spin so they stay out of the pool for PW_MYSTERY_SPIN_COOLDOWN_SPINS turns. */
function finalizeMysterySpinSelection(serial, hotBefore, parts){
  const h={...hotBefore};
  const mark=k=>{ h[k]=serial; };
  for(const name of parts.req||[])
    if(name&&String(name).trim()) mark("ing:"+String(name).trim().toLowerCase());
  for(const r of parts.res||[])
    if(r) mark("res:"+normalizeRestrictionKey(r));
  for(const e of parts.forbEq||[])
    if(e!=null) mark("forb:"+String(e).trim().toLowerCase());
  for(const e of parts.reqEq||[])
    if(e!=null) mark("must:"+String(e).trim().toLowerCase());
  saveMysterySpinCooldown({serial, hot:h});
}

/** Mystery spin / constraint random: roll 0–1 must-use equipment (never contradicts forbidden). */
function rollMustUseEquipment(diffKey, forbEq, spinSerial, hot){
  const forb=new Set(forbEq||[]);
  let cand=EQUIP.filter(e=>!forb.has(e));
  if(spinSerial!=null&&hot) cand=mysteryFilterEquipListForCooldown(cand, spinSerial, hot, "must");
  state.reqEq=[];
  if(!cand.length) return;
  const p=diffKey==="easy"?0.38:diffKey==="medium"?0.48:(diffKey==="hard"||diffKey==="insane")?0.55:0.45;
  if(randomUnit()>=p) return;
  state.reqEq=[cand[randomIndex(cand.length)]];
}

function drawUnifiedConstraints(count, spinSerial, hot){
  const n=Math.max(0, Number(count)||0);
  const all=[
    ...RESTRICT.map(r=>({type:"res",label:r})),
    ...EQUIP.map(e=>({type:"forb",label:"✕ "+e,raw:e})),
  ];
  const candidates=mysteryFilterConstraintsForCooldown(all, spinSerial, hot);
  const chosen=pick(candidates,n);
  return {
    spinConstraints: chosen.map(c=>c.label),
    restrictions: chosen.filter(c=>c.type==="res").map(c=>c.label),
    forbEquip: chosen.filter(c=>c.type==="forb").map(c=>c.raw),
  };
}

/** How many pantry names remain valid under these dietary restrictions */
function pantryFeasibleCount(pool, restrictions){
  const r=restrictions||[];
  const filtered=filterPoolByRestrictions([...new Set((pool||[]).filter(Boolean))],r);
  return filtered.length;
}

/** Re-roll unified draws until the pantry can still fill required slots (avoids No dairy + heavy cream style impossibilities). */
function drawUnifiedConstraintsFeasible(n, pool, needSlots, spinSerial, hot){
  const need=Math.max(0, Number(needSlots)||0);
  const count=Math.max(0, Number(n)||0);
  if(need<=0) return drawUnifiedConstraints(count, spinSerial, hot);
  let best=null, bestScore=-1;
  for(let attempt=0; attempt<55; attempt++){
    const draw=drawUnifiedConstraints(count, spinSerial, hot);
    const fc=pantryFeasibleCount(pool, draw.restrictions);
    if(fc>=need) return draw;
    if(fc>bestScore){ bestScore=fc; best=draw; }
  }
  for(let attempt=0; attempt<35; attempt++){
    const k=Math.max(0, Math.min(count, EQUIP.length));
    const feSrc=mysteryFilterEquipListForCooldown(EQUIP, spinSerial, hot, "forb");
    const fe=pick(feSrc,k);
    const draw={
      spinConstraints:fe.map(e=>"✕ "+e),
      restrictions:[],
      forbEquip:fe,
    };
    if(pantryFeasibleCount(pool, [])>=need) return draw;
  }
  if(best&&bestScore>0){
    while(best.restrictions.length&&pantryFeasibleCount(pool,best.restrictions)<need)
      best.restrictions.pop();
    const feSrc=mysteryFilterEquipListForCooldown(EQUIP, spinSerial, hot, "forb");
    best.forbEquip=pick(feSrc,Math.min(count-best.restrictions.length,feSrc.length));
    best.spinConstraints=[...best.restrictions,...best.forbEquip.map(e=>"✕ "+e)];
    if(pantryFeasibleCount(pool,best.restrictions)>=need) return best;
  }
  return {spinConstraints:[],restrictions:[],forbEquip:[]};
}

// Extract one JSON object from model text (handles ```json fences, braces inside strings, trailing commas).
function stripCodeFences(text) {
  const t = String(text || "").trim();
  const m = t.match(/```(?:json)?\s*([\s\S]*?)```/);
  return m ? m[1].trim() : t;
}
function stripTrailingCommas(jsonStr) {
  return jsonStr.replace(/,(\s*[\}\]])/g, "$1");
}
/** Apply trailing-comma fix repeatedly (nested arrays/objects). */
function stripTrailingCommasDeep(jsonStr) {
  let s = String(jsonStr || "");
  for (let i = 0; i < 8; i++) {
    const n = stripTrailingCommas(s);
    if (n === s) break;
    s = n;
  }
  return s;
}
function extractBalancedJsonObject(text) {
  const s = stripCodeFences(text);
  const start = s.indexOf("{");
  if (start === -1) return null;
  let depth = 0, inStr = false, esc = false;
  for (let i = start; i < s.length; i++) {
    const c = s[i];
    if (esc) { esc = false; continue; }
    if (inStr) {
      if (c === "\\") esc = true;
      else if (c === '"') inStr = false;
      continue;
    }
    if (c === '"') { inStr = true; continue; }
    if (c === "{") depth++;
    else if (c === "}") {
      depth--;
      if (depth === 0) return s.slice(start, i + 1);
    }
  }
  return null;
}
function normalizeJsonText(s) {
  return String(s || "")
    .replace(/[\u201c\u201d\u00ab\u00bb]/g, '"')
    .replace(/[\u2018\u2019]/g, "'");
}
/** Strip U+2028/U+2029 (line/paragraph sep) — JSON.parse rejects them inside strings unless escaped. */
function stripJsonUnsafeSeparators(s) {
  return String(s || "").replace(/\u2028/g, "\n").replace(/\u2029/g, "\n");
}
function parseModelJsonObject(raw) {
  let candidate = extractBalancedJsonObject(raw);
  if (!candidate) {
    const s = String(raw || "").indexOf("{"), e = String(raw || "").lastIndexOf("}");
    if (s !== -1 && e > s) candidate = String(raw).slice(s, e + 1);
  }
  if (!candidate) throw new Error("Model returned no JSON object");
  candidate = stripJsonUnsafeSeparators(normalizeJsonText(candidate));
  const tryParse = (str) => {
    try {
      return JSON.parse(str);
    } catch (e) {
      try {
        return JSON.parse(stripTrailingCommasDeep(str));
      } catch (_e2) {
        throw e;
      }
    }
  };
  try {
    return tryParse(candidate);
  } catch (e1) {
    try {
      return tryParse(candidate.replace(/\r\n/g, "\n"));
    } catch (_e2) {
      throw new Error(e1.message + " — Recipe JSON was malformed or cut off. Click Try Again.");
    }
  }
}

const PW_DAILY_AI_STORAGE_KEY = "pw_daily_ai_rounds_v1";
/** Target band ~10–20/day; feels generous, blocks 100+ round abuse */
const PW_DAILY_AI_LIMIT = 18;
const PW_DAILY_LIMIT_MESSAGE = "You've used today's battles — come back tomorrow or unlock more soon.";

function pwLocalDateKey() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function pwGetDailyAiCount() {
  try {
    const raw = localStorage.getItem(PW_DAILY_AI_STORAGE_KEY);
    const j = raw ? JSON.parse(raw) : null;
    const today = pwLocalDateKey();
    if (!j || j.d !== today) return { d: today, n: 0 };
    return { d: today, n: Math.max(0, Math.min(PW_DAILY_AI_LIMIT + 50, Number(j.n) || 0)) };
  } catch (_e) {
    return { d: pwLocalDateKey(), n: 0 };
  }
}

function pwDailyAiRemaining() {
  return Math.max(0, PW_DAILY_AI_LIMIT - pwGetDailyAiCount().n);
}

function pwCanUseAiRound() {
  return pwGetDailyAiCount().n < PW_DAILY_AI_LIMIT;
}

function pwRecordSuccessfulAiRound() {
  const today = pwLocalDateKey();
  const cur = pwGetDailyAiCount();
  const next = cur.d === today ? cur.n + 1 : 1;
  localStorage.setItem(PW_DAILY_AI_STORAGE_KEY, JSON.stringify({ d: today, n: next }));
  try {
    if (!sessionStorage.getItem("pw_session_started_v1")) {
      sessionStorage.setItem("pw_session_started_v1", "1");
      if (typeof gtag === "function") gtag("event", "pw_play_session", {});
    }
    if (typeof gtag === "function") {
      gtag("event", "pw_ai_round_ok", {
        daily_total: next,
        daily_remaining: Math.max(0, PW_DAILY_AI_LIMIT - next),
        limit: PW_DAILY_AI_LIMIT,
      });
    }
  } catch (_e) {}
}

function pwTrackDailyLimitHit(context) {
  try {
    if (typeof gtag === "function") {
      gtag("event", "pw_daily_limit_hit", {
        context: context || "ai",
        daily_count: pwGetDailyAiCount().n,
        limit: PW_DAILY_AI_LIMIT,
      });
    }
  } catch (_e) {}
}

// ── AI CALL ───────────────────────────────────────────────────────────────────
/** opts.bypassDailyPrecheck — internal retries after a successful parse (same user action). opts.skipQuotaRecord — do not increment daily AI count (pair with bypass for regen attempts). */
async function ai(prompt, tokens=300, opts) {
  opts=opts||{};
  await loadAppConfig();
  const apiKey = getAnthropicApiKey();
  if (!apiKey && !_serverAnthropicConfigured) throw new Error("No API key — cancelled or empty");
  if (!opts.bypassDailyPrecheck && !pwCanUseAiRound()) {
    pwTrackDailyLimitHit("blocked_precheck");
    throw new Error(PW_DAILY_LIMIT_MESSAGE);
  }
  const maxTok = Math.min(Math.max(256, Number(tokens) || 300), 8192);
  let timeoutMs = Number(opts.timeoutMs);
  if (!Number.isFinite(timeoutMs) || timeoutMs < 15000) {
    if (maxTok >= 6000) timeoutMs = 240000;
    else if (maxTok >= 3500) timeoutMs = 180000;
    else if (maxTok >= 1200) timeoutMs = 120000;
    else timeoutMs = 90000;
  }
  const runXhr = (forceServerKeyOnly) => new Promise((resolve, reject) => {
    // On hosted deployments with a configured server key, ignore per-browser keys.
    // This prevents one device's stale/invalid key from breaking while others work.
    const keyToSend=(forceServerKeyOnly||_serverAnthropicConfigured)?"":apiKey;
    const xhr = new XMLHttpRequest();
    const sec = Math.round(timeoutMs / 1000);
    const timer = setTimeout(() => {
      xhr.abort();
      reject(new Error(`Request timed out after ${sec}s — rival recipe and coach calls use a huge prompt; Claude often needs 1–3 min. Try again, or wait and retry if Anthropic is slow.`));
    }, timeoutMs);
    xhr.open("POST", "/api/anthropic");
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.onload = () => {
      clearTimeout(timer);
      if (xhr.status !== 200) {
        let detail = xhr.responseText.slice(0, 500);
        try {
          const errJ = JSON.parse(xhr.responseText);
          if (errJ.error && errJ.error.message) detail = errJ.error.message;
        } catch (_e) {}
        if(xhr.status===401&&!forceServerKeyOnly&&_serverAnthropicConfigured&&apiKey){
          runXhr(true).then(resolve).catch(reject);
          return;
        }
        reject(new Error("HTTP " + xhr.status + (detail ? ": " + detail : "")));
        return;
      }
      try {
        const d = JSON.parse(xhr.responseText);
        if (d.type === "error" && d.error) {
          reject(new Error(d.error.message || d.error.type || "Anthropic API error"));
          return;
        }
        if (d.error && (d.error.message || d.error.type)) {
          reject(new Error(d.error.message || d.error.type || "Anthropic API error"));
          return;
        }
        let txt = "";
        if (d.content && Array.isArray(d.content)) {
          txt = d.content.filter(c => c && c.type === "text" && c.text).map(c => String(c.text)).join("");
        }
        if (d.stop_reason === "max_tokens" && txt && !extractBalancedJsonObject(txt)) {
          reject(new Error("Response ran out of space — click Try Again, or use fewer required ingredients."));
          return;
        }
        const parsed = parseModelJsonObject(txt);
        if(!opts.skipQuotaRecord) pwRecordSuccessfulAiRound();
        resolve(parsed);
      } catch (err) {
        reject(err);
      }
    };
    xhr.onerror = () => {
      clearTimeout(timer);
      reject(new Error("Cannot reach Pantry Wars server — check that the app is running (npm start) or your live site is up."));
    };
    xhr.onabort = () => { clearTimeout(timer); reject(new Error("aborted")); };
    const payload = {
      model: PW_CLAUDE_MODEL,
      max_tokens: maxTok,
      messages: [{ role: "user", content: prompt }]
    };
    xhr.send(JSON.stringify({ api_key: keyToSend, payload }));
  });
  return runXhr(false);
}

async function leaderboardFetch(username){
  const u=String(username||"").trim();
  const qs=u?`?username=${encodeURIComponent(u)}`:"";
  const r=await fetch(`/api/leaderboard${qs}`,{method:"GET"});
  if(!r.ok) throw new Error(`Leaderboard HTTP ${r.status}`);
  return r.json();
}

async function leaderboardSubmit(payload){
  const r=await fetch("/api/leaderboard/submit",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload||{})
  });
  const text=await r.text();
  let data={};
  try{ data=JSON.parse(text||"{}"); }catch(_e){}
  if(!r.ok){
    const msg=(data&&data.error&&data.error.message)||`Leaderboard HTTP ${r.status}`;
    throw new Error(msg);
  }
  return data;
}

// ── LAUNCH ────────────────────────────────────────────────────────────────────
/** Snapshot current builder into challenge shape (for AI prompts before launch). */
function challengeFromBuilder(){
  const pool=pantryPool();
  return{
    diff:state.diff,
    ctype:state.ctype,
    totalTime:state.total,
    prepTime:state.prep,
    cookTime:state.cook,
    surpriseCut:state.cut,
    required:[...state.req],
    restrictions:sanitizeRestrictionList(state.res),
    reqEquip:[...state.reqEq],
    forbEquip:[...state.forbEq],
    limitBurners:state.lim,
    pantry:pool.filter(p=>!state.req.includes(p)),
  };
}

function doLaunch() {
  const cfg=DIFF[state.diff];
  if(state.req.length<cfg.req){
    alert(`This difficulty needs ${cfg.req} required ingredients that fit your restrictions — you have ${state.req.length}. Add pantry items or ease restrictions.`);
    return;
  }
  if(state.req.some(n=>ingredientConflictsWithAny(n,state.res))){
    alert("A required ingredient still conflicts with a restriction. Check your basket.");
    return;
  }
  if(!pwCanUseAiRound()){
    pwTrackDailyLimitHit("launch_blocked");
    alert(PW_DAILY_LIMIT_MESSAGE);
    return;
  }
  state.res=sanitizeRestrictionList(state.res);
  const pool = pantryPool();
  state.challenge={diff:state.diff,ctype:state.ctype,totalTime:state.total,prepTime:state.prep,cookTime:state.cook,surpriseCut:state.cut,required:state.req,restrictions:state.res,reqEquip:state.reqEq,forbEquip:state.forbEq,limitBurners:state.lim,pantry:pool.filter(p=>!state.req.includes(p))};
  trackPWEvent("start_battle", pwParamsChallenge(state.challenge));
  state.userCookPlan={dish:"",techniques:"",timing:""};
  state.contestRecipe=null;
  showScreen("screen-recipe");
  renderRecipe();
}

function wireUserCookPlanForm() {
  const d=$("user-plan-dish"),t=$("user-plan-tech"),tm=$("user-plan-time");
  if(!d||!t||!tm)return;
  d.value=state.userCookPlan.dish||"";
  t.value=state.userCookPlan.techniques||"";
  tm.value=state.userCookPlan.timing||"";
  d.oninput=()=>{state.userCookPlan.dish=d.value;updateBattleButtonState();};
  t.oninput=()=>{state.userCookPlan.techniques=t.value;updateBattleButtonState();};
  tm.oninput=()=>{state.userCookPlan.timing=tm.value;updateBattleButtonState();};
}

function syncUserCookPlanFromDom() {
  const d=$("user-plan-dish"),t=$("user-plan-tech"),tm=$("user-plan-time");
  if(d) state.userCookPlan.dish=d.value;
  if(t) state.userCookPlan.techniques=t.value;
  if(tm) state.userCookPlan.timing=tm.value;
}

function userPlanFilled() {
  const u=state.userCookPlan;
  return !!(u.dish||"").trim()||!! (u.techniques||"").trim()||!!(u.timing||"").trim();
}

function updateBattleButtonState() {
  const b=$("battle-btn"),hint=$("battle-hint");

function cancelDuelScoreAnimation(){

/** Keep judge copy aligned with weighted math (taste×3.5 + creativity×2.5 + presentation×2 + difficulty×2). */
function reconcileDuelJudgeSummary(raw, ty, ta){
  const s=String(raw||"").trim();
  state.duelJudgeSummaryConflict=false;
  let off="tie";
  if(ty>ta) off="you";
  else if(ta>ty) off="rival";
  const youWin=/\b(you\s+win|you\s+(?:take|edge|clinch)|your\s+(?:plan|dish|idea|entry)\s+win|winner:\s*you|favors\s+you\b)/i.test(s);
  const rivWin=/\b(rival\s+win|rival\s+chef\s+win|ai\s+win|favors\s+(?:the\s+)?rival|winner:\s*rival|rival\s+(?:take|edges|clinch))\b/i.test(s);
  let bad=false;
  if(off==="you"&&rivWin&&!youWin) bad=true;
  if(off==="rival"&&youWin&&!rivWin) bad=true;
  if(off==="tie"&&(youWin||rivWin)) bad=true;
  if(!bad) return s;
  state.duelJudgeSummaryConflict=true;
  const label=off==="you"?`You win (${ty} vs ${ta})`:off==="rival"?`Rival chef wins (${ta} vs ${ty})`:`Tie (${ty} each)`;
  return `Official weighted result — ${label}. (Narrative below disagreed with the numbers; totals decide the round.)\n\n${s}`;
}
function syncDuelScoreWidgets(){
  const sides=["you","ai"];
  const cats=["taste","creativity","presentation","difficulty"];
  for(const side of sides){
    const key=side==="you"?"scoresYou":"scoresAI";
    for(const cat of cats){
      const lab=$(`score-${side}-val-${cat}`);
      if(lab) lab.textContent=state[key][cat];
      const rg=$(`score-${side}-range-${cat}`);
      if(rg) rg.value=state[key][cat];
    }
  }
  updateScoreDisplay();
  const aut=$("score-auto-status");
  if(aut){
    if(state.duelScoreAnimRaf!=null) aut.textContent="Revealing scores…";
    else if(state.duelAutoScoring) aut.textContent="Auto-judging duel…";
    else aut.textContent="Auto-judge ready.";
  }
}
function animateDuelScores(targetYou,targetAi){
  cancelDuelScoreAnimation();
  const keys=["taste","creativity","presentation","difficulty"];
  const startY={...state.scoresYou},startA={...state.scoresAI};
  const startT=performance.now();
  const dur=1300;
  const ease=t=>1-Math.pow(1-t,3);
  function frame(now){
    const u=Math.min(1,(now-startT)/dur);
    const e=ease(u);
    for(const k of keys){
      state.scoresYou[k]=Math.max(0,Math.round(startY[k]+(targetYou[k]-startY[k])*e));
      state.scoresAI[k]=Math.max(0,Math.round(startA[k]+(targetAi[k]-startA[k])*e));
    }
    syncDuelScoreWidgets();
    if(u<1) state.duelScoreAnimRaf=requestAnimationFrame(frame);
    else{
      state.duelScoreAnimRaf=null;
      for(const k of keys){
        state.scoresYou[k]=targetYou[k];
        state.scoresAI[k]=targetAi[k];
      }
      state.duelSlidersUnlocked=true;
      state.duelAutoSummary=reconcileDuelJudgeSummary(state.duelAutoSummaryRaw,calcTotal(state.scoresYou),calcTotal(state.scoresAI));
      renderScore();
    }
  }
  state.duelSlidersUnlocked=false;
  state.duelScoreAnimRaf=requestAnimationFrame(frame);
}

function analyzeBasketForRecipe(required) {
  const low = required.map(s => String(s).toLowerCase());
  const junkRx = /\b(frosting|icing|chocolate\s*syrup|corn\s*syrup|candy|marshmallow|soda|cola|potato\s*chips|cereal|pizza\b|snack|twinkie|pop[\s-]?tart|spray\s*cheese|velveeta|cool\s*whip|hot\s*fudge|nesquik|hershey'?s?\s*syrup)\b/;
  const sweetShelfRx = /\b(frosting|icing|chocolate\s*syrup|syrup|candy|marshmallow|hot\s*fudge)\b/;
  const junkHits = low.filter(s => junkRx.test(s)).length;
  const processedSweet = low.some(s => sweetShelfRx.test(s));
  const hardBasket = junkHits >= 2 || required.length >= 5 || (junkHits >= 1 && required.length >= 4);
  const cleanBasket = junkHits === 0 && required.length <= 4;
  return { hardBasket, cleanBasket, processedSweet, junkHits };
}

FAIL THE BRIEF IF:

    return `CHALLENGE INTENT (mandatory): SNACK — course means EATING FORMAT and portion scale, not only flavor logic.

INDULGENCE & TEXTURE (diner wins are often "too much" in a good way):

  }
  if(challengeTypeIsStreetFood(ctype)){

WHAT COUNTS:

REQUIRED IN OUTPUT:

  if(challengeTypeIsFineDining(ctype)){

REQUIRED IN OUTPUT:

FAIL THE BRIEF IF:

  }
  if(challengeTypeIsComfortReinvented(ctype)){

WHAT COUNTS:
- Mac & cheese, pot pie, shepherd's pie, casserole, baked pasta — dishes that trigger "home," then you justify a smart twist (technique, ingredient, texture) without erasing the dish.
- **Reinvent the EXPERIENCE** (crisp + rich + cohesive), not only the flavor keywords — especially for **pot pie**: if **oven/sheet pan are forbidden**, you must still deliver **crust logic** (pan-crisp grain lid, griddled dough, crisp potato top, etc.), not "stew in a bowl + sweet sauce."
- **Marshmallow / shelf-sweet in a savory comfort dish:** use as **technique** (caramelize, torch, salty-sweet **integrated** in filling, toasted crisp) — **NOT** as **marshmallow gravy** or a **dessert drizzle** that makes the plate "pork + sweet sauce." Judges must taste **one unified bite**.
- **Salt stack:** multiple umami/salty sources (anchovy, cheese puffs, capers, miso, cured meat, crab, snack crisps, aged cheese) → **restraint on added salt** + **named acid** (lemon, vinegar, pickle) + often **herb or raw veg** so the dish is not one-note salty.
- **Shelf-snack crumb "crust" on fish:** cheese puffs / similar are **pre-cooked, fatty, salty** — they **char faster** than flour/panko; call **lower heat / shorter first-side** or **protect** the crust so judges don't get burn-bitter, and keep **salt discipline** when crumbs also dissolve into sauce.

- **Fresh contrast:** creamy/rich comfort still needs a **bright layer** — citrus, herbs, peppery green, quick pickle — integrated in the bite, not only tweezers.
- **Split use:** veg that can do two things (edamame, peas, cauliflower, lotus, potato) → **two techniques** (whole + purée/blister/char/chip) when time allows — stronger than a single fold-in.

REQUIRED IN OUTPUT:
- title OR tagline must name the comfort baseline (e.g. "pot pie," "mac and cheese") and the twist in plain words.
- balance.basket sentence 1: "Comfort baseline: [dish] — twist: …" and one line on why it still feels like that comfort food.
- balance.flavor: name **salt discipline** (if salty ingredients stack) **and** **fresh/acid contrast** for rich plates.

FAIL THE BRIEF IF:
- Baseline disappears into a random fine-dining plate with no recognizable comfort anchor — that is replacement, not reinvention.

  }
  if(challengeTypeIsGlobalCuisine(ctype)){

function restrictionsJudgeAddon(ch){
  const r=sanitizeRestrictionList((ch&&ch.restrictions)||[]);
  if(!r.length) return "";
  const req=(ch&&ch.required)||[];
  const veganKimchi=r.some(x=>normalizeRestrictionKey(x)==="Vegan")&&req.some(x=>/\bkimchi\b/i.test(String(x)));
  return `
RESTRICTIONS — JUDGING LENS (non-negotiable):
- Penalize HARD if either competitor's plan breaks a stated restriction (e.g. dairy under No Dairy, meat under Vegetarian). "Classic needs cheese" or "just a finish of cream" is still disqualifying-level bad in real comps.
- Rule compliance outweighs delicious flavor: say so in summary when one side is tastier but illegal.
- Reward honest substitutes that stay inside the rules while still respecting the challenge type.${veganKimchi?`
- VEGAN + KIMCHI IN HAUL: Default kimchi is often non-vegan (fish sauce, shrimp paste). Penalize "kimchi" with no **vegan/fish-free** labeling or honest DIY/no-seafood statement; reward explicit vegan product or scratch ferment with no seafood.`:""}`;
}

/** When No Salt is active: latent sodium vs letter of rule + compensation. */
function noSaltRestrictionJudgeAddon(ch){
  const r=sanitizeRestrictionList((ch&&ch.restrictions)||[]);
  if(!r.some(x=>normalizeRestrictionKey(x)==="No Salt")) return "";
  return `
NO SALT — JUDGING LENS:
- Letter of rule: penalize explicit **granulated/added salt** only — table salt, kosher salt, finishing salt, seasoned salt, and "salt to taste." Salty ingredients (stock, butter, cheese, soy, miso, capers, caper brine, pickle brine, etc.) are allowed unless another restriction blocks them.
- Penalize plans that ignore the brief: no clear answer to "how did you solve NO SALT?" (acid, umami, char, reduction, honest latent sodium) — only fat/cream richness.
- Reward plans that compensate with acid (citrus, vinegar), tomato or char for depth, bitter char on veg, and aggressive reduction — especially when maple/honey/sweet items are in play — so the dish does not read flat or dessert-sweet.
- Call out flat flavor plans that forget contrast (acid/bitter/char) — not because salty ingredients are illegal, but because they often still need brightness to avoid muddy richness.`;
}
