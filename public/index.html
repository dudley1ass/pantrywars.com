  const id=String((ch.ctype&&ch.ctype.id)||"");
  const label=String((ch&&ch.ctype&&ch.ctype.label)||"").toLowerCase();
  if(id!=="dessert"&&!/\bdessert\b/.test(label)) return msgs;
  const req=(ch.required||[]).map(s=>String(s).toLowerCase()).join(" ");
  if(!/\b(snap\s*pea|snow\s*pea|sugar\s*snap)\b/.test(req)) return msgs;
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  const veg=/\b(snap\s*pea|snow\s*pea|sugar\s*snap)\b/i;
  if(!veg.test(low)) return msgs;
  const transform=/\b(blanch|blanched|saut[eé]|saute|char|charred|caramel|candied|pickle|compote|roast|roasted|grill|grilled|glaze|glazed|wilt|wilted|heat|quick[\s-]?cook|syrup|sugar\s+cook|brown\s+in\s+pan)\b/i.test(low);
  const rawOnly=/\b(raw|chop|chopped|slice|sliced|thinly|dice|diced|mince|minced|garnish|garnished|sprinkle|sprinkled)\b/i.test(low)&&veg.test(low);
  if(rawOnly&&!transform)
    msgs.push(`Dessert + snap/snow peas: use a real technique (blanch, sauté, char, candied strip, syrup pickle) — not only raw chop or sprinkle garnish.`);
  else if(!transform)
    msgs.push(`Dessert + snap/snow peas: name a heat or sugar technique in steps or balance.flavor — not undressed veg on a sweet plate.`);
  return msgs;
}

/** Savory-ish challenge types where marshmallow must transform (not dessert sauce default). */
function challengeTypeUsesMarshmallowSavoryRule(ctype){
  const id=String((ctype&&ctype.id)||"");
  const label=String((ctype&&ctype.label)||"").toLowerCase();
  if(id==="dessert"||/\bdessert\b/.test(label)) return false;
  return new Set(["appetizer","entree","comfort_reinvented","diner_classic","street_food","fine_dining","global_cuisine","elevate","recreate","snack"]).has(id);
}

/** Snack challenge: form = binding; HARD = crunch/cohesion — catch deconstructed plate + drizzle chocolate + loose fish + limp greens. */
function getSnackFormatEnforcementViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch||!challengeTypeIsSnack(ch.ctype)) return msgs;
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  const req=(ch.required||[]).map(s=>String(s).toLowerCase()).join(" ");
  const hard=["hard","insane"].includes(String(ch.diff||"").toLowerCase());

  if(/\b(deconstructed|composed\s+entree|tasting[\s-]menu|three\s+components|separate\s+components)\b/i.test(low))
    msgs.push(`Snack: reads as deconstructed entree — build **one** handheld/poppable structure (fritter, croquette, crisp toast, skewer bite) with cohesive chew — not sautéed X + pan Y + drizzle Z as separate tracks.`);

  if(hard){
    if(/\b(kale|collard|spinach|swiss\s+chard|mustard\s+greens)\b/.test(req)){
      const wiltOnly=/\bsaut[eé]e?\w*\s+(?:the\s+)?(?:kale|greens|spinach|chard)\b|\b(kale|spinach|greens)[\s\S]{0,55}?\bsaut[eé]e?\w*\b/i.test(low);
      const integrated=/\b(chip|chips|crisp|dehydrat|fritter|patty|croquette|mix\s+into|finely\s+chop|mince|batter|nugget|cake)\b/i.test(low);
      if(wiltOnly&&!integrated)
        msgs.push(`Snack + leafy greens (HARD): limp sautéed greens read as side garnish — **chips**, **fine chop in binder**, or **baked into** fritter/nugget — not a soft pile next to protein.`);
    }
    if(/\b(cod|halibut|salmon|tuna|fish)\b/.test(req)){
      const looseFish=/\b(?:pan|skillet)[\s\S]{0,120}?\b(?:chunk|chunks|piece|pieces|flake)\b|\bchunk\w*\s+of\s+(?:cod|fish|salmon)\b|\bpan[\s-]?cook(?:ed|ing)?\b[\s\S]{0,140}?\b(?:cod|fish|salmon)\b/i.test(low);
      const structured=/\b(fritter|croquette|patty|cake|ball|nugget|skewer|toast|bind|batter|mix\s+into)\b/i.test(low);
      if(looseFish&&!structured)
        msgs.push(`Snack + fish (HARD): loose pan-cooked chunks fall apart — **bind** (fish cake, fritter, crisp on toast) so the bite holds shape and repeats.`);
    }
    if(/\bnutritional\s+yeast\b/.test(req)){
      const workedIn=/\b(mix|fold|blend|batter|dough|filling|coat|into\s+the|fritter)\b[\s\S]{0,140}?\bnutritional\s+yeast\b|\bnutritional\s+yeast\b[\s\S]{0,140}?\b(mix|fold|blend|batter|into)\b/i.test(low);
      const onlySprinkle=/\b(sprinkle|garnish)\b[\s\S]{0,100}?\bnutritional\s+yeast\b/i.test(low)&&!workedIn;
      if(onlySprinkle)
        msgs.push(`Snack + nutritional yeast: drive **umami in the mix** (binder/coating) — not **only** a sprinkle garnish — so it reads cheesy-snack, not afterthought.`);
    }
    if(!/\b(crisp|crispy|crunch|toast|fry|fried|sear|skillet|griddle|bake|chip|crumb|crust|fritter|croquette)\b/i.test(low))
      msgs.push(`Snack (HARD): need **texture contrast** — at least one **crisp / crunch / sear** story (fried bite, toast base, kale chips, crumb crust). Soft + soft + drizzle alone fails snack viability.`);
  }
  return msgs;
}

/** Strip negated/forbidden phrasing so "not gravy + marshmallow" / "do not drizzle marshmallow" does not false-flag. */
function scrubComfortMarshmallowJudgeProse(low){
  return String(low||"")
    .replace(/\b(?:not|no|without|avoid|never|don'?t)\s+[^.;]{0,140}?\b(?:gravy|drizzle)\b[^.;]{0,180}?\bmarshmallow\b/gi," ")
    .replace(/\b(?:not|no|without|avoid)\s+[^.;]{0,140}?\bmarshmallow\b[^.;]{0,120}?\b(?:gravy|drizzle)\b/gi," ")
    .replace(/\bgravy\b\s*\+\s*marshmallow\b|\bmarshmallow\b\s*\+\s*gravy\b/gi," ")
    .replace(/\b(?:not|never)\s+[^.;]{0,60}?\bdrizzle\b/gi," ");
}

/** Comfort Reinvented + marshmallow: ban "marshmallow gravy" / sweet sauce spine (eval: technique + cohesion, not dessert drizzle). */
function getComfortReinventedMarshmallowViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch||!challengeTypeIsComfortReinvented(ch.ctype)) return msgs;
  const req=(ch.required||[]).map(s=>String(s).toLowerCase()).join(" ");
  if(!/\bmarshmallow\b/.test(req)) return msgs;

  const badGravy=/\bmarshmallow\s+gravy\b|\bmarshmallow[\s-]gravy\b|\bgravy\s+of\s+marshmallow\b|\bgravy\b[\s\S]{0,120}?\bmarshmallow\b|\bmarshmallow\b[\s\S]{0,100}?\bgravy\b/i.test(low);

  if(badGravy||sweetFinish)
    msgs.push(`Comfort reinvented + marshmallow: forbidden pattern — **marshmallow gravy**, **marshmallow essence drizzle**, or sweet sauce as the lead finish. Use marshmallow as **technique** (caramelize, torch, tiny salty-sweet glaze integrated into the filling, or crisp/toast) for **one cohesive savory bite**; balance.flavor must explain the **unified** story — not "pork + sweet sauce."`);

}

/** Marshmallow in basket + savory course: require documented heat work, not cold dairy fold. */
function getMarshmallowSavoryTransformationViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;

  const marshHeat=/marshmallow[\s\S]{0,220}?\b(melt|melted|melting|caramel|carameliz|torch|br[ûu]l[eé]|dissolv|toast|toasted|brown|broil|reduc|heated|hot\s+pan|pan[\s-]*melt|warm|simmer|grill|char|flame)|\b(melt|melted|caramel|torch|toast|dissolv|brown|broil|reduc|cook|simmer)[\s\S]{0,220}?marshmallow/i.test(low);

/** Dark chocolate in basket + savory course or SNACK: block dessert-style sauce/drizzle collision without fusion technique. */
function getSavoryChocolateIntegrationViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;

    /\b(chocolate|cocoa)\b[\s\S]{0,130}?\b(red\s+wine|sherry|balsamic|espresso)\b/i.test(low);

  if(wingChocBraise)

    /\b(heavy\s+cream|whipping\s+cream)\b[\s\S]{0,110}?\bmelt(?:ed|ing|s)?\s+(?:the\s+)?chocolate\b/i.test(low);

      :`Savory + dark chocolate: integrate into one system — not a separate dessert-style chocolate sauce or ganache (melt chocolate + cream alone) or drizzle on a savory base. Use mole/adobo-style depth, bloom paprika/chile in fat then dissolve chocolate, or bitter cocoa in reduced stock/coffee with acid/salt.`);

/** Appetizer/entree: require a named palate hook (acid, heat/spice, char, or punchy savory) — not only mild + sweet + butter. */
function getCompetitionSavoryEdgeViolations(recipe, ch){

/** HARD/INSANE + ≤25 min: scratch dough + custard bake + separate veg/wok is usually fantasy. */
function getShortClockHardKitchenLoadViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const d=String(ch.diff||"").toLowerCase();
  if(d!=="hard"&&d!=="insane") return msgs;
  const total=Math.max(1, Number(ch.totalTime)||30);
  if(total>25) return msgs;
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  const scratch=/\b(make\s+(?:the\s+)?(?:dough|pastry|crust|shell)|from\s+scratch|roll\s+out\s+(?:the\s+)?dough|mix\s+(?:the\s+)?(?:dough|pastry|custard\s+base))\b/i.test(low);
  const custBake=/\b(custard|quiche|egg\s+tart|custard\s+fill)\b/i.test(low)&&/\b(blind\s*bake|bake\s+(?:the\s+)?(?:tart|shell|crust)|oven\s+until|oven\s+for)\b/i.test(low);
  const sideTrack=/\b(collard|greens|wok|saut[eé]\s+(?:the\s+)?(?:greens|collard))\b/i.test(low);
  if(scratch&&custBake&&sideTrack)
    msgs.push(`Timeline (${total} min ${d.toUpperCase()}): scratch dough + custarded bake + separate greens/wok track is not credible — use purchased pastry/shell, fewer stages, or one primary heat story with honest parallel minutes.`);
  return msgs;
}

function escapeRegExpBasketToken(s){
  return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

/** Word-level match for basket coverage (allows plural/singular). */
function basketTokenMatchesBlob(t, blobLower){
  const tok=String(t||"").trim().toLowerCase();
  if(tok.length<=1) return true;
  if(new RegExp("\\b"+escapeRegExpBasketToken(tok)+"(?:es|s)?\\b","i").test(blobLower)) return true;
  const stem=tok.replace(/ies$/,"y").replace(/(?:es|s)$/,"");
  if(stem.length>=2&&stem!==tok){
    if(new RegExp("\\b"+escapeRegExpBasketToken(stem)+"(?:es|s|ies)?\\b","i").test(blobLower)) return true;
  }
  return false;
}

/**
 * Each REQUIRED basket name must appear in flattened recipe text (ingredients, steps, balance, titles).
 * Catches missing required items that prompts alone do not stop.
 */
function basketRequiredNameCovered(name, blobLower){
  const raw=String(name||"").trim().toLowerCase();
  if(!raw) return true;
  if(blobLower.includes(raw)) return true;
  if(/\bhalf\s+and\s+half\b/i.test(raw)&&/\bhalf\s+and\s+half\b/i.test(blobLower)) return true;
  if(/\bhalf[\s-]and[\s-]half\b/i.test(blobLower)&&raw.replace(/[^a-z0-9]+/g," ").includes("half and half")) return true;
  const STOP=new Set(["the","a","an","of","and","or","for","with","to","in","on","at"]);
  const tokens=raw.split(/[^a-z0-9]+/).filter(x=>x.length>0).filter(x=>!STOP.has(x));
  if(!tokens.length) return blobLower.includes(raw);
  for(const t of tokens){
    if(!basketTokenMatchesBlob(t, blobLower)) return false;
  }
  return true;
}

function getRequiredBasketCoverageViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const req=(ch.required||[]).map(s=>String(s).trim()).filter(Boolean);
  if(!req.length) return msgs;
  const blobLower=recipeFlattenTextForCompliance(recipe).toLowerCase();
  for(const name of req){
    if(basketRequiredNameCovered(name, blobLower)) continue;
    msgs.push(`Basket coverage: REQUIRED "${name}" must appear clearly in ingredients and/or steps (list it or describe using it — paraphrase only if unmistakably the same product).`);
  }
  msgs.push(...getRequiredBasketIntegrationDepthViolations(recipe, ch));
  return msgs;
}

/**
 * HARD/INSANE: penalize finish-only token usage for required basket items.
 * Presence alone passes coverage, but finish-only should lose depth points.
 */
function getRequiredBasketIntegrationDepthViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const diff=String(ch.diff||"").toLowerCase();
  if(diff!=="hard"&&diff!=="insane") return msgs;
  const req=(ch.required||[]).map(s=>String(s).trim()).filter(Boolean);
  if(!req.length) return msgs;
  const ingredientBlob=recipeIngredientLinesForCompliance(recipe).toLowerCase();
  const stepsBlob=recipeStepLinesForCompliance(recipe).toLowerCase();
  const finishCue=/\b(finish|at\s+the\s+pass|garnish|sprinkle|dust|zest|microplane|grate\s+over|drizzle|top\s+with|optional)\b/i;
  const processCue=/\b(sear|saut[eé]|fry|toast|char|braise|simmer|reduce|deglaze|blend|puree|purée|fold|bind|caramel|emulsif|roast|bake|pressure|marinate|pickle|glaze|stew|broil)\b/i;
  const splitTokens=(s)=>String(s).toLowerCase().split(/[^a-z0-9]+/).filter(x=>x.length>=3);
  for(const name of req){
    const tokens=splitTokens(name);
    const tokenRe=tokens.length?new RegExp(`\\b(?:${tokens.map(escapeRegExpBasketToken).join("|")})\\b`,"i"):new RegExp(`\\b${escapeRegExpBasketToken(String(name).toLowerCase())}\\b`,"i");
    const inIngredients=tokenRe.test(ingredientBlob);
    const inSteps=tokenRe.test(stepsBlob);
    if(!inIngredients&&!inSteps) continue;
    const finishOnly=tokenRe.test(stepsBlob)&&finishCue.test(stepsBlob)&&!processCue.test(stepsBlob);
    const garnishHeavy=(/\b(garnish|sprinkle|dust|zest|drizzle)\b/i.test(stepsBlob)&&tokenRe.test(stepsBlob)&&!processCue.test(stepsBlob));
    if((finishOnly||garnishHeavy)&&!challengeTypeIsSnack(ch.ctype)){
      msgs.push(`Integration depth (${diff.toUpperCase()}): REQUIRED "${name}" reads **finish-only** (grate/sprinkle/drizzle) with no clear transformation step. Keep it load-bearing: name one process move (sear/blend/reduce/fold/bind/etc.), not only a pass garnish.`);
    }
  }
  return msgs;
}

/** Reject named fruit sauces/reductions for fruits not in REQUIRED or PANTRY (e.g. "strawberry reduction" when only Plum is in the haul). */
function getBasketFruitSauceDriftViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const req=(ch.required||[]).map(s=>String(s).trim().toLowerCase()).filter(Boolean);
  const pan=(ch.pantry||[]).map(s=>String(s).trim().toLowerCase()).filter(Boolean);
  const allowed=new Set([...req,...pan]);
  const blob=recipeFlattenTextForCompliance(recipe).toLowerCase();
  for(const fruit of PW_NAMED_FRUIT_FOR_SAUCE_CHECK){
    if(allowed.has(fruit)) continue;
    const re=new RegExp(`\\b${fruit}\\s+(reduction|gastrique|sauce|compote|coulis|glaze|purée|puree|jam|syrup)\\b`,"i");
    if(re.test(blob))
      msgs.push(`Basket fruit drift: "${fruit}" is named as a sauce/reduction/compote flavor but is not in REQUIRED or PANTRY — use a required fruit (or neutral "fruit reduction") instead; do not substitute strawberry for plum etc.`);
  }
  return msgs;
}

/**
 * Dish words that imply a physical format — require matching structure in method text.
 */
const PW_FORMAT_HONESTY_RULES=[
  { re:/\btartlet\b/i, need:/\b(pastry|puff|shortcrust|dough|shell|crust|phyllo|filo|tart\s+shell|lined\s+ring|mold)\b/i, msg:'Format honesty: "tartlet" needs a real pastry/shell (dough, puff, crust) or rename (e.g. composed bite).' },
  { re:/\bpot\s+pie\b/i, need:/\b(pastry|crust|top\s*crust|lid|puff|dough|biscuit\s+topping)\b/i, msg:"Format honesty: pot pie needs a crust/lid story — not a bowl stew only." },
  { re:/\bsandwich\b/i, need:/\b(bread|bun|roll|brioche|toast|baguette|wrap|tortilla|bun\s+top)\b/i, msg:"Format honesty: sandwich needs bread/wrap layers — or call it an open plate." },
  { re:/\bcalzone\b/i, need:/\b(dough|pizza\s+dough|folded|stuffed\s+dough)\b/i, msg:"Format honesty: calzone implies sealed dough — say so or rename." },
  { re:/\btaco\b/i, need:/\b(tortilla|shell|corn\s+tortilla|flour\s+tortilla)\b/i, msg:"Format honesty: taco needs a tortilla/shell — or rename the format." },
];

function getRecipeFormatHonestyViolations(recipe){
  const msgs=[];
  if(!recipe) return msgs;
  const head=String(recipe.title||"")+" "+String(recipe.tagline||"");
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  for(const rule of PW_FORMAT_HONESTY_RULES){
    if(!rule.re.test(head)) continue;
    if(rule.need.test(low)) continue;
    msgs.push(rule.msg);
  }
  return msgs;
}

/** Mayo/aioli naming + absurd flour-as-bread lines — regen gate. */
function getKitchenScienceHonestyViolations(recipe){
  const msgs=[];
  if(!recipe) return msgs;

/** Must-use gear must appear in a primary heat/technique step, not only garnish. */
function getRecipeEquipmentCentralityViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const req=(ch.reqEquip||[]).map(s=>String(s).trim()).filter(Boolean);
  if(!req.length) return msgs;
  const steps=recipe.steps||[];
  for(const eq of req){
    const en=eq.toLowerCase();
    if(/torch|blender|food\s*processor|sous\s*vide|microwave|air\s*fryer|instant\s*pot|oven|sheet\s*pan|cast\s*iron|wok/i.test(en)===false) continue;
    let ok=false;
    for(const s of steps){
      const ph=(String(s.phase||"").toUpperCase()).trim();
      const blob=String(s.what||"")+" "+String(s.how||"");
      const b=blob.toLowerCase();
      const hasTool=mentionsEquipment(b, eq);
      if(/blender|food\s*processor/i.test(en)){
        const verbOk=/\b(blend|blended|blending|puree|purée|pureed|pulse|pulsed|blitz|liquif|emulsif|smooth)\b/i.test(b);
        const primary=/^(COOK|SAUCE|PREP|ASSEMBLE|PLATE)$/.test(ph);
        if((hasTool&&verbOk)||(verbOk&&primary)){
          ok=true;
          break;
        }
        continue;
      }
      if(/^oven$/i.test(en.trim())){
        const primary=/^(COOK|SAUCE|ASSEMBLE|PREP)$/.test(ph);
        if(primary&&stepTextShowsOvenUse(b)){
          ok=true;
          break;
        }
        continue;
      }
      if(!hasTool) continue;
      if(/torch/i.test(en)) ok=/\b(brul|torch|torched|torching|blow-?\s*torch|kitchen\s*torch|melt|char\s+with)\b/i.test(blob)||/^PLATE$|^ASSEMBLE$/i.test(String(ph||"").trim());
      else if(/sous\s*vide/i.test(en)) ok=/\b(sous\s*vide|water\s*bath|\d+\s*°?f|\d+\s*°?c)\b/i.test(blob);
      else if(/microwave/i.test(en)) ok=/\b(microwave|nuke)\b/i.test(blob);
      else if(/air\s*fryer/i.test(en)) ok=/\bair\s*fryer\b/i.test(blob);
      else if(/instant\s*pot|pressure/i.test(en)) ok=/\b(instant\s*pot|pressure\s*cook)\b/i.test(blob);
      else if(/sheet\s*pan/i.test(en)) ok=/COOK|SAUCE|PREP/.test(ph)&&/\b(sheet\s*pan|sheetpan|tray)\b/i.test(blob)&&/\b(roast|bake|sheet)\b/i.test(blob);
      else if(/cast\s*iron/i.test(en)){
        const fullSteps=steps.map(st=>String(st.what||"")+" "+String(st.how||"")).join(" ").toLowerCase();
        const depthMove=/\b(deglaze|fond|reduction|pan\s+sauce|braise|simmer|reduce|scrape|brown\s+bits|build\s+on)\b/i.test(fullSteps);
        const searOnly=/\b(sear|saut[eé])\b/i.test(fullSteps)&&!depthMove;
        ok=/COOK|SAUCE/.test(ph)&&!searOnly;
      }
      else if(/wok/i.test(en)) ok=/COOK|SAUCE/.test(ph)&&/\b(sear|saut[eé]|braise|brown|simmer|reduce|deglaze|fond|toast|char|caramel|stir[\s-]?fry|wok|pan\s+sauce)\b/i.test(blob);
      else ok=true;
      if(ok) break;
    }
    if(!ok) msgs.push(`Must-use ${eq}: use it in a primary technique step (sear/braise/blend/bake as fits the tool) — not only a passing mention or side garnish.`);
  }
  msgs.push(...getWokMustUseCentralityViolations(recipe,ch));
  msgs.push(...getBlenderMustUseCentralityViolations(recipe,ch));
  msgs.push(...getTorchMustUseDepthViolations(recipe,ch));
  return msgs;
}

/** Appetizer portions should read first-course scale, not entree mass. */
function getAppetizerPortionSanityViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  if(String((ch.ctype&&ch.ctype.id)||"")!=="appetizer") return msgs;
  const serves=Math.max(1, Number(recipe&&recipe.serves)||2);
  const ing=Array.isArray(recipe.ingredients)?recipe.ingredients:[];
  const toNum=(s)=>{
    const m=String(s||"").match(/(\d+(?:\.\d+)?)/);
    return m?Number(m[1]):null;
  };
  let proteinOz=0;
  for(const row of ing){
    const item=String(row&&row.item||"").toLowerCase();
    const amount=String(row&&row.amount||"").toLowerCase();
    if(!/\b(chicken|beef|pork|lamb|duck|turkey|salmon|tuna|cod|halibut|shrimp|scallop|sausage|steak|breast|fillet|filet|wings?)\b/.test(item)) continue;
    const n=toNum(amount);
    if(n==null) continue;
    if(/\boz\b/.test(amount)) proteinOz+=n;
    else if(/\blb\b/.test(amount)) proteinOz+=n*16;
    else if(/\bg\b/.test(amount)) proteinOz+=n/28.35;
  }
  if(proteinOz>0){
    const per=proteinOz/serves;
    if(per>=7){
      msgs.push(`Course fit (appetizer): protein portion trends **~${per.toFixed(1)} oz per serving**, which reads entrée-scale. Downsize to starter portions (small bites/slices, shared plate logic) and shift weight to acid/crisp garnish or base.`);
    }
  }
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  if(/\b(full|whole)\s+(?:chicken\s+breast|steak|fillet|filet|pork\s+chop)\b/.test(low))
    msgs.push(`Course fit (appetizer): "full/whole" center-cut protein language reads entrée. Reframe as sliced/shared first course or bite-format architecture.`);
  return msgs;
}

function executionHonestyBlock(ch){
  const t=Math.max(1, Number((ch&&ch.totalTime)||30));
  return `EXECUTION HONESTY (judging table):
- Must-use equipment: integrate in the main cook story (COOK/SAUCE or the step that matches the tool) — not only for a minor component while the heaviest step uses a different vessel.
- Timeline: step "dur" values should sum realistically vs ${t} min; long braises must fit; say "parallel" when two things run at once; avoid vague filler steps whose only job is to pad minutes.
- **Tart / pastry shell / quiche / galette (${t} min):** On tight clocks, name **store-bought or frozen pastry** in ingredients if you use a baked shell — or pick a **no-crust** format. Scratch dough + chill + bake is not credible when minutes are short; the app gate checks this.
- Format words: if you say tartlet, sandwich, pot pie, taco, calzone — include the real structure (pastry shell, bread, tortilla, etc.) or rename the dish.
- Kitchen naming: mayonnaise/aioli implies a real emulsion (egg yolk, jarred mayo, etc.) — not cream whisked with lemon unless you rename the sauce.
- **Pan fond:** Do not **wipe/scrape the pan clean** of browned bits before building a sauce or glaze and then claim **fond / Maillard depth** from that same pan — **deglaze** the crumbs into the next stage or skip the wipe; those lines contradict each other.
- **Tempeh / dense soy cakes:** A **5–10 min surface marinade** does not season the interior — be honest (short dip + **pan glaze / reduced marinade** carries flavor) or write a **longer soak** if you claim deep marinade penetration.\n`;
}

/** No Gluten + pasta/noodle shape in required haul — GF boil + starch physics for prompts. */

- **Boil time:** Gluten-free dry spaghetti and most GF long pasta need **~${PW_PHYSICS_GLUTEN_FREE_PASTA.typicalBoilRangeMinutes} min** to cook through — often **longer than wheat**, not shorter. Start salted **pasta water early**; dropping GF pasta **too late** in a ${t} min round is a common clock fail (under-boiled GF pasta reads chalky).
- **Pasta-water finito:** The glossy **starchy pasta water + butter + toss** trick assumes **wheat starch**. GF noodles (rice, legume, corn blends) release **different starch** — emulsified cling is **unreliable**; sauces can read **greasy or broken**. If you still want that finish, name a **fallback** (small **cornstarch slurry**, longer **reduction**, extra cheese bind) or use **rice noodles / glass noodles** when the story allows a faster, more predictable cling.

/** Short-clock grain realism: pearl barley / arborio are not quick-cook unless pre-cooked/instant. */

/** Real cooking constraints — rival + coach must not claim impossible outcomes to satisfy the basket. */
function physicsRealismBlock(ch){
  const t=Math.max(1, Number((ch&&ch.totalTime)||30));
  const ctype=(ch&&ch.ctype)||{};
  let s=`PHYSICS & REAL COOKING (non-negotiable — no comic-book shortcuts):
- CLOCK (${t} min total): Every named minute in steps and prose must fit inside ${t} min (including parallel work). If sous vide, water bath, or "slow roast" would need longer than ${t} min, you cannot use that method — pick faster techniques (sear, steam, shallow poach, high-heat roast only if oven allowed and time fits).
- **Sous vide bath:** From **room-temp water**, reaching target temp often takes **~8–15+ min** depending on volume — put **real preheat minutes** in PREP, state **preheated / hot fill / kettle boost**, or **bag in only after bath is at temp**; do not imply a **3 min** "set circulator" step is enough before submerge.
- Real food obeys time and heat (${t} min round): collagen-rich cuts (short rib, chuck, brisket, shank, oxtail, cheek, pork shoulder) do not become fork-tender from a ${t}-minute open-pot simmer alone — pick real options from this list (mix as needed):
  • **Pressure / Instant Pot** — If allowed in equipment: name it; high-pressure ~35–55 min can stand in for multi-hour braising; finish sauce on stovetop in the same clock.
  • **Honest rename** — "Oxtail-inspired," "stew flavors," "bourguignon-style" — not the full textbook dish name if you are not doing the full braise time.
  • **Faster protein + oxtail as depth** — Pressure or small-batch braise the tough cut, shred as garnish/rich fold-in; bulk the plate with a quicker cut (or veg) so the clock works.
  • **Smaller pieces / cross-cut** — More surface area helps, but does not replace pressure or time; do not claim full gelatinous stew body from a 15 min uncovered simmer.
  • **Sear + concentrated liquid** — Build flavor with reduced stock, char, fond, tomato paste — without pretending 3 hours of collagen extraction happened.
  • **Pantry depth** — Quality beef stock / demi concentrate (named honestly) for body when the clock cannot build stock from scratch.
  • **Fast techniques on a different cut** — Thin-slice across the grain after pressure pre-cook; crispy shredded bits from pressure-then-broil; not "fork-tender osso buco" from a flash simmer.
- **Chicken wings — pick a texture lane:** crackle (sear + glaze, air-fry, high-heat roast) **or** long wet braise / pressure for fall-off — not a **short braise** that promises both tenderness and crackle; dark chocolate fits a **controlled reduction or glaze** (acid/salt/fat), not an uncontrolled simmer on the wing.
- Do not claim 2–3 hour outcomes (deep collagen breakdown, from-scratch demi in minutes, textbook osso buco / bourguignon braise) inside this clock unless the method honestly matches — pressure, quality stock concentrate from pantry with clear label, or an honest "inspired by" dish name.
- Reductions and stocks: respect evaporation; no "instant demi" or full stock body without a credible source or time budget in the steps.
- Grill / live fire: harder to hold low steady braise temps than an oven; do not assume oven-like stability — simplify or say how you manage heat.
- Banned fantasy phrasing: outcomes that imply physics broke ("fork-tender short rib braise" in 20 min on ambient simmer, "full classic bourguignon" with no time for the braise) unless pressure or pivot is explicit.\n`;
  if(challengeTypeIsRecreateClassic(ctype)){
    s+=`RECREATE A CLASSIC — NAME VS. CLOCK: If the signature technique of the named classic needs longer than ${t} min in the real world, you MUST pivot honestly — "inspired by," "flavors of," faster protein treatment — or use only real shortcuts (pressure when allowed). **Do not title it as the textbook classic if the timeline makes that dish impossible.**\n`;
  }
  s+=glutenFreePastaPhysicsPromptBlock(ch);
  s+=noGlutenFishSaucePhysicsPromptBlock(ch);
  s+=shortClockGrainPhysicsPromptBlock(ch);
  return s;
}

/**
 * Implied process heat/tools from full recipe text — catches "bake the tart" when the word "oven" never appears.
 * Stovetop is handled separately in the forbidden loop (clause logic).
 */
function getRecipeProcessEquipmentForbiddenViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const forb=(ch.forbEquip||[]).map(s=>String(s).trim()).filter(Boolean);
  if(!forb.length) return msgs;
  let L=recipeFlattenTextForCompliance(recipe);
  L=scrubComplianceFalsePositives(L).toLowerCase();

  const hit={};
  const push=(key,msg)=>{if(hit[key])return;hit[key]=true;msgs.push(msg);};

  for(const raw of forb){
    const en=String(raw||"").trim().toLowerCase();
    if(en==="oven"){
      if(stepTextShowsOvenUse(L))
        push("oven",`Process equipment: method implies **oven / enclosed bake / roast / broil** but **Oven is forbidden** — use a no-bake / stovetop / grill / air-fryer (if allowed) story, or change the restriction.`);
      continue;
    }
    if(en==="air fryer"||en==="airfryer"){
      if(/\bair[\s-]fry(?:ing|ed)?\b/i.test(L)&&!/\bair\s*fryer\b/i.test(L))
        push("airfry",`Process equipment: method implies **air fry** but **Air Fryer is forbidden** — pivot to oven/skillet/grill per allowed gear.`);
      continue;
    }
    if(en==="grill"){
      if(/\bgrill\b/i.test(L)) continue;
      if(/\b(grill(?:ing|ed)|barbecue|bbq|charcoal|over\s+(?:hot\s+)?coals)\b/i.test(L)&&!/\bgrill\s+pan\b/i.test(L))
        push("grill",`Process equipment: method implies **grill / live fire / BBQ** but **Grill is forbidden** — cook on allowed heat or rename the technique.`);
      continue;
    }
    if(en==="instant pot"){
      if(/\bpressure\s*cook(?:er|ing)?\b/i.test(L)&&!/\binstant\s*pot\b/i.test(L))
        push("ip",`Process equipment: method implies **pressure cooking** but **Instant Pot is forbidden** — use stovetop braise with honest time, or oven; or change format.`);
      continue;
    }
    if(en==="blender"){
      if(/\bblender\b/i.test(L)) continue;
      if(/\b(blend|blended|blending|purée|puree|blitz|vitamix|nutribullet)\b/i.test(L)&&!/\b(food\s*processor|processor\s+bowl)\b/i.test(L))
        push("blend",`Process equipment: method implies **blender / high-speed purée** but **Blender is forbidden** — use food processor, whisk, or fine chop; or change the dish.`);
      continue;
    }
    if(en==="food processor"){
      if(/\bshred(?:ded)?\s+in\s+(?:the\s+)?(?:food\s+)?processor\b/i.test(L))
        push("fp",`Process equipment: method implies **food processor** but **Food Processor is forbidden** — knife/mandoline/hand or blender where honest.`);
      continue;
    }
    if(en==="torch"){
      if(/\bbr[ûu]l[eé]/i.test(L)&&!/\b(torch|torched|torching|blow-?\s*torch|kitchen\s*torch|butane\s*torch|propane\s*torch)\b/i.test(L))
        push("torch",`Process equipment: method implies **torch-style brûlée** but **Torch is forbidden** — use broiler (if oven allowed) or alternate finish.`);
      continue;
    }
    if(en==="wok"){
      if(/\bstir[\s-]fry\b/i.test(L)&&!/\bwok\b/i.test(L))
        push("wok",`Process equipment: method implies **stir-fry** (wok-class heat) but **Wok is forbidden** — use large skillet or sauté pan and say so.`);
      continue;
    }
    if(en==="sheet pan"){
      if(/\b(one[\s-]?pan|sheet\s+meal|tray\s+bake)\b/i.test(L)&&!/\bsheet\s*pan\b|sheetpan/i.test(L))
        push("sheet",`Process equipment: method implies **sheet-pan / tray bake** but **Sheet Pan is forbidden** — use another allowed oven vessel and name it.`);
      continue;
    }
  }
  return msgs;
}

/** Optional declared processEquipment[] vs forbidden / must-use lists. */
function getRecipeProcessEquipmentDeclaredViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const pe=recipe.processEquipment;
  if(!Array.isArray(pe)||!pe.length) return msgs;
  const forb=(ch.forbEquip||[]).map(s=>String(s).trim()).filter(Boolean);
  const reqNeed=(ch.reqEquip||[]).map(s=>String(s).trim()).filter(Boolean);

  for(const raw of pe){
    const tool=String(raw||"").trim();
    if(!tool) continue;
    for(const f of forb){
      if(mentionsEquipment(tool.toLowerCase(), f)){
        msgs.push(`processEquipment lists **${tool}** but it matches forbidden **${f}** — remove it and pivot the method.`);
        break;
      }
    }
  }
  for(const r of reqNeed){
    const ok=pe.some(x=>mentionsEquipment(String(x||"").toLowerCase(), r));
    if(!ok) msgs.push(`processEquipment must include must-use **${r}** (declare every required tool).`);
  }
  return msgs;
}

/** Equipment compliance gate: forbidden gear bans + must-use checks + practical stovetop exception logic. */
function getRecipeEquipmentViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  const clauses=String(low).split(/[.!?;\n]+/).map(s=>s.trim()).filter(Boolean);

  // Forbidden equipment checks.
  for(const raw of (ch.forbEquip||[])){
    const eq=String(raw||"").trim();
    if(!eq) continue;
    if(/^oven$/i.test(eq)) continue;
    let rx=equipmentAliasRegex(eq);
    if(/^sous\s*vide$/i.test(eq))
      rx=/\b(sous\s*-?\s*vide|immersion\s+circulator|vacuum\s+bag[\s\S]{0,50}?(?:water\s*bath|bath))\b/i;
    if(eq.toLowerCase()==="stovetop"){
      const bad=clauses.find(c=>{
        if(!rx.test(c)) return false;
        // Allowed edge case: pan/skillet use explicitly tied to grill heat.
        const grillCtx=/\b(grill|griddle|plancha|bbq)\b/.test(c);
        const panCtx=/\b(pan|skillet|cast\s*iron)\b/.test(c);
        return !(grillCtx&&panCtx);
      });
      if(bad) msgs.push(`Forbidden equipment: Stovetop appears in method text ("${bad.slice(0,120)}").`);
      continue;
    }
    if(rx.test(low)) msgs.push(`Forbidden equipment: ${eq} appears in method text.`);
  }

  // Must-use equipment checks: require explicit mention in steps/prose (blender/FP allow technique verbs — see mustUseEquipmentSatisfied).
  for(const raw of (ch.reqEquip||[])){
    const eq=String(raw||"").trim();
    if(!eq) continue;
    if(!mustUseEquipmentSatisfied(recipe, eq)){
      msgs.push(`Must-use equipment missing: ${eq} is required but not clearly used in the written method.`);
    }
  }

  // Optional one-burner guardrail language check.
  if(ch.limitBurners){
    if(/\b(two|2)\s+burners?\b|\bboth\s+burners?\b|\bsecond\s+burner\b|\banother\s+burner\b/i.test(low)){
      msgs.push(`1 burner only: method text suggests multiple burners.`);
    }
  }

  msgs.push(...getEquipmentClockFeasibilityViolations(recipe,ch));

  msgs.push(...getRecipeEquipmentCentralityViolations(recipe,ch));
  msgs.push(...getStovetopPrimaryHeatViolations(low,ch));
  msgs.push(...getMustUseGrillVsBakedFormatViolations(recipe,ch));
  msgs.push(...getRecipeProcessEquipmentForbiddenViolations(recipe,ch));
  msgs.push(...getRecipeProcessEquipmentDeclaredViolations(recipe,ch));
  return msgs;
}

/** Must-use equipment vs round clock feasibility (e.g. slow cooker in 20 min). */
function getEquipmentClockFeasibilityViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const total=Math.max(1, Number(ch.totalTime)||30);
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  const steps=(recipe.steps||[]).map(s=>`${String(s&&s.what||"")} ${String(s&&s.how||"")} ${String(s&&s.dur||"")}`.toLowerCase()).join(" ");
  const blob=(low+" "+steps).toLowerCase();
  const prepAhead=/\b(pre[\s-]?cook|pre[\s-]?cooked|already\s+cooked|leftover|overnight|ahead\s+of\s+time|day[-\s]?old|store[\s-]?bought)\b/i.test(blob);
  for(const raw of (ch.reqEquip||[])){
    const eq=String(raw||"").trim();
    if(!eq) continue;
    const minM=minRoundMinutesForEquipment(eq);
    if(!minM||total>=minM) continue;
    const used=mentionsEquipment(blob, eq);
    // If must-use is declared but round is too short for meaningful in-round effect, force explicit pre-cook/setup story.
    if(used&&!prepAhead){
      msgs.push(`Equipment clock: **${eq}** is usually not meaningful on a ${total} min round (typical floor ~${minM}+ min) unless you state a pre-cooked/setup path. Use a faster must-use tool or explicitly pre-stage.`);
    }
  }
  return msgs;
}

/** When Grill is must-use, flag oven-baked cake/pastry-shell stories that conflict with grill-realistic formats. */
function getMustUseGrillVsBakedFormatViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const req=(ch.reqEquip||[]).map(s=>String(s).trim().toLowerCase());
  if(!req.some(r=>r==="grill"||/\bgrill\b/.test(r))) return msgs;
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  const bakedCake=/\b(cake|cupcake|sponge|layer\s+cake|birthday\s+cake|baked\s+alaska|chiffon|angel\s+food)\b/i.test(low);
  const pastryBake=/\b(blind\s*bake|bake\s+(?:the\s+)?(?:crust|shell|tart(?:\s+shell)?|quiche)|pastry\s+shell|shortcrust|p[\u00e9e]te\s+bris|souffl[\u00e9e]|custard\s+bake)\b/i.test(low);
  if(bakedCake||pastryBake)
    msgs.push(`Equipment: **Grill** must-use conflicts with **oven-baked cake/pastry-shell** format — use grilled components (smoke, char, skewers) or change required equipment.`);
  return msgs;
}

/** When Stovetop is must-use and Sous Vide is forbidden (no Oven must-use), broiler/oven-finish reads as off-brief heat. */
function getStovetopPrimaryHeatViolations(low, ch){
  const msgs=[];
  if(!ch) return msgs;
  const req=(ch.reqEquip||[]).map(s=>String(s).trim().toLowerCase());
  const forb=(ch.forbEquip||[]).map(s=>String(s).trim().toLowerCase());
  const L=String(low||"").toLowerCase();
  const mustStovetop=req.some(r=>r==="stovetop"||r.includes("stovetop"));
  const svForbidden=forb.some(r=>/\bsous/.test(r));
  const ovenMust=req.some(r=>/\boven\b/.test(r));
  if(!mustStovetop||!svForbidden||ovenMust) return msgs;
  if(/\b(broiler|under\s+(?:the\s+)?broiler|salamander|oven\s*[-\s]?finish|finish\s+under\s+(?:the\s+)?broiler|broil\s+until|top\s+brown\s+under)\b/i.test(L))
    msgs.push(`Equipment: broiler / oven-finish is not stovetop heat — for this brief use burners, skillet, or saucepan only (no salamander/broiler finish).`);
  return msgs;
}

function getClassicArchetypeViolations(claimText, low){
  const msgs=[];
  const claim=String(claimText||"");
  const t=String(low||"");
  for(const arch of PW_CLASSIC_ARCHETYPES){
    if(!arch.match.test(claim)) continue;
    for(const chk of arch.checks){
      try{
        if(chk.when(claim,t)) msgs.push(`${arch.label} archetype: ${chk.msg}`);
      }catch(_e){}
    }
  }
  return msgs;
}

/** Recreate-a-Classic quality gate: reject "swap-only" outputs that miss classic function mapping. */
function getRecreateClassicTransformationViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch||!challengeTypeIsRecreateClassic(ch.ctype)) return msgs;

  const title=String(recipe.title||"");
  const tagline=String(recipe.tagline||"");
  const atThePass=String(recipe.atThePass||"");
  const flavorBalanceCoach=String(recipe.flavorBalance||"");
  const basketLine=String((recipe.balance&&recipe.balance.basket)||"");
  const flavorLine=String((recipe.balance&&recipe.balance.flavor)||"");
  const basketEffective=basketLine||atThePass;
  const flavorEffective=flavorLine||flavorBalanceCoach;
  const lowBlob=recipeFlattenTextForCompliance(recipe);
  const low=(lowBlob||"").toLowerCase();
  const head=(title+" "+tagline+" "+atThePass).toLowerCase();
  const basketLow=basketEffective.toLowerCase();

  // Broad but practical classic dish-name detector.
  const classicNameRx=/\b(fish and chips|chicken\s+piccata|veal\s+piccata|chicken parmesan|chicken parm(?:igiana)?|eggplant parmesan|eggplant parm(?:igiana)?|salisbury steak|meatloaf|beef stroganoff|shepherd'?s pie|cottage pie|coq au vin|beef bourguignon|steak frites|shrimp scampi|sole meuni[eè]re|lobster thermidor|cioppino|bouillabaisse|spaghetti (?:and )?meatballs|carbonara|cacio e pepe|lasagna|bolognese|alfredo|pasta primavera|risotto milanese|(?:chicken|veal|pork)\s+milanese|cotoletta|wiener schnitzel|mac (?:and|&) cheese|fried chicken|chicken pot pie|biscuits and gravy|cheeseburger|club sandwich|pad thai|fried rice|ramen|pho|shawarma|falafel|gyro|eggs benedict|french toast|pancakes|omelette|huevos rancheros)\b/i;
  const hasNamedClassic=classicNameRx.test(head)||classicNameRx.test(basketEffective);
  if(!hasNamedClassic){
    msgs.push(`Recreate brief: title/tagline/balance.basket must name one specific classic dish (menu-level name), not just style vibes.`);
  }

  const claimForArch=`${title} ${tagline} ${basketEffective}`;
  msgs.push(...getClassicArchetypeViolations(claimForArch, low));

  // Require explicit function mapping language, not only ingredient swapping (title/tagline count — models often put the pitch there). Competition coach JSON uses atThePass/flavorBalance instead of balance.*.
  const functionProse=`${basketEffective} ${flavorEffective} ${title} ${tagline}`;
  const functionMapRx=/\b(function|role|acts as|serves as|mimic|mimics|mimicking|stand[-\s]?in|replaces?|still reads as|reads as|classic (?:structure|architecture)|umami depth|brown gravy|savory depth|mapping|honors the|acid lift|briny snap|delivers the|anchors the)\b/i;
  const lineageRx=/\b(gravy|pan sauce|deglaz(e|ed|ing)|roux|reduction|braise|batter|breading|cutlet|rag[uù]|marinara|bechamel|au jus|demi|fond|emulsion|piccata|capers?|meuni|schnitzel|dredge|sear|saut[eé]|wok|stir[-\s]?fry)\b/i;
  if(!functionMapRx.test(functionProse)||!lineageRx.test(low)){
    msgs.push(`Recreate brief: explain how basket ingredients preserve classic FUNCTION (not just substitutions), and cite one concrete classic technique lineage.`);
  }

  // Savory classics should not drift sweet-forward unless explicitly counterbalanced.
  const isDessertClassic=(String((ch.ctype&&ch.ctype.id)||"")==="dessert"||/\bdessert\b/.test(String((ch.ctype&&ch.ctype.label)||"").toLowerCase()));
  if(!isDessertClassic){
    const sweetLean=/\b(maple|honey|sweet|syrup|gastrique|glaze)\b/i.test(low);
    const savoryCounter=/\b(umami|savory|gravy|fond|browned|maillard|allium|stock|reduction|acid balance|vinegar balance|peppery|salty)\b/i.test(low);
    if(sweetLean&&!savoryCounter){
      msgs.push(`Recreate brief: flavor read drifts sweet without a clear savory-depth counterweight expected by the named classic.`);
    }
  }

  return msgs;
}

function equipmentHardPriorityBlock(ch){

  if(req.some(x=>/\bcast[\s-]*iron/i.test(String(x)))) s+=`- CAST IRON: A quick sear alone is weak — use the pan for fond, deglaze, reduction, or a real braise/simmer so the skillet earns its keep.\n`;

function filterPoolByRestrictions(pool, restrictions){
  const r=restrictions||[];
  if(!r.length) return [...new Set((pool||[]).filter(Boolean))];
  return [...new Set((pool||[]).filter(Boolean))].filter(n=>!ingredientConflictsWithAny(n,r));
}

function pruneConflictingReq(cfg, cdOpt){
  const need=cfg.req;
  state.req=state.req.filter(n=>!ingredientConflictsWithAny(n,state.res));
  let pool=filterPoolByRestrictions(pantryPool(),state.res).filter(x=>!state.req.includes(x));
  const nonBasicPool=pool.filter(n=>!isSpinnerBasicIngredientName(n));
  if(nonBasicPool.length>=Math.max(0, need-state.req.length)) pool=nonBasicPool;
  if(cdOpt&&cdOpt.hot!=null&&cdOpt.spinSerial!=null)
    pool=filterIngredientsForCooldown(pool,cdOpt.spinSerial,cdOpt.hot);
  while(state.req.length<need && pool.length){
    const i=randomIndex(pool.length);
    state.req.push(pool.splice(i,1)[0]);
  }
  const p=pantryPool();
  state.req=ensureCourseBasketViability(state.req,state.ctype,state.diff,p,state.res,pwChaosOrInsane(),cdOpt);
}

function classifyRequiredBucket(name){
  const n=String(name||"").toLowerCase();
  const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===n);
  const cat=String((m&&m.cat)||"").toLowerCase();
  const wildcardRx=/\b(candy|frosting|icing|syrup|caramel|chocolate|soda|cola|chips|cereal|cookie|marshmallow|dessert|sweet)\b/;
  if(wildcardRx.test(n)||/sweet items|snacks/.test(cat)) return "wildcard";

  // Cheese / cream / butter = flavor driver — NOT the "protein" basket slot (meat/fish/eggs/beans).
  if(/dairy\s*&\s*cheese|dairy|cheese/.test(cat) || /\b(butter|cream|milk|yogurt|mozzarella|feta|parmesan|pecorino|goat cheese|ricotta|cheddar|brie|halloumi|crema)\b/.test(n)) return "flavor";

  // Pulses / legumes: basket "vegetable" slot — not the animal/tofu/egg protein slot (Chopped-style).
  const legumeRx=/\b(chickpea|chickpeas|garbanzo|black bean|black beans|kidney bean|kidney beans|navy bean|navy beans|pinto bean|pinto beans|cannellini|great northern beans|white beans|lima bean|lima beans|fava bean|fava beans|lentil|lentils|split pea|split peas)\b/i;
  if(legumeRx.test(n)) return "produce";

  // Stocks, broths, fonds — liquid savory bases, not a centerpiece protein (Chicken Stock ≠ chicken on the plate).
  if(/\b(stock|broth|bone\s*broth|bouillon|consomm[ée]|consomme|fumet|dashi)\b/i.test(n)) return "flavor";

  // Bottled sauces, ferments, pastes — not center-of-plate protein (fish sauce ≠ fish fillet; soy ≠ protein anchor).
  if(/\b(fish sauce|oyster sauce|soy sauce|tamari|worcestershire|hoisin|teriyaki|sriracha|ketchup|bbq sauce|barbecue sauce|fish paste|shrimp paste|anchovy paste|xo sauce|mayo|mayonnaise|mirin|gochujang|harissa)\b/i.test(n)) return "flavor";
  if(/\bclams?\s+juice\b/i.test(n)) return "flavor";

  // Catalog: oils, vinegars, shelf condiments — spinner "flavor" slot, never column 1 protein.
  if(m && /oils\s*&\s*vinegars/i.test(String(m.cat||""))) return "flavor";

  // Primary protein: meat, seafood, eggs, tofu/tempeh/seitan — not legumes (handled above).
  // "fish" / "clam" alone: exclude fish sauce, clam juice (condiments — handled above).
  const primaryRx=/\b(chicken|beef|pork|lamb|turkey|duck|salmon|tuna|cod|halibut|trout|shrimp|prawn|crab|lobster|scallops?|mussels?|tofu|tempeh|seitan|egg|eggs|anchov(?:y|ies)|sardines?|ground beef|steak|bacon|sausage|prosciutto|chorizo|kielbasa|andouille)\b/;
  const fishProtein=/\bfish\b(?!\s+sauce\b)/i;
  const clamShellfish=/\bclams?\b(?!\s+juice\b)/i;
  const primaryHit=primaryRx.test(n)||fishProtein.test(n)||clamShellfish.test(n);
  if(cat==="proteins" || /seafood|meat|poultry/.test(cat) || primaryHit) return "protein";

  // Produce: veg, fruit, aromatics (onion family, etc.)
  const produceRx=/\b(tomato|tomatoes|onion|shallot|garlic|ginger|pepper|jalape|spinach|kale|cauliflower|asparagus|corn|beet|brussels|carrot|scallion|lemon|lime|avocado|mango|apple|banana|orange|berry|grape|melon|mushroom|potato|zucchini|eggplant|herb|basil|thyme|rosemary|fiddlehead|rambutan)\b/;
  if(/vegetables|fruits|aromatics/.test(cat) || produceRx.test(n)) return "produce";

  return "flavor";
}

/** Spinner column titles: slot 1 = protein anchor, 2 = veg/produce, 3–4 = wildcards (pickRequiredPattern buckets). */
function mustUseSlotColumnLabel(slotIndex, totalSlots){
  const i=Number(slotIndex);
  const t=Math.max(0, Number(totalSlots)||0);
  if(t<=0||i<0||i>=t) return "Must use "+(i+1);
  if(t===2) return ["Protein","Vegetable"][i]||"Must use "+(i+1);
  if(t===3) return ["Protein","Vegetable","Random"][i]||"Must use "+(i+1);
  if(t===4) return ["Protein","Vegetable","Random","Random"][i]||"Must use "+(i+1);
  return ["Protein","Vegetable","Wild card","Flavor","Random"][i]||"Must use "+(i+1);
}

/** Chaos toggle or Insane difficulty → skip course-vs-basket viability fixes. */
function pwChaosOrInsane(){

function courseIsDessert(ctype){

/** Eggs + soy proteins OK in sweet applications; meat/fish/shellfish read savory. */
function isDessertBlockingSavoryProtein(name){
  const n=String(name||"").toLowerCase();
  if(/\b(egg|eggs)\b/.test(n)) return false;
  if(/\b(tofu|tempeh|seitan)\b/.test(n)) return false;
  return classifyRequiredBucket(name)==="protein";
}

/** Ingredients that break dessert identity even with “dessert” technique. */
function isDessertSpoilerIngredient(name){
  if(isDessertBlockingSavoryProtein(name)) return true;
  if(/\bnutritional yeast\b/i.test(String(name||""))) return true;
  return false;
}

function classifyRequiredBasketType(name){
  const b=classifyRequiredBucket(name);
  if(b==="wildcard") return "wildcard";
  if(b==="protein") return "protein";
  if(b==="produce") return "produce";
  const n=String(name||"").toLowerCase();
  const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===n);
  const cat=String((m&&m.cat)||"").toLowerCase();
  if(/dairy\s*&\s*cheese|dairy|cheese/.test(cat)) return "dairy";
  return "flavor";
}

function getIngredientCompatibilityMeta(name){
  const n=String(name||"").toLowerCase();
  const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===n);
  const cat=String((m&&m.cat)||"").toLowerCase();
  const flavors=(m&&m.flavor)||[];
  const hasFlavor=f=>flavors.some(x=>String(x).toLowerCase()===String(f).toLowerCase());
  const isFruit=/fruits/i.test(cat);
  const isDairy=/dairy\s*&\s*cheese|dairy|cheese/.test(cat)
    ||/\b(butter|cream|milk|yogurt|mozzarella|feta|parmesan|pecorino|goat cheese|ricotta|cheddar|brie|halloumi|crema|mascarpone|paneer)\b/.test(n);
  const isSugarSource=/\b(honey|sugar|maple|molasses|caramel|marshmallow|chocolate|nesquik|frosting|icing|agave|jam|jelly|sweetener|vanilla bean|toffee|butterscotch)\b/.test(n)||/sweet items|snacks/i.test(cat);
  const hasSweetNote=hasFlavor("sweet");
  let dessertCompatibility=3;
  if(/sweet items/i.test(cat)||/\b(dark chocolate|white chocolate|caramel|marshmallow|vanilla bean)\b/.test(n)||isSugarSource) dessertCompatibility=5;
  else if(isFruit) dessertCompatibility=4;
  else if(isDairy) dessertCompatibility=4;
  else if(hasSweetNote) dessertCompatibility=4;
  if(classifyRequiredBucket(name)==="protein"&&!/\b(egg|eggs)\b/.test(n)) dessertCompatibility=Math.min(dessertCompatibility,2);
  if(/\b(soy sauce|fish sauce|fish stock|anchov)\b/.test(n)) dessertCompatibility=Math.min(dessertCompatibility,2);
  const basketType=classifyRequiredBasketType(name);
  return {basketType,isFruit,isDairy,isSugarSource,hasSweetNote,dessertCompatibility};
}

/** Produce / aromatics where “sweet” on the card is a real dessert pathway (not e.g. edamame or onion). */
const PW_DESSERT_SWEET_PRODUCE_RX=/\b(sweet potato|sweet potatoes|\byams?\b|pumpkin|butternut|acorn squash|delicata|kabocha|carrots?|beets?|beetroots?|\bcorns?\b|corn on the cob|parsnip|parsnips|plantains?|figs?|dates?|bananas?|apples?|pears?|peaches?|plums?|apricots?|nectarines?|cherries?\b|berries|raisins?|prunes?|rhubarb|coconut milk|coconut cream|mangos?|papaya|guava|kiwi|pomegranate|watermelon|cantaloupe|honeydew)\b/i;

const PW_NAME_BLOCKS_DESSERT_SWEET=/\b(chipotle|chipotles|adobo|sriracha|harissa|gochujang|sambal|fish sauce|soy sauce|hoisin|miso paste|doubanjiang|curry paste)\b/i;

function dessertIngredientAnchorsCourse(name, restrictions){
  const r=restrictions||[];
  const noDairy=r.includes("No Dairy")||r.includes("Vegan");
  const m=getIngredientCompatibilityMeta(name);
  if(m.isFruit) return true;
  if(!noDairy&&m.isDairy) return true;
  if(m.isSugarSource&&!ingredientConflictsWithRestriction(name,"No Sugar")) return true;
  if(classifyRequiredBucket(name)==="wildcard") return true;
  if(ingredientConflictsWithRestriction(name,"No Sugar")) return false;
  const row=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===String(name||"").toLowerCase());
  const cat=String((row&&row.cat)||"").toLowerCase();
  const flavors=(row&&row.flavor)||[];
  const savoryFlavorTag=/^(spicy|smoky|funky|hot|pungent)$/i;
  if(flavors.some(x=>savoryFlavorTag.test(String(x)))) return false;
  if(PW_NAME_BLOCKS_DESSERT_SWEET.test(String(name||"").toLowerCase())) return false;
  if(m.dessertCompatibility>=5) return true;
  if(m.hasSweetNote&&m.dessertCompatibility>=4){
    const b=classifyRequiredBucket(name);
    if(b==="protein") return false;
    if(b==="produce"||/vegetables|aromatics/.test(cat))
      return PW_DESSERT_SWEET_PRODUCE_RX.test(String(name||"").toLowerCase());
    return true;
  }
  return false;
}

function dessertBasketHasPath(req, restrictions){
  for(const name of req||[]){
    if(dessertIngredientAnchorsCourse(name,restrictions)) return true;
  }
  return false;
}

const PW_SAVORY_LEGUME_RX=/\b(chickpea|chickpeas|garbanzo|black bean|black beans|kidney bean|kidney beans|navy bean|navy beans|pinto bean|pinto beans|cannellini|great northern beans|white beans|lima bean|lima beans|fava bean|fava beans|lentil|lentils|split pea|split peas)\b/i;

function savoryBasketHasPath(req){
  for(const name of req||[]){
    const b=classifyRequiredBucket(name);
    const n=String(name||"");
    if(b==="protein") return true;
    if(/\b(egg|eggs|tofu|tempeh|seitan)\b/i.test(n)) return true;
    if(PW_SAVORY_LEGUME_RX.test(n)) return true;
  }
  return false;
}

function pickDessertAnchorFromPool(candidates, restrictions){
  if(!candidates||!candidates.length) return null;
  const ok=candidates.filter(n=>dessertIngredientAnchorsCourse(n,restrictions));
  if(!ok.length) return null;
  return ok[randomIndex(ok.length)];
}

/** Session log for mystery spins — used to avoid tofu streaks (two firm+silken SKUs skewed probability). */
const PW_SPIN_TOFU_KEY="pw_spin_had_tofu";
function recordMysterySpinTofuPresence(req){
  const had=(req||[]).some(n=>/\btofu\b/i.test(String(n)));
  try{
    let a=JSON.parse(sessionStorage.getItem(PW_SPIN_TOFU_KEY)||"[]");
    if(!Array.isArray(a)) a=[];
    a.push(had);
    while(a.length>12) a.shift();
    sessionStorage.setItem(PW_SPIN_TOFU_KEY,JSON.stringify(a));
  }catch(_e){}
}
function recentTofuSpinStreak(){
  try{
    const a=JSON.parse(sessionStorage.getItem(PW_SPIN_TOFU_KEY)||"[]");
    if(!Array.isArray(a)||!a.length) return 0;
    let streak=0;
    for(let i=a.length-1;i>=0;i--){
      if(a[i]) streak++; else break;
    }
    return streak;
  }catch(_e){ return 0; }
}

/** Vegan baskets: diversify plant proteins — deprioritize tempeh and avoid stacking tofu+tempeh+seitan when legumes/produce exist.
 *  Non-vegan: Firm + Silken tofu are two catalog rows — treat as one probability bucket vs other proteins, and skip tofu after 2 spins in a row that included tofu. */
function pickPlantProteinForBasketSlot(avail, restrictions, alreadyPicked){
  if(!avail||!avail.length) return null;
  const r=sanitizeRestrictionList(restrictions||[]);
  const vegan=r.some(x=>normalizeRestrictionKey(x)==="Vegan");
  let pool=avail.slice();
  const picked=alreadyPicked||[];
  const hasSoy=picked.some(n=>/\b(tofu|tempeh|seitan)\b/i.test(String(n)));
  if(vegan&&hasSoy){
    const noMoreSoy=pool.filter(n=>!/\b(tofu|tempeh|seitan)\b/i.test(String(n)));
    if(noMoreSoy.length) pool=noMoreSoy;
  }
  const streak=recentTofuSpinStreak();
  const nonTofu=pool.filter(n=>!/\btofu\b/i.test(String(n)));
  const tofuOnly=pool.filter(n=>/\btofu\b/i.test(String(n)));
  if(streak>=2&&nonTofu.length) pool=nonTofu;
  else if(nonTofu.length&&tofuOnly.length){
    if(randomUnit()*(nonTofu.length+1)<nonTofu.length)
      return pickUsageBalanced(nonTofu);
    return pickUsageBalanced(tofuOnly);
  }
  const nonTempeh=pool.filter(n=>!/\btempeh\b/i.test(String(n)));
  if(vegan&&nonTempeh.length&&randomUnit()<0.82) return pickUsageBalanced(nonTempeh);
  return pickUsageBalanced(pool);
}

function pickSavoryAnchorFromPool(candidates, restrictions, currentReq){
  if(!candidates||!candidates.length) return null;
  const ok=candidates.filter(n=>{
    const s=String(n||"");
    if(classifyRequiredBucket(n)==="protein") return true;
    if(/\b(egg|eggs|tofu|tempeh|seitan)\b/i.test(s)) return true;
    if(PW_SAVORY_LEGUME_RX.test(s)) return true;
    return false;
  });
  if(!ok.length) return null;
  return pickPlantProteinForBasketSlot(ok, restrictions, currentReq||[]);
}

function pickLeastUsefulIndexForCourse(req, ctype){
  const scored=(req||[]).map((name,i)=>({i,name,meta:getIngredientCompatibilityMeta(name),bucket:classifyRequiredBucket(name)}));
  if(!scored.length) return 0;
  if(courseIsDessert(ctype)){
    scored.sort((a,b)=>{
      const sa=isDessertSpoilerIngredient(a.name)?0:1, sb=isDessertSpoilerIngredient(b.name)?0:1;
      if(sa!==sb) return sa-sb;
      return a.meta.dessertCompatibility-b.meta.dessertCompatibility;
    });
    return scored[0].i;
  }
  const rank=x=>{
    const nm=String(x.name||"");
    if(x.bucket==="protein"||/\b(egg|eggs|tofu|tempeh|seitan)\b/i.test(nm)||PW_SAVORY_LEGUME_RX.test(nm)) return 3;
    if(x.bucket==="produce") return 2;
    return 1;
  };
  scored.sort((a,b)=>rank(a)-rank(b));
  return scored[0].i;
}

function viabilitySwapAttempts(diffKey, chaos, ctype){
  if(chaos||diffKey==="insane") return 0;
  const bonus=courseIsDessert(ctype)?2:0;
  if(diffKey==="easy") return 5+bonus;
  if(diffKey==="medium") return 3+bonus;
  return 2+bonus;
}

function ensureCourseBasketViability(req, ctype, diffKey, pool, restrictions, chaos, cdOpt){
  if(!req||!req.length) return req||[];
  if(chaos) return req.slice();
  const filt=filterPoolByRestrictions(pool||[],restrictions||[]);
  let out=req.slice();
  const tries=viabilitySwapAttempts(diffKey,chaos,ctype);
  for(let t=0;t<tries;t++){
    let needFix=false;
    if(courseIsDessert(ctype)){
      if(!dessertBasketHasPath(out,restrictions)) needFix=true;
      if(out.some(isDessertSpoilerIngredient)) needFix=true;
    }else if(!savoryBasketHasPath(out)) needFix=true;
    if(!needFix) break;
    let spare=filt.filter(x=>!out.includes(x));
    if(cdOpt&&cdOpt.hot!=null&&cdOpt.spinSerial!=null)
      spare=filterIngredientsForCooldown(spare,cdOpt.spinSerial,cdOpt.hot);
    const anchor=courseIsDessert(ctype)
      ?pickDessertAnchorFromPool(spare,restrictions)
      :pickSavoryAnchorFromPool(spare,restrictions,out);
    if(!anchor) break;
    const replaceIdx=pickLeastUsefulIndexForCourse(out,ctype);
    out[replaceIdx]=anchor;
  }
  return out;
}

/** Pantry staples that usually make weak mystery must-use ingredients. */
function isSpinnerBasicIngredientName(name){
  const n=String(name||"").toLowerCase().trim();
  if(!n) return false;
  return /\b(kosher\s+salt|sea\s+salt|table\s+salt|pink\s+salt|salt|black\s+pepper|peppercorns?|olive\s+oil|vegetable\s+oil|cooking\s+spray|butter|all-purpose\s+flour|flour|cornstarch|baking\s+powder|baking\s+soda)\b/i.test(n);
}

function pickRequiredPattern(pool,count,resList,cdOpt){
  const r=resList!==undefined?resList:state.res;
  let filtered=filterPoolByRestrictions(pool||[],r||[]);
  if(cdOpt&&cdOpt.hot!=null&&cdOpt.spinSerial!=null)
    filtered=filterIngredientsForCooldown(filtered,cdOpt.spinSerial,cdOpt.hot);
  // Mystery spinner: avoid "base staple" must-use picks when possible.
  const needed=Math.max(1, Number(count)||0);
  const nonBasic=filtered.filter(n=>!isSpinnerBasicIngredientName(n));
  if(nonBasic.length>=needed) filtered=nonBasic;
  const uniq=shuffleArray([...new Set(filtered.filter(Boolean))]);
  if(uniq.length===0){
    alert("Nothing in your pantry matches the current restrictions. Clear a restriction or add compatible ingredients.");
    return [];
  }
  const by={protein:[],produce:[],wildcard:[],flavor:[]};
  uniq.forEach(n=>by[classifyRequiredBucket(n)].push(n));
  if(courseIsDessert(state.ctype)){
    by.protein=by.protein.filter(n=>!isDessertBlockingSavoryProtein(n));
    by.flavor=by.flavor.filter(n=>!isDessertSpoilerIngredient(n));
    by.produce=by.produce.filter(n=>!isDessertSpoilerIngredient(n));
  }
  const ordered=count>=4?["protein","produce","wildcard","flavor"]:count===3?["protein","produce","flavor"]:["protein","produce"];
  const out=[];
  const pickOne=(k)=>{
    const avail=by[k].filter(x=>!out.includes(x));
    if(!avail.length) return;
    if(k==="produce"&&avail.length>1){
      const vegFruit=avail.filter(n=>{
        const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===String(n).toLowerCase());
        return m&&/vegetables|fruits/i.test(String(m.cat||""));
      });
      const pickPool=vegFruit.length?vegFruit:avail;
      out.push(pickUsageBalanced(pickPool));
    } else if(k==="protein"){
      out.push(pickPlantProteinForBasketSlot(avail,r,out));
    } else {
      out.push(pickUsageBalanced(avail));
    }
  };
  ordered.forEach(k=>pickOne(k));
  const leftovers=shuffleArray(uniq.filter(x=>!out.includes(x)));
  const veganSpin=sanitizeRestrictionList(r||[]).some(x=>normalizeRestrictionKey(x)==="Vegan");
  while(out.length<count&&leftovers.length){
    if(veganSpin){
      const hasSoy=out.some(n=>/\b(tofu|tempeh|seitan)\b/i.test(String(n)));
      let pool=leftovers.filter(x=>!out.includes(x));
      if(hasSoy){
        const noSoy=pool.filter(n=>!/\b(tofu|tempeh|seitan)\b/i.test(String(n)));
        if(noSoy.length) pool=noSoy;
      }
      const nonTem=pool.filter(n=>!/\btempeh\b/i.test(String(n)));
      if(nonTem.length&&randomUnit()<0.75) pool=nonTem;
      const pick=pickUsageBalanced(pool);
      const ix=leftovers.indexOf(pick);
      if(ix>=0) leftovers.splice(ix,1);
      out.push(pick);
    }else{
      const pick=pickUsageBalanced(leftovers);
      const ix=leftovers.indexOf(pick);
      if(ix>=0) leftovers.splice(ix,1);
      out.push(pick);
    }
  }
  return out.slice(0,count);
}

function runMysteryRandomize(){
  const host=$("spin-host");
  if(!host)return;
  state.mysterySpinLocked=false;
  const pool=(window.USER_PANTRY&&window.USER_PANTRY.length)?window.USER_PANTRY:PANTRY;
  const cfg=DIFF[state.diff];
  try{
    doRandomize();
  }catch(err){
    console.error("Mystery basket spin failed", err);
    state.mysterySpinLocked=false;
    alert("Mystery basket hit an error: "+(err&&err.message?err.message:String(err)));
    renderBuild();
    return;
  }
  const need=cfg.req;
  const constraints=spinConstraintDisplayItems();
  const nConstraints=constraints.length;
  const ctypePool=[...CTYPES,...state.customTypes];
  const totalSlots=need+nConstraints+2;
  const slotMeta=[];
  for(let i=0;i<need;i++) slotMeta.push({kind:"ing",lbl:mustUseSlotColumnLabel(i,need)});
  for(let j=0;j<nConstraints;j++) slotMeta.push({kind:"con",lbl:"Rule "+(j+1)});
  slotMeta.push({kind:"time",lbl:"AI clock"});
  slotMeta.push({kind:"ct",lbl:"Challenge"});
  const cells=slotMeta.map((m,i)=>{
    const wrapCls=m.kind==="ing"?"basket-spin-cell pw-pantry-ing-tip-wrap":"basket-spin-cell";
    return `<div class="${wrapCls}" data-i="${i}"><span class="basket-spin-lbl">${m.lbl}</span><div class="rnd-slot" data-kind="${m.kind}" aria-label="${escapeHtml(m.lbl)}">—</div></div>`;
  }).join("");
  host.innerHTML=`<div class="basket-spin-wrap">
    <div class="basket-spin-h"><span>🎰 Mystery basket</span><span style="font-size:11px;font-weight:700;color:#64748b">${escapeHtml(cfg.label)} · spinning…</span></div>
    <div class="basket-spin-slots" id="rnd-slots">${cells}</div>
    <div class="basket-spin-bar"><i></i></div>
  </div>`;
  try{ host.scrollIntoView({behavior:"smooth",block:"nearest"}); }catch(_e){}
  const slots=[...host.querySelectorAll(".rnd-slot")];
  if(slots.length!==slotMeta.length){
    console.error("Mystery basket: slot mismatch", {slots:slots.length,meta:slotMeta.length});
    alert("Spinner UI out of sync — refresh the page.");
    return;
  }
  const idxTime=need+nConstraints;
  const idxChallenge=need+nConstraints+1;
  const stopOrder=[]
    .concat(idxChallenge)
    .concat(Array.from({length:need},(_,i)=>i))
    .concat(Array.from({length:nConstraints},(_,j)=>need+j))
    .concat(idxTime);
  const locked=new Array(slots.length).fill(false);
  const tickMs=48;
  const maxTicks=36+totalSlots*4;
  const stopGapMs=340;
  function spinUnlockedPreview(){
    slots.forEach((s,idx)=>{
      if(locked[idx]) return;
      const k=slotMeta[idx].kind;
      if(k==="ing") s.textContent=pool[randomIndex(pool.length)];
      else if(k==="con"){
        const r=randomUnit();
        if(r<0.45) s.textContent=RESTRICT[randomIndex(RESTRICT.length)];
        else if(r<0.85) s.textContent="✕ "+EQUIP[randomIndex(EQUIP.length)];
        else s.textContent="✓ "+EQUIP[randomIndex(EQUIP.length)];
      }
      else if(k==="time") s.textContent=String(SPIN_AI_TIMES[randomIndex(SPIN_AI_TIMES.length)])+" min";
      else { const ct=ctypePool[randomIndex(ctypePool.length)]; s.textContent=ct.emoji+" "+ct.label; }
      s.style.animation="none";
      void s.offsetWidth;
      s.style.animation="rndSpin .1s ease";
    });
  }
  function finalizeSlot(idx){
    const s=slots[idx];
    const k=slotMeta[idx].kind;
    s.style.animation="none";
    void s.offsetWidth;
    s.style.animation="rndSpin .18s ease";
    if(k==="ing"){
      const name=state.req[idx];
      const cell=s.closest(".basket-spin-cell");
      if(cell){
        const prev=cell.querySelector(".pw-pantry-ing-tooltip");
        if(prev) prev.remove();
      }
      if(name){
        s.textContent=name;
        s.classList.add("rnd-done-ing","basket-ing-hover");
        s.setAttribute("tabindex","0");
        s.setAttribute("title",mysteryBasketIngTitleAttr(name));
        if(cell){
          cell.classList.add("pw-pantry-ing-tip-wrap");
          const tipHtml=mysteryBasketIngTooltipHtml(name);
          if(tipHtml) cell.insertAdjacentHTML("beforeend",tipHtml);
        }
      }else{
        s.textContent="—";
        s.style.opacity="0.5";
        s.classList.remove("basket-ing-hover");
        s.removeAttribute("tabindex");
      }
    }else if(k==="con"){
      const txt=constraints[idx-need]||"—";
      s.textContent=txt;
      if(txt.startsWith("✕ ")) s.classList.add("rnd-done-forb");
      else if(txt.startsWith("✓ ")) s.classList.add("rnd-done-ct");
      else s.classList.add("rnd-done-res");
    }else if(k==="time"){
      s.textContent=(Number(state.total)||0)+" min";
      s.classList.add("rnd-done-time");
    }else{
      s.textContent=state.ctype.emoji+" "+state.ctype.label;
      s.classList.add("rnd-done-ct");
    }
    locked[idx]=true;
  }
  function finishSpinSequence(){
    const bar=host.querySelector(".basket-spin-h span:last-child");
    if(bar) bar.textContent=cfg.label+" · locked in";
    state.mysterySpinLocked=true;
    recordMysterySpinTofuPresence(state.req);
    trackPWEvent("basket_generated", pwParamsBuilder());
    renderBuild();
  }
  let ticks=0;
  const iv=setInterval(()=>{
    ticks++;
    spinUnlockedPreview();
    if(ticks<maxTicks) return;
    clearInterval(iv);
    let step=0;
    function runStopStep(){
      if(step>=stopOrder.length){
        finishSpinSequence();
        return;
      }
      finalizeSlot(stopOrder[step]);
      step++;
      if(step>=stopOrder.length) finishSpinSequence();
      else setTimeout(runStopStep,stopGapMs);
    }
    runStopStep();
  },tickMs);
}

function doRandomize(){
  const {serial, hot}=beginMysterySpinCooldownTurn();
  const cd={spinSerial:serial, hot};
  const d=DIFF[state.diff];
  const nConstraints=Math.max(Number(d.res)||0, Number(d.forb)||0);
  const pool=window.USER_PANTRY||PANTRY;
  const draw=drawUnifiedConstraintsFeasible(nConstraints, pool, d.req, serial, hot);
  state.spinConstraints=sanitizeSpinConstraints(draw.spinConstraints);
  state.res=sanitizeRestrictionList(draw.restrictions);
  state.forbEq=draw.forbEquip;
  rollMustUseEquipment(state.diff, state.forbEq, serial, hot);
  state.lim=false;
  state.cut=d.cut;
  const allTypes=[...CTYPES,...state.customTypes];
  state.ctype=allTypes[randomIndex(allTypes.length)];
  state.req=pickRequiredPattern(pool,d.req,state.res,cd);
  state.req=ensureCourseBasketViability(state.req,state.ctype,state.diff,pool,state.res,pwChaosOrInsane(),cd);
  recordRequiredUsage(state.req);
  const t=SPIN_AI_TIMES[randomIndex(SPIN_AI_TIMES.length)];
  state.total=t;state.prep=Math.round(t*0.35);state.cook=Math.round(t*0.65);
  pruneConflictingReq(d, cd);
  finalizeMysterySpinSelection(serial, hot, {req:state.req,res:state.res,forbEq:state.forbEq,reqEq:state.reqEq});
}

loadAppConfig().then(() => {
  try {
    const u = new URL(location.href);
    if (u.searchParams.get("reset_ai") === "1") {
      pwResetDailyAiQuota();
      u.searchParams.delete("reset_ai");
      const q = u.searchParams.toString();
      history.replaceState({}, "", u.pathname + (q ? "?" + q : "") + u.hash);
    }
  } catch (_e) {}
  renderLanding();
});
</script>
