function doModalAdd(data){
  const t=state.modalType;
  if(t==="type"){const nt={id:"c"+Date.now(),label:data.label||data.name,emoji:data.emoji||"🍴",custom:true};state.customTypes.push(nt);state.ctype=nt;}
  else if(t==="ingredient"){const n=data.name||data.label;if(n&&!state.req.includes(n)){if(ingredientConflictsWithAny(n,state.res)){alert("That ingredient conflicts with a restriction (e.g. dairy under No Dairy).");return;}state.req.push(n);onBasketModified();}}
  else if(t==="pantry_item"){
    const n=(data.name||data.label||"").trim();
    if(!n){closeModal();refreshAfterModalAdd();return;}
    const low=n.toLowerCase();
    if(pantryCatalog().some(x=>x.name.toLowerCase()===low)){alert("That ingredient is already in the list (built-in or yours).");closeModal();refreshAfterModalAdd();return;}
    const allowed=new Set(["sweet","salty","sour","bitter","umami","savory","gamey","rich","briny","smoky","mild"]);
    const flavor=(data.tags||[]).map(x=>String(x).toLowerCase()).filter(x=>allowed.has(x));
    const flavor2=flavor.length?flavor.slice(0,4):["mild"];
    const cat=(data.category||CUSTOM_PANTRY_CAT).trim()||CUSTOM_PANTRY_CAT;
    const id="pc_"+Date.now();
    state.customPantryItems.push({
      id,name:n,cat,flavor:flavor2,texture:[],richness:"lean",acidity:"none",intensity:"mild",
      notes:(data.notes||"Added to your pantry.").slice(0,500),custom:true
    });
    if(!state.pantryItems.includes(id))state.pantryItems.push(id);
  }
  else if(t==="restriction"){
    const n=normalizeRestrictionKey(data.label);
    if(n&&!state.res.includes(n)){state.res=sanitizeRestrictionList([...state.res,n]);onBasketModified();}
    pruneConflictingReq(DIFF[state.diff]);
  }
  else if(t==="equipment"){const n=data.label;if(n&&!state.reqEq.includes(n))state.reqEq.push(n);}
  closeModal();refreshAfterModalAdd();
}

function doModalAddFromPending(){
  const data=window.__basketPendingModal;
  delete window.__basketPendingModal;
  if(data) doModalAdd(data);
}

function ingredientConflictsWithRestriction(ingName, restriction){
  restriction=normalizeRestrictionKey(restriction);
  const n=String(ingName||"").toLowerCase();
  const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===n);
  const cat=String((m&&m.cat)||"").toLowerCase();

  if(restriction==="No Dairy"){
    if(/\b(heavy cream|half\s*and\s*half|cream cheese|sour cream|cream|milk|buttermilk|butter|cheese|yogurt|kefir|mozzarella|feta|parmesan|pecorino|goat cheese|ricotta|cheddar|brie|halloumi|crema|queso|ghee|whey|paneer)\b/i.test(n)) return true;
    if(/dairy|cheese/.test(cat)) return true;
    return false;
  }
  if(restriction==="No Butter"){
    if(/\bbutter\b|ghee|brown butter/i.test(n)) return true;
    return false;
  }
  if(restriction==="No Gluten"){
    if(/\b(flour|wheat|pasta|spaghetti|bread|couscous|barley|rye|semolina|udon|ramen|noodle|farro|bulgur)\b/i.test(n)) return true;
    if(/\ball[\s-]?purpose\b/i.test(n)) return true;
    if(/\bsoy sauce\b/i.test(n)) return true;
    return false;
  }
  if(restriction==="No Sugar"){
    if(/\b(honey|sugar|maple|molasses|candy|frosting|icing|marshmallow|nesquik|syrup|caramel sauce|jam)\b/i.test(n)) return true;
    if(/\b(chocolate|dark chocolate)\b/i.test(n)) return true;
    return false;
  }
  if(restriction==="No Pre-made Sauces"){
    if(/\b(soy sauce|fish sauce|worcestershire|oyster sauce|hoisin|sriracha|ketchup|bbq sauce|teriyaki)\b/i.test(n)) return true;
    if(/\b(crushed tomatoes|tomato paste|mustard|vinegar)\b/i.test(n) && /\b(canned|jarred|bottle)\b/i.test(cat)) return true;
    return false;
  }
  if(restriction==="No Alcohol"){
    if(/\bvinegar\b/i.test(n)) return false;
    if(/\b(beer|bourbon|whiskey|rum|vodka|brandy|sake|liqueur|alcohol)\b/i.test(n)) return true;
    if(/\bwine\b/i.test(n)) return true;
    return false;
  }
  if(restriction==="No Nuts"){
    if(/\b(almond|peanut|cashew|pistachio|pecan|walnut|hazelnut|pine nut|macadamia|pesto)\b/i.test(n)) return true;
    if(/nuts\s*&\s*seeds/i.test(cat)) return true;
    return false;
  }
  if(restriction==="Vegetarian"){
    if(/\b(chicken|beef|pork|lamb|turkey|duck|salmon|tuna|cod|halibut|trout|fish|shrimp|prawn|crab|lobster|scallops?|mussels?|clams?|anchov(?:y|ies)|sardines?|bacon|sausage|prosciutto|chorizo|ground beef|steak|oxtail|veal)\b/i.test(n)) return true;
    if(cat==="proteins" && !/\b(egg|tofu|tempeh|bean|chickpea|lentil)\b/i.test(n)) return true;
    return false;
  }
  if(restriction==="Vegan"){
    if(ingredientConflictsWithRestriction(ingName,"No Dairy")) return true;
    if(ingredientConflictsWithRestriction(ingName,"No Butter")) return true;
    if(/\b(egg|eggs|honey|gelatin|mayo)\b/i.test(n)) return true;
    if(ingredientConflictsWithRestriction(ingName,"Vegetarian")) return true;
    return false;
  }
  if(restriction==="No Salt") return false;
  return false;
}

function ingredientConflictsWithAny(ingName, restrictions){
  return (restrictions||[]).some(r=>ingredientConflictsWithRestriction(ingName,r));
}

/** Flatten AI recipe JSON for restriction scanning (rival + contest coach shapes). */
function recipeFlattenTextForCompliance(r){
  if(!r||typeof r!=="object") return "";
  const parts=[];
  const push=x=>{if(x!=null&&String(x).trim())parts.push(String(x));};
  push(r.title);push(r.tagline);push(r.plating);push(r.tip);
  push(r.atThePass);push(r.flavorBalance);push(r.lastMinuteTip);
  const b=r.balance;
  if(b&&typeof b==="object") for(const v of Object.values(b)) push(v);
  for(const i of r.ingredients||[]){
    if(!i) continue;
    const line=[i.item,i.prep,i.amount].filter(Boolean).join(" ").trim();
    push(line);
  }
  for(const s of r.steps||[]){
    if(!s) continue;
    push(s.phase);push(s.what);push(s.how);
  }
  return parts.join("\n").toLowerCase();
}

function scrubComplianceFalsePositives(low){
  return String(low||"")
    .replace(/\bbutter\s+lettuce\b/gi," ")
    .replace(/\bcream\s+of\s+tartar\b/gi," ")
    .replace(/\b(coconut|cashew|almond|soy|oat)\s+cream\b/gi," __plantcream__ ")
    .replace(/\b(oat|almond|soy|cashew|coconut|hemp)\s+milk\b/gi," __plantmilk__ ")
    .replace(/\bpeanut\s+butter\b/gi," __pb__ ")
    .replace(/\bcocoa\s+butter\b/gi," __cocoabutter__ ");
}

/** Strip disclaimers like "no butter" so compliance prose does not trip butter/ghee detectors. */
function scrubNegatedButterGhee(low){
  let s=String(low||"");
  const reps=[
    /\b(no|without|sans|avoid(?:ing|s)?|skip(?:ping)?|omit(?:ting)?|never|free\s+of|instead\s+of|not\s+using|contains\s+no|zero|don'?t\s+use|do\s+not\s+use|excluding|except\s+no)\s+brown\s+butter\b/gi,
    /\b(no|without|sans|avoid(?:ing|s)?|skip(?:ping)?|omit(?:ting)?|never|free\s+of|instead\s+of|not\s+using|contains\s+no|zero|don'?t\s+use|do\s+not\s+use|excluding|except\s+no)\s+(butter|ghee)\b/gi,
    /\b(butter|ghee|brown\s+butter)[\s-]*free\b/gi,
    /\b(butter|ghee)\s+(omitted|avoided|excluded|not\s+used|not\s+included)\b/gi,
  ];
  for(const re of reps) s=s.replace(re," ");
  return s;
}

function textSuggestsAnimalDairy(low){
  let t=scrubComplianceFalsePositives(low);
  t=scrubNegatedButterGhee(t);
  return /\b(heavy\s*cream|whipping\s*cream|double\s*cream|sour\s*cream|clotted\s*cream|cream\s*cheese|cr[eè]me\s*fra[iî]che|half\s*and\s*half|buttermilk|\bwhole\s*milk\b|\bskim\s*milk\b|condensed\s*milk|evaporated\s*milk|\bmilk\b|\bbutter\b|ghee|brown\s*butter|cheese\b|mozzarella|parmesan|parm\b|pecorino|ricotta|feta|halloumi|cheddar|brie|mascarpone|provolone|gruy[eè]re|paneer|yogurt|yoghurt|kefir|\bwhey\b|fromage|crema\b|\bdairy\b|\bcream\b)/i.test(t);
}

function textSuggestsButterFat(low){
  let t=scrubComplianceFalsePositives(low);
  t=scrubNegatedButterGhee(t);
  return /\b(butter|ghee|brown\s+butter)\b/i.test(t);
}

/** Meat, seafood, and common animal-derived savory bases (stocks, demi, animal fats, fish/oyster sauce). */
function textSuggestsAnimalFleshOrBroth(low){
  const l=String(low||"").toLowerCase();
  if(/\b(chicken|beef|pork|lamb|duck|turkey|goose|quail|venison|bison|veal|mutton|rabbit|bacon|pancetta|guanciale|prosciutto|salami|chorizo|andouille|kielbasa|sausage|mortadella|capicola|nduja|hot\s+dog|frankfurter|bratwurst|lard|tallow|suet|crackl(?:e|ing)s?|oxtail|brisket|short\s*rib|ribeye|offal|sweetbreads|foie|liver\b|ground\s+(beef|pork|lamb|turkey|chicken)|meatball|meat\s+loaf|carnitas|barbacoa)\b/i.test(l)) return true;
  if(/\b(anchov|sardine|mackerel|salmon|tuna|cod|halibut|trout|bass|fish\b|fillet|sea\s+bass|shrimp|prawn|scallop|clam|mussel|oyster|crab|lobster|calamari|squid|octopus|eel|caviar|\broe\b|uni\b|surimi)\b/i.test(l)) return true;
  if(/\b(chicken|beef|veal|fish|turkey|ham|shrimp|bone)\s+(stock|broth|broths|base|bases)\b/i.test(l)) return true;
  if(/\bbone\s+broth\b/i.test(l)) return true;
  if(/\b(fish|oyster)\s+sauce\b/i.test(l)) return true;
  if(/\bworcestershire\b/i.test(l)) return true;
  if(/\bdemi[\s-]?glace\b/i.test(l)) return true;
  if(/\b(duck|chicken|bacon|pork)\s+fat\b/i.test(l)) return true;
  if(/\b(beef|chicken|fish)\s+(bouillon|powder)\b/i.test(l)) return true;
  if(/\b(gelatin|isinglass|rennet)\b/i.test(l)) return true;
  return false;
}
function textSuggestsMeatOrFish(low){
  return textSuggestsAnimalFleshOrBroth(low);
}

/** Post-check AI output vs challenge restrictions; drives regen + UI warning. */
function getRecipeRestrictionViolations(recipe, restrictions){
  const msgs=[];
  const rlist=sanitizeRestrictionList(restrictions||[]);
  if(!rlist.length||!recipe) return msgs;
  const blob=recipeFlattenTextForCompliance(recipe);
  const low=blob.toLowerCase();
  const ingLines=[];
  for(const i of recipe.ingredients||[]){
    const line=[i&&i.item,i&&i.prep,i&&i.amount].filter(Boolean).join(" ").trim();
    if(line) ingLines.push(line);
  }
  for(const rawR of rlist){
    const norm=normalizeRestrictionKey(rawR);
    let ingHit="";
    for(const line of ingLines){
      const checkLine=String(line||"").replace(/\b(coconut|cashew|almond|soy|oat)\s+cream\b/gi,"__plantcream__").replace(/\b(oat|almond|soy|cashew|coconut|hemp)\s+milk\b/gi,"__plantmilk__");
      if(ingredientConflictsWithRestriction(checkLine,norm)){ingHit=line;break;}
    }
    if(ingHit){
      msgs.push(`${norm}: conflicts with ingredient — "${ingHit.slice(0,120)}"`);
      continue;
    }
    if(norm==="No Dairy"&&textSuggestsAnimalDairy(low))
      msgs.push(`${norm}: text still references animal dairy (milk, cream, butter, cheese, yogurt, etc.)`);
    else if(norm==="No Butter"&&textSuggestsButterFat(low))
      msgs.push(`${norm}: text still references butter or ghee`);
    else if(norm==="Vegetarian"&&textSuggestsAnimalFleshOrBroth(low))
      msgs.push(`${norm}: text suggests meat, fish, shellfish, or animal stock/fish sauce`);
    else if(norm==="Vegan"){
      const veganHit=textSuggestsAnimalDairy(low)||textSuggestsButterFat(low)||textSuggestsAnimalFleshOrBroth(low)
        ||/\b(honey|bee\s*honey)\b/i.test(low)||/\b(eggs?|egg\s+yolk|egg\s+white|mayo|mayonnaise)\b/i.test(low);
      if(veganHit) msgs.push(`${norm}: non-vegan wording detected (meat, seafood, dairy, egg, honey, animal stock/broth, fish sauce, gelatin, etc.)`);
    }
    else if(norm==="No Alcohol"&&/\b(wine|beer|rum|vodka|whiskey|whisky|bourbon|brandy|sake|liqueur|champagne|prosecco)\b/i.test(low)
      &&!/\b(alcohol-free|non-alcoholic|na beer)\b/i.test(low))
      msgs.push(`${norm}: mentions alcoholic ingredient`);
    else if(norm==="No Nuts"&&/\b(almond|cashew|pistachio|pecan|walnut|hazelnut|pine\s*nut|pesto|peanut)\b/i.test(low))
      msgs.push(`${norm}: mentions nuts or peanut`);
  }
  return msgs;
}

function equipmentAliasRegex(name){
  const n=String(name||"").toLowerCase();
  if(n==="stovetop") return /\b(stovetop|range|burner|hob|cooktop|on\s+the\s+stove|over\s+medium\s+heat|over\s+high\s+heat|saut[eé]|skillet\s+over)\b/i;
  if(n==="food processor") return /\b(food\s*processor|processor\s+bowl)\b/i;
  if(n==="air fryer") return /\bair\s*fryer\b/i;
  if(n==="instant pot") return /\binstant\s*pot|pressure\s*cooker\b/i;
  if(n==="sheet pan") return /\bsheet\s*pan\b/i;
  return new RegExp(`\\b${n.replace(/[.*+?^${}()|[\]\\]/g,"\\$&").replace(/\s+/g,"\\s*")}\\b`,"i");
}

function mentionsEquipment(low, equipName){
  const rx=equipmentAliasRegex(equipName);
  return rx.test(String(low||""));
}

/** Minutes from a step's dur field (e.g. "20 min", "4–5 min"). */
function minutesFromStepDur(dur){
  const d=String(dur||"").trim();
  if(!d) return 0;
  const range=d.match(/(\d+)\s*[-–]\s*(\d+)\s*min/i);
  if(range) return Math.max(+range[1], +range[2]);
  const one=d.match(/(\d+)\s*min/i);
  if(one) return +one[1];
  const plain=d.match(/^(\d+)\s*$/);
  if(plain) return +plain[1];
  return 0;
}

/**
 * Rough timeline check: summed step durations vs challenge clock.
 * Catches "20 min braise + rest in 25 min" style fantasy.
 */
function getRecipeTimelineViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const total=Math.max(1, Number(ch.totalTime)||30);
  const steps=recipe.steps||[];
  let sum=0, maxM=0;
  for(const s of steps){
    const m=minutesFromStepDur(s.dur);
    sum+=m;
    if(m>maxM) maxM=m;
  }
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  const parallel=/\b(parallel|simultaneous|same\s+time|while\s+.*\s+boil|at\s+the\s+same\s+time)\b/i.test(low);
  if(sum>0){
    const budget=parallel?total*1.35:total+6;
    if(sum>budget) msgs.push(`Timeline: step durations (~${sum} min) exceed the ${total} min challenge window${parallel?" (even allowing overlap)":""} — shorten, overlap tasks honestly, or fix dur fields.`);
    if(maxM>total*0.68) msgs.push(`Timeline: one step (~${maxM} min) dominates the ${total} min clock — compress, parallelize, or simplify so the run is believable.`);
  }
  return msgs;
}

/**
 * Dish words that imply a physical format — require matching structure in method text.
 */
const PW_FORMAT_HONESTY_RULES=[
  { re:/\btartlet\b/i, need:/\b(pastry|puff|shortcrust|dough|shell|crust|phyllo|filo|tart\s+shell|lined\s+ring|mold)\b/i, msg:'Format honesty: "tartlet" needs a real pastry/shell (dough, puff, crust) or rename (e.g. composed bite).' },
  { re:/\bpot\s+pie\b/i, need:/\b(pastry|crust|top\s*crust|lid|puff|dough|biscuit\s+topping)\b/i, msg:"Format honesty: pot pie needs a crust/lid story — not a bowl stew only." },
  { re:/\bsandwich\b/i, need:/\b(bread|bun|roll|brioche|toast|baguette|wrap|tortilla|bun\s+top)\b/i, msg:"Format honesty: sandwich needs bread/wrap layers — or call it an open plate." },
  { re:/\bcalzone\b/i, need:/\b(dough|pizza\s+dough|folded|stuffed\s+dough)\b/i, msg:"Format honesty: calzone implies sealed dough — say so or rename." },
  { re:/\btaco\b/i, need:/\b(tortilla|shell|corn\s+tortilla|flour\s+tortilla)\b/i, msg:"Format honesty: taco needs a tortilla/shell — or rename the format." },
];

function getRecipeFormatHonestyViolations(recipe){
  const msgs=[];
  if(!recipe) return msgs;
  const head=String(recipe.title||"")+" "+String(recipe.tagline||"");
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  for(const rule of PW_FORMAT_HONESTY_RULES){
    if(!rule.re.test(head)) continue;
    if(rule.need.test(low)) continue;
    msgs.push(rule.msg);
  }
  return msgs;
}

/** Must-use gear must appear in a primary heat/technique step, not only garnish. */
function getRecipeEquipmentCentralityViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const req=(ch.reqEquip||[]).map(s=>String(s).trim()).filter(Boolean);
  if(!req.length) return msgs;
  const steps=recipe.steps||[];
  for(const eq of req){
    const en=eq.toLowerCase();
    if(/torch|blender|food\s*processor|sous\s*vide|microwave|air\s*fryer|instant\s*pot|oven|sheet\s*pan|cast\s*iron|wok/i.test(en)===false) continue;
    let ok=false;
    for(const s of steps){
      const ph=(s.phase||"").toUpperCase();
      const blob=String(s.what||"")+" "+String(s.how||"");
      const b=blob.toLowerCase();
      if(!mentionsEquipment(b, eq)) continue;
      if(/torch/i.test(en)) ok=/\b(brul|torch|melt|char\s+with)\b/i.test(blob)||/^PLATE$|^ASSEMBLE$/i.test(String(ph||"").trim());
      else if(/blender|food\s*processor/i.test(en)) ok=/\b(blend|puree|pulse|process|grate|blitz)\b/i.test(blob);
      else if(/sous\s*vide/i.test(en)) ok=/\b(sous\s*vide|water\s*bath|\d+\s*°?f|\d+\s*°?c)\b/i.test(blob);
      else if(/microwave/i.test(en)) ok=/\b(microwave|nuke)\b/i.test(blob);
      else if(/air\s*fryer/i.test(en)) ok=/\bair\s*fryer\b/i.test(blob);
      else if(/instant\s*pot|pressure/i.test(en)) ok=/\b(instant\s*pot|pressure\s*cook)\b/i.test(blob);
      else if(/^oven$/i.test(en)) ok=/\b(oven|bake|roast)\b/i.test(blob);
      else if(/sheet\s*pan/i.test(en)) ok=/COOK|SAUCE|PREP/.test(ph)&&/\b(sheet\s*pan|sheetpan|tray)\b/i.test(blob)&&/\b(roast|bake|sheet)\b/i.test(blob);
      else if(/cast\s*iron|wok/i.test(en)) ok=/COOK|SAUCE/.test(ph)&&/\b(sear|saut[eé]|braise|brown|simmer|reduce|deglaze|fond|toast|char|caramel|pan\s+sauce)\b/i.test(blob);
      else ok=true;
      if(ok) break;
    }
    if(!ok) msgs.push(`Must-use ${eq}: use it in a primary technique step (sear/braise/blend/bake as fits the tool) — not only a passing mention or side garnish.`);
  }
  return msgs;
}

function executionHonestyBlock(ch){
  const t=Math.max(1, Number((ch&&ch.totalTime)||30));
  return `EXECUTION HONESTY (judging table):
- Must-use equipment: integrate in the main cook story (COOK/SAUCE or the step that matches the tool) — not only for a minor component while the heaviest step uses a different vessel.
- Timeline: step "dur" values should sum realistically vs ${t} min; long braises must fit; say "parallel" when two things run at once.
- Format words: if you say tartlet, sandwich, pot pie, taco, calzone — include the real structure (pastry shell, bread, tortilla, etc.) or rename the dish.\n`;
}

/** Real cooking constraints — rival + coach must not claim impossible outcomes to satisfy the basket. */
function physicsRealismBlock(ch){
  const t=Math.max(1, Number((ch&&ch.totalTime)||30));
  const ctype=(ch&&ch.ctype)||{};
  let s=`PHYSICS & REAL COOKING (non-negotiable — no comic-book shortcuts):
- Real food obeys time and heat (${t} min round): collagen-rich cuts (short rib, chuck, brisket, shank, oxtail) do not become fork-tender from a ${t}-minute stovetop or grill "simmer" alone. If you braise them, either (1) use a pressure cooker / Instant Pot that is explicitly allowed in equipment and named in steps with believable timing, or (2) switch to a fast technique (hot sear, steak-cut slice against the grain, thin-cut) and **reframe** so you are not claiming a full long-braise classic.
- Do not claim 2–3 hour outcomes (deep collagen breakdown, from-scratch demi in minutes, textbook osso buco / bourguignon braise) inside this clock unless the method honestly matches — pressure, quality stock concentrate from pantry with clear label, or an honest "inspired by" dish name.
- Reductions and stocks: respect evaporation; no "instant demi" or full stock body without a credible source or time budget in the steps.
- Grill / live fire: harder to hold low steady braise temps than an oven; do not assume oven-like stability — simplify or say how you manage heat.
- Banned fantasy phrasing: outcomes that imply physics broke ("fork-tender short rib braise" in 20 min on ambient simmer, "full classic bourguignon" with no time for the braise) unless pressure or pivot is explicit.\n`;
  if(challengeTypeIsRecreateClassic(ctype)){
    s+=`RECREATE A CLASSIC — NAME VS. CLOCK: If the signature technique of the named classic needs longer than ${t} min in the real world, you MUST pivot honestly — "inspired by," "flavors of," faster protein treatment — or use only real shortcuts (pressure when allowed). **Do not title it as the textbook classic if the timeline makes that dish impossible.**\n`;
  }
  return s;
}

/** Equipment compliance gate: forbidden gear bans + must-use checks + practical stovetop exception logic. */
function getRecipeEquipmentViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  const clauses=String(low).split(/[.!?;\n]+/).map(s=>s.trim()).filter(Boolean);

  // Forbidden equipment checks.
  for(const raw of (ch.forbEquip||[])){
    const eq=String(raw||"").trim();
    if(!eq) continue;
    const rx=equipmentAliasRegex(eq);
    if(eq.toLowerCase()==="stovetop"){
      const bad=clauses.find(c=>{
        if(!rx.test(c)) return false;
        // Allowed edge case: pan/skillet use explicitly tied to grill heat.
        const grillCtx=/\b(grill|griddle|plancha|bbq)\b/.test(c);
        const panCtx=/\b(pan|skillet|cast\s*iron)\b/.test(c);
        return !(grillCtx&&panCtx);
      });
      if(bad) msgs.push(`Forbidden equipment: Stovetop appears in method text ("${bad.slice(0,120)}").`);
      continue;
    }
    if(rx.test(low)) msgs.push(`Forbidden equipment: ${eq} appears in method text.`);
  }

  // Must-use equipment checks: require explicit mention in steps/prose.
  for(const raw of (ch.reqEquip||[])){
    const eq=String(raw||"").trim();
    if(!eq) continue;
    if(!mentionsEquipment(low, eq)){
      msgs.push(`Must-use equipment missing: ${eq} is required but not clearly used in the written method.`);
    }
  }

  // Optional one-burner guardrail language check.
  if(ch.limitBurners){
    if(/\b(two|2)\s+burners?\b|\bboth\s+burners?\b|\bsecond\s+burner\b|\banother\s+burner\b/i.test(low)){
      msgs.push(`1 burner only: method text suggests multiple burners.`);
    }
  }

  msgs.push(...getRecipeEquipmentCentralityViolations(recipe,ch));
  return msgs;
}

/**
 * Named-classic archetypes: judge-style identity rules (beyond generic swap checks).
 * Extend over time as evals surface new failure modes.
 */
const PW_CLASSIC_ARCHETYPES=[
  {
    id:"piccata",
    label:"Piccata",
    match:/\b((chicken|veal)\s+)?piccata\b/i,
    checks:[
      {
        when:function(claim,low){
          if(!/\b((chicken|veal)\s+)?piccata\b/i.test(claim)) return false;
          const sweetLead=/\b(plum|cherry|apricot|fig|date|apple|berry)\b[\s\S]{0,48}\bgastrique|\bgastrique\b[\s\S]{0,48}\b(plum|cherry|apricot|fig|date)\b|sweet\s+spine|one\s+clear\s+sweet\s+spine|primary\s+foundation.*\b(plum|sweet\s+fruit|fruit\s+gastrique)\b/i.test(low);
          const acidBriny=/\b(capers?\b|caper\s+brine|briny\s+(spike|hit|backbone)|lemon[-\s]forward|lemon\s+(zest|juice)|sharp\s+thin|yuzu|citrus\s+acid|cornichon|pickle\s+brine|olive\s+brine|salty\s+snap)\b/i.test(low);
          return sweetLead && !acidBriny;
        },
        msg:"Sauce must read lemon/citrus-forward and briny (capers or an honest acid+briny substitute). A sweet fruit gastrique cannot replace that profile as the lead story."
      },
      {
        when:function(claim,low){
          if(!/\bpiccata\b/i.test(claim)) return false;
          const g=/\bgastrique\b/i.test(low);
          const heavySecond=/\b(demi|demi[\s-]glace|reduce\s+stock\s+to|stock\s+reduction\s+separate|second\s+sauce\s+system|parallel\s+reduction)\b/i.test(low);
          return g && heavySecond && !/\b(one\s+sauce|single\s+sauce\s+architecture|not\s+two\s+full\s+sauces)\b/i.test(low);
        },
        msg:"Avoid stacking a full gastrique story with a separate heavy stock/demi reduction — pick one coherent piccata-style sauce."
      }
    ]
  },
  {
    id:"carbonara",
    label:"Carbonara",
    match:/\bcarbonara\b/i,
    checks:[
      {
        when:function(claim,low){
          if(!/\bcarbonara\b/i.test(claim)) return false;
          if(/\b(no\s+cream|cream[-\s]free|non[-\s]traditional|riff|vegan\s+carbonara)\b/i.test(low)) return false;
          return /\b(heavy\s+cream|cream\s+sauce|cream\s+toss|finish\s+with\s+cream|creamy\s+carbonara\s+sauce)\b/i.test(low);
        },
        msg:"Classic carbonara lineage is egg + hard cheese + pasta water — not a cream sauce unless clearly framed as a deliberate non-classic riff."
      }
    ]
  },
  {
    id:"fish_chips",
    label:"Fish and chips",
    match:/\bfish\s+and\s+chips\b/i,
    checks:[
      {
        when:function(claim,low){
          if(!/\bfish\s+and\s+chips\b/i.test(claim)) return false;
          return !/\b(chips?|fries?|fried\s+potatoes|hand[-\s]?cut\s+fries|french\s+fries)\b/i.test(low);
        },
        msg:"Fish and chips requires fried chips/fries as part of the classic — not fish alone with an unrelated starch."
      }
    ]
  },
  {
    id:"pad_thai",
    label:"Pad Thai",
    match:/\bpad\s+thai\b/i,
    checks:[
      {
        when:function(claim,low){
          if(!/\bpad\s+thai\b/i.test(claim)) return false;
          const sweetDom=/\b(only\s+honey|only\s+maple|sweet\s+spine\s+only|dessert[-\s]sweet)\b/i.test(low);
          const balance=/\b(tamarind|fish\s+sauce|palm\s+sugar|sour\s*[/&]\s*sweet|salty\s*[/&]\s*sour)\b/i.test(low);
          return sweetDom && !balance;
        },
        msg:"Pad Thai needs sour/salty/sweet balance in the noodle story — not a single-track sweet sauce unless you explicitly map classic pad Thai functions."
      }
    ]
  }
];

function getClassicArchetypeViolations(claimText, low){
  const msgs=[];
  const claim=String(claimText||"");
  const t=String(low||"");
  for(const arch of PW_CLASSIC_ARCHETYPES){
    if(!arch.match.test(claim)) continue;
    for(const chk of arch.checks){
      try{
        if(chk.when(claim,t)) msgs.push(`${arch.label} archetype: ${chk.msg}`);
      }catch(_e){}
    }
  }
  return msgs;
}

function classicArchetypeHardBlock(){
  return `CLASSIC ARCHETYPE LOCK (examples — if the named dish matches, honor judge identity, not only ingredients):
- Piccata: lemon/citrus-forward thin sharp sauce + briny caper lane (or stated substitutes for BOTH acid lift and briny snap). Do not make a sweet fruit gastrique the lead sauce profile.
- Carbonara: pecorino/egg/pasta-water lineage — not cream unless explicitly a labeled non-classic riff.
- Fish and chips: battered fried fish + fried chips/fries — both belong to the dish.
- Pad Thai: tamarind/fish-sauce/sweet-salty-sour balance lane — not honey-forward dessert logic unless reframed with function mapping.\n`;
}

/** Recreate-a-Classic quality gate: reject "swap-only" outputs that miss classic function mapping. */
function getRecreateClassicTransformationViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch||!challengeTypeIsRecreateClassic(ch.ctype)) return msgs;

  const title=String(recipe.title||"");
  const tagline=String(recipe.tagline||"");
  const basketLine=String((recipe.balance&&recipe.balance.basket)||"");
  const flavorLine=String((recipe.balance&&recipe.balance.flavor)||"");
  const lowBlob=recipeFlattenTextForCompliance(recipe);
  const low=(lowBlob||"").toLowerCase();
  const head=(title+" "+tagline).toLowerCase();
  const basketLow=basketLine.toLowerCase();

  // Broad but practical classic dish-name detector.
  const classicNameRx=/\b(fish and chips|chicken\s+piccata|veal\s+piccata|chicken parmesan|chicken parm(?:igiana)?|eggplant parmesan|eggplant parm(?:igiana)?|salisbury steak|meatloaf|beef stroganoff|shepherd'?s pie|cottage pie|coq au vin|beef bourguignon|steak frites|shrimp scampi|sole meuni[eè]re|lobster thermidor|cioppino|bouillabaisse|spaghetti (?:and )?meatballs|carbonara|cacio e pepe|lasagna|bolognese|alfredo|pasta primavera|risotto milanese|mac (?:and|&) cheese|fried chicken|chicken pot pie|biscuits and gravy|cheeseburger|club sandwich|pad thai|fried rice|ramen|pho|shawarma|falafel|gyro|eggs benedict|french toast|pancakes|omelette|huevos rancheros)\b/i;
  const hasNamedClassic=classicNameRx.test(head)||classicNameRx.test(basketLine);
  if(!hasNamedClassic){
    msgs.push(`Recreate brief: title/tagline/balance.basket must name one specific classic dish (menu-level name), not just style vibes.`);
  }

  const claimForArch=`${title} ${tagline} ${basketLine}`;
  msgs.push(...getClassicArchetypeViolations(claimForArch, low));

  // Require explicit function mapping language, not only ingredient swapping.
  const functionMapRx=/\b(function|role|acts as|serves as|mimic|mimics|mimicking|stand[-\s]?in|replaces?|still reads as|classic (?:structure|architecture)|umami depth|brown gravy|savory depth)\b/i;
  const lineageRx=/\b(gravy|pan sauce|roux|reduction|braise|batter|breading|cutlet|rag[uù]|marinara|bechamel|bechamel|au jus|demi|fond)\b/i;
  if(!(functionMapRx.test(basketLine)||functionMapRx.test(flavorLine))||!lineageRx.test(low)){
    msgs.push(`Recreate brief: explain how basket ingredients preserve classic FUNCTION (not just substitutions), and cite one concrete classic technique lineage.`);
  }

  // Savory classics should not drift sweet-forward unless explicitly counterbalanced.
  const isDessertClassic=(String((ch.ctype&&ch.ctype.id)||"")==="dessert"||/\bdessert\b/.test(String((ch.ctype&&ch.ctype.label)||"").toLowerCase()));
  if(!isDessertClassic){
    const sweetLean=/\b(maple|honey|sweet|syrup|gastrique|glaze)\b/i.test(low);
    const savoryCounter=/\b(umami|savory|gravy|fond|browned|maillard|allium|stock|reduction|acid balance|vinegar balance|peppery|salty)\b/i.test(low);
    if(sweetLean&&!savoryCounter){
      msgs.push(`Recreate brief: flavor read drifts sweet without a clear savory-depth counterweight expected by the named classic.`);
    }
  }

  return msgs;
}

/** Absolute rule priority + expanded bans for the model (and coach). */
function restrictionHardPriorityBlock(ch){
  const r=sanitizeRestrictionList((ch&&ch.restrictions)||[]);
  if(!r.length) return "";
  let s=`RULE PRIORITY (read before everything else — breaking these fails the run):
1) ACTIVE RESTRICTIONS + forbidden equipment: absolute. A single violation (even "a little cream to finish") = failed compliance — worse than boring flavor or weak creativity.
2) Challenge type brief (e.g. Recreate a Classic).
3) Flavor and basket storytelling.

You must scan your own output before returning: every ingredients[].item and prep, every step "how", plating, balance.* prose — all must satisfy EVERY restriction. If you catch a violation, rewrite the whole plan; do not return the bad version.

ACTIVE RESTRICTIONS (fail closed):
`;
  for(const x of r){
    const norm=normalizeRestrictionKey(x);
    s+=`• ${x}`;
    if(norm==="No Dairy")
      s+=` — BANNED everywhere: cow/goat milk, cream, half-and-half, butter, ghee, cheese, yogurt, whey, traditional dairy. OK if honestly named: coconut/soy/oat/cashew cream or milk, cashew "ricotta," cultured non-dairy yogurt — label them as non-dairy. Never write "heavy cream" or "finish with butter" under this rule.\n`;
    else if(norm==="No Butter")
      s+=` — BANNED: butter, ghee, brown butter (including in prose). Do not name butter or ghee even to say you avoided them; describe fats as olive oil, neutral oil, etc.\n`;
    else if(norm==="Vegetarian")
      s+=` — BANNED: meat, poultry, fish, shellfish, gelatin, fish/oyster sauce, Worcestershire (fish-based), lard, chicken/beef/fish stock and bone broth — use vegetable stock, mushroom broth, or kombu.\n`;
    else if(norm==="Vegan")
      s+=` — BANNED: all animal products (meat, poultry, fish, shellfish, dairy, eggs, honey, gelatin, rennet, butter, milk chocolate, bonito, dashi with fish). NO chicken/beef/fish stock or bone broth — only veg stock, mushroom broth, kombu/dried mushroom, or water + aromatics. NO fish sauce, oyster sauce, Worcestershire (fish-based) unless you state an approved vegan brand and the brief allows that sauce. Do not “borrow” animal depth.\n`;
    else if(norm==="No Gluten")
      s+=` — BANNED: wheat flour, standard pasta/bread, barley, rye, typical soy sauce unless gluten-free stated — use GF pasta/flour/tamari when needed.\n`;
    else if(norm==="No Alcohol")
      s+=` — BANNED: wine, beer, spirits in food; cooking wine counts.\n`;
    else if(norm==="No Nuts")
      s+=` — BANNED: tree nuts, peanuts, nut milks, pesto with pine nuts unless exception stated.\n`;
    else if(norm==="No Salt")
      s+=` — BANNED: table salt, kosher salt, finishing salt, seasoned salt, explicit "season with salt" / "salt to taste" in steps. MSG-as-salt is off unless you label an allowed exception (usually avoid).
- Latent sodium is real: commercial stock, butter, cheese, soy sauce, miso, fish sauce, bacon, ham, brined pickles, many condiments — still allowed if your other rules permit them; name the source honestly. Prefer unsalted butter / low-sodium stock wording when the story allows so strict judges see intent.
- Flavor architecture without added salt: push acid (citrus, vinegar), bitter (charred veg, greens), tomato paste or charred tomato for "red sauce" memory, aggressive reduction, herbs — especially when the basket has maple/honey/sweet; finish with extra acid so the plate stays savory, not dessert-leaning.\n`;
    else s+=` — treat as strict; do not violate in any field.\n`;
  }
  s+=`SELF-CHECK: Output JSON must be restriction-clean on first save. Judges eliminate on rule breaks.\n`;
  return s;
}

function equipmentHardPriorityBlock(ch){
  const req=(ch&&ch.reqEquip)||[];
  const forb=(ch&&ch.forbEquip)||[];
  const oneBurner=!!(ch&&ch.limitBurners);
  if(!req.length&&!forb.length&&!oneBurner) return "";
  let s=`EQUIPMENT COMPLIANCE (hard rule):
- Forbidden means forbidden in wording and method — do not mention or use banned tools/heat sources.
- Must-use means explicit usage in the method; include the tool by name where used.
`;
  if(forb.length) s+=`- FORBIDDEN: ${forb.join(", ")}.\n`;
  if(req.length) s+=`- MUST USE: ${req.join(", ")}.\n`;
  if(oneBurner) s+=`- LIMIT: 1 burner only — avoid multi-burner choreography.\n`;
  if(forb.some(x=>String(x).toLowerCase()==="stovetop")){
    s+=`- Outside-the-box allowance: if Stovetop is forbidden, pan/skillet work is allowed ONLY when explicitly tied to an allowed non-stovetop heat source (e.g. cast-iron skillet on grill/plancha), never on a burner/range.\n`;
  }
  if(req.length) s+=`- Centrality: must-use gear must drive a primary step for that tool (sear/braise in the cast iron, blend in the processor) — not only a side garnish while the main cook happens elsewhere.\n`;
  s+=`- Self-check before returning: ingredients, steps, and prose must all be equipment-compliant.\n`;
  return s;
}

function whiteChocolateHonestyBlock(requiredArr){
  const req=(requiredArr||[]).map(s=>String(s).toLowerCase()).join(" ");
  if(!/\bwhite\s*chocolate\b/.test(req)) return "";
  return `WHITE CHOCOLATE (material truth when it is in the basket):
- Typical white chocolate is sugar + cocoa butter + milk solids / dairy — it does NOT deliver "cocoa depth" or dark-cocoa flavor (no cocoa solids). Honest descriptors: sweet, vanilla, fatty/waxy melt, mild dairy notes if applicable.
- Do not claim "subtle cocoa depth" from white chocolate — that is false. If using it for savoriness, say sugar/fat/texture instead.
- If the plate must stay dairy-free / vegan, say explicitly when your white chocolate is a dairy-free product or use another basket path — do not smuggle dairy via "white chocolate" without checking restrictions.\n`;
}

function filterPoolByRestrictions(pool, restrictions){
  const r=restrictions||[];
  if(!r.length) return [...new Set((pool||[]).filter(Boolean))];
  return [...new Set((pool||[]).filter(Boolean))].filter(n=>!ingredientConflictsWithAny(n,r));
}

function pruneConflictingReq(cfg){
  const need=cfg.req;
  state.req=state.req.filter(n=>!ingredientConflictsWithAny(n,state.res));
  const pool=filterPoolByRestrictions(pantryPool(),state.res).filter(x=>!state.req.includes(x));
  while(state.req.length<need && pool.length){
    const i=randomIndex(pool.length);
    state.req.push(pool.splice(i,1)[0]);
  }
  const p=pantryPool();
  state.req=ensureCourseBasketViability(state.req,state.ctype,state.diff,p,state.res,pwChaosOrInsane());
}

function classifyRequiredBucket(name){
  const n=String(name||"").toLowerCase();
  const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===n);
  const cat=String((m&&m.cat)||"").toLowerCase();
  const wildcardRx=/\b(candy|frosting|icing|syrup|caramel|chocolate|soda|cola|chips|cereal|cookie|marshmallow|dessert|sweet)\b/;
  if(wildcardRx.test(n)||/sweet items|snacks/.test(cat)) return "wildcard";

  // Cheese / cream / butter = flavor driver — NOT the "protein" basket slot (meat/fish/eggs/beans).
  if(/dairy\s*&\s*cheese|dairy|cheese/.test(cat) || /\b(butter|cream|milk|yogurt|mozzarella|feta|parmesan|pecorino|goat cheese|ricotta|cheddar|brie|halloumi|crema)\b/.test(n)) return "flavor";

  // Pulses / legumes: basket "vegetable" slot — not the animal/tofu/egg protein slot (Chopped-style).
  const legumeRx=/\b(chickpea|chickpeas|garbanzo|black bean|black beans|kidney bean|kidney beans|navy bean|navy beans|pinto bean|pinto beans|cannellini|great northern beans|white beans|lima bean|lima beans|fava bean|fava beans|lentil|lentils|split pea|split peas)\b/i;
  if(legumeRx.test(n)) return "produce";

  // Stocks, broths, fonds — liquid savory bases, not a centerpiece protein (Chicken Stock ≠ chicken on the plate).
  if(/\b(stock|broth|bone\s*broth|bouillon|consomm[ée]|consomme|fumet|dashi)\b/i.test(n)) return "flavor";

  // Bottled sauces, ferments, pastes — not center-of-plate protein (fish sauce ≠ fish fillet; soy ≠ protein anchor).
  if(/\b(fish sauce|oyster sauce|soy sauce|tamari|worcestershire|hoisin|teriyaki|sriracha|ketchup|bbq sauce|barbecue sauce|fish paste|shrimp paste|anchovy paste|xo sauce|mayo|mayonnaise|mirin|gochujang|harissa)\b/i.test(n)) return "flavor";
  if(/\bclams?\s+juice\b/i.test(n)) return "flavor";

  // Catalog: oils, vinegars, shelf condiments — spinner "flavor" slot, never column 1 protein.
  if(m && /oils\s*&\s*vinegars/i.test(String(m.cat||""))) return "flavor";

  // Primary protein: meat, seafood, eggs, tofu/tempeh/seitan — not legumes (handled above).
  // "fish" / "clam" alone: exclude fish sauce, clam juice (condiments — handled above).
  const primaryRx=/\b(chicken|beef|pork|lamb|turkey|duck|salmon|tuna|cod|halibut|trout|shrimp|prawn|crab|lobster|scallops?|mussels?|tofu|tempeh|seitan|egg|eggs|anchov(?:y|ies)|sardines?|ground beef|steak|bacon|sausage|prosciutto|chorizo|kielbasa|andouille)\b/;
  const fishProtein=/\bfish\b(?!\s+sauce\b)/i;
  const clamShellfish=/\bclams?\b(?!\s+juice\b)/i;
  const primaryHit=primaryRx.test(n)||fishProtein.test(n)||clamShellfish.test(n);
  if(cat==="proteins" || /seafood|meat|poultry/.test(cat) || primaryHit) return "protein";

  // Produce: veg, fruit, aromatics (onion family, etc.)
  const produceRx=/\b(tomato|tomatoes|onion|shallot|garlic|ginger|pepper|jalape|spinach|kale|cauliflower|asparagus|corn|beet|brussels|carrot|scallion|lemon|lime|avocado|mango|apple|banana|orange|berry|grape|melon|mushroom|potato|zucchini|eggplant|herb|basil|thyme|rosemary|fiddlehead|rambutan)\b/;
  if(/vegetables|fruits|aromatics/.test(cat) || produceRx.test(n)) return "produce";

  return "flavor";
}

/** Spinner column titles: slot 1 = protein anchor, 2 = veg/produce, 3–4 = wildcards (pickRequiredPattern buckets). */
function mustUseSlotColumnLabel(slotIndex, totalSlots){
  const i=Number(slotIndex);
  const t=Math.max(0, Number(totalSlots)||0);
  if(t<=0||i<0||i>=t) return "Must use "+(i+1);
  if(t===2) return ["Protein","Vegetable"][i]||"Must use "+(i+1);
  if(t===3) return ["Protein","Vegetable","Random"][i]||"Must use "+(i+1);
  if(t===4) return ["Protein","Vegetable","Random","Random"][i]||"Must use "+(i+1);
  return ["Protein","Vegetable","Wild card","Flavor","Random"][i]||"Must use "+(i+1);
}

/** Chaos toggle or Insane difficulty → skip course-vs-basket viability fixes. */
function pwChaosOrInsane(){
  return !!(state.chaosBasket||state.diff==="insane");
}

function courseIsDessert(ctype){
  if(!ctype) return false;
  if(ctype.id==="dessert") return true;
  return /\bdessert\b/i.test(String(ctype.label||""));
}

/** Eggs + soy proteins OK in sweet applications; meat/fish/shellfish read savory. */
function isDessertBlockingSavoryProtein(name){
  const n=String(name||"").toLowerCase();
  if(/\b(egg|eggs)\b/.test(n)) return false;
  if(/\b(tofu|tempeh|seitan)\b/.test(n)) return false;
  return classifyRequiredBucket(name)==="protein";
}

/** Ingredients that break dessert identity even with “dessert” technique. */
function isDessertSpoilerIngredient(name){
  if(isDessertBlockingSavoryProtein(name)) return true;
  if(/\bnutritional yeast\b/i.test(String(name||""))) return true;
  return false;
}

function classifyRequiredBasketType(name){
  const b=classifyRequiredBucket(name);
  if(b==="wildcard") return "wildcard";
  if(b==="protein") return "protein";
  if(b==="produce") return "produce";
  const n=String(name||"").toLowerCase();
  const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===n);
  const cat=String((m&&m.cat)||"").toLowerCase();
  if(/dairy\s*&\s*cheese|dairy|cheese/.test(cat)) return "dairy";
  return "flavor";
}

function getIngredientCompatibilityMeta(name){
  const n=String(name||"").toLowerCase();
  const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===n);
  const cat=String((m&&m.cat)||"").toLowerCase();
  const flavors=(m&&m.flavor)||[];
  const hasFlavor=f=>flavors.some(x=>String(x).toLowerCase()===String(f).toLowerCase());
  const isFruit=/fruits/i.test(cat);
  const isDairy=/dairy\s*&\s*cheese|dairy|cheese/.test(cat)
    ||/\b(butter|cream|milk|yogurt|mozzarella|feta|parmesan|pecorino|goat cheese|ricotta|cheddar|brie|halloumi|crema|mascarpone|paneer)\b/.test(n);
  const isSugarSource=/\b(honey|sugar|maple|molasses|caramel|marshmallow|chocolate|nesquik|frosting|icing|agave|jam|jelly|sweetener|vanilla bean|toffee|butterscotch)\b/.test(n)||/sweet items|snacks/i.test(cat);
  const hasSweetNote=hasFlavor("sweet");
  let dessertCompatibility=3;
  if(/sweet items/i.test(cat)||/\b(dark chocolate|white chocolate|caramel|marshmallow|vanilla bean)\b/.test(n)||isSugarSource) dessertCompatibility=5;
  else if(isFruit) dessertCompatibility=4;
  else if(isDairy) dessertCompatibility=4;
  else if(hasSweetNote) dessertCompatibility=4;
  if(classifyRequiredBucket(name)==="protein"&&!/\b(egg|eggs)\b/.test(n)) dessertCompatibility=Math.min(dessertCompatibility,2);
  if(/\b(soy sauce|fish sauce|fish stock|anchov)\b/.test(n)) dessertCompatibility=Math.min(dessertCompatibility,2);
  const basketType=classifyRequiredBasketType(name);
  return {basketType,isFruit,isDairy,isSugarSource,hasSweetNote,dessertCompatibility};
}

/** Produce / aromatics where “sweet” on the card is a real dessert pathway (not e.g. edamame or onion). */
const PW_DESSERT_SWEET_PRODUCE_RX=/\b(sweet potato|sweet potatoes|\byams?\b|pumpkin|butternut|acorn squash|delicata|kabocha|carrots?|beets?|beetroots?|\bcorns?\b|corn on the cob|parsnip|parsnips|plantains?|figs?|dates?|bananas?|apples?|pears?|peaches?|plums?|apricots?|nectarines?|cherries?\b|berries|raisins?|prunes?|rhubarb|coconut milk|coconut cream|mangos?|papaya|guava|kiwi|pomegranate|watermelon|cantaloupe|honeydew)\b/i;

const PW_NAME_BLOCKS_DESSERT_SWEET=/\b(chipotle|chipotles|adobo|sriracha|harissa|gochujang|sambal|fish sauce|soy sauce|hoisin|miso paste|doubanjiang|curry paste)\b/i;

function dessertIngredientAnchorsCourse(name, restrictions){
  const r=restrictions||[];
  const noSugar=r.includes("No Sugar");
  const noDairy=r.includes("No Dairy")||r.includes("Vegan");
  const m=getIngredientCompatibilityMeta(name);
  if(m.isFruit) return true;
  if(!noDairy&&m.isDairy) return true;
  if(!noSugar&&m.isSugarSource) return true;
  if(classifyRequiredBucket(name)==="wildcard") return true;
  if(noSugar) return false;
  const row=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===String(name||"").toLowerCase());
  const cat=String((row&&row.cat)||"").toLowerCase();
  const flavors=(row&&row.flavor)||[];
  const savoryFlavorTag=/^(spicy|smoky|funky|hot|pungent)$/i;
  if(flavors.some(x=>savoryFlavorTag.test(String(x)))) return false;
  if(PW_NAME_BLOCKS_DESSERT_SWEET.test(String(name||"").toLowerCase())) return false;
  if(m.dessertCompatibility>=5) return true;
  if(m.hasSweetNote&&m.dessertCompatibility>=4){
    const b=classifyRequiredBucket(name);
    if(b==="protein") return false;
    if(b==="produce"||/vegetables|aromatics/.test(cat))
      return PW_DESSERT_SWEET_PRODUCE_RX.test(String(name||"").toLowerCase());
    return true;
  }
  return false;
}

function dessertBasketHasPath(req, restrictions){
  for(const name of req||[]){
    if(dessertIngredientAnchorsCourse(name,restrictions)) return true;
  }
  return false;
}

const PW_SAVORY_LEGUME_RX=/\b(chickpea|chickpeas|garbanzo|black bean|black beans|kidney bean|kidney beans|navy bean|navy beans|pinto bean|pinto beans|cannellini|great northern beans|white beans|lima bean|lima beans|fava bean|fava beans|lentil|lentils|split pea|split peas)\b/i;

function savoryBasketHasPath(req){
  for(const name of req||[]){
    const b=classifyRequiredBucket(name);
    const n=String(name||"");
    if(b==="protein") return true;
    if(/\b(egg|eggs|tofu|tempeh|seitan)\b/i.test(n)) return true;
    if(PW_SAVORY_LEGUME_RX.test(n)) return true;
  }
  return false;
}

function pickDessertAnchorFromPool(candidates, restrictions){
  if(!candidates||!candidates.length) return null;
  const ok=candidates.filter(n=>dessertIngredientAnchorsCourse(n,restrictions));
  if(!ok.length) return null;
  return ok[randomIndex(ok.length)];
}

/** Vegan baskets: diversify plant proteins — deprioritize tempeh and avoid stacking tofu+tempeh+seitan when legumes/produce exist. */
function pickPlantProteinForBasketSlot(avail, restrictions, alreadyPicked){
  if(!avail||!avail.length) return null;
  const r=sanitizeRestrictionList(restrictions||[]);
  const vegan=r.some(x=>normalizeRestrictionKey(x)==="Vegan");
  if(!vegan) return avail[randomIndex(avail.length)];
  let pool=avail.slice();
  const picked=alreadyPicked||[];
  const hasSoy=picked.some(n=>/\b(tofu|tempeh|seitan)\b/i.test(String(n)));
  if(hasSoy){
    const noMoreSoy=pool.filter(n=>!/\b(tofu|tempeh|seitan)\b/i.test(String(n)));
    if(noMoreSoy.length) pool=noMoreSoy;
  }
  const nonTempeh=pool.filter(n=>!/\btempeh\b/i.test(String(n)));
  if(nonTempeh.length&&randomUnit()<0.82) return nonTempeh[randomIndex(nonTempeh.length)];
  return pool[randomIndex(pool.length)];
}

function pickSavoryAnchorFromPool(candidates, restrictions, currentReq){
  if(!candidates||!candidates.length) return null;
  const ok=candidates.filter(n=>{
    const s=String(n||"");
    if(classifyRequiredBucket(n)==="protein") return true;
    if(/\b(egg|eggs|tofu|tempeh|seitan)\b/i.test(s)) return true;
    if(PW_SAVORY_LEGUME_RX.test(s)) return true;
    return false;
  });
  if(!ok.length) return null;
  return pickPlantProteinForBasketSlot(ok, restrictions, currentReq||[]);
}

function pickLeastUsefulIndexForCourse(req, ctype){
  const scored=(req||[]).map((name,i)=>({i,name,meta:getIngredientCompatibilityMeta(name),bucket:classifyRequiredBucket(name)}));
  if(!scored.length) return 0;
  if(courseIsDessert(ctype)){
    scored.sort((a,b)=>{
      const sa=isDessertSpoilerIngredient(a.name)?0:1, sb=isDessertSpoilerIngredient(b.name)?0:1;
      if(sa!==sb) return sa-sb;
      return a.meta.dessertCompatibility-b.meta.dessertCompatibility;
    });
    return scored[0].i;
  }
  const rank=x=>{
    const nm=String(x.name||"");
    if(x.bucket==="protein"||/\b(egg|eggs|tofu|tempeh|seitan)\b/i.test(nm)||PW_SAVORY_LEGUME_RX.test(nm)) return 3;
    if(x.bucket==="produce") return 2;
    return 1;
  };
  scored.sort((a,b)=>rank(a)-rank(b));
  return scored[0].i;
}

function viabilitySwapAttempts(diffKey, chaos, ctype){
  if(chaos||diffKey==="insane") return 0;
  const bonus=courseIsDessert(ctype)?2:0;
  if(diffKey==="easy") return 5+bonus;
  if(diffKey==="medium") return 3+bonus;
  return 2+bonus;
}

function ensureCourseBasketViability(req, ctype, diffKey, pool, restrictions, chaos){
  if(!req||!req.length) return req||[];
  if(chaos) return req.slice();
  const filt=filterPoolByRestrictions(pool||[],restrictions||[]);
  let out=req.slice();
  const tries=viabilitySwapAttempts(diffKey,chaos,ctype);
  for(let t=0;t<tries;t++){
    let needFix=false;
    if(courseIsDessert(ctype)){
      if(!dessertBasketHasPath(out,restrictions)) needFix=true;
      if(out.some(isDessertSpoilerIngredient)) needFix=true;
    }else if(!savoryBasketHasPath(out)) needFix=true;
    if(!needFix) break;
    const spare=filt.filter(x=>!out.includes(x));
    const anchor=courseIsDessert(ctype)
      ?pickDessertAnchorFromPool(spare,restrictions)
      :pickSavoryAnchorFromPool(spare,restrictions,out);
    if(!anchor) break;
    const replaceIdx=pickLeastUsefulIndexForCourse(out,ctype);
    out[replaceIdx]=anchor;
  }
  return out;
}

function pickRequiredPattern(pool,count,resList){
  const r=resList!==undefined?resList:state.res;
  const filtered=filterPoolByRestrictions(pool||[],r||[]);
  const uniq=shuffleArray([...new Set(filtered.filter(Boolean))]);
  if(uniq.length===0){
    alert("Nothing in your pantry matches the current restrictions. Clear a restriction or add compatible ingredients.");
    return [];
  }
  const by={protein:[],produce:[],wildcard:[],flavor:[]};
  uniq.forEach(n=>by[classifyRequiredBucket(n)].push(n));
  if(courseIsDessert(state.ctype)){
    by.protein=by.protein.filter(n=>!isDessertBlockingSavoryProtein(n));
    by.flavor=by.flavor.filter(n=>!isDessertSpoilerIngredient(n));
    by.produce=by.produce.filter(n=>!isDessertSpoilerIngredient(n));
  }
  const ordered=count>=4?["protein","produce","wildcard","flavor"]:count===3?["protein","produce","flavor"]:["protein","produce"];
  const out=[];
  const pickOne=(k)=>{
    const avail=by[k].filter(x=>!out.includes(x));
    if(!avail.length) return;
    if(k==="produce"&&avail.length>1){
      const vegFruit=avail.filter(n=>{
        const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===String(n).toLowerCase());
        return m&&/vegetables|fruits/i.test(String(m.cat||""));
      });
      const pickPool=vegFruit.length?vegFruit:avail;
      out.push(pickPool[randomIndex(pickPool.length)]);
    } else if(k==="protein"){
      out.push(pickPlantProteinForBasketSlot(avail,r,out));
    } else {
      out.push(avail[randomIndex(avail.length)]);
    }
  };
  ordered.forEach(k=>pickOne(k));
  const leftovers=shuffleArray(uniq.filter(x=>!out.includes(x)));
  const veganSpin=sanitizeRestrictionList(r||[]).some(x=>normalizeRestrictionKey(x)==="Vegan");
  while(out.length<count&&leftovers.length){
    if(veganSpin){
      const hasSoy=out.some(n=>/\b(tofu|tempeh|seitan)\b/i.test(String(n)));
      let pool=leftovers.filter(x=>!out.includes(x));
      if(hasSoy){
        const noSoy=pool.filter(n=>!/\b(tofu|tempeh|seitan)\b/i.test(String(n)));
        if(noSoy.length) pool=noSoy;
      }
      const nonTem=pool.filter(n=>!/\btempeh\b/i.test(String(n)));
      if(nonTem.length&&randomUnit()<0.75) pool=nonTem;
      const pick=pool[randomIndex(pool.length)];
      const ix=leftovers.indexOf(pick);
      if(ix>=0) leftovers.splice(ix,1);
      out.push(pick);
    }else{
      out.push(leftovers.splice(randomIndex(leftovers.length),1)[0]);
    }
  }
  return out.slice(0,count);
}

/** One-line browser title fallback (native tooltip). */
function mysteryBasketIngTitleAttr(name){
  if(!name||String(name).trim()===""||name==="—")return "";
  const meta=PANTRY_BY_NAME[name];
  if(!meta) return "No pantry flavor card for custom ingredient.";
  const line=[
    (meta.flavor||[]).join(", "),
    (meta.texture||[]).length?(meta.texture||[]).join(", "):"",
    meta.notes||""
  ].filter(Boolean).join(" · ");
  return line.slice(0,420)+(line.length>420?"…":"");
}

function mysteryBasketIngTooltipHtml(name){
  if(!name||String(name).trim()===""||name==="—")return "";
  const meta=PANTRY_BY_NAME[name];
  if(!meta){
    const msg=`No flavor card for “${name}” — custom or non-catalog ingredients don’t include detailed hints yet.`;
    return `<div class="pw-pantry-ing-tooltip" role="tooltip"><div class="pw-pantry-ing-tooltip-h">Pantry note</div><div class="pw-pantry-ing-tooltip-p">${escapeHtml(msg)}</div></div>`;
  }
  const flavorProfile=[
    (meta.flavor||[]).join(", ")||"—",
    (meta.texture||[]).length?`Texture: ${(meta.texture||[]).join(", ")}`:"",
    `Richness ${meta.richness||"—"} · acidity ${meta.acidity||"—"} · intensity ${meta.intensity||"—"}`
  ].filter(Boolean).join(" · ");
  const technique=meta.notes||"—";
  return `<div class="pw-pantry-ing-tooltip" role="tooltip"><div class="pw-pantry-ing-tooltip-h">Flavor profile</div><div class="pw-pantry-ing-tooltip-p">${escapeHtml(flavorProfile)}</div><div class="pw-pantry-ing-tooltip-h" style="margin-top:8px">Cooking technique</div><div class="pw-pantry-ing-tooltip-p">${escapeHtml(technique)}</div></div>`;
}

/** Constraints shown in spinner/result: dietary + forbidden equip + must-use equip + burner lock. */
function spinConstraintDisplayItems(){
  const out=[...(state.spinConstraints||[])];
  (state.reqEq||[]).forEach(e=>out.push("✓ "+e));
  if(state.lim) out.push("1 burner only");
  return out;
}

function mysterySpinResultPanelHtml(){
  const cfg=DIFF[state.diff];
  const need=cfg.req;
  const constraints=spinConstraintDisplayItems();
  const nConstraints=constraints.length;
  const parts=[];
  for(let i=0;i<need;i++){
    const name=state.req[i]||"—";
    const colLbl=mustUseSlotColumnLabel(i,need);
    parts.push(`<div class="basket-spin-cell pw-pantry-ing-tip-wrap"><span class="basket-spin-lbl">${escapeHtml(colLbl)}</span><div class="rnd-slot rnd-done-ing basket-ing-hover" tabindex="0" title="${escapeHtml(mysteryBasketIngTitleAttr(name))}">${escapeHtml(name)}</div>${mysteryBasketIngTooltipHtml(name)}</div>`);
  }
  for(let j=0;j<nConstraints;j++){
    const txt=constraints[j]||"—";
    const isForb=txt.startsWith("✕ ");
    const isReq=txt.startsWith("✓ ");
    const slotCls=isForb?"rnd-done-forb":isReq?"rnd-done-ct":"rnd-done-res";
    parts.push(`<div class="basket-spin-cell"><span class="basket-spin-lbl">Rule ${j+1}</span><div class="rnd-slot ${slotCls}">${escapeHtml(txt)}</div></div>`);
  }
  parts.push(`<div class="basket-spin-cell"><span class="basket-spin-lbl">AI clock</span><div class="rnd-slot rnd-done-time">${Number(state.total)||30} min</div></div>`);
  const ct=`${state.ctype.emoji} ${state.ctype.label}`;
  parts.push(`<div class="basket-spin-cell"><span class="basket-spin-lbl">Challenge</span><div class="rnd-slot rnd-done-ct">${escapeHtml(ct)}</div></div>`);
  return `<div class="basket-spin-wrap">
    <div class="basket-spin-h"><span>🎰 Mystery basket</span><span style="font-size:11px;font-weight:700;color:#64748b">${escapeHtml(cfg.label)} · locked in</span></div>
    <div class="basket-spin-slots">${parts.join("")}</div>
    <div style="font-size:11px;color:#64748b;margin-top:10px;text-align:center;line-height:1.45"><strong>AI clock</strong> is how long the rival-chef recipe assumes (20–45 min). <strong>Hover</strong> (or keyboard-focus) a <strong>must-use</strong> ingredient for flavor hints. <strong>Must-use equipment</strong> sometimes rolls on spin — check <strong>Equipment</strong> below. Change <strong>restrictions</strong>, required ingredients, or equipment there, or <strong>spin again</strong> for a new haul.</div>
  </div>`;
}

function runMysteryRandomize(){
  const host=$("spin-host");
  if(!host)return;
  state.mysterySpinLocked=false;
  const pool=(window.USER_PANTRY&&window.USER_PANTRY.length)?window.USER_PANTRY:PANTRY;
  const cfg=DIFF[state.diff];
  try{
    doRandomize();
  }catch(err){
    console.error("Mystery basket spin failed", err);
    state.mysterySpinLocked=false;
    alert("Mystery basket hit an error: "+(err&&err.message?err.message:String(err)));
    renderBuild();
    return;
  }
  const need=cfg.req;
  const constraints=spinConstraintDisplayItems();
  const nConstraints=constraints.length;
  const ctypePool=[...CTYPES,...state.customTypes];
  const totalSlots=need+nConstraints+2;
  const slotMeta=[];
  for(let i=0;i<need;i++) slotMeta.push({kind:"ing",lbl:mustUseSlotColumnLabel(i,need)});
  for(let j=0;j<nConstraints;j++) slotMeta.push({kind:"con",lbl:"Rule "+(j+1)});
  slotMeta.push({kind:"time",lbl:"AI clock"});
  slotMeta.push({kind:"ct",lbl:"Challenge"});
  const cells=slotMeta.map((m,i)=>{
    const wrapCls=m.kind==="ing"?"basket-spin-cell pw-pantry-ing-tip-wrap":"basket-spin-cell";
    return `<div class="${wrapCls}" data-i="${i}"><span class="basket-spin-lbl">${m.lbl}</span><div class="rnd-slot" data-kind="${m.kind}" aria-label="${escapeHtml(m.lbl)}">—</div></div>`;
  }).join("");
  host.innerHTML=`<div class="basket-spin-wrap">
    <div class="basket-spin-h"><span>🎰 Mystery basket</span><span style="font-size:11px;font-weight:700;color:#64748b">${escapeHtml(cfg.label)} · spinning…</span></div>
    <div class="basket-spin-slots" id="rnd-slots">${cells}</div>
    <div class="basket-spin-bar"><i></i></div>
  </div>`;
  try{ host.scrollIntoView({behavior:"smooth",block:"nearest"}); }catch(_e){}
  const slots=[...host.querySelectorAll(".rnd-slot")];
  if(slots.length!==slotMeta.length){
    console.error("Mystery basket: slot mismatch", {slots:slots.length,meta:slotMeta.length});
    alert("Spinner UI out of sync — refresh the page.");
    return;
  }
  const idxTime=need+nConstraints;
  const idxChallenge=need+nConstraints+1;
  const stopOrder=[]
    .concat(idxChallenge)
    .concat(Array.from({length:need},(_,i)=>i))
    .concat(Array.from({length:nConstraints},(_,j)=>need+j))
    .concat(idxTime);
  const locked=new Array(slots.length).fill(false);
  const tickMs=48;
  const maxTicks=36+totalSlots*4;
  const stopGapMs=340;
  function spinUnlockedPreview(){
    slots.forEach((s,idx)=>{
      if(locked[idx]) return;
      const k=slotMeta[idx].kind;
      if(k==="ing") s.textContent=pool[randomIndex(pool.length)];
      else if(k==="con"){
        const r=randomUnit();
        if(r<0.45) s.textContent=RESTRICT[randomIndex(RESTRICT.length)];
        else if(r<0.85) s.textContent="✕ "+EQUIP[randomIndex(EQUIP.length)];
        else s.textContent="✓ "+EQUIP[randomIndex(EQUIP.length)];
      }
      else if(k==="time") s.textContent=String(SPIN_AI_TIMES[randomIndex(SPIN_AI_TIMES.length)])+" min";
      else { const ct=ctypePool[randomIndex(ctypePool.length)]; s.textContent=ct.emoji+" "+ct.label; }
      s.style.animation="none";
      void s.offsetWidth;
      s.style.animation="rndSpin .1s ease";
    });
  }
  function finalizeSlot(idx){
    const s=slots[idx];
    const k=slotMeta[idx].kind;
    s.style.animation="none";
    void s.offsetWidth;
    s.style.animation="rndSpin .18s ease";
    if(k==="ing"){
      const name=state.req[idx];
      const cell=s.closest(".basket-spin-cell");
      if(cell){
        const prev=cell.querySelector(".pw-pantry-ing-tooltip");
        if(prev) prev.remove();
      }
      if(name){
        s.textContent=name;
        s.classList.add("rnd-done-ing","basket-ing-hover");
        s.setAttribute("tabindex","0");
        s.setAttribute("title",mysteryBasketIngTitleAttr(name));
        if(cell){
          cell.classList.add("pw-pantry-ing-tip-wrap");
          const tipHtml=mysteryBasketIngTooltipHtml(name);
          if(tipHtml) cell.insertAdjacentHTML("beforeend",tipHtml);
        }
      }else{
        s.textContent="—";
        s.style.opacity="0.5";
        s.classList.remove("basket-ing-hover");
        s.removeAttribute("tabindex");
      }
    }else if(k==="con"){
      const txt=constraints[idx-need]||"—";
      s.textContent=txt;
      if(txt.startsWith("✕ ")) s.classList.add("rnd-done-forb");
      else if(txt.startsWith("✓ ")) s.classList.add("rnd-done-ct");
      else s.classList.add("rnd-done-res");
    }else if(k==="time"){
      s.textContent=(Number(state.total)||0)+" min";
      s.classList.add("rnd-done-time");
    }else{
      s.textContent=state.ctype.emoji+" "+state.ctype.label;
      s.classList.add("rnd-done-ct");
    }
    locked[idx]=true;
  }
  function finishSpinSequence(){
    const bar=host.querySelector(".basket-spin-h span:last-child");
    if(bar) bar.textContent=cfg.label+" · locked in";
    state.mysterySpinLocked=true;
    trackPWEvent("basket_generated", pwParamsBuilder());
    renderBuild();
  }
  let ticks=0;
  const iv=setInterval(()=>{
    ticks++;
    spinUnlockedPreview();
    if(ticks<maxTicks) return;
    clearInterval(iv);
    let step=0;
    function runStopStep(){
      if(step>=stopOrder.length){
        finishSpinSequence();
        return;
      }
      finalizeSlot(stopOrder[step]);
      step++;
      if(step>=stopOrder.length) finishSpinSequence();
      else setTimeout(runStopStep,stopGapMs);
    }
    runStopStep();
  },tickMs);
}

function doRandomize(){
  const d=DIFF[state.diff];
  const nConstraints=Math.max(Number(d.res)||0, Number(d.forb)||0);
  const pool=window.USER_PANTRY||PANTRY;
  const draw=drawUnifiedConstraintsFeasible(nConstraints, pool, d.req);
  state.spinConstraints=sanitizeSpinConstraints(draw.spinConstraints);
  state.res=sanitizeRestrictionList(draw.restrictions);
  state.forbEq=draw.forbEquip;
  rollMustUseEquipment(state.diff, state.forbEq);
  state.lim=false;
  state.cut=d.cut;
  const allTypes=[...CTYPES,...state.customTypes];
  state.ctype=allTypes[randomIndex(allTypes.length)];
  state.req=pickRequiredPattern(pool,d.req,state.res);
  state.req=ensureCourseBasketViability(state.req,state.ctype,state.diff,pool,state.res,pwChaosOrInsane());
  const t=SPIN_AI_TIMES[randomIndex(SPIN_AI_TIMES.length)];
  state.total=t;state.prep=Math.round(t*0.35);state.cook=Math.round(t*0.65);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadAppConfig().then(() => renderLanding());
</script>
