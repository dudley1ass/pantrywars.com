- PHYSICS & TIME: Do not pretend a 2–3 hour braise or full collagen melt happened in the minutes available. Tough cuts (short rib, chuck, brisket, shank, oxtail) need real time or pressure — or you must pivot title/technique (e.g. "bourguignon-inspired" on grilled steak-cut rib; pressure steps only if Instant Pot/pressure is allowed and written). Grill/live fire is not a stable oven; say so if you lean on it for low simmer.\n`;
  }
  if (challengeTypeIsElevateCheap(ch.ctype)) {
    return `CHALLENGE INTENT — ELEVATE A MEAL THAT IS ACTUALLY CHEAP / EVERYDAY:
- CHEAP BASELINE (mandatory): Name one judge-recognizable baseline from the CANONICAL CHEAP / EVERYDAY list in CHALLENGE INTENT (cup noodles, boxed mac, tuna salad, PB&J, dollar-menu burger, etc.) or an equally humble peer. Not a vague SKU ("cheap block tofu") unless tied to a real cheap-food trope (convenience tofu cup, etc.).
- GENRE LOCK: Do NOT default to fine-dining centerpieces (mushroom risotto, luxury composed plates, tweezed tasting courses) unless balance.basket names the BUDGET analogue you upgraded (e.g. "boxed rice/pasta mix → same comforting shape, real technique"). Pantry add-ons must support the cheap-meal arc — not silently replace it with a new restaurant genre.
- TRANSFORMATION LOCK: Elevation = upgrade the SAME dish, not a new recipe. If baseline is tuna salad, the plate stays salad/sandwich/bowl-of-salad logic — seared tuna may appear as chunks folded in, not as a center-plate fillet with unrelated pilaf. If baseline is grilled cheese, it stays a sandwich story — not "deconstructed" into a random entree. Judges must answer "where is the [baseline]?" without guessing.
- UNRELATED BASE BAN: Do not introduce quinoa, farro, freekeh, new "grain bowl" foundations, or composed-entree starch bands that were never part of the cheap meal — those read as chef filler and erase identity unless you explicitly anchored baseline to that shape (e.g. cheap rice bowl from takeout) in sentence 1.
- BEFORE → AFTER: Steps should still feel like that home/kitchen first (open packet, boil water, mix salad, fry slab sandwich) before upgrades — then show elevation (better acid, sear on protein bits IN the dish, better bind, crunchy upgrade to "cheese slice") without erasing the original identity.
- TITLE/TAGLINE: First clause = the cheap starter in plain words; second half = what you did to dignify it — headline still belongs to that starter (e.g. "Elevated tuna salad: …"), not a different dish name.
- PASTA + SAUCE: If the cheap baseline is long pasta with sauce, do not stop at "toss in thin glaze." When you reduce a sauce or gastrique for pasta, include an emulsified finish: reserved pasta water + vigorous toss (or tight technique that achieves the same glossy cling). Call it in steps.
- SWEET BASKET (maple, honey, etc.) ON SAVORY ELEVATE: Pair sweetness with aggressive acid finish, bitter char on veg, or reduction discipline — so judges do not read dessert pasta.
- ELEVATION BAR (mandatory): At least ONE concrete upgrade judges can taste — sear/char on protein pieces, toast or griddle bread, pickle/brine move, real emulsion (egg yolk or jarred mayo named), smash/char/blister on a veg, or a deliberate texture contrast. "Same salad, slightly creamier" without a named technique = failed elevate brief.
- PROTEIN IN SALAD/SANDWICH BASELINES: Do not write only "cook and shred" — name salt, dry rub, sear on pieces folded in, gentle poach, or spice. Depth matters on the clock.
- EMULSION NAMING: Never call heavy cream + lemon "mayonnaise" or "aioli." Mayo/aioli = egg yolk emulsion, aquafaba emulsion, or jarred mayo — or honestly label a lemon cream / crème acidulée.
- REQUIRED VEG WITH TEXTURE (e.g. edamame): Prefer char, smash, blister, or quick fry for contrast — not only raw dice unless the brief forces it.
- SANDWICH BREAD: List real bread (slice, roll, bun) — never loose AP flour as "slices."
- TIMELINE: Step minutes must reflect real active work or stated parallel tasks — not filler rests to pad the clock.\n`;
  }
  if(challengeTypeIsDinerClassic(ch.ctype)){
    return `COURSE LOCK — DINER CLASSIC:
- **Named format first:** judges should think "that's from a diner menu" — Caesar, patty melt, tuna melt, diner spaghetti, fish fry, blue plate — not anonymous noodle fusion.
- Griddle / counter / blue-plate energy — burgers, melts, **counter salads**, fries, shakes (when rules allow). Craveable sear, real melt, **crouton or fry shatter**, creamy or cheesy body — not tweezers or tasting-menu scaffolding.
- **Indulgence + acid:** butter/cheese/creamy dressing/fry crisp **with** pickle, lemon, or hot sauce so it stays diner, not dessert.
- **Texture:** avoid all-soft, all-slick plates — add **crunch** (crouton, chip, crisp bread) when the basket allows.
- balance.complete: one phrase naming diner execution (griddle crust, cheese pull, fry crisp, **wok-toasted crouton**).\n`;
  }
  if(challengeTypeIsStreetFood(ch.ctype)){
    return `COURSE LOCK — STREET FOOD:
- Portable format (wrap, skewer, taco-scale, cup) + bold seasoning. Judges should imagine eating from a stall or standing — not a white-tablecloth pass.
- Avoid entree ceremony: wide moats, multiple quenelles, or full fillet centerpiece — shrink to street scale unless the basket is clearly a big-format share.\n`;
  }
  if(challengeTypeIsFineDining(ch.ctype)){
    return `COURSE LOCK — FINE DINING:
- Restraint: fewer components, more precision; one focal; sauces placed with intent — not maximalist piles.
- balance.texture + balance.visual must justify each element (no orphan dots).
- **Basket integrity vs decoration:** every REQUIRED item needs a **flavor or texture reason** — not only color/contrast crumbles. **Feta / briny cheese** must **earn** its place (whip, warm sauce, vinaigrette, fold into purée, sear) — not **sprinkle-only** next to sweet maple/rich fat unless balance.flavor names the bridge.
- **Okra:** treat as **mucilaginous** — not cauliflower purée; do not **sauté then blend** alone and expect silk; use **dry roast/char**, **acid**, **pickle**, or **crisp-fry** before purée.
- **Pork belly:** **crispy/crackling** from **raw** needs **real render time** (often **25–35+ min** in air fryer for cubes; longer for thick) — align step **dur** with physics or use **pre-cooked / pressure / thin-slice sear** honestly.\n`;
  }
  if(challengeTypeIsComfortReinvented(ch.ctype)){
    const forb=(ch.forbEquip||[]).map(x=>String(x).toLowerCase()).join(" ");
    const noOven=/\boven\b/.test(forb);
    const noSheet=/sheet\s*pan/.test(forb);
    const ovenSheetLock=(noOven||noSheet)
      ?`- **NO OVEN / NO SHEET PAN + pie or pot-pie story:** you cannot bake a classic crust — fake **pot pie EXPERIENCE** on the stovetop: **pan-crisp couscous** or **toasted grain "lid"**, **griddled tortilla/phyllo**, **smashed/crisp potato top**, or **crumb crisp** — name the **crust substitute** in balance.basket; do not serve "stew + sweet gravy" and call it pot pie.\n`
      :"";
    const hardDiff=["hard","insane"].includes(String(ch.diff||"").toLowerCase());
    const hardText=hardDiff
      ?`- **HARD:** require **texture contrast** — not all boil/soft/mush; crisp or char at least one anchor (potato, protein surface, or grain).\n`
      :"";
    return `COURSE LOCK — COMFORT FOOD REINVENTED:
- NAMED comfort baseline first (mac & cheese, pot pie, baked pasta, casserole) — then one clear twist. Still recognizable comfort; not a new genre.
- balance.basket must lead with "Comfort baseline: … — twist: …"
- **Reinvention = experience + cohesion**, not only removing the crust and adding sugar. If the basket has **marshmallow**, it is NOT allowed as **dessert gravy** or **sweet drizzle spine** — use **heat**, **binder**, or **micro** salty-sweet integrated into the filling/top.
- **Salt + umami stack** (anchovy + puffs, miso + soy, etc.): **minimize table salt**; push **acid** and **herb/raw** contrast in balance.flavor and steps.
- **Freshness:** one **bright** element (citrus, herb, pickle, raw veg) on rich comfort — mandatory for competition balance.
- **Split-use veg:** edamame/peas/cauliflower/lotus/potato → two textures when the haul allows — name both in balance.basket.
${ovenSheetLock}${hardText}`;
  }
  if(challengeTypeIsGlobalCuisine(ch.ctype)){
    return `COURSE LOCK — GLOBAL CUISINE:
- ONE cuisine lane (e.g. Italian, Thai, Mexican, West African) + honest flavor grammar (aromatics, spice order, technique markers). No "fusion" without naming the tradition you are cooking from.
- balance.basket sentence 1 must name the lane + one backbone technique or flavor system.
- **Avoid the cliché global bowl** as the only move: grain + plant protein + charred chile + bowl — unless you **elevate format** (crisp base, tostada, street pickup, layered contrast) or **justify** why this lane is the only honest read for the basket.
- **Tradition labels:** if title/tagline says **al pastor**, **carnitas**, etc., steps must show **credible technique** (dried chiles/achiote depth, serious sear, honest trompo/inspired-by language) — or rename to **citrus-cumin tempeh**, **inspired-by pastor**, etc.\n`;
  }
  return "";
}

/** Universal: basket-as-a-whole → flavor direction → roles (before category defaults like “protein = main”). */
function basketFlavorLeadershipBlock(ch){
  const lab=(ch.ctype&&ch.ctype.label)?String(ch.ctype.label):"this challenge";
  const id=String((ch.ctype&&ch.ctype.id)||"");
  const labelLow=String((ch.ctype&&ch.ctype.label)||"").toLowerCase();
  const isDessert=id==="dessert"||/\bdessert\b/.test(labelLow);
  const isElevate=challengeTypeIsElevateCheap(ch.ctype);
  const isRecreate=challengeTypeIsRecreateClassic(ch.ctype);
  const isDiner=challengeTypeIsDinerClassic(ch.ctype);
  const isStreet=challengeTypeIsStreetFood(ch.ctype);
  const isFine=challengeTypeIsFineDining(ch.ctype);
  const isComfortRev=challengeTypeIsComfortReinvented(ch.ctype);
  const isGlobal=challengeTypeIsGlobalCuisine(ch.ctype);
  let out=`CHEF PROCESS — FLAVOR & HIERARCHY FIRST (do this mentally before JSON):
- Banned mindset: "How do I give every ingredient equal prominence?" Better: "What is the most believable flavor direction for this entire basket under ${lab}? What should lead; what should support; what is accent-only?"
- Order: (1) Scan ALL required items together — what naturally pairs or clusters? (2) Name one clearest dish identity / flavor lane (what you'd pitch in one breath). (3) Pick ONE primary foundation. (4) Assign each REQUIRED to: PRIMARY FOUNDATION, SUPPORTING, ACCENT/GARNISH, or MINIMAL-USE — the last is for honest trace/chip/pinch when an item fights the lane, not co-equal billing.
- Anchor rule: Choose the best dish first, then fit ingredients into it. Do NOT assign roles from category alone (protein / veg / dairy) and then force a concept — especially do not default "protein ⇒ centerpiece."
- Conflicts: commit to a dominant path; limit ingredients that don't fit that path (still present, still true to the SKU).
- Rank what matters: (1) dish identity (2) flavor logic (3) realism on time (4) basket integrity — integrity means each item appears honestly, NOT equal portion for all.

`;
  if(isRecreate){
    out+=`RECREATE A CLASSIC — FLAVOR NORTH STAR Pick ONE dish a civilian could name (fish and chips, chicken parm, pad thai, etc.). Every choice must answer: "Does this still read as THAT classic to a judge?" Basket items are forced substitutions inside that frame — not an excuse to invent a new center of the plate.
- If the classic's defining cook is longer than the round allows, respect physics: pivot to "inspired by," change the cut, or use pressure — do not claim the textbook dish on a fantasy timeline.

`;
  }
  if(isElevate){
    out+=`ELEVATE A CHEAP MEAL — FLAVOR NORTH STAR: Humble recognizable food first (what a $3–$10 meal looks like), then better technique and basket items on THAT SAME DISH — not a new cuisine’s fine-dining default. If your gut says "risotto," "quinoa pilaf," or "composed entree with protein anchor," STOP — unless the cheap anchor was literally that dish class (e.g. packet rice bowl) and you named it in sentence one.
- Good pattern: "tuna salad" → seared tuna cubes folded in, edamame, maple vinaigrette, halloumi crisp instead of bland cheese slice — still reads as tuna salad.
- Bad pattern: "tuna salad" on the label, then quinoa pilaf + seared steak-cut tuna + entree plating — baseline disappeared; that is replacement.
- Jar-sauce / spaghetti night: give judges one "nostalgia" thread — tomato (paste or charred), dried herbs that read marinara, or explicit "our jar-sauce night but…" so it is not generic noodles.
- Long pasta + built sauce: finish emulsified (starchy pasta water + toss) for restaurant cling, not a thin coating from a quick toss in loose liquid.
- Elevation bar: one named technique upgrade (sear, toast, pickle, emulsion with real base, char on veg) — "nicer dressing" alone is not enough.
- Sandwiches/salads with chicken or other protein: name the cook (sear pieces, poach, spice rub) — not only "cook and shred."
- Firm veg in the basket (edamame, etc.): give a texture plan — char, smash, blister — when raw chop is the lazy default.

`;
  }
  if(isDessert){
    out+=`DESSERT — LEAD WITH SWEET: Default hierarchy = PRIMARY sweet structure (shell, custard, cake, fruit, chocolate, caramel) → SUPPORTING sweet/sour bridge (e.g. compote, curd) → SUPPORTING odd produce → ACCENT/MICRO only for savory plant protein or aggressive umami. If a required item still reads savory when crisp (tempeh, etc.), shrink it until it behaves like nuts or toasted spice — not a second theme.

`;
  }
  if(challengeTypeIsSnack(ch.ctype)){
    out+=`SNACK — FLAVOR SERVES FORMAT: Valid basket pairings must be EXECUTED at bite scale. Same ingredients can win if shrunk to one pickup (toast square, mini tart, skewer): fish as flake not fillet, caramel as smear not pool, cream as micro not quenelle. Do not let good flavor logic excuse entree-weight or entree plating.

`;
  }
  if(isDiner){
    out+=`DINER CLASSIC — FLAVOR NORTH STAR: **Menu-name identity** + craveable fat + crisp. Lead with **recognizable formats** (patty melt, **Caesar**, tuna melt, diner spaghetti, fish fry) — not "balanced fusion" with no diner headline. **Indulgence** (cheese, butter, creamy dressing, fry oil) is on-brief when checked by acid (lemon, pickle). If the haul has **anchovy + lemon + sesame oil** and **Wok**, seriously consider **counter Caesar** with **wok-toasted sesame croutons** as the star wok move — before defaulting to stir-fry noodles.

`;
  }
  if(isStreet){
    out+=`STREET FOOD — FLAVOR NORTH STAR: Loud, portable, honest char/chile/acid. One handheld story — not a composed entree with fork-and-knife energy.

`;
  }
  if(isFine){
    out+=`FINE DINING — FLAVOR NORTH STAR: Restraint + clarity. One focal flavor, precise sauce, intentional garnish — fewer ideas, better execution.

`;
  }
  if(isComfortRev){
    out+=`COMFORT REINVENTED — FLAVOR NORTH STAR: Name the home dish first (mac, pot pie, etc.), then the twist. Judges must still taste "that" dish — not a new restaurant genre.
- **Sodium:** if anchovy, cheese puffs, cured meat, miso, crab, or snack crisps share the plate, **salt is a design problem** — under-season with table salt; over-deliver **lemon, vinegar, herbs, pickle**.
- **Fresh punch:** creamy comfort needs **acid + green** (herb, citrus, raw allium, arugula) — not only brown/beige layers.
- **Two ways:** edamame/peas/cauliflower/lotus → **split** (purée + whole, blister + fold) when the clock fits — shows craft.

`;
  }
  if(isGlobal){
    out+=`GLOBAL CUISINE — FLAVOR NORTH STAR: Pick ONE tradition and honor its grammar (aromatics, heat, acid, herbs). Basket maps into that lane — not vague "international flavors."
- **Creativity bar:** the obvious lane (e.g. Latin chile + tempeh + quinoa → Tex-Mex bowl) is **crowded** — push **texture contrast**, **street/snack format**, or a **second-plausible region** when ingredients allow (still honest to the lane you name).
- **Named classics in the title:** do not use **al pastor / carnitas / adobo** as marketing if the cook is only a quick citrus marinade — judges will cut you; say **inspired-by** or build real chile depth.

`;
  }
  return out;
}

/** Course-first ingredient roles (not “protein = centerpiece” globally). Feeds rival-chef prompt. */
function courseRoleHierarchyBlock(ch){
  const ctype=ch.ctype||{};
  const id=String(ctype.id||"");
  const label=String(ctype.label||"").toLowerCase();
  if(id==="dessert"||/\bdessert\b/.test(label)){
    return `ROLE HIERARCHY — DESSERT (context → roles → ingredients):
- Wrong default: "there is meat/cured pork in the basket, therefore it is the main." Right default: course picks the STAR. For dessert, PRIMARY = sweet backbone (ice cream/gelato, mousse, curd, tart shell, panna cotta, chocolate base, marshmallow whip, honey caramel, compote — from REQUIRED or pantry).
- Animal proteins & charcuterie (prosciutto, ham, bacon, etc.) = ACCENT or TEXTURE only: crisp shard, friable sprinkle, salted crackling on TOP, paper-thin chip garnish — NOT the conceptual center. Judges should hear the dessert first ("white chocolate ice cream with prosciutto crackling"), not "prosciutto plate with sweet notes."
- Eggs, silken tofu, and soy milk may carry PRIMARY only as the homogeneous sweet body (custard/pudding/curd/cake) — spoon must read dessert. Tempeh, seitan, firm tofu pieces: MICRO-ACCENT only (whisper, single placement); do not repeat on tart, filling, and sauce. Never let them steal the first bite from maple, pastry, or fruit.
- Odd veg (hearts of palm, tomato, etc.) = SUPPORT for bridge or acid — not a savory salad exit; pair with fewer other concepts (see EXPERIMENTAL BRIDGES in course lock).
- balance.basket must assign each REQUIRED item an explicit role label in prose: PRIMARY (sweet spine), SUPPORT (bridge/fruit/herb), ACCENT (contrast), MICRO-ACCENT (savory plant bits), one short phrase per item. If multiple sweets exist, pick ONE PRIMARY sweet story; others merge or become SUPPORT.
- Title/tagline should read as a dessert; savory REQUIRED items appear as "with …" / "finished with …" / "crackling on top," not as the dish's noun head.\n`;
  }
  if(challengeTypeIsRecreateClassic(ctype)){
    return `ROLE HIERARCHY — RECREATE A CLASSIC:
- PRIMARY = ONE named classic dish (standard menu name: e.g. fish and chips, chicken parmesan, cassoulet). The whole plate is an execution of THAT identity — recognition beats novelty.
- SUPPORTING / ACCENT = basket and pantry items mapped into the classic's usual architecture (cutlet + sauce + cheese for parm; battered fish + chips + acidic note for fish & chips; etc.). Do not dissolve the classic into a generic "composed" plate.
- BANNED: treating the challenge as "original restaurant concept" while only nodding at a cuisine. Title head noun should signal the classic ("our fish and chips…", "chicken parm from the basket…").
- TIME-HONEST NAMING: If you cannot deliver the classic's real technique on the clock, the title/tagline must signal the pivot ("bourguignon flavors on grilled short rib," "cassoulet-inspired bowl") — not "beef bourguignon" with a 25-minute pretend braise.
- FRY-FORWARD CLASSICS + **Grill** must-use (e.g. fish and chips): treat the grill as heat for **cast-iron / plancha on the grates** with oil — fish should not be a fragile crumb **directly on open grates**; chips/subs need **crisp** (shallow fry, roast-to-crisp, twice-cook), not only soft grilled planks. **Batter** must be hydrated (flour + liquid) or a stated honest mapping (e.g. polenta + chocolate bloomed with fat for malt note) — not egg wash + dry dredge called “batter.”
- balance.basket: sentence 1 MUST name the classic + one-line how the basket twists it without erasing the dish. Then tag each REQUIRED with how it maps to that classic's usual components.\n`;
  }
  if(challengeTypeIsElevateCheap(ctype)){
    return `ROLE HIERARCHY — ELEVATE A CHEAP MEAL:
- PRIMARY = the upgraded CHEAP / EVERYDAY DISH itself (same identity — better execution). The star is "ramen but actually great," "tuna salad but actually great," "boxed mac but from scratch technique," not a different restaurant dish that borrowed one basket item.
- SUPPORTING = pantry and technique that directly serve that baseline (better fat, acid, allium, stock technique, better protein treatment INSIDE that format) — not a parallel fine-dining storyline or unrelated starch anchor.
- Protein in a salad/sandwich baseline: stays IN that format (chunks folded into salad, better sear on pieces you fold in) — never steal the dish with center-plate fillet + sides unless baseline was already entree-class.
- BANNED as brief-killing move: picking a refined template (classic risotto, quinoa pilaf, luxury plated entree) and using a required item only as cream/emulsifier while omitting a named cheap starter — or while erasing the baseline's visible form. If you truly need a rice technique, name the budget packet/side dish that justified it.
- JAR-SAUCE / WEEKNIGHT PASTA: If baseline is spaghetti + jar sauce (or peer), the eat must still cue "cheap red sauce night" somewhere — tomato paste, charred tomato, classic dried herbs, or explicit callout — not anonymous glossy pasta.
- LONG PASTA: If saucing spaghetti/linguine/etc., include emulsified finish (reduce + pasta water + toss) in steps when a sauce coats the noodles — not only a loose toss in unthickened liquid.
- ELEVATION BAR: Name at least one concrete upgrade (sear/char, toast, pickle, real emulsion, texture contrast on a required veg) in balance.basket or steps — "slightly better mix" alone fails the brief.
- EMULSION / BREAD: Mayonnaise or aioli = egg yolk, jarred mayo, or honest emulsion — not cream + lemon alone. Sandwiches list real bread — never flour by the slice.
- balance.basket: sentence 1 MUST be "Cheap baseline: [specific] → elevation: [one sentence — same dish]." Sentence 2 MUST state in plain words how the plate STILL reads as that baseline ("still a tuna salad in the bowl," "still a grilled cheese you can pick up," etc.). Then tag each REQUIRED with how it serves THAT baseline.\n`;
  }
  if(id==="appetizer"||/\bappetizer\b/.test(label)){
    return `ROLE HIERARCHY — APPETIZER:
- PRIMARY = the single starter story (composed bite, veg base, tartlet, dip, broth cup). Protein/cured fish/charcuterie often ACCENT (shaving, crisp, tartare quenelle, thin slice on crostini) unless the basket is clearly protein-anchored.
- Do not plate entree portions. balance.basket: name PRIMARY vs ACCENT vs SUPPORT for each REQUIRED item in one clause each.\n`;
  }
  if(id==="snack"||/\bsnack\b/.test(label)){
    return `ROLE HIERARCHY — SNACK:
- PRIMARY = the single bite or handheld format (one crostini / mini tart shell / vol-au-vent / skewer line / small slider). The dish is that vehicle — not "a plate with many components."
- Fish / meat / poultry from the basket = flake, dice, thin slice, or nugget ON that vehicle — ACCENT-SCALE protein, never a fillet or breast portion that owns the plate.
- Pastry / starch = small crisp base or one enclosure — not a full tart entrée with entree fillings; puff as small square or cup, not a slice of pie service.
- Sweet elements (chocolate, fruit, caramel) = pin-dot, smear, or thread — not dessert service beside a fish main.
- SECONDARY layers: at most one sauce/accent visible on the bite; avoid tasting-menu moats + quenelles + shards scattered like a main.
- balance.basket: name the pickup format first; then tag each REQUIRED as it fits the BITE (base / flake / smear / trace) — explicit that no full protein portion is the center.\n`;
  }
  if(challengeTypeIsDinerClassic(ctype)){
    return `ROLE HIERARCHY — DINER CLASSIC:
- PRIMARY = **named diner format** — griddled sandwich / burger / melt OR **counter Caesar (or other big-bowl salad)** OR crisp fries + anchor protein OR **diner pasta plate** — diner legibility beats chef abstraction.
- If **Wok** is must-use: PRIMARY wok work must be **starring** (stir-fry main, **wok-toasted croutons/bread**, wok-char on a main element) — not only wilting garnish while a pot boils pasta unless the title is honest **diner spaghetti** and wok earns its line another way.
- SUPPORT = cheese melt, pickle, onion, **creamy dressing**, sauce that reads counter-service — not three unrelated sauces.
- balance.basket: name **which classic** + griddle/counter story + **crisp story** (fries, hash, **crouton**) in one breath.\n`;
  }
  if(challengeTypeIsStreetFood(ctype)){
    return `ROLE HIERARCHY — STREET FOOD:
- PRIMARY = handheld vehicle (tortilla, bao, skewer line, paper cup bowl) + bold flavor spine.
- Protein = chopped / sliced for bite or skewer — not a standalone steak service.
- balance.basket: portability first; then tag each REQUIRED to filling / salsa / pickle / crunch.\n`;
  }
  if(challengeTypeIsFineDining(ctype)){
    return `ROLE HIERARCHY — FINE DINING:
- PRIMARY = one focal (protein OR veg OR sauce architecture) — others SUPPORT with discipline.
- ACCENT = micro garnish, dots, oils — not competing entrées on one plate.
- balance.basket: state focal + supporting in one sentence; cap visible elements.\n`;
  }
  if(challengeTypeIsComfortReinvented(ctype)){
    return `ROLE HIERARCHY — COMFORT REINVENTED:
- PRIMARY = the comfort dish identity (mac, pot pie shell + filling, baked pasta) — twist is technique or one basket swap, not a new dish name.
- SUPPORT = pantry that reinforces creaminess, crust, or nostalgia — not unrelated starch bands.
- **Salty stack:** if REQUIRED combines high-sodium items (anchovy + puffs, etc.), ACCENT = acid/herb — PRIMARY sauce must not also max salt without naming the fix.
- **Veg with range:** edamame / peas / cauliflower / lotus — map **PRIMARY/SUPPORT** to two techniques when possible (e.g. purée base + whole fold).
- balance.basket: "Comfort baseline: … — twist: …" then roles per REQUIRED + **salt/acid/fresh** one-liner.\n`;
  }
  if(challengeTypeIsGlobalCuisine(ctype)){
    return `ROLE HIERARCHY — GLOBAL CUISINE:
- PRIMARY = one tradition-appropriate anchor (noodle, curry, taco, braise, wok toss) matching the named lane.
- Basket items map to roles THAT cuisine expects (acid, heat, herb, coconut, etc.) — state the mapping plainly.
- balance.basket: cuisine lane + backbone technique first; then each REQUIRED tagged to classic roles in that cuisine.\n`;
  }
  return `ROLE HIERARCHY — ENTRÉE / SAVORY MAIN (& most non-dessert challenges):
- PRIMARY is often protein when the basket supports it — but starch-forward (risotto, pasta, pie) or veg-forward mains are valid; do not force protein to headline if the haul points elsewhere.
- Cured meats, bacon, secondary proteins can be ACCENT (lardon, crisp, garnish) rather than owning the title.
- balance.basket: for each REQUIRED, state PRIMARY / ACCENT / SUPPORT in plain language so judges see hierarchy — avoid "everything co-equal important."\n`;
}

function toggleTimer(){

  else{
    state.timerRunning=true;$("timer-toggle").textContent="Pause";$("timer-toggle").style.background="#ef4444";
    const total=state.challenge.totalTime*60;
    state.timerInterval=setInterval(()=>{
      state.timerRem=Math.max(0,state.timerRem-1);

      const col=pct>0.5?"#22c55e":pct>0.25?"#f59e0b":"#ef4444";

      if(td){td.textContent=formatTime(state.timerRem);td.style.color=col;}

    },1000);
  }

/** Normalize AI JSON for custom pantry rows so they carry the same optional fields as FULL_PANTRY (cookSheet, clock playbooks, toolkits, cook matrix, technique matrix). */
function normalizeCustomPantryFromAi(data){
  const src=data&&typeof data==="object"?data:{};
  const flavorSet=new Set(["sweet","salty","sour","bitter","umami","savory","gamey","rich","briny","smoky","mild"]);
  const textureSet=new Set(["crunchy","soft","creamy","juicy","firm","tender","flaky","silky","loose","chewy","snappy","dense","crispy","meaty","leafy","stringy"]);
  const richnessOk=new Set(["lean","medium","rich"]);
  const acidityOk=new Set(["none","mild","high"]);
  const intensityOk=new Set(["mild","medium","strong"]);
  const tmKeys=["sear","sliceThin","grind","quickBraise","sousVide","slowCook"];
  const flavorSrc=Array.isArray(src.flavor)?src.flavor:(Array.isArray(src.tags)?src.tags:[]);
  const flavor=flavorSrc.map(x=>String(x).toLowerCase()).filter(x=>flavorSet.has(x));
  const flavor2=flavor.length?flavor.slice(0,4):["mild"];
  const texture=(Array.isArray(src.texture)?src.texture:[]).map(x=>String(x).toLowerCase()).filter(x=>textureSet.has(x)).slice(0,6);
  let richness=String(src.richness||"lean").toLowerCase();
  if(!richnessOk.has(richness)) richness="lean";
  let acidity=String(src.acidity||"none").toLowerCase();
  if(!acidityOk.has(acidity)) acidity="none";
  let intensity=String(src.intensity||"mild").toLowerCase();
  if(!intensityOk.has(intensity)) intensity="mild";
  const cat=String(src.category||CUSTOM_PANTRY_CAT).trim()||CUSTOM_PANTRY_CAT;
  const notesRaw=String(src.notes||"Added to your pantry.").trim();
  const notes=notesRaw.length>500?notesRaw.slice(0,500):notesRaw;
  const trimCap=(s,max)=>{const t=String(s||"").trim();return t.length>max?t.slice(0,max):t;};
  const cookSheet=trimCap(src.cookSheet,800);
  const clockPlaybookAi=trimCap(src.clockPlaybookAi,650);
  const clockPlaybook=trimCap(src.clockPlaybook,1200);
  const ingredientToolkitAi=trimCap(src.ingredientToolkitAi,450);
  const ingredientToolkit=trimCap(src.ingredientToolkit,2000);
  const cookMatrixAi=trimCap(src.cookMatrixAi,420);
  const cmSrc=(src.cookMatrix&&typeof src.cookMatrix==="object")?src.cookMatrix:{};
  const cmFast=trimCap(cmSrc.fast,80);
  const cmMedium=trimCap(cmSrc.medium,80);
  const cmLong=trimCap(cmSrc.long,80);
  const cmNoCook=trimCap(cmSrc.noCook,20);
  const cmBest=trimCap(cmSrc.bestShortClock,120);
  const cmAvoid=trimCap(cmSrc.avoidShortClock,120);
  const cookMatrix=(cmFast||cmMedium||cmLong||cmNoCook||cmBest||cmAvoid)
    ?{
      fast:cmFast||"3–10 min",
      medium:cmMedium||"10–20 min",
      long:cmLong||"20+ min",
      noCook:cmNoCook||"limited",
      bestShortClock:cmBest||"one fast method",
      avoidShortClock:cmAvoid||"long multi-stage builds",
    }
    :null;
  let techniqueMatrix=null;
  if(src.techniqueMatrix&&typeof src.techniqueMatrix==="object"){
    const o={};
    let any=false;
    for(const k of tmKeys){
      const v=src.techniqueMatrix[k];
      if(v!=null&&String(v).trim()){ any=true; o[k]=String(v).trim().slice(0,48); }
    }
    if(any){
      techniqueMatrix={};
      for(const k of tmKeys) techniqueMatrix[k]=o[k]!=null?o[k]:"—";
    }
  }
  const row={cat,flavor:flavor2,texture,richness,acidity,intensity,notes,custom:true};
  if(cookSheet) row.cookSheet=cookSheet;
  if(clockPlaybookAi) row.clockPlaybookAi=clockPlaybookAi;
  if(clockPlaybook) row.clockPlaybook=clockPlaybook;
  if(ingredientToolkitAi) row.ingredientToolkitAi=ingredientToolkitAi;
  if(ingredientToolkit) row.ingredientToolkit=ingredientToolkit;
  row.cookMatrixAi=cookMatrixAi||defaultCookMatrixAiForMeta(row, String(src.name||src.label||""));
  row.cookMatrix=cookMatrix||{
    fast:"3–10 min",
    medium:"10–20 min",
    long:"20+ min",
    noCook:"limited",
    bestShortClock:"one fast method",
    avoidShortClock:"long multi-stage builds",
  };
  if(techniqueMatrix) row.techniqueMatrix=techniqueMatrix;
  const mcm=Number(src.minClockMinutes);
  if(Number.isFinite(mcm)&&mcm>0&&mcm<=600) row.minClockMinutes=Math.round(mcm);
  return row;
}

function doModalAdd(data){
  const t=state.modalType;
  if(t==="type"){const nt={id:"c"+Date.now(),label:data.label||data.name,emoji:data.emoji||"🍴",custom:true};state.customTypes.push(nt);state.ctype=nt;}
  else if(t==="ingredient"){const n=data.name||data.label;if(n&&!state.req.includes(n)){if(ingredientConflictsWithAny(n,state.res)){alert("That ingredient conflicts with a restriction (e.g. dairy under No Dairy).");return;}state.req.push(n);onBasketModified();}}
  else if(t==="pantry_item"){
    const n=(data.name||data.label||"").trim();
    if(!n){closeModal();refreshAfterModalAdd();return;}
    const low=n.toLowerCase();
    if(pantryCatalog().some(x=>x.name.toLowerCase()===low)){alert("That ingredient is already in the list (built-in or yours).");closeModal();refreshAfterModalAdd();return;}
    const id="pc_"+Date.now();
    const base=normalizeCustomPantryFromAi(data);
    base.id=id;
    base.name=n;
    state.customPantryItems.push(base);
    if(!state.pantryItems.includes(id))state.pantryItems.push(id);
    state.activePantryPreset = "custom";
  }
  else if(t==="restriction"){
    const n=normalizeRestrictionKey(data.label);
    if(n&&!state.res.includes(n)){state.res=sanitizeRestrictionList([...state.res,n]);onBasketModified();}
    pruneConflictingReq(DIFF[state.diff]);
  }
  else if(t==="equipment"){const n=data.label;if(n&&!state.reqEq.includes(n))state.reqEq.push(n);}
  closeModal();refreshAfterModalAdd();
}

function doModalAddFromPending(){

function ingredientConflictsWithRestriction(ingName, restriction){
  restriction=normalizeRestrictionKey(restriction);
  const n=String(ingName||"").toLowerCase();
  const m=pantryCatalog().find(x=>String(x.name||"").toLowerCase()===n);
  const cat=String((m&&m.cat)||"").toLowerCase();

  if(restriction==="No Dairy"){
    if(/\b(heavy cream|half\s*and\s*half|cream cheese|sour cream|cream|milk|buttermilk|butter|cheese|yogurt|kefir|mozzarella|feta|parmesan|pecorino|goat cheese|ricotta|cheddar|brie|halloumi|crema|queso|ghee|whey|paneer)\b/i.test(n)) return true;
    if(/dairy|cheese/.test(cat)) return true;
    return false;
  }
  if(restriction==="No Butter"){
    if(/\bbutter\b|ghee|brown butter/i.test(n)) return true;
    return false;
  }
  if(restriction==="No Gluten"){
    const nl=String(n||"").toLowerCase();
    if(/\b(gluten[\s-]?free|certified\s+gf|\bg[\s/.]*f[\s/.]*)\b/i.test(nl)) return false;
    if(/\b(rice\s+noodles?|brown\s+rice\s+noodles?|rice\s+vermicelli|glass\s+noodles?|mung\s+bean|bean\s+thread|konjac|shirataki|sweet\s+potato\s+noodles?)\b/i.test(nl)) return false;
    if(/\b(flour|wheat|pasta|spaghetti|bread|couscous|barley|rye|semolina|udon|ramen|farro|bulgur)\b/i.test(nl)) return true;
    if(/\ball[\s-]?purpose\b/i.test(nl)) return true;
    if(/\bsoy sauce\b/i.test(nl)&&!/\b(gluten[\s-]?free|tamari)\b/i.test(nl)) return true;
    if(/\binstant\s+noodles?\b/i.test(nl)) return !/\b(gluten[\s-]?free|gf|rice|mung|buckwheat)\b/i.test(nl);
    if(/\begg\s+noodles?\b/i.test(nl)||/\bwheat\s+noodles?\b/i.test(nl)) return true;
    if(/\bnoodles?\b/i.test(nl)){
      if(/\b(rice|glass|mung|bean|sweet\s+potato|konjac|shirataki|brown\s+rice)\b/i.test(nl)) return false;
      if(/\b(gluten[\s-]?free|gf)\b/i.test(nl)) return false;
      return true;
    }
    return false;
  }
  if(restriction==="No Sugar"){
    /** No granulated sugar (white or brown) and no powdered/confectioners. OK: honey, maple, caramel, molasses, syrups, chocolate bar, etc. */
    const nl=String(ingName||"").toLowerCase();
    const raw=String(ingName||"");
    if(/\bsugar\s+snap\b/i.test(nl)) return false;
    if(/\bsugar\s+pumpkin\b/i.test(nl)) return false;
    if(/\b(powdered|confectioners?|icing)\s+sugar\b/i.test(nl)) return true;
    if(/\b(granulated|table)\s+sugar\b/i.test(nl)) return true;
    if(/\b(white)\s+sugar\b/i.test(nl)) return true;
    if(/\b(caster|castor|superfine)\s+sugar\b/i.test(nl)) return true;
    if(/\bbrown\s+sugar\b/i.test(nl)) return true;
    if(/\bsugar\s*\(\s*brown\s*\)/i.test(raw)) return true;
    if(/\bcane\s+sugar\b/i.test(nl)) return true;
    if(/\bcoconut\s+sugar\b/i.test(nl)) return true;
    if(/\bturbinado(?:\s+sugar)?\b/i.test(nl)) return true;
    if(/\bdemerara(?:\s+sugar)?\b/i.test(nl)) return true;
    if(/^\s*sugar\s*$/i.test(raw.trim())) return true;
    return false;
  }
  if(restriction==="No Pre-made Sauces"){
    if(/\b(soy sauce|fish sauce|worcestershire|oyster sauce|hoisin|sriracha|ketchup|bbq sauce|teriyaki)\b/i.test(n)) return true;
    if(/\b(crushed tomatoes|tomato paste|mustard|vinegar)\b/i.test(n) && /\b(canned|jarred|bottle)\b/i.test(cat)) return true;
    return false;
  }
  if(restriction==="No Alcohol"){
    if(/\bvinegar\b/i.test(n)) return false;
    if(/\b(beer|bourbon|whiskey|rum|vodka|brandy|sake|liqueur|alcohol)\b/i.test(n)) return true;
    if(/\bwine\b/i.test(n)) return true;
    return false;
  }
  if(restriction==="No Nuts"){
    if(/\b(almond|peanut|cashew|pistachio|pecan|walnut|hazelnut|pine nut|macadamia|pesto)\b/i.test(n)) return true;
    if(/nuts\s*&\s*seeds/i.test(cat)) return true;
    return false;
  }
  if(restriction==="Vegetarian"){
    if(/\b(chicken|beef|pork|lamb|turkey|duck|salmon|tuna|cod|halibut|trout|fish|shrimp|prawn|crab|lobster|scallops?|mussels?|clams?|anchov(?:y|ies)|sardines?|bacon|sausage|prosciutto|chorizo|ground beef|steak|oxtail|veal)\b/i.test(n)) return true;
    if(cat==="proteins" && !/\b(egg|tofu|tempeh|bean|chickpea|lentil)\b/i.test(n)) return true;
    return false;
  }
  if(restriction==="Vegan"){
    if(ingredientConflictsWithRestriction(ingName,"No Dairy")) return true;
    if(ingredientConflictsWithRestriction(ingName,"No Butter")) return true;
    if(/\b(egg|eggs|honey|gelatin|mayo)\b/i.test(n)) return true;
    if(ingredientConflictsWithRestriction(ingName,"Vegetarian")) return true;
    return false;
  }
  if(restriction==="No Salt"){
    // "No Salt" bans explicit added salt products, not naturally salty foods.
    if(/\b(kosher\s+salt|sea\s+salt|table\s+salt|pink\s+salt|himalayan\s+salt|flaky\s+salt|finishing\s+salt|celery\s+salt|seasoned\s+salt|garlic\s+salt|onion\s+salt|salt)\b/i.test(n)) return true;
    return false;
  }
  return false;
}

function ingredientConflictsWithAny(ingName, restrictions){
  return (restrictions||[]).some(r=>ingredientConflictsWithRestriction(ingName,r));
}

/** Ingredient lines only — title vs list consistency checks. */
function recipeIngredientListText(r){
  if(!r||!Array.isArray(r.ingredients)) return "";
  return (r.ingredients||[]).map(i=>{
    if(!i) return "";
    return [i.item,i.prep,i.amount].filter(Boolean).join(" ");
  }).filter(Boolean).join(" ").toLowerCase();
}

/** Flatten AI recipe JSON for restriction scanning (rival + contest coach shapes). */
function recipeFlattenTextForCompliance(r){
  if(!r||typeof r!=="object") return "";
  const parts=[];
  const push=x=>{if(x!=null&&String(x).trim())parts.push(String(x));};
  push(r.title);push(r.tagline);push(r.plating);push(r.tip);
  push(r.atThePass);push(r.flavorBalance);push(r.lastMinuteTip);
  const b=r.balance;
  if(b&&typeof b==="object") for(const v of Object.values(b)) push(v);
  for(const i of r.ingredients||[]){
    if(!i) continue;
    const line=[i.item,i.prep,i.amount].filter(Boolean).join(" ").trim();
    push(line);
  }
  for(const s of r.steps||[]){
    if(!s) continue;
    push(s.phase);push(s.what);push(s.how);
  }
  return parts.join("\n").toLowerCase();
}

/** Ingredient lines only — for bread/flour sanity checks. */
function recipeIngredientLinesForCompliance(r){
  if(!r||!Array.isArray(r.ingredients)) return "";
  return r.ingredients.map(i=>{
    if(!i) return "";
    return [i.amount,i.item,i.prep].filter(Boolean).join(" ").trim();
  }).filter(Boolean).join(" | ").toLowerCase();
}

/** Step lines only — for integration-depth and sequencing heuristics. */
function recipeStepLinesForCompliance(r){
  if(!r||!Array.isArray(r.steps)) return "";
  return r.steps.map(s=>{
    if(!s) return "";
    return [s.time,s.dur,s.phase,s.what,s.how].filter(Boolean).join(" ").trim();
  }).filter(Boolean).join(" | ").toLowerCase();
}

function scrubComplianceFalsePositives(low){
  return String(low||"")
    .replace(/\bbutter\s+lettuce\b/gi," ")
    .replace(/\bcream\s+of\s+tartar\b/gi," ")
    .replace(/\b(coconut|cashew|almond|soy|oat)\s+cream\b/gi," __plantcream__ ")
    .replace(/\b(oat|almond|soy|cashew|coconut|hemp)\s+milk\b/gi," __plantmilk__ ")
    .replace(/\bpeanut\s+butter\b/gi," __pb__ ")
    .replace(/\bcocoa\s+butter\b/gi," __cocoabutter__ ");
}

/** Strip disclaimers like "no butter" so compliance prose does not trip butter/ghee detectors. */
function scrubNegatedButterGhee(low){
  let s=String(low||"");
  const reps=[
    /\b(no|without|sans|avoid(?:ing|s)?|skip(?:ping)?|omit(?:ting)?|never|free\s+of|instead\s+of|not\s+using|contains\s+no|zero|don'?t\s+use|do\s+not\s+use|excluding|except\s+no)\s+brown\s+butter\b/gi,
    /\b(no|without|sans|avoid(?:ing|s)?|skip(?:ping)?|omit(?:ting)?|never|free\s+of|instead\s+of|not\s+using|contains\s+no|zero|don'?t\s+use|do\s+not\s+use|excluding|except\s+no)\s+(butter|ghee)\b/gi,
    /\b(butter|ghee|brown\s+butter)[\s-]*free\b/gi,
    /\b(butter|ghee)\s+(omitted|avoided|excluded|not\s+used|not\s+included)\b/gi,
  ];
  for(const re of reps) s=s.replace(re," ");
  return s;
}

/**
 * "non-dairy" / "dairy-free" contain the substring \bdairy\b — strip before scanning or every
 * compliance-safe recipe trips No Dairy. Same for plant cheeses and negated dairy mentions.
 */
function scrubDairyNegationsForCompliance(low){
  return String(low||"")
    .replace(/\bnon[\s-]*dairy\s+milk\b/gi," __ndmilk__ ")
    .replace(/\bnon[\s-]*dairy\b/gi," ")
    .replace(/\bdairy[\s-]*free\b/gi," ")
    .replace(/\bfree[\s-]*of[\s-]*dairy\b/gi," ")
    .replace(/\bcontains[\s-]*no[\s-]*dairy\b/gi," ")
    .replace(/\bno[\s-]*animal[\s-]*dairy\b/gi," ")
    .replace(/\b(without|sans|avoiding)[\s]+dairy\b/gi," ")
    .replace(/\b(vegan|plant|nut|cashew|almond|soy|oat|vegetable)\s+cheese\b/gi," __vcheese__ ")
    .replace(/\bvegan[\s-]*(?:dark[\s-]*)?chocolate\b/gi," __vchoc__ ");
}

function textSuggestsAnimalDairy(low){
  let t=scrubComplianceFalsePositives(low);
  t=scrubDairyNegationsForCompliance(t);
  t=scrubNegatedButterGhee(t);
  return /\b(heavy\s*cream|whipping\s*cream|double\s*cream|sour\s*cream|clotted\s*cream|cream\s*cheese|cr[eè]me\s*fra[iî]che|half\s*and\s*half|buttermilk|\bwhole\s*milk\b|\bskim\s*milk\b|condensed\s*milk|evaporated\s*milk|\bmilk\b|\bbutter\b|ghee|brown\s*butter|cheese\b|mozzarella|parmesan|parm\b|pecorino|ricotta|feta|halloumi|cheddar|brie|mascarpone|provolone|gruy[eè]re|paneer|yogurt|yoghurt|kefir|\bwhey\b|fromage|crema\b|\bdairy\b|\bcream\b)/i.test(t);
}

function textSuggestsButterFat(low){
  let t=scrubComplianceFalsePositives(low);
  t=scrubNegatedButterGhee(t);
  return /\b(butter|ghee|brown\s+butter)\b/i.test(t);
}

/** Meat, seafood, and common animal-derived savory bases (stocks, demi, animal fats, fish/oyster sauce). */
function textSuggestsAnimalFleshOrBroth(low){
  const l=String(low||"").toLowerCase();
  if(/\b(chicken|beef|pork|lamb|duck|turkey|goose|quail|venison|bison|veal|mutton|rabbit|bacon|pancetta|guanciale|prosciutto|salami|chorizo|andouille|kielbasa|sausage|mortadella|capicola|nduja|hot\s+dog|frankfurter|bratwurst|lard|tallow|suet|crackl(?:e|ing)s?|oxtail|brisket|short\s*rib|ribeye|offal|sweetbreads|foie|liver\b|ground\s+(beef|pork|lamb|turkey|chicken)|meatball|meat\s+loaf|carnitas|barbacoa)\b/i.test(l)) return true;
  if(/\b(anchov|sardine|mackerel|salmon|tuna|cod|halibut|trout|bass|fish(?!\s+sauce)\b|sea\s+bass|shrimp|prawn|scallop|clam|mussel|oyster(?!\s+sauce)|crab|lobster|calamari|squid|octopus|eel|caviar|\broe\b|uni\b|surimi)\b/i.test(l)) return true;
  if(/\b(chicken|beef|veal|fish|turkey|ham|shrimp|bone)\s+(stock|broth|broths|base|bases)\b/i.test(l)) return true;
  if(/\bbone\s+broth\b/i.test(l)) return true;
  if(/\b(fish|oyster)\s+sauce\b/i.test(l)) return true;
  if(/\bworcestershire\b/i.test(l)) return true;
  if(/\bdemi[\s-]?glace\b/i.test(l)) return true;
  if(/\b(duck|chicken|bacon|pork)\s+fat\b/i.test(l)) return true;
  if(/\b(beef|chicken|fish)\s+(bouillon|powder)\b/i.test(l)) return true;
  if(/\b(gelatin|isinglass|rennet)\b/i.test(l)) return true;
  return false;
}
function textSuggestsMeatOrFish(low){
  return textSuggestsAnimalFleshOrBroth(low);
}

/** Strip "no fish sauce / without honey …" style lines so Vegan checks do not false-positive on negated mentions. */
function scrubNegatedNonVeganPhrases(low){
  let s=String(low||"");
  const reps=[
    /\b(no|without|sans|omit|avoid(?:ing|s)?|never|free\s+of|not\s+using|contains\s+no|zero)\s+[^.;]{0,52}?\b(fish\s+sauce|oyster\s+sauce|honey|gelatin|whey|casein|lactose|eggs?|egg\s+yolks?)\b/gi,
    /\b(no|without)\s+[^.;]{0,40}?\b(dairy|animal\s+products?)\b/gi,
  ];
  for(const re of reps) s=s.replace(re," ");
  return s;
}

/** Retail kimchi often contains fish sauce or shrimp paste — vegan rounds need an explicit vegan/fish-free product or DIY statement (use raw recipe text, not scrubbed). */
function textVeganKimchiCompliant(fullText){
  const L=String(fullText||"");
  if(!/\bkimchi\b/i.test(L)) return true;
  if(/\b(vegan|plant-based|fish-free)\s+kimchi\b|\bkimchi\s*\([^)]*\b(vegan|plant-based|fish-free)\b/i.test(L)) return true;
  if(/\bvegan\s+[^\n.,;]{0,40}?\bkimchi\b/i.test(L)) return true;
  if(/\bkimchi\s+brine\b/i.test(L)&&/\b(vegan|fish-free)\b/i.test(L)) return true;
  if(/\bbrine\s+from\s+(the\s+)?(vegan|fish-free)\s+kimchi/i.test(L)) return true;
  if(/\bkimchi\b[\s\S]{0,160}?\b(no|without|free\s+of)\s+[^.;]{0,55}?\b(fish\s*sauce|shrimp\s*paste|seafood|anchovy|fish\s*base)\b/i.test(L)) return true;
  if(/\b(no|without|free\s+of)\s+[^.;]{0,55}?\b(fish\s*sauce|shrimp\s*paste|seafood)\b[\s\S]{0,160}?\bkimchi\b/i.test(L)) return true;
  return false;
}

/** No Sugar: no granulated (white, brown, coconut, turbinado, demerara…) and no powdered/confectioners — honey, maple, caramel, etc. OK. */
function textSuggestsGranulatedOrPowderedSugar(low){
  const L=String(low||"").toLowerCase();
  if(/\b(no|without|omit|avoid|sans)\s+[^.;]{0,52}?\b(granulated|powdered|table|white|brown|confectioners?|icing|caster|castor|superfine|coconut)\s+sugar\b/i.test(L)) return false;
  if(/\b(no|without|omit)\s+brown\s+sugar\b/i.test(L)) return false;
  if(/\b(no|without|omit)\s+coconut\s+sugar\b/i.test(L)) return false;
  if(/\b(no|without|omit)\s+turbinado\b/i.test(L)) return false;
  return /\b(granulated|table|white)\s+sugar\b|\b(powdered|confectioners?|icing)\s+sugar\b|\b(caster|castor|superfine)\s+sugar\b|\bbrown\s+sugar\b|\bcoconut\s+sugar\b|\bturbinado(?:\s+sugar)?\b|\bdemerara(?:\s+sugar)?\b/i.test(L);
}

/** Post-check AI output vs challenge restrictions; drives regen + UI warning. */
function getRecipeRestrictionViolations(recipe, restrictions){
  const msgs=[];
  const rlist=sanitizeRestrictionList(restrictions||[]);
  if(!rlist.length||!recipe) return msgs;
  const blob=recipeFlattenTextForCompliance(recipe);
  const low=blob.toLowerCase();
  const ingLines=[];
  for(const i of recipe.ingredients||[]){
    const line=[i&&i.item,i&&i.prep,i&&i.amount].filter(Boolean).join(" ").trim();
    if(line) ingLines.push(line);
  }
  for(const rawR of rlist){
    const norm=normalizeRestrictionKey(rawR);
    let ingHit="";
    for(const line of ingLines){
      const checkLine=String(line||"").replace(/\b(coconut|cashew|almond|soy|oat)\s+cream\b/gi,"__plantcream__").replace(/\b(oat|almond|soy|cashew|coconut|hemp)\s+milk\b/gi,"__plantmilk__");
      if(ingredientConflictsWithRestriction(checkLine,norm)){ingHit=line;break;}
    }
    if(ingHit){
      msgs.push(`${norm}: conflicts with ingredient — "${ingHit.slice(0,120)}"`);
      continue;
    }
    if(norm==="No Dairy"&&textSuggestsAnimalDairy(low))
      msgs.push(`${norm}: text still references animal dairy (milk, cream, butter, cheese, yogurt, etc.)`);
    else if(norm==="No Butter"&&textSuggestsButterFat(low))
      msgs.push(`${norm}: text still references butter or ghee`);
    else if(norm==="Vegetarian"&&textSuggestsAnimalFleshOrBroth(low))
      msgs.push(`${norm}: text suggests meat, fish, shellfish, or animal stock/fish sauce`);
    else if(norm==="Vegan"){
      const lowV=scrubNegatedNonVeganPhrases(low);
      const veganHit=textSuggestsAnimalDairy(lowV)||textSuggestsButterFat(lowV)||textSuggestsAnimalFleshOrBroth(lowV)
        ||/\b(honey|bee\s*honey)\b/i.test(lowV)||/\b(eggs?|egg\s+yolk|egg\s+white|mayo|mayonnaise)\b/i.test(lowV);
      if(veganHit) msgs.push(`${norm}: non-vegan wording detected (meat, seafood, dairy, egg, honey, animal stock/broth, fish sauce, gelatin, etc.)`);
      if(/\bkimchi\b/i.test(low)&&!textVeganKimchiCompliant(low))
        msgs.push(`${norm}: kimchi often contains fish sauce or shrimp paste — ingredients must name **vegan / fish-free kimchi** (or brine from that product), or clearly state homemade kimchi with no seafood, in the JSON.`);
    }
    else if(norm==="No Alcohol"&&/\b(wine|beer|rum|vodka|whiskey|whisky|bourbon|brandy|sake|liqueur|champagne|prosecco)\b/i.test(low)
      &&!/\b(alcohol-free|non-alcoholic|na beer)\b/i.test(low))
      msgs.push(`${norm}: mentions alcoholic ingredient`);
    else if(norm==="No Nuts"&&/\b(almond|cashew|pistachio|pecan|walnut|hazelnut|pine\s*nut|pesto|peanut)\b/i.test(low))
      msgs.push(`${norm}: mentions nuts or peanut`);
    else if(norm==="No Sugar"&&textSuggestsGranulatedOrPowderedSugar(low))
      msgs.push(`${norm}: text still references granulated sugar (white, brown, coconut, turbinado, demerara…), powdered, or confectioners — use honey, maple, caramel, syrups, fruit, etc.`);
  }
  if(rlist.some(x=>normalizeRestrictionKey(x)==="No Gluten")&&!msgs.some(m=>/^No Gluten:\s+conflicts/i.test(m))){
    if(/\bramen\b/i.test(low)&&!/\b(gluten[\s-]?free|certified\s+gf|\bg[\s/.]*f[\s/.]*|rice\s+noodles?|rice\s+vermicelli|glass\s+noodles?|mung\s+bean|bean\s+thread|konjac|shirataki)\b/i.test(low))
      msgs.push(`No Gluten: title or steps still imply **wheat ramen** — use certified GF noodles or rice/glass noodles and name them in ingredients; tamari or GF-labeled soy, not generic soy sauce.`);
  }
  return msgs;
}

/** No Salt: judges expect an explicit flavor strategy, not only rich dairy. */
function getNoSaltCompensationViolations(recipe, restrictions){
  const msgs=[];
  if(!recipe) return msgs;
  const rlist=sanitizeRestrictionList(restrictions||[]);
  if(!rlist.some(x=>normalizeRestrictionKey(x)==="No Salt")) return msgs;
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  const strat=/\b(no\s+salt|salt[- ]?free|without\s+(added\s+)?salt|compensat|acid\s+balance|brighten|vinegar|citrus|lemon|lime|pickle|brine|capers?\b|ferment|umami|tomato\s+paste|charred|aggressive\s+reduction|low[\s-]?sodium|unsalted|sodium\s+from|latent\s+sodium)\b/i.test(low);
  if(!strat) msgs.push(`No Salt: state how you build savor without added salt — acid (citrus/vinegar/pickles), umami you name honestly, char, reduction, herbs/spices integrated into the sauce — not only butter/cream richness.`);
  const sweetFatPit=/\b(maple|honey|brown\s+sugar|syrup)\b/.test(low)&&/\b(heavy\s+cream|cream|butter|half\s+and\s+half)\b/.test(low);
  const acidNamed=/\b(lemon|lime|orange\s+(?:juice|zest)|grapefruit|citrus|cider\s+vinegar|wine\s+vinegar|sherry\s+vinegar|vinegar|verjuice|pickle|pickled|brine|capers?|yuzu|malt\s+vinegar|balsamic|shrub)\b/i.test(low);
  if(sweetFatPit&&!acidNamed)
    msgs.push(`No Salt: maple/honey + cream/butter without named acid (citrus, vinegar, pickle brine) reads one-dimensional — put acid/caramelization/spice in balance.flavor and real steps, not only richness.`);
  return msgs;
}

/** Collagen-heavy cuts: forbid fantasy quick-braise / "tender in 15 min" on short clocks. */
function getBrisketPhysicsViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const req=(ch.required||[]).map(s=>String(s).toLowerCase());
  const total=Math.max(1, Number(ch.totalTime)||30);
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  const legit=/\b(pressure|instant\s*pot|pre[\s-]?cooked|pre[\s-]?braised|leftover|smoked|already\s+tender|brais(ed|e)\s+ahead|hours|low\s+and\s+slow|shredded|pulled|prepared|deli|corned|pastrami|sous\s*vide|\d+\s*h(?:ou)?rs?\b)\b/i.test(low);

  if(req.some(r=>/\bbrisket\b/.test(r))&&total<=90){
    if(!legit){
      const rawCube=/\b(raw\s+)?brisket\s+(cubes?|dice|chunks?|pieces)\b|\b(cubes?|dice)\s+of\s+brisket\b/i.test(low);
      const quickCook=/\b(sear|saut|simmer|cook|brown)\b[^.]{0,120}\bbrisket[^.]{0,140}?\b([1-9]|1[0-9]|20)\s*(?:min|minutes)\b/i.test(low)
        ||/\bbrisket[^.]{0,140}?\b(sear|saut|simmer|cook|brown)\b[^.]{0,120}?\b([1-9]|1[0-9]|20)\s*(?:min|minutes)\b/i.test(low);
      if(rawCube||quickCook) msgs.push(`Physics: brisket will not tenderize from raw in a few minutes on a ~${total} min clock — use pressure (if allowed), leftover/shredded/smoked brisket, or honest longer braise; not raw cubes + short sear.`);
    }
  }

  function pushCollagenFantasy(label, match){
    if(!match) return;
    const n=+(match[1]||match[2]);
    if(n>=5&&n<=90)
      msgs.push(`Physics: ${label} is collagen-heavy — it will not become fork-tender in ~${n} min open simmer/braise on a ~${total} min round — use pressure (if allowed), pre-braised/leftover meat, grind/shave/thin-sear for intentional texture, flavor-accent only, or an honest reformat — not "quick stew/chili tender in minutes."`);
  }
  if(total<=120&&!legit){
    const oxtailRx=/\boxtail\b[\s\S]{0,520}?\b(?:simmer|braise|stew)\b[\s\S]{0,420}?\b(\d{1,3})\s*(?:min|minutes?)|\b(?:simmer|braise|stew)\b[\s\S]{0,420}?\boxtail\b[\s\S]{0,420}?\b(\d{1,3})\s*(?:min|minutes?)/i;
    const shortRibRx=/\bshort\s*ribs?\b[\s\S]{0,520}?\b(?:simmer|braise|stew)\b[\s\S]{0,420}?\b(\d{1,3})\s*(?:min|minutes?)|\b(?:simmer|braise|stew)\b[\s\S]{0,420}?\bshort\s*ribs?\b[\s\S]{0,420}?\b(\d{1,3})\s*(?:min|minutes?)/i;
    const shankRx=/\b(?:beef\s+)?shank\b[\s\S]{0,520}?\b(?:simmer|braise|stew)\b[\s\S]{0,420}?\b(\d{1,3})\s*(?:min|minutes?)|\b(?:simmer|braise|stew)\b[\s\S]{0,420}?\b(?:beef\s+)?shank\b[\s\S]{0,420}?\b(\d{1,3})\s*(?:min|minutes?)/i;
    const chuckRx=/\bchuck\b[\s\S]{0,520}?\b(?:simmer|braise|stew)\b[\s\S]{0,420}?\b(\d{1,3})\s*(?:min|minutes?)|\b(?:simmer|braise|stew)\b[\s\S]{0,420}?\bchuck\b[\s\S]{0,420}?\b(\d{1,3})\s*(?:min|minutes?)/i;
    if(req.some(r=>/\boxtail\b/.test(r))&&/\boxtail\b/.test(low))
      pushCollagenFantasy("Oxtail", low.match(oxtailRx));
    if(req.some(r=>/\bshort\s*ribs?\b/.test(r))&&/\bshort\s*ribs?\b/.test(low))
      pushCollagenFantasy("Beef short rib", low.match(shortRibRx));
    if(req.some(r=>/\b(beef\s+)?shank\b/.test(r))&&/\b(?:beef\s+)?shank\b/.test(low))
      pushCollagenFantasy("Beef shank", low.match(shankRx));
    if(req.some(r=>/\bchuck\b/.test(r))&&/\bchuck\b/.test(low))
      pushCollagenFantasy("Chuck", low.match(chuckRx));
  }

  msgs.push(...getChickenWingPhysicsViolations(recipe, ch));
  return msgs;
}

/** Wings: short wet braise vs crisp/fry promises; chocolate-in-wing-braise handled in getSavoryChocolateIntegrationViolations. */
function getChickenWingPhysicsViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  const req=(ch.required||[]).map(s=>String(s).toLowerCase()).join(" ");
  if(!/\b(?:chicken\s+)?wings?\b/.test(low)&&!/\b(?:chicken\s+)?wings?\b/.test(req)) return msgs;

  const pressureOk=/\b(pressure\s*cooker|instant\s*pot|high\s+pressure)\b/i.test(low);
  const braiseWing=/\b(?:chicken\s+)?wings?\b[\s\S]{0,450}?\b(?:braise|braised|braising)\b|\b(?:braise|braised|braising)\b[\s\S]{0,450}?\b(?:chicken\s+)?wings?\b/i.test(low);
  const crispPromise=/\b(crisp|crispy|crackl|shatter|deep[\s-]*fry|fry\s+until\s+crisp|fry\s+for\s+crisp|air\s*fry|toasted\s+skin)\b/i.test(low);
  const fryPath=/\b(?:deep[\s-]*fry|fry\s+(?:the\s+)?(?:chicken\s+)?wings|wings?\s+[^\n]{0,100}(?:deep[\s-]*fry|fry|frying)|double[\s-]?fry)\b/i.test(low);

  if(braiseWing&&crispPromise)
    msgs.push(`Physics: chicken wings — **crisp skin and a wet braise on the same wing** contradict each other — pick **one lane**: hard sear + sticky glaze / air-fry or high-heat roast / **honest long braise** (tender, not crackling) — not "braise then crisp" on the same surface.`);

  if(braiseWing&&fryPath)
    msgs.push(`Technique: **braise wings** + **deep-fry/fry** in the same plan fights the dish — wet cooking softens skin; frying targets crackle. Pick one coherent path (e.g. sear + reduce glaze; roast/air-fry; or confit with an explicit story).`);

  if(braiseWing&&!pressureOk){
    const shortWingBraise=/\b(?:chicken\s+)?wings?\b[\s\S]{0,380}?\b(?:braise|braised|braising)\b[\s\S]{0,380}?\b([1-9]|1[0-9]|2[0-5])\s*(?:min|minutes)/i.exec(low);
    if(shortWingBraise){
      const n=+shortWingBraise[1];
      if(n>=5&&n<=25)
        msgs.push(`Physics: **short braise (~${n} min) on wings** rarely gives tenderness or crackle — skin can stay rubbery, fat under-rendered. Use **sear + glaze**, **high-heat roast/air-fry**, **pressure** (if allowed), or a **long braise** with an honest texture story — not a weak middle path.`);
    }
  }

  return msgs;
}

function equipmentAliasRegex(name){
  const n=String(name||"").toLowerCase();
  if(n==="chef's knife"||n==="paring knife"||n==="bread knife") return /\b(chef'?s\s+knife|paring\s+knife|bread\s+knife|knife)\b/i;
  if(n==="cast iron skillet") return /\b(cast[\s-]?iron(?:\s+skillet)?|skillet)\b/i;
  if(n==="carbon steel pan") return /\b(carbon\s+steel\s+pan|steel\s+pan)\b/i;
  if(n==="saute pan") return /\b(saut[eé]\s+pan|frying\s+pan|saute)\b/i;
  if(n==="range (gas/electric)") return /\b(range|gas\s+range|electric\s+range|stove)\b/i;
  if(n==="induction cooktop") return /\b(induction\s+cooktop|induction)\b/i;
  if(n==="electric griddle"||n==="flat-top griddle") return /\b(electric\s+griddle|flat[\s-]?top\s+griddle|griddle)\b/i;
  if(n==="hot plate") return /\bhot\s+plate\b/i;
  if(n==="immersion blender") return /\b(immersion\s+blender|stick\s+blender)\b/i;
  if(n==="mortar and pestle") return /\b(mortar\s+and\s+pestle|mortar)\b/i;
  if(n==="baking sheet") return /\b(baking\s+sheet|sheet\s+pan)\b/i;
  if(n==="culinary torch") return /\b(torch|culinary\s+torch|blow-?\s*torch|kitchen\s*torch)\b/i;
  if(n==="heat gun (culinary)") return /\b(heat\s+gun|culinary\s+heat\s+gun)\b/i;
  if(n==="commercial fryer") return /\b(commercial\s+fryer|deep\s+fryer|fryer)\b/i;
  if(n==="charcoal grill") return /\b(charcoal\s+grill|grill)\b/i;
  if(n==="gas grill") return /\b(gas\s+grill|grill)\b/i;
  if(n==="pellet grill") return /\b(pellet\s+grill|grill)\b/i;
  if(n==="vacuum chamber sealer") return /\b(vacuum\s+chamber\s+sealer|chamber\s+sealer)\b/i;
  if(n==="citrus press") return /\b(citrus\s+press|lemon\s+squeezer|lime\s+press)\b/i;
  if(n==="stovetop") return /\b(stovetop|range|burner|hob|cooktop|on\s+the\s+stove|over\s+medium\s+heat|over\s+high\s+heat|saut[eé]|skillet\s+over)\b/i;
  if(n==="blender") return /\b(blender|immersion\s+blender|stick\s+blender|vitamix|nutribullet|high[\s-]*speed[\s-]*blender)\b/i;
  if(n==="food processor") return /\b(food\s*processor|processor\s+bowl)\b/i;
  if(n==="air fryer") return /\bair\s*fryer\b/i;
  if(n==="instant pot") return /\binstant\s*pot|pressure\s*cooker\b/i;
  if(n==="pressure cooker") return /\b(pressure\s*cooker|instant\s*pot|multi[\s-]?cooker)\b/i;
  if(n==="multi-cooker") return /\b(multi[\s-]?cooker|instant\s*pot|pressure\s*cooker)\b/i;
  if(n==="rice cooker") return /\b(rice\s+cooker)\b/i;
  if(n==="slow cooker") return /\b(slow\s+cooker|crock[\s-]?pot)\b/i;
  if(n==="sous vide machine"||n==="sous vide circulator") return /\b(sous\s*-?\s*vide|immersion\s+circulator)\b/i;
  if(n==="deep fryer") return /\b(deep\s+fryer|deep[\s-]?fry|fryer)\b/i;
  if(n==="meat grinder") return /\b(meat\s+grinder|grind(?:er|ing)\s+meat)\b/i;
  if(n==="meat slicer") return /\b(meat\s+slicer|slicer)\b/i;
  if(n==="pasta maker") return /\b(pasta\s+maker|roller|sheeted\s+pasta)\b/i;
  if(n==="ice cream maker") return /\b(ice\s+cream\s+maker|churn)\b/i;
  if(n==="dehydrator") return /\bdehydrator|dehydrate\b/i;
  if(n==="fermentation crock") return /\b(fermentation\s+crock|ferment)\b/i;
  if(n==="smoker") return /\bsmoker|smoke\b/i;
  if(n==="vacuum sealer") return /\b(vacuum\s+sealer|vacuum\s+seal)\b/i;
  if(n==="whipping siphon") return /\b(whipping\s+siphon|isi\s+siphon|siphon)\b/i;
  if(n==="salamander broiler") return /\b(salamander\s+broiler|salamander|broiler)\b/i;
  if(n==="steam table") return /\bsteam\s+table\b/i;
  if(n==="juicer") return /\bjuicer|juice\b/i;
  if(n==="sheet pan") return /\bsheet\s*pan\b/i;
  if(n==="torch") return /\b(torch|torched|torching|blow-?\s*torch|kitchen\s*torch|butane\s*torch|propane\s*torch)\b/i;
  return new RegExp(`\\b${n.replace(/[.*+?^${}()|[\]\\]/g,"\\$&").replace(/\s+/g,"\\s*")}\\b`,"i");
}

function mentionsEquipment(low, equipName){
  const rx=equipmentAliasRegex(equipName);
  return rx.test(String(low||""));
}

/** Steps only — avoids balance.basket claiming "oven" without a real step. */
function recipeStepsTextForEquipment(recipe){
  if(!recipe||!Array.isArray(recipe.steps)) return "";
  const parts=[];
  for(const s of recipe.steps){
    if(!s) continue;
    parts.push(String(s.phase||""), String(s.what||""), String(s.how||""));
  }
  return parts.join(" ").toLowerCase();
}

/** Oven techniques that imply the oven (not stovetop-only). */
function stepTextShowsOvenUse(stepBlobLower){
  const b=String(stepBlobLower||"").toLowerCase();
  if(/\b(no|without|skip|avoid)\s+.{0,24}\b(oven|bake|roast|broil)\b/i.test(b)) return false;
  return /\b(oven|preheat(?:\s+the)?\s+oven|bake|baking|baked|bakes|roast|roasting|roasted|roasts|broil|broiling|broiled|gratin|gratin[eé]e|convection|bake\s+until|roast\s+until|under\s+(?:the\s+)?broiler|oven\s*-\s*finish)\b/i.test(b);
}

/** Must-use blender / food processor: tool name OR unmistakable blend/pulse technique in prose (models often say "purée" without repeating "blender"). */
function mustUseEquipmentSatisfied(recipe, eq){
  const L=recipeFlattenTextForCompliance(recipe).toLowerCase();
  const en=String(eq||"").toLowerCase();
  if(/^oven$/i.test(en.trim())){
    const st=recipeStepsTextForEquipment(recipe);
    return stepTextShowsOvenUse(st);
  }
  if(mentionsEquipment(L, eq)) return true;
  if(/\bblender\b/.test(en))
    return /\b(blend|blended|blending|puree|purée|pureed|pulse|pulsed|blitz|vitamix|liquif|smoothie)\b|immersion\s+blender/i.test(L);
  if(/food\s*processor/.test(en))
    return /\b(food\s*processor|processor\s+bowl)\b/i.test(L)
      ||(/\b(pulse|pulsed|shred|grate)\b/i.test(L)&&/\bprocessor\b/i.test(L));
  return false;
}

/** Minutes from a step's dur field (e.g. "20 min", "4–5 min"). */
function minutesFromStepDur(dur){
  const d=String(dur||"").trim();
  if(!d) return 0;
  const range=d.match(/(\d+)\s*[-–]\s*(\d+)\s*min/i);
  if(range) return Math.max(+range[1], +range[2]);
  const one=d.match(/(\d+)\s*min/i);
  if(one) return +one[1];
  const plain=d.match(/^(\d+)\s*$/);
  if(plain) return +plain[1];
  return 0;
}

/**
 * Scans full recipe prose for cook times that cannot fit the round (catches bad JSON when step dur is empty but "how" says 30 min sous vide).
 */
function getProseTimelineViolations(low, total){
  const msgs=[];
  const t=Math.max(1, total);
  const L=String(low||"").toLowerCase();
  if(t<=120){
    const hr=L.match(/\b(\d+)\s*(?:h|hr|hrs|hours?)\b/);
    if(hr&&+hr[1]>=1) msgs.push(`Timeline: recipe mentions ${hr[1]} hour(s) of cook or hold — impossible inside a ${t} min round.`);
  }
  const svChunks=[
    /\b(?:sous\s*-?\s*vide|immersion\s+circulator)\b[\s\S]{0,180}?\b(\d+)\s*(?:min|minutes?)\b/gi,
    /\b(\d+)\s*(?:min|minutes?)\b[\s\S]{0,120}?\b(?:sous\s*-?\s*vide|immersion\s+circulator)\b/gi,
    /\bwater\s*bath\b[\s\S]{0,120}?\b(?:at|for|@)\s*[\d.]+\s*[°]?[fc]?[\s\S]{0,40}?\b(\d+)\s*(?:min|minutes?)\b/gi,
  ];
  for(const re of svChunks){
    re.lastIndex=0;
    let m;
    while((m=re.exec(L))!==null){
      const n=+m[1];
      if(n>t+2) msgs.push(`Timeline: long low-temp step (~${n} min, sous vide / water bath / circulator) exceeds the ${t} min round — use only techniques and times that fit the clock.`);
    }
  }
  const slowOven=/\b(?:slow\s*roast|low\s+(?:and\s+)?slow)\b[\s\S]{0,100}?\b(\d+)\s*(?:min|minutes?)\b/gi;

/**
 * Specific basket trap: couscous + malanga + seitan often gets mashed into one soft fritter.
 * Enforce technique separation: toasted couscous crunch, dried malanga base, seitan texture visible.
 */
function getCouscousMalangaSeitanViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const basket=[...(ch.required||[]),...(ch.pantry||[])].map(s=>String(s).toLowerCase()).join(" | ");
  const hasCouscous=/\bcouscous\b/.test(basket);
  const hasMalanga=/\bmalanga\b/.test(basket);
  const hasSeitan=/\bseitan\b/.test(basket);
  if(!(hasCouscous||hasMalanga||hasSeitan)) return msgs;
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();

  // 1) Raw couscous crust over wet binder tends to steam/gum instead of crisp.
  if(hasCouscous){
    const crustUse=/\bcouscous\b[\s\S]{0,220}?\b(crust|coat|coating|bread|crumb|dredge|press(?:ed)?\s+on|roll(?:ed)?\s+in|fritter|patty)\b/i.test(low);
    const preToast=/\bcouscous\b[\s\S]{0,220}?\b(toast|toasted|dry[-\s]?toast|oven[-\s]?toast|nutty|golden)\b/i.test(low);
    if(crustUse&&!preToast){
      msgs.push(`Technique (couscous): raw couscous pressed onto a wet fritter/patty tends to **steam/gum**, not crisp — **dry-toast couscous first** (nutty/golden), then use as a crunchy coat or topper.`);
    }
  }

  // 2) Malanga mash needs explicit moisture control before forming/binding.
  if(hasMalanga){
    const mashOrPatty=/\bmalanga\b[\s\S]{0,260}?\b(mash|mashed|fritter|patty|cake|bind|mixture)\b/i.test(low);
    const dryStep=/\b(squeeze|press|wring|towel|cloth|steam[-\s]?dry|sheet[-\s]?dry|dry\s+off|evaporat)\b/i.test(low);
    if(mashOrPatty&&!dryStep){
      msgs.push(`Technique (malanga): if using mash/patty/fritter, add an explicit **drying step** (squeeze/wring/towel or brief steam-dry) before binding — malanga holds moisture and can blow crust adhesion.`);
    }
  }

  // 3) Seitan should keep fibrous chew; buried crumble in mash hides its best quality.
  if(hasSeitan){
    const buried=/\b(seitan)\b[\s\S]{0,260}?\b(crumble|crumbled|fold(?:ed)?\s+into|mixed?\s+into|stir(?:red)?\s+into|buried|hidden)\b[\s\S]{0,220}?\b(mash|puree|purée|fritter|patty|dough)\b/i.test(low)
      || /\b(mash|puree|purée|fritter|patty|dough)\b[\s\S]{0,260}?\b(seitan)\b[\s\S]{0,180}?\b(crumble|crumbled|fold(?:ed)?\s+in|mixed?\s+in)\b/i.test(low);
    const featured=/\bseitan\b[\s\S]{0,260}?\b(strip|strips|baton|slice|slabs?|char|charred|edge|edges|roast(?:ed)?|sear(?:ed)?|crisp|crispy|featured|main)\b/i.test(low);
    if(buried&&!featured){
      msgs.push(`Texture role (seitan): avoid burying seitan as invisible crumble inside mash — keep a **featured chewy/crisp element** (strips/slices with charred edges) so its gluten-fiber texture is actually tasted.`);
    }
  }

  return msgs;
}

/**
 * Comfort Reinvented basket trap: wings + celery root + potato chips + parmesan.
 * Guard against soggy chip crust timing, GF chip ambiguity, and overbuilt double-hero execution.
 */
function getComfortWingMacChipViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  if(!challengeTypeIsComfortReinvented(ch.ctype)) return msgs;
  const req=(ch.required||[]).map(s=>String(s).toLowerCase()).join(" | ");
  const hasWing=/\bchicken\s+wings?\b|\bwings?\b/.test(req);
  const hasCeleryRoot=/\bcelery\s+root|celeriac\b/.test(req);
  const hasChips=/\bpotato\s+chips?\b/.test(req);
  const hasParm=/\bparmesan\b/.test(req);
  if(!(hasWing&&hasCeleryRoot&&hasChips&&hasParm)) return msgs;

  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();

  // No Gluten + potato chips should name GF certainty.
  if(challengeHasNoGluten(ch)&&hasChips){
    const chipsMentioned=/\bpotato\s+chips?\b/i.test(low);
    const gfNamed=/\b(gluten[\s-]?free|gf|certified\s+gf)\b[\s\S]{0,60}\bpotato\s+chips?\b|\bpotato\s+chips?\b[\s\S]{0,60}\b(gluten[\s-]?free|gf|certified\s+gf)\b/i.test(low);
    if(chipsMentioned&&!gfNamed){
      msgs.push(`No Gluten + potato chips: specify **gluten-free / certified GF chips** (brand-safe wording) — generic "potato chips" is an avoidable compliance risk.`);
    }
  }

  const chipOnWing=/\b(chip[-\s]?crust|chip[-\s]?coated|press(?:ed)?\s+.*potato\s+chips?|potato\s+chips?\s+.*(?:onto|on)\s+.*wings?)\b/i.test(low);
  const glazeOnWing=/\b(honey|glaze|sticky|parmesan\s+paste)\b[\s\S]{0,160}\bwings?\b|\bwings?\b[\s\S]{0,160}\b(honey|glaze|sticky)\b/i.test(low);
  const freshChipFinish=/\b(plate|plating|finish)\b[\s\S]{0,220}\b(chip\s+shards?|fresh\s+chips?|crushed\s+chips?)\b/i.test(low);
  if(chipOnWing&&glazeOnWing&&!freshChipFinish){
    msgs.push(`Texture hold: **chip crust on glazed wings** softens quickly at the pass — keep chips for **last-minute plating crunch** (or split: light pan set + fresh shard finish).`);
  }

  // Step-time realism: long hold between celery-root purée and pasta finish can tighten cream purée.
  const steps=Array.isArray(recipe.steps)?recipe.steps:[];
  const timeToMin=(t)=>{
    const m=String(t||"").match(/^\s*(\d{1,2})\s*:\s*(\d{2})\s*$/);
    if(!m) return null;
    return (+m[1])*60+(+m[2]);
  };
  let pureeAt=null, pastaFinishAt=null;
  for(const s of steps){
    const blob=(String(s&&s.what||"")+" "+String(s&&s.how||"")).toLowerCase();
    const tm=timeToMin(s&&s.time);
    if(tm==null) continue;
    if(pureeAt==null&&/\b(celery\s+root|celeriac)\b/.test(blob)&&/\b(blend|puree|purée)\b/.test(blob)) pureeAt=tm;
    if(pastaFinishAt==null&&/\b(pasta|mac)\b/.test(blob)&&/\b(finish|toss|sauce|coat)\b/.test(blob)) pastaFinishAt=tm;
  }
  if(pureeAt!=null&&pastaFinishAt!=null&&pastaFinishAt-pureeAt>=6){
    msgs.push(`Texture timing: celery-root cream base sits **~${pastaFinishAt-pureeAt} min** before pasta finish — it can tighten/paste. Either blend closer to toss time or name a stronger re-loosen plan (more pasta water/cream).`);
  }

  // Overbuild signal: crispy wings + mac-and-cheese reinvention + chip crust all as co-heroes.
  const comfortMac=/\b(mac\s*(?:and|&)\s*cheese|mac[-\s]?style|celery\s+root\s+mac)\b/i.test(low);
  const wingHero=/\bwings?\b[\s\S]{0,140}\b(top|on\s+top|hero|crisp|crusted)\b|\bcrispy\s+wings?\b/i.test(low);
  if(comfortMac&&wingHero&&chipOnWing){
    msgs.push(`Strategy risk: this basket can become **double-hero overload** (reinvented mac + chip-crusted wings). Keep one hero primary and simplify the secondary so execution survives the clock.`);
  }

  return msgs;
}

    || /\b(?:bath|water)\s+(?:reaches|reached|hits?|is\s+at)\b/.test(L)
    || /\bcomes?\s+to\s+(?:temp|temperature)\b/.test(L)
    || /\btarget\s+temp(?:erature)?\b/.test(L)
    || /\bonce\s+(?:the\s+)?(?:bath|water)\s+(?:is|hits|reaches)\b/.test(L)
    || /\b(?:hot|warm)\s+water\b|\bkettle\b|\b(?:boil|boiling)\s+water\b/.test(L)
    || /\b\d{1,2}\s*min(?:utes)?\s+(?:to\s+)?(?:heat|preheat)\b/.test(L)
    || /\b(?:preheated|pre-heated)\s+(?:bath|water)\b/.test(L)
    || (/\bbefore\s+(?:the\s+)?(?:clock|round|challenge)\b/.test(L)&&/\b(?:bath|preheat|circulator|sous\s*v?ide)\b/.test(L));
}

function stepTimelineMinutes(timeStr){
  const m=String(timeStr||"").match(/^\s*(\d{1,2})\s*:\s*(\d{2})\s*$/);
  if(!m) return null;
  return (+m[1])*60+(+m[2]);
}

/** Circulators typically need meaningful heat-up; flag early bag-in or "while water heats" with no minute budget. */
function getSousVideBathPreheatViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const low=recipeFlattenTextForCompliance(recipe).toLowerCase();
  if(!/\b(sous\s*-?\s*vide|immersion\s+circulator)\b/.test(low)) return msgs;
  const cookStory=/\b(submerg|submerged|into\s+(?:the\s+)?(?:bath|water)|vacuum\s+bag|zip[\s-]?\s*lock|water\s+displacement)\b/.test(low)
    && /\b(\d+\s*min|minutes?|°\s*c|°\s*f|passive\s+hold)\b/.test(low);
  if(!cookStory) return msgs;
  if(sousVidePreheatLanguagePresent(low)) return msgs;

  const steps=Array.isArray(recipe.steps)?recipe.steps:[];
  let earliest=null;
  for(const s of steps){
    const blob=(String(s&&s.phase||"")+" "+String(s&&s.what||"")+" "+String(s&&s.how||"")).toLowerCase();
    if(!/\b(sous\s*-?\s*vide|immersion\s+circulator|water\s*bath)\b/.test(blob)) continue;
    if(!/\b(submerg|submerged|into\s+(?:the\s+)?bath|sealed\s+bag|zip[\s-]?\s*lock|passive\s+hold|vacuum\s+bag)\b/.test(blob)) continue;
    const st=stepTimelineMinutes(s&&s.time);
    if(st==null) continue;
    if(earliest==null||st<earliest) earliest=st;
  }
  if(earliest!=null&&earliest<10)
    msgs.push(`Sous vide: **bath heat-up** to target is often **~8–15+ min** from cold — timeline shows **bag-in** in the **first ~10 min** without **preheat minutes**, **preheated bath**, or **hot / kettle fill**. Add honest PREP or state bath at temp before submerge.`);
  else if(/\bwhile\s+(?:the\s+)?water\s+heats\b/.test(low))
    msgs.push(`Sous vide: "**while water heats**" is not a timeline unless you budget **~8–15+ min** (volume-dependent) — add **explicit preheat minutes** or **start from hot / preheated bath**.`);
  else if(!steps.length)
    msgs.push(`Sous vide: name **bath preheat to target temp** (minutes) or **preheated/hot-filled vessel** so circulator timing is credible — **set circulator** alone is rarely enough before **submerge**.`);
  return msgs;
}

/**
 * Detect overloaded active-active overlaps (e.g., sear + glaze + reduction all at once).
 * We allow one passive overlap lane, but flag dense simultaneous attention sinks.
 */
function getActiveAttentionOverlapViolations(recipe, ch){
  const msgs=[];
  if(!recipe||!ch) return msgs;
  const steps=Array.isArray(recipe.steps)?recipe.steps:[];
  if(steps.length<2) return msgs;
  const total=Math.max(1, Number(ch.totalTime)||30);
  const toMin=(t)=>{
    const m=String(t||"").match(/^\s*(\d{1,2})\s*:\s*(\d{2})\s*$/);
    if(!m) return null;
    return (+m[1])*60+(+m[2]);
  };
  const activeCue=/\b(sear|saut[eé]|stir|stir-fry|fry|shallow[\s-]?fry|deep[\s-]?fry|reduce|deglaze|caramel|caramelize|emulsif|whisk|mount|temper|flip|baste|press|torch|broil|grill|char|watch|monitor)\b/i;
  const passiveCue=/\b(boil|simmer|roast|bake|pressure|instant\s*pot|air\s*fry|steam|rest|hold|warm|chill|set)\b/i;
  const windows=[];
  for(const s of steps){
    const st=toMin(s&&s.time);
    const d=minutesFromStepDur(s&&s.dur);
    if(st==null||d<=0) continue;
    const blob=(String(s&&s.phase||"")+" "+String(s&&s.what||"")+" "+String(s&&s.how||"")).toLowerCase();
    const isActive=activeCue.test(blob) || (/^(COOK|SAUCE|ASSEMBLE)$/.test(String(s&&s.phase||"").toUpperCase())&&!passiveCue.test(blob));
    windows.push({
      start:st,
      end:st+d,
      active:isActive
    });
  }
  if(windows.length<2) return msgs;
  let timelineEnd=0;
  for(const w of windows) timelineEnd=Math.max(timelineEnd, w.end||0);
  const buffer=Math.max(0, total-timelineEnd);
  const events=[];
  for(const w of windows){
    if(!w.active) continue;
    events.push({t:w.start, d:+1});
    events.push({t:w.end, d:-1});
  }
  events.sort((a,b)=>a.t===b.t?(b.d-a.d):(a.t-b.t));
  let activeNow=0, maxActive=0;
  for(const e of events){
    activeNow+=e.d;
    if(activeNow>maxActive) maxActive=activeNow;
  }
  if(buffer===0&&maxActive>=3){
    msgs.push(`Execution risk: **timeline buffer is zero** with **${maxActive} concurrent active lanes** at peak. Re-sequence one lane as passive or create 1-2 min finish buffer.`);
  }
  let worstPair=null;
  for(let i=0;i<windows.length;i++){
    for(let j=i+1;j<windows.length;j++){
      const a=windows[i], b=windows[j];
      const overlap=Math.max(0, Math.min(a.end,b.end)-Math.max(a.start,b.start));
      if(overlap<=0) continue;
      if(!(a.active&&b.active)) continue;
      if(!worstPair||overlap>worstPair.overlap) worstPair={overlap};
    }
  }
  if(!worstPair) return msgs;
  const severe=worstPair.overlap>=Math.max(5, Math.round(total*0.15));
  const level=severe?"HIGH":"LOW";
  msgs.push(`Sequence collision (${level}): timeline overlaps **active + active** work for ~${worstPair.overlap} min (attention sinks competing at once). Re-sequence so one lane is passive (roast/simmer/hold) while the other is active, or shorten one stage.`);
  return msgs;
}

/** End minute of last timeline step (same clock as step times). */
function recipeTimelineEndMinute(recipe){
  const steps=(recipe&&recipe.steps)||[];
  let end=0;
  for(const s of steps){
    const st=stepTimelineMinutes(s&&s.time);
    const d=minutesFromStepDur(s&&s.dur);
    if(st==null||d<=0) continue;
    end=Math.max(end, st+d);
  }
  return end;
}

  let blanchEnd=null;

  const msgs=[];
