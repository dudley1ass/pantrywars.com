<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Pantry Wars</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#0f172a;min-height:100vh;}
  button{cursor:pointer;font-family:inherit;border:none;outline:none;}
  input,select,textarea{font-family:inherit;outline:none;}
  .page{min-height:100vh;background:#f1f5f9;}
  .dark{min-height:100vh;background:#0f172a;color:#f8fafc;}
  .hdr{background:#1e293b;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .card{background:#fff;border:2px solid #e2e8f0;border-radius:12px;padding:14px 16px;margin-bottom:12px;}
  .dcard{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px 16px;margin-bottom:12px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .full{grid-column:1/-1;}
  .lbl{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#64748b;display:block;margin-bottom:8px;}
  .tag{border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;display:inline-block;}
  .btn{border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;padding:8px 14px;}
  .chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
  .hidden{display:none!important;}
  .overlay{position:fixed;inset:0;background:rgba(15,23,42,0.7);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;}
  .modal{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spinner{position:relative;width:76px;height:76px;margin:0 auto 18px;}
  .spinner-ring{position:absolute;inset:0;border-radius:50%;border:4px solid #1e293b;}
  .spinner-arc{position:absolute;inset:0;border-radius:50%;border:4px solid transparent;border-top-color:#f59e0b;animation:spin 1s linear infinite;}
  .spinner-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;}
  input[type=range]{width:100%;accent-color:#6366f1;}
  textarea{width:100%;background:#f8fafc;border:2px solid #e2e8f0;border-radius:8px;padding:8px;font-size:13px;resize:vertical;}
  @media(max-width:600px){.grid2{grid-template-columns:1fr;}.full{grid-column:1;}}
  @media(max-width:700px){.duel-score-grid{grid-template-columns:1fr!important;}}
  #recipe-compare-grid{display:grid;grid-template-columns:1fr;gap:18px;max-width:1180px;margin:0 auto;}
  @media(min-width:920px){#recipe-compare-grid{grid-template-columns:1fr 1fr;align-items:start;}}
</style>
</head>

  if (_configPromise) return _configPromise;
  _configPromise = fetch("/api/config")
    .then(r => r.json())
    .then(j => {
      _serverAnthropicConfigured = !!j.anthropicConfigured;
    })
    .catch(() => {
      _serverAnthropicConfigured = false;
    });
  return _configPromise;
}

function getAnthropicKey() {
  const fromConst = (typeof BASKET_API_KEY === "string" && BASKET_API_KEY.trim()) ? BASKET_API_KEY.trim() : "";
  if (fromConst) return fromConst;
  const stored = (localStorage.getItem("basket_anthropic_key_v1") || "").trim();
  if (stored) return stored;
  if (_serverAnthropicConfigured) return "";
  let k = prompt("Anthropic API key is required for rival chef & Look Up.\n\nCreate one at https://console.anthropic.com\n\nStored only in this browser unless your host already configured the server key.") || "";
  if (k.trim()) localStorage.setItem("basket_anthropic_key_v1", k.trim());
  return (k || "").trim();
}

// Extract one JSON object from model text (handles ```json fences, braces inside strings, trailing commas).
function stripCodeFences(text) {
  const t = String(text || "").trim();
  const m = t.match(/```(?:json)?\s*([\s\S]*?)```/);
  return m ? m[1].trim() : t;
}
function stripTrailingCommas(jsonStr) {
  return jsonStr.replace(/,(\s*[\}\]])/g, "$1");
}
function extractBalancedJsonObject(text) {
  const s = stripCodeFences(text);
  const start = s.indexOf("{");
  if (start === -1) return null;
  let depth = 0, inStr = false, esc = false;
  for (let i = start; i < s.length; i++) {
    const c = s[i];
    if (esc) { esc = false; continue; }
    if (inStr) {
      if (c === "\\") esc = true;
      else if (c === '"') inStr = false;
      continue;
    }
    if (c === '"') { inStr = true; continue; }
    if (c === "{") depth++;
    else if (c === "}") {
      depth--;
      if (depth === 0) return s.slice(start, i + 1);
    }
  }
  return null;
}
function normalizeJsonText(s) {
  return String(s || "")
    .replace(/[\u201c\u201d\u00ab\u00bb]/g, '"')
    .replace(/[\u2018\u2019]/g, "'");
}
function parseModelJsonObject(raw) {
  let candidate = extractBalancedJsonObject(raw);
  if (!candidate) {
    const s = String(raw || "").indexOf("{"), e = String(raw || "").lastIndexOf("}");
    if (s !== -1 && e > s) candidate = String(raw).slice(s, e + 1);
  }
  if (!candidate) throw new Error("Model returned no JSON object");
  candidate = normalizeJsonText(candidate);
  try {
    return JSON.parse(candidate);
  } catch (e1) {
    try {
      return JSON.parse(stripTrailingCommas(candidate));
    } catch (_e2) {
      throw new Error(e1.message + " — Recipe JSON was malformed or cut off. Click Try Again.");
    }
  }
}

// ── AI CALL ───────────────────────────────────────────────────────────────────
async function ai(prompt, tokens=300) {
  await loadAppConfig();
  const apiKey = getAnthropicKey();
  if (!apiKey && !_serverAnthropicConfigured) throw new Error("No API key — cancelled or empty");
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    const timer = setTimeout(() => { xhr.abort(); reject(new Error("Request timed out (60s)")); }, 60000);
    xhr.open("POST", "/api/anthropic");
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.onload = () => {
      clearTimeout(timer);
      if (xhr.status !== 200) {
        let detail = xhr.responseText.slice(0, 400);
        try {
          const errJ = JSON.parse(xhr.responseText);
          if (errJ.error && errJ.error.message) detail = errJ.error.message;
        } catch (_e) {}
        reject(new Error("HTTP " + xhr.status + (detail ? ": " + detail : "")));
        return;
      }
      try {
        const d = JSON.parse(xhr.responseText);
        const txt = (d.content || []).find(b => b.type === "text")?.text || "";
        if (d.stop_reason === "max_tokens" && txt && !extractBalancedJsonObject(txt))
          reject(new Error("Response ran out of space — click Try Again, or use fewer required ingredients."));
        else resolve(parseModelJsonObject(txt));
      } catch(err) { reject(err); }
    };
    xhr.onerror = () => {
      clearTimeout(timer);
      reject(new Error("Cannot reach Pantry Wars server — check that the app is running (npm start) or your live site is up."));
    };
    xhr.onabort = () => { clearTimeout(timer); reject(new Error("aborted")); };
    xhr.send(JSON.stringify({
      api_key: apiKey,
      payload: {
        model: "claude-haiku-4-5",
        max_tokens: tokens,
        messages: [{ role: "user", content: prompt }]
      }
    }));
  });
}

function analyzeBasketForRecipe(required) {
  const low = required.map(s => String(s).toLowerCase());
  const junkRx = /\b(frosting|icing|chocolate\s*syrup|corn\s*syrup|candy|marshmallow|soda|cola|potato\s*chips|cereal|pizza\b|snack|twinkie|pop[\s-]?tart|spray\s*cheese|velveeta|cool\s*whip|hot\s*fudge|nesquik|hershey'?s?\s*syrup)\b/;
  const sweetShelfRx = /\b(frosting|icing|chocolate\s*syrup|syrup|candy|marshmallow|hot\s*fudge)\b/;
  const junkHits = low.filter(s => junkRx.test(s)).length;
  const processedSweet = low.some(s => sweetShelfRx.test(s));
  const hardBasket = junkHits >= 2 || required.length >= 5 || (junkHits >= 1 && required.length >= 4);
  const cleanBasket = junkHits === 0 && required.length <= 4;
  return { hardBasket, cleanBasket, processedSweet, junkHits };
}

async function generateRecipe() {
  const ch=state.challenge;
  try {
    const res=ch.restrictions.length?`Avoid: ${ch.restrictions.join(", ")}.`:"";
    const fe=ch.forbEquip.length?`Forbidden: ${ch.forbEquip.join(", ")}.`:"";
    const re=ch.reqEquip.length?`Must use equipment: ${ch.reqEquip.join(", ")}.`:"";
    const bl=ch.limitBurners?"1 burner only.":"";
    const tw=ch.twist?`Twist: "${ch.twist}".`:"";
    const pantryLines=ch.pantry.length<=35?ch.pantry.join(", "):ch.pantry.slice(0,35).join(", ")+", …";
    const sig=analyzeBasketForRecipe(ch.required);
    let maxSteps=Math.min(8,Math.max(5,Math.floor(ch.totalTime/4)));
    if(sig.hardBasket) maxSteps=Math.min(maxSteps,7);
    const maxComponents=ch.totalTime<=35?3:ch.totalTime<=50?4:5;
    const simplicityGoal=sig.hardBasket
      ?Math.min(3,maxComponents)
      :sig.cleanBasket
        ?Math.min(ch.totalTime<=35?3:4,maxComponents)
        :Math.min(4,maxComponents);
    let executionMode="";
    if(sig.cleanBasket)
      executionMode=`EXECUTION MODE — CLEAN CLASSIC: Basket reads like a natural pairing. Execute cleanly with textbook technique. Prefer ${simplicityGoal} on-plate elements (max ${maxComponents}). Do NOT force fusion, stunts, or extra texture layers — trust the ingredients.`;
    else if(sig.hardBasket)
      executionMode=`EXECUTION MODE — HARD / CHAOTIC BASKET: Simplify aggressively. Target ${simplicityGoal} on-plate elements (never more than ${maxComponents}). ONE idea only — do NOT add bonus structure (extra cakes, grains, nested bases) to "save" a weird basket. Lean into clarity; downshift cleverness. If junk-food or shelf-sweet items are present, use them in SUPPORTING roles (accent, small glaze, restrained dose) — not as the dish's identity unless the challenge is dessert.`;
    else
      executionMode=`EXECUTION MODE — STANDARD: Prefer ${simplicityGoal} clear components (cap ${maxComponents}). One starring technique max.`;
    const productSweetNote=sig.processedSweet
      ?` PROCESSED SWEET ALERT: At least one required item is shelf-sweet. It must read as that product in use (squeeze, scoop, from bottle) — not re-labeled as artisan chocolate. Keep it a supporting player unless dessert.`
      :"";
    const m=ch.totalTime;
    const techniquePolicy=m<=30
      ?`TECHNIQUE vs TIME (${m} min, tight): Nothing is "banned." Finicky work (foam/aeration, spherification, fluid gels, LN2, long-setting gels) may ONLY appear if your step times prove each stage fits inside Prep+Cook with a realistic buffer. If the math is doubtful, use a simpler method (crema, reduction, melted cheese, pan sauce, vinaigrette).`
      :m<=45
        ?`TECHNIQUE vs TIME (${m} min, moderate): Advanced techniques are fine when step durations add up honestly and the dish still respects the component budget. If a foam or refined emulsion is marginal on time, prefer a stable sauce that delivers the same flavor intent.`
        :`TECHNIQUE vs TIME (${m} min, generous): Full cheffy range is allowed — foams, refined emulsions, more layers — as long as the timeline proves feasibility (no fantasy minutes). Technique must earn its place; avoid empty showboating.`;
    const prompt=`CHOPPED-style competition recipe. ONE valid JSON object only — no markdown, no code fences, no extra text. ASCII quotes. No trailing commas. Step "how" max ~90 chars.

CHALLENGE: ${ch.ctype.label} | DIFFICULTY: ${ch.diff} | TIME: ${ch.totalTime}min (Prep ${ch.prepTime}, Cook ${ch.cookTime})
REQUIRED BASKET (each must CARRY the dish, not garnish-only): ${ch.required.join(", ")}
PANTRY you may use (only these + basics like salt/oil/water): ${pantryLines}
${res} ${fe} ${re} ${bl} ${tw}

${executionMode}
${productSweetNote}

FOOD PRODUCT TRUTH (material honesty — not vocabulary checks):
- Naming a required ingredient is NOT enough. For EACH required item: (1) ingredients[] must list it in the honest starting form from the store (or a clear portion of that package); (2) at least one step must show physical handling of that real product (squeeze bottle, scoop from tub, tear crust, chop whole fruit, grate from block).
- balance.basket must include one concrete sensory/material note per required item (too sweet, thin vs thick, fake vanilla, waxy chocolate, salty pickle brine, etc.) so a judge recognizes the actual SKU — not a re-branded "chef version" with only the label in common.
- The dish fails if a competitor could swap in a finer product without changing your steps — steps must be specific to what was in the basket.

BASKET INTEGRITY (mandatory):
- The plate's STAR (main story: protein/starch/veg focal point) must come from REQUIRED + PANTRY above. Do NOT add a new centerpiece (chicken, beef, pork, salmon, etc.) unless that exact protein appears in REQUIRED or PANTRY.
- Each REQUIRED item: name its PRIMARY role (filling, crust, sauce base, relish, main veg, etc.).
- Prefer one bold coherent idea — at most ${maxSteps} steps before PLATE, believable in ${ch.totalTime} min.
- RICHNESS: oily fish + aged cheese + heavy cream is usually overload; choose at most one fat-forward anchor unless you explicitly lighten the others.

STRUCTURE / ONE BASE (control creativity — avoid "AI fusion" that fights itself):
- ONE PRIMARY STARCH OR GRAIN ANCHOR for the plate body: do not run two full starch systems as co-equal bases (e.g. arborio risotto + pizza crust both bulking the "rice"; pasta + potato both the chew; rice + big bread chunks in the same cohesive base). Judges get gummy, heavy, or confused textures. Pick ONE path OR make the second element clearly minor (thin crumble, crisp topper, dust) and state in balance.complete why it will not turn stodgy.
- If the basket supplies items that imply two starches (pizza + rice): choose a SINGLE cleaner story — e.g. crisped crust with beer-braised veg and sauce OR a true risotto with only a whisper of crust; not "risotto that is also loaded with bread."
- LIMIT COMPOUND CLEVERNESS: at most ONE high-concept move per dish (the big idea). Do not stack multiple wow-fusions; prefer what a confident competitor would pitch in one clear sentence — natural beats over-constructed.
- SWEET LAYERING: dried fruit (prunes, raisins), malty beer, honey/maple/brown sugar are cumulative — do not add extra concentrated sweetness without trimming elsewhere. Default: if prunes anchor the sauce, skip added honey/syrup unless balance.flavor explains the bitter/acid/salt hammer you are using and why it stays savory.

BASKET IDENTITY (no "laundering" ugly or processed items):
- Do not silently upgrade a required item into a fancier product. If the basket says chocolate frosting, canned soup, neon candy, etc., the ingredients list and at least one step must name that real starter. You may transform it — but a judge must see you used what was in the basket, not conceptually swapped it for couverture or demi-glace.
- If a required item is very sweet or artificial-vanilla-heavy (frosting, icing, candy), balance.richness MUST be realistic: supermarket sweetness does not fully vanish — spell out limits (thin sauce, small amount, bitter/acid/salt forward, taste as you go). Avoid magical wording like "kill all sweetness" without concrete guardrails. If the combo could still read dessert-heavy, say what you'd watch for at the pass.

PLAIN LANGUAGE (kitchen dock, not press release):
- No purple prose or packaging clichés. Avoid terms like: "flavor arc", "cream liaison", "controlled pool", "jewel-toned", "symphony", "tapestry", "nest the...", "hero element", "elevate", "celebrate the ingredient" when plain words work.
- tagline, step labels ("what"), plating, and step "how" lines: short, direct, competitor voice — like you're calling it to the judges' table, not writing a press kit.

TIMELINE REALISM:
- The work in your steps must honestly fit ~${ch.totalTime} min total challenge time (your ${ch.prepTime} prep + ${ch.cookTime} cook narrative). If tasks run in parallel, say so. Do not compress a full entrée into a obviously too-short window unless timing is explained.
- Do not oversell "easy" or relaxed pacing when the sequence is tight — tip or balance.complete may note that the clock is aggressive but doable with parallel work (if true).

REAL COOK / TIME-FIRST (judges hate fantasy timing, not ambition):
${techniquePolicy}
- COMPONENT BUDGET: at most ${maxComponents} on-plate elements for this clock — PREFER FEWER when the story still works. Each element must earn its place (see CLEAN PLATE).
- CLEAN PLATE / MINIMALISM: Default to the smallest set of parts that still honors every REQUIRED item. In balance.texture, briefly justify each texture (sauce body, veg snap, steak crust) — not "adds interest." Do NOT bolt on bonus crunch (extra toasted grain, random crumb, second fried starch) unless it is clearly tied to a REQUIRED or central pantry item OR you state in balance.complete why the dish would fail without it — judges punish "crunch for crunch's sake."
- If the basket is already LOUD (sardine, aged cheese, chile, raw onion family): simplify elsewhere — fewer competing sharp layers.
- Charring fruit/veg (e.g. watermelon): prefer SOME raw + SOME lightly charred for freshness when you use heat.
- "tip": one sentence on clock fit ${ch.totalTime} min (advanced steps + minutes if any). If tight, say so plainly — not false calm.

BALANCE (honest):
- Let basket supply flavor/texture; no extra components just to sound cheffy.
- Completeness from basket+allowed pantry — never "rescue protein."

JSON keys (fill all):
{"title":"","tagline":"","serves":"2","balance":{"flavor":"","basket":"","texture":"","richness":"","visual":"","complete":""},"ingredients":[{"item":"","amount":"","prep":""}],"steps":[{"time":"0:00","dur":"","phase":"PREP","what":"","how":""}],"plating":"","tip":""}
balance.basket: 2-4 sentences — stars vs hides; name each REQUIRED item and its starring role. If something is store-bought or messy, say you're using THAT item, not a posh substitute.
balance.flavor: name sweet drivers (fruit, beer malt, honey, etc.) and confirm you did not stack them blindly — one clear sweet spine max unless you explain the counterweight.
balance.complete: single starch/body choice (or explain minor vs major); component count vs ${maxComponents}; timing honesty for ${ch.totalTime} min; optional "purer plate" omission; flag dual-base or gumminess risks if you bent the rule.
balance.richness: if any REQUIRED item is sugary/processed, concrete sweetness limits + residual-sugar realism (see BASKET IDENTITY).
balance.texture: each texture choice tied to a reason; no orphan crunch layers.
Step phases: PREP, COOK, SAUCE, ASSEMBLE, PLATE — last must be PLATE.`;
    const data=await ai(prompt,8192);
    state.recipe=data;
    showRecipeData(data);
  } catch(e) {

  }
}

function formatTime(s){const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");}

function toggleTimer(){
  if(state.timerRunning){clearInterval(state.timerInterval);state.timerRunning=false;$("timer-toggle").textContent="Resume";$("timer-toggle").style.background="#22c55e";}
  else{
    state.timerRunning=true;$("timer-toggle").textContent="Pause";$("timer-toggle").style.background="#ef4444";
    const total=state.challenge.totalTime*60;
    state.timerInterval=setInterval(()=>{
      state.timerRem=Math.max(0,state.timerRem-1);
      const pct=state.timerRem/total;
      const col=pct>0.5?"#22c55e":pct>0.25?"#f59e0b":"#ef4444";
      const td=$("timer-display");const tb=$("timer-bar");
      if(td){td.textContent=formatTime(state.timerRem);td.style.color=col;}
      if(tb){tb.style.width=(pct*100)+"%";tb.style.background=col;}
      if(state.timerRem===0){clearInterval(state.timerInterval);state.timerRunning=false;const tu=$("timeup-banner");if(tu)tu.style.display="block";}
    },1000);
  }
}
function resetTimer(){clearInterval(state.timerInterval);state.timerRunning=false;state.timerRem=state.challenge.totalTime*60;const td=$("timer-display");const tb=$("timer-bar");if(td){td.textContent=formatTime(state.timerRem);td.style.color="#22c55e";}if(tb){tb.style.width="100%";tb.style.background="#22c55e";}$("timer-toggle").textContent="Start";$("timer-toggle").style.background="#22c55e";}
function cutTime(){state.timerRem=Math.max(0,state.timerRem-600);const td=$("timer-display");if(td)td.textContent=formatTime(state.timerRem);}
function fireTwist(){const tb=$("twist-banner");if(tb){tb.textContent="TWIST: "+TWISTS[Math.floor(Math.random()*TWISTS.length)];tb.style.display="block";setTimeout(()=>{tb.style.display="none";},6000);}}

  sc.innerHTML=`
    <div style="background:#1e293b;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <button onclick="showScreen('screen-active');renderActive()" style="background:#334155;color:#94a3b8;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer">Back</button>
      <div style="font-size:16px;font-weight:800;color:#f8fafc">Pantry Wars — Duel scorecards</div>
    </div>
    <div style="max-width:920px;margin:0 auto;padding:16px 12px">
      ${(()=>{const uc=state.userCookPlan;const has=(uc.dish||"").trim()||(uc.techniques||"").trim()||(uc.timing||"").trim();if(!has)return"";const aiT=state.recipe&&state.recipe.title?state.recipe.title:"—";return`<div style="background:#fff7ed;border:2px solid #fdba74;border-radius:12px;padding:14px;margin-bottom:14px;text-align:left">
        <div style="font-size:10px;font-weight:900;color:#c2410c;text-transform:uppercase;margin-bottom:8px">Pantry Wars · Compared</div>
        <div class="duel-score-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:12px;color:#0f172a">
          <div><span style="color:#818cf8;font-weight:800">Rival chef</span> · ${escapeHtml(aiT)}</div>
          <div><span style="color:#f59e0b;font-weight:800">You</span> · ${escapeHtml((uc.dish||"").slice(0,160))}${(uc.dish||"").length>160?"…":""}</div>
        </div>
        ${(uc.techniques||"").trim()?`<div style="font-size:11px;color:#57534e;margin-top:8px;line-height:1.45"><strong>Your techniques:</strong> ${escapeHtml((uc.techniques||"").slice(0,200))}${(uc.techniques||"").length>200?"…":""}</div>`:""}
      </div>`;})()}
      <div class="duel-score-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
        ${duelCard("you","You","#d97706","scoresYou")}
        ${duelCard("ai","Rival chef","#4f46e5","scoresAI")}
      </div>
      <div style="background:#fff;border:2px solid #e2e8f0;border-radius:12px;padding:14px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:700;color:#0f172a;margin-bottom:6px">Judge notes</div>
        <textarea id="judge-notes" placeholder="What worked? What to fix? How do the two dishes compare?" rows="3"></textarea>
      </div>
      <div class="duel-score-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
        <div id="score-display-you" style="background:#0f172a;border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border:2px solid #f59e0b"></div>
        <div id="score-display-ai" style="background:#0f172a;border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border:2px solid #6366f1"></div>
      </div>
      <button onclick="submitScore()" style="width:100%;padding:12px;font-size:14px;font-weight:900;border-radius:10px;background:#6366f1;color:#fff;border:none;cursor:pointer">Submit — see results</button>
    </div>`;
  updateScoreDisplay();
}

function resetDuelScores(){
  const d={taste:7,creativity:7,presentation:7,difficulty:7};
  state.scoresYou={...d};state.scoresAI={...d};
}

function updateDuelScore(side,k,v){
  const key=side==="you"?"scoresYou":"scoresAI";
  state[key][k]=+v;
  const el=$(`score-${side}-val-${k}`);
  if(el) el.textContent=v;
  updateScoreDisplay();
}
function calcTotal(s){return Math.round(s.taste*3.5+s.creativity*2.5+s.presentation*2+s.difficulty*2);}
function gradeTotal(t){return {g:t>=90?"A+":t>=80?"A":t>=70?"B":t>=60?"C":"D",gc:t>=80?"#22c55e":t>=60?"#f59e0b":"#ef4444"};}
function updateScoreDisplay(){
  const ty=calcTotal(state.scoresYou),ta=calcTotal(state.scoresAI);
  const gy=gradeTotal(ty),ga=gradeTotal(ta);
  const sdy=$("score-display-you"),sda=$("score-display-ai");
  if(sdy) sdy.innerHTML=`<div><div style="font-size:9px;color:#94a3b8;font-weight:800;letter-spacing:1px">YOU</div><div style="font-size:22px;font-weight:900;color:${gy.gc}">${ty}/100</div></div><div style="font-size:36px;font-weight:900;color:${gy.gc}">${gy.g}</div>`;
  if(sda) sda.innerHTML=`<div><div style="font-size:9px;color:#94a3b8;font-weight:800;letter-spacing:1px">RIVAL</div><div style="font-size:22px;font-weight:900;color:${ga.gc}">${ta}/100</div></div><div style="font-size:36px;font-weight:900;color:${ga.gc}">${ga.g}</div>`;
}
function submitScore(){
  const ty=calcTotal(state.scoresYou),ta=calcTotal(state.scoresAI);
  const gy=gradeTotal(ty),ga=gradeTotal(ta);
  const notes=$("judge-notes")?.value||"";
  const sy=state.scoresAI, su=state.scoresYou;
  let verdict="",vb="#0f172a";
  if(ty>ta){verdict="You take this round.";vb="#d97706";}
  else if(ta>ty){verdict="Rival chef takes this round.";vb="#4f46e5";}
  else{verdict="Dead heat — split decision.";vb="#64748b";}
  $("screen-score").innerHTML=`
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#f1f5f9">
      <div style="background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:28px 24px;max-width:520px;width:100%;text-align:center">
        <div style="font-size:48px;margin-bottom:6px">🏆</div>
        <div style="font-size:11px;font-weight:900;color:#6366f1;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px">Pantry Wars</div>
        <div style="font-size:15px;font-weight:900;color:${vb};margin-bottom:16px;line-height:1.3">${verdict}</div>
        <div class="duel-score-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;text-align:left">
          <div style="background:#fffbeb;border:2px solid #f59e0b;border-radius:12px;padding:14px">
            <div style="font-size:10px;font-weight:800;color:#d97706;text-transform:uppercase;margin-bottom:4px">You</div>
            <div style="font-size:36px;font-weight:900;color:${gy.gc};line-height:1">${gy.g}</div>
            <div style="font-size:16px;font-weight:800;color:#0f172a">${ty}/100</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;font-size:11px">
              ${[["Taste",su.taste],["Creativity",su.creativity],["Presentation",su.presentation],["Difficulty",su.difficulty]].map(([l,v])=>`<div style="background:#fff;border-radius:6px;padding:6px"><span style="color:#94a3b8;font-weight:700">${l}</span> <strong>${v}</strong></div>`).join("")}
            </div>
          </div>
          <div style="background:#eef2ff;border:2px solid #6366f1;border-radius:12px;padding:14px">
            <div style="font-size:10px;font-weight:800;color:#4f46e5;text-transform:uppercase;margin-bottom:4px">Rival chef</div>
            <div style="font-size:36px;font-weight:900;color:${ga.gc};line-height:1">${ga.g}</div>
            <div style="font-size:16px;font-weight:800;color:#0f172a">${ta}/100</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;font-size:11px">
              ${[["Taste",sy.taste],["Creativity",sy.creativity],["Presentation",sy.presentation],["Difficulty",sy.difficulty]].map(([l,v])=>`<div style="background:#fff;border-radius:6px;padding:6px"><span style="color:#94a3b8;font-weight:700">${l}</span> <strong>${v}</strong></div>`).join("")}
            </div>
          </div>
        </div>
        <div style="font-size:12px;color:#94a3b8;margin-bottom:12px">${state.challenge.ctype.label} · ${state.challenge.diff.toUpperCase()}</div>
        ${notes?`<div style="background:#f8fafc;border-radius:8px;padding:10px;font-size:12px;color:#334155;text-align:left;margin-bottom:14px">${escapeHtml(notes)}</div>`:""}
        <button onclick="resetDuelScores();showScreen('screen-pantry');renderPantry();" style="width:100%;padding:12px;font-size:13px;font-weight:800;border-radius:10px;background:#6366f1;color:#fff;border:none;cursor:pointer;margin-bottom:8px">Pantry Wars — Play again</button>
        <button onclick="resetDuelScores();renderLanding();" style="width:100%;padding:10px;font-size:12px;font-weight:700;border-radius:10px;background:#f1f5f9;color:#475569;border:2px solid #e2e8f0;cursor:pointer">Home</button>
      </div>
    </div>`;
}

// ── AI MODAL ──────────────────────────────────────────────────────────────────
const MODAL_PROMPTS={
  type:      i=>`Culinary expert. "${i}" as a cooking competition challenge type. Return ONLY JSON no markdown: {"label":"name","emoji":"emoji","description":"1 sentence","tags":["keywords"]}`,
  ingredient:i=>`Culinary expert. User typed: "${i}". Return ONLY compact JSON with keys name, notes, tags — no markdown, no extra text.
"name": STANDARD ENGLISH pantry label (US grocery / competition basket), Title Case — e.g. Chicken, Chicken Breast, Boneless Skinless Chicken Breast. NEVER translate (no Poulet, Suprema de Pollo, etc.) unless the user's text was in that language. Match specificity: vague input → simple name (chicken → Chicken); specific cut → that cut in English.
"notes": 1-2 sentence competition tip.
"tags": array of flavor tags (salty, umami, etc.).`,
  restriction:i=>`Culinary expert. "${i}" as a cooking restriction. Return ONLY JSON no markdown: {"label":"short name","description":"what it eliminates","tags":["affected"]}`,
  equipment: i=>`Culinary expert. "${i}" as kitchen equipment. Return ONLY JSON no markdown: {"label":"equipment name","description":"how it affects cooking","tags":["techniques"]}`,
};

function openModal(type){
  state.modalType=type;
  const titles={type:"Add Challenge Type",ingredient:"Add Ingredient",restriction:"Add Restriction",equipment:"Add Equipment"};
  const placeholders={type:"e.g. Diner Food, Brunch...",ingredient:"e.g. Kohlrabi, Wagyu Beef...",restriction:"e.g. No Frying, Kosher...",equipment:"e.g. Tagine, Pizza Stone..."};
  const ov=$("modal-overlay");
  ov.innerHTML=`
    <div class="modal">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:15px;font-weight:800;color:#0f172a">${titles[type]}</div>
        <button onclick="closeModal()" style="background:#f1f5f9;border:none;border-radius:6px;padding:3px 10px;font-size:18px;cursor:pointer">x</button>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input id="modal-input" placeholder="${placeholders[type]}" style="flex:1;background:#f8fafc;border:2px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:13px;color:#0f172a">
        <button id="modal-lookup-btn" onclick="doModalLookup()" style="background:#6366f1;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer">Look Up</button>
      </div>
      <div id="modal-body"></div>
    </div>`;
  ov.classList.remove("hidden");
  const inp=$("modal-input");
  inp.focus();
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")doModalLookup();});
}

function closeModal(){$("modal-overlay").classList.add("hidden");}

async function doModalLookup(){
  const inp=$("modal-input");
  const val=inp?.value?.trim();
  if(!val) return;
  const mb=$("modal-body");
  const lb=$("modal-lookup-btn");
  mb.innerHTML=`<div style="text-align:center;padding:14px 0;color:#6366f1;font-size:13px;font-weight:700">Looking up ${val}...<br><button onclick="document.getElementById('modal-body').innerHTML=''" style="background:#f1f5f9;border:2px solid #e2e8f0;border-radius:6px;padding:5px 12px;margin-top:8px;cursor:pointer;font-size:11px">Cancel</button></div>`;
  lb.disabled=true;lb.style.background="#94a3b8";
  try{
    const data=await ai(MODAL_PROMPTS[state.modalType](val));
    lb.disabled=false;lb.style.background="#6366f1";
    window.__basketPendingModal = data;
    const name=data.label||data.name||val;
    const desc=data.description||data.notes||"";
    const tags=(data.tags||[]).map(t=>`<span style="background:#eff6ff;border:1px solid #93c5fd;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700;color:#1d4ed8;margin:2px">${escapeHtml(t)}</span>`).join("");
    mb.innerHTML=`<div style="background:#f8fafc;border:2px solid #e2e8f0;border-radius:10px;padding:12px">
      <div style="font-size:14px;font-weight:800;color:#0f172a;margin-bottom:3px">${data.emoji||""} ${escapeHtml(String(name))}</div>
      ${desc?`<div style="font-size:12px;color:#475569;margin-bottom:8px;line-height:1.5">${escapeHtml(desc)}</div>`:""}
      ${tags?`<div style="margin-bottom:10px">${tags}</div>`:""}
      <button type="button" onclick="doModalAddFromPending()" style="width:100%;padding:9px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer">Add</button>
    </div>`;
  } catch(e){
    lb.disabled=false;lb.style.background="#6366f1";
    mb.innerHTML=`<div style="background:#fef2f2;border:2px solid #fecaca;border-radius:8px;padding:10px;font-size:12px;font-weight:700;color:#b91c1c">
      Error: ${escapeHtml(e.message)}<br><br>
      <small style="font-weight:500;color:#6b7280">The app must be served over HTTP(S) so <code>/api/anthropic</code> works. Locally: <code>npm start</code> then open the URL shown. HTTP 401 = bad key. Clear saved key: <code style="font-size:11px">localStorage.removeItem(&quot;basket_anthropic_key_v1&quot;)</code></small><br><br>
      <button type="button" onclick="doModalLookup()" style="background:#fff;border:2px solid #fecaca;border-radius:5px;padding:4px 10px;cursor:pointer;font-size:11px">Try Again</button>
    </div>`;
    console.error("AI lookup failed:", e);
  }
}

function doModalAdd(data){
  const t=state.modalType;
  if(t==="type"){const nt={id:"c"+Date.now(),label:data.label||data.name,emoji:data.emoji||"🍴",custom:true};state.customTypes.push(nt);state.ctype=nt;}
  else if(t==="ingredient"){const n=data.name||data.label;if(n&&!state.req.includes(n))state.req.push(n);}
  else if(t==="restriction"){const n=data.label;if(n&&!state.res.includes(n))state.res.push(n);}
  else if(t==="equipment"){const n=data.label;if(n&&!state.reqEq.includes(n))state.reqEq.push(n);}
  closeModal();refreshAfterModalAdd();
}

function doModalAddFromPending(){
  const data=window.__basketPendingModal;
  delete window.__basketPendingModal;
  if(data) doModalAdd(data);
}

function doRandomize(){
  const d=DIFF[state.diff];
  state.req=pick(window.USER_PANTRY||PANTRY,d.req);state.res=pick(RESTRICT,d.res);state.forbEq=pick(EQUIP,d.forb);
  state.lim=d.burners;state.cut=d.cut;
  const t=d.times[Math.floor(Math.random()*d.times.length)];
  state.total=t;state.prep=Math.round(t*0.35);state.cook=Math.round(t*0.65);
  state.ctype=CTYPES[Math.floor(Math.random()*CTYPES.length)];
  state.twist=d.twist?TWISTS[Math.floor(Math.random()*TWISTS.length)]:"";
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadAppConfig().then(() => renderLanding());
</script>
</body>
</html>
