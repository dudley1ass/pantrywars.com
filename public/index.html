  /** Persist first-touch campaign params from the URL for GA4 (session). */
  function pwCaptureUtmsFromUrl() {
    try {
      const u = new URL(window.location.href);
      const keys = ["utm_source", "utm_medium", "utm_campaign", "utm_content", "utm_term"];
      const o = {};
      keys.forEach(function (k) {
        var v = u.searchParams.get(k);
        if (v) o[k] = v;
      });
      if (Object.keys(o).length) sessionStorage.setItem("pw_utm", JSON.stringify(o));
    } catch (_e) {}
  }
  function pwGetCampaignParams() {
    try {
      var raw = sessionStorage.getItem("pw_utm");
      return raw ? JSON.parse(raw) : {};
    } catch (_e) {
      return {};
    }
  }
  pwCaptureUtmsFromUrl();

  function trackPWEvent(eventName, params) {
    params = Object.assign({}, pwGetCampaignParams(), params || {});
    if (typeof gtag === "function") {
      gtag("event", eventName, params);
    }
  }

  /** Share URL with default UTMs for the viral loop (copy / native share). */
  function pwTrackedShareUrl(content) {
    var base =
      location.hostname === "localhost" || location.hostname === "127.0.0.1"
        ? new URL(location.origin + location.pathname)
        : new URL("https://pantrywars.com/");
    base.hash = "";
    base.searchParams.set("utm_source", "share");
    base.searchParams.set("utm_medium", "social");
    base.searchParams.set("utm_campaign", "pantrywars_launch");
    base.searchParams.set("utm_content", content || "landing");

  }

/** Collapse "No No …" from duplicated prefixes (e.g. AI returns "No No Butter") and match built-in casing. */
function normalizeRestrictionKey(s){
  let t=String(s==null?"":s).trim();
  if(!t) return t;
  if(/^raw\s*only$/i.test(t)) return "";
  while(/^no\s+no(\s|$)/i.test(t)) t=t.replace(/^no\s+/i,"").trim();
  const low=t.toLowerCase();
  for(const r of RESTRICT) if(r.toLowerCase()===low) return r;
  return t;
}
function sanitizeRestrictionList(arr){
  const out=[], seen=new Set();
  for(const x of arr||[]){
    const k=normalizeRestrictionKey(x);
    if(!k||seen.has(k)) continue;
    seen.add(k); out.push(k);
  }
  return out;
}
function sanitizeSpinConstraints(arr){
  return (arr||[]).map(x=>{

/** Uniform integer in [0, max) — uses crypto when available. */
function randomIndex(max){
  const n=Math.floor(Number(max))||0;
  if(n<=0) return 0;
  if(typeof crypto!=="undefined"&&crypto.getRandomValues){
    const buf=new Uint32Array(1);
    crypto.getRandomValues(buf);
    return buf[0]%n;
  }
  return Math.floor(Math.random()*n);
}
/** ~Uniform on [0, 1) for probability gates. */
function randomUnit(){
  if(typeof crypto!=="undefined"&&crypto.getRandomValues){
    const buf=new Uint32Array(1);
    crypto.getRandomValues(buf);
    return buf[0]/4294967296;
  }
  return Math.random();
}
function shuffleArray(arr){
  const a=(arr||[]).slice();
  for(let i=a.length-1;i>0;i--){
    const j=randomIndex(i+1);
    const t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}
/** Unbiased distinct pick of n items (Fisher–Yates — never sort(() => Math.random()). */
const pick = (arr,n) => {
  let c = Number(n);
  if (!Number.isFinite(c) || c < 0) c = 0;
  const src=[...(arr||[])];
  c = Math.min(c, src.length);
  if (c <= 0) return [];
  return shuffleArray(src).slice(0,c);
};

/** Mystery spin / constraint random: roll 0–1 must-use equipment (never contradicts forbidden). */
function rollMustUseEquipment(diffKey, forbEq){
  const forb=new Set(forbEq||[]);
  const cand=EQUIP.filter(e=>!forb.has(e));
  state.reqEq=[];
  if(!cand.length) return;
  const p=diffKey==="easy"?0.38:diffKey==="medium"?0.48:(diffKey==="hard"||diffKey==="insane")?0.55:0.45;
  if(randomUnit()>=p) return;
  state.reqEq=[cand[randomIndex(cand.length)]];
}

function drawUnifiedConstraints(count){
  const n=Math.max(0, Number(count)||0);
  const candidates=[
    ...RESTRICT.map(r=>({type:"res",label:r})),
    ...EQUIP.map(e=>({type:"forb",label:"✕ "+e,raw:e})),
  ];
  const chosen=pick(candidates,n);
  return {
    spinConstraints: chosen.map(c=>c.label),
    restrictions: chosen.filter(c=>c.type==="res").map(c=>c.label),
    forbEquip: chosen.filter(c=>c.type==="forb").map(c=>c.raw),
  };
}

/** How many pantry names remain valid under these dietary restrictions */
function pantryFeasibleCount(pool, restrictions){
  const r=restrictions||[];
  const filtered=filterPoolByRestrictions([...new Set((pool||[]).filter(Boolean))],r);
  return filtered.length;
}

/** Re-roll unified draws until the pantry can still fill required slots (avoids No dairy + heavy cream style impossibilities). */
function drawUnifiedConstraintsFeasible(n, pool, needSlots){
  const need=Math.max(0, Number(needSlots)||0);
  const count=Math.max(0, Number(n)||0);
  if(need<=0) return drawUnifiedConstraints(count);
  let best=null, bestScore=-1;
  for(let attempt=0; attempt<55; attempt++){
    const draw=drawUnifiedConstraints(count);
    const fc=pantryFeasibleCount(pool, draw.restrictions);
    if(fc>=need) return draw;
    if(fc>bestScore){ bestScore=fc; best=draw; }
  }
  for(let attempt=0; attempt<35; attempt++){
    const k=Math.max(0, Math.min(count, EQUIP.length));
    const fe=pick(EQUIP,k);
    const draw={
      spinConstraints:fe.map(e=>"✕ "+e),
      restrictions:[],
      forbEquip:fe,
    };
    if(pantryFeasibleCount(pool, [])>=need) return draw;
  }
  if(best&&bestScore>0){
    while(best.restrictions.length&&pantryFeasibleCount(pool,best.restrictions)<need)
      best.restrictions.pop();
    best.forbEquip=pick(EQUIP,Math.min(count-best.restrictions.length,EQUIP.length));
    best.spinConstraints=[...best.restrictions,...best.forbEquip.map(e=>"✕ "+e)];
    if(pantryFeasibleCount(pool,best.restrictions)>=need) return best;
  }
  return {spinConstraints:[],restrictions:[],forbEquip:[]};
}

// Extract one JSON object from model text (handles ```json fences, braces inside strings, trailing commas).
function stripCodeFences(text) {
  const t = String(text || "").trim();
  const m = t.match(/```(?:json)?\s*([\s\S]*?)```/);
  return m ? m[1].trim() : t;
}
function stripTrailingCommas(jsonStr) {
  return jsonStr.replace(/,(\s*[\}\]])/g, "$1");
}
function extractBalancedJsonObject(text) {
  const s = stripCodeFences(text);
  const start = s.indexOf("{");
  if (start === -1) return null;
  let depth = 0, inStr = false, esc = false;
  for (let i = start; i < s.length; i++) {
    const c = s[i];
    if (esc) { esc = false; continue; }
    if (inStr) {
      if (c === "\\") esc = true;
      else if (c === '"') inStr = false;
      continue;
    }
    if (c === '"') { inStr = true; continue; }
    if (c === "{") depth++;
    else if (c === "}") {
      depth--;
      if (depth === 0) return s.slice(start, i + 1);
    }
  }
  return null;
}
function normalizeJsonText(s) {
  return String(s || "")
    .replace(/[\u201c\u201d\u00ab\u00bb]/g, '"')
    .replace(/[\u2018\u2019]/g, "'");
}
function parseModelJsonObject(raw) {
  let candidate = extractBalancedJsonObject(raw);
  if (!candidate) {
    const s = String(raw || "").indexOf("{"), e = String(raw || "").lastIndexOf("}");
    if (s !== -1 && e > s) candidate = String(raw).slice(s, e + 1);
  }
  if (!candidate) throw new Error("Model returned no JSON object");
  candidate = normalizeJsonText(candidate);
  try {
    return JSON.parse(candidate);
  } catch (e1) {
    try {
      return JSON.parse(stripTrailingCommas(candidate));
    } catch (_e2) {
      throw new Error(e1.message + " — Recipe JSON was malformed or cut off. Click Try Again.");
    }
  }
}

function pwLocalDateKey() {

function pwGetDailyAiCount() {
  try {
    const raw = localStorage.getItem(PW_DAILY_AI_STORAGE_KEY);
    const j = raw ? JSON.parse(raw) : null;
    const today = pwLocalDateKey();
    if (!j || j.d !== today) return { d: today, n: 0 };
    return { d: today, n: Math.max(0, Math.min(PW_DAILY_AI_LIMIT + 50, Number(j.n) || 0)) };
  } catch (_e) {
    return { d: pwLocalDateKey(), n: 0 };
  }
}

function pwDailyAiRemaining() {
  return Math.max(0, PW_DAILY_AI_LIMIT - pwGetDailyAiCount().n);

  return pwGetDailyAiCount().n < PW_DAILY_AI_LIMIT;

function pwRecordSuccessfulAiRound() {
  const today = pwLocalDateKey();
  const cur = pwGetDailyAiCount();
  const next = cur.d === today ? cur.n + 1 : 1;
  localStorage.setItem(PW_DAILY_AI_STORAGE_KEY, JSON.stringify({ d: today, n: next }));
  try {
    if (!sessionStorage.getItem("pw_session_started_v1")) {
      sessionStorage.setItem("pw_session_started_v1", "1");
      if (typeof gtag === "function") gtag("event", "pw_play_session", {});

    if (typeof gtag === "function") {
      gtag("event", "pw_ai_round_ok", {
        daily_total: next,
        daily_remaining: Math.max(0, PW_DAILY_AI_LIMIT - next),

  } catch (_e) {}
}

/** opts.bypassDailyPrecheck — internal retries after a successful parse (same user action). opts.skipQuotaRecord — do not increment daily AI count (pair with bypass for regen attempts). */
async function ai(prompt, tokens=300, opts) {
  opts=opts||{};
  await loadAppConfig();
  const apiKey = getAnthropicKey();
  if (!apiKey && !_serverAnthropicConfigured) throw new Error("No API key — cancelled or empty");
  if (!opts.bypassDailyPrecheck && !pwCanUseAiRound()) {
    pwTrackDailyLimitHit("blocked_precheck");
    throw new Error(PW_DAILY_LIMIT_MESSAGE);
  }
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    const timer = setTimeout(() => { xhr.abort(); reject(new Error("Request timed out (60s)")); }, 60000);
    xhr.open("POST", "/api/anthropic");
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.onload = () => {
      clearTimeout(timer);
      if (xhr.status !== 200) {
        let detail = xhr.responseText.slice(0, 400);
        try {
          const errJ = JSON.parse(xhr.responseText);
          if (errJ.error && errJ.error.message) detail = errJ.error.message;
        } catch (_e) {}
        reject(new Error("HTTP " + xhr.status + (detail ? ": " + detail : "")));
        return;
      }
      try {
        const d = JSON.parse(xhr.responseText);
        const txt = (d.content || []).find(b => b.type === "text")?.text || "";
        if (d.stop_reason === "max_tokens" && txt && !extractBalancedJsonObject(txt)) {
          reject(new Error("Response ran out of space — click Try Again, or use fewer required ingredients."));
          return;
        }
        const parsed = parseModelJsonObject(txt);
        if(!opts.skipQuotaRecord) pwRecordSuccessfulAiRound();
        resolve(parsed);
      } catch (err) {
        reject(err);
      }
    };
    xhr.onerror = () => {
      clearTimeout(timer);
      reject(new Error("Cannot reach Pantry Wars server — check that the app is running (npm start) or your live site is up."));
    };
    xhr.onabort = () => { clearTimeout(timer); reject(new Error("aborted")); };
    xhr.send(JSON.stringify({
      api_key: apiKey,
      payload: {
        model: "claude-haiku-4-5",

      }
    }));

}

function toggleFromModal(id) {
  if (state.pantryItems.includes(id)) state.pantryItems = state.pantryItems.filter(x=>x!==id);

/** Snapshot current builder into challenge shape (for AI prompts before launch). */
function challengeFromBuilder(){
  const pool=pantryPool();
  return{
    diff:state.diff,
    ctype:state.ctype,
    totalTime:state.total,
    prepTime:state.prep,
    cookTime:state.cook,
    surpriseCut:state.cut,
    required:[...state.req],
    restrictions:sanitizeRestrictionList(state.res),
    reqEquip:[...state.reqEq],
    forbEquip:[...state.forbEq],
    limitBurners:state.lim,
    pantry:pool.filter(p=>!state.req.includes(p)),
  };
}

function doLaunch() {
  const cfg=DIFF[state.diff];
  if(state.req.length<cfg.req){
    alert(`This difficulty needs ${cfg.req} required ingredients that fit your restrictions — you have ${state.req.length}. Add pantry items or ease restrictions.`);
    return;
  }
  if(state.req.some(n=>ingredientConflictsWithAny(n,state.res))){
    alert("A required ingredient still conflicts with a restriction. Check your basket.");
    return;
  }
  if(!pwCanUseAiRound()){
    pwTrackDailyLimitHit("launch_blocked");
    alert(PW_DAILY_LIMIT_MESSAGE);
    return;
  }
  state.res=sanitizeRestrictionList(state.res);
  const pool = pantryPool();
  state.challenge={diff:state.diff,ctype:state.ctype,totalTime:state.total,prepTime:state.prep,cookTime:state.cook,surpriseCut:state.cut,required:state.req,restrictions:state.res,reqEquip:state.reqEq,forbEquip:state.forbEq,limitBurners:state.lim,pantry:pool.filter(p=>!state.req.includes(p))};
  trackPWEvent("start_battle", pwParamsChallenge(state.challenge));
  state.userCookPlan={dish:"",techniques:"",timing:""};
  state.contestRecipe=null;
  showScreen("screen-recipe");
  renderRecipe();
}

function clampScore(v){
  const n=Math.round(Number(v)||0);
  return Math.min(10,Math.max(1,n));
}

async function runAutoBattleScoring(){
  if(state.duelAutoScoring) return;
  const ch=state.challenge, uc=state.userCookPlan, r=state.recipe;
  if(!ch||!r) return;
  state.duelAutoScoring=true;
  const st=$("score-auto-status");
  if(st) st.textContent="Auto-judging duel...";
  try{
    const prompt=`You are a fair cooking competition judge. Compare two competitors from the same basket.
Return ONLY compact JSON with this shape:
{"you":{"taste":1-10,"creativity":1-10,"presentation":1-10,"difficulty":1-10},"ai":{"taste":1-10,"creativity":1-10,"presentation":1-10,"difficulty":1-10},"summary":"2-4 sentences with winner + why"}

SCORING RUBRIC:
- Taste: flavor logic, balance, plausibility
- Creativity: originality without nonsense — but for "Recreate a Classic," creativity must serve a NAMED classic; pure original with no classic = lower creativity/challenge execution
- Presentation: plating clarity from described dish
- Difficulty: technical ambition that fits time
${challengeIntentJudgeAddon(ch.ctype)}${restrictionsJudgeAddon(ch)}${noSaltRestrictionJudgeAddon(ch)}${dessertJudgeAddon(ch)}${snackJudgeAddon(ch)}${elevateCheapJudgeAddon(ch)}${recreateClassicJudgeAddon(ch)}${physicsRealismJudgeAddon(ch)}

Challenge:
- Type: ${ch.ctype.label}
- Time: ${ch.totalTime} minutes
- Required: ${ch.required.join(", ")}
- Restrictions: ${(ch.restrictions||[]).join(", ")||"none"}

USER PLAN:
- Dish: ${(uc.dish||"").slice(0,1200)}
- Techniques: ${(uc.techniques||"").slice(0,1200)}
- Timing: ${(uc.timing||"").slice(0,1200)}

AI ENTRY:
${JSON.stringify({
  title:r.title||"",
  tagline:r.tagline||"",
  balance:r.balance||{},
  ingredients:(r.ingredients||[]).slice(0,20),
  steps:(r.steps||[]).slice(0,16),
  plating:r.plating||"",
  tip:r.tip||""
})}`;
    const out=await ai(prompt,1400);
    if(out&&out.you&&out.ai){
      state.scoresYou={
        taste:clampScore(out.you.taste),
        creativity:clampScore(out.you.creativity),
        presentation:clampScore(out.you.presentation),
        difficulty:clampScore(out.you.difficulty),
      };
      state.scoresAI={
        taste:clampScore(out.ai.taste),
        creativity:clampScore(out.ai.creativity),
        presentation:clampScore(out.ai.presentation),
        difficulty:clampScore(out.ai.difficulty),
      };
      state.duelAutoSummary=String(out.summary||"").slice(0,700);
      renderScore();
    } else {
      if(st) st.textContent="Auto-judge unavailable — set scores manually.";
    }
  } catch(_e){
    if(st) st.textContent="Auto-judge unavailable — set scores manually.";
  } finally{
    state.duelAutoScoring=false;
    const base=pwParamsChallenge();
    trackPWEvent("battle_completed", {
      ...base,
      score_total: calcTotal(state.scoresYou),
    });
  }
}

function analyzeBasketForRecipe(required) {
  const low = required.map(s => String(s).toLowerCase());
  const junkRx = /\b(frosting|icing|chocolate\s*syrup|corn\s*syrup|candy|marshmallow|soda|cola|potato\s*chips|cereal|pizza\b|snack|twinkie|pop[\s-]?tart|spray\s*cheese|velveeta|cool\s*whip|hot\s*fudge|nesquik|hershey'?s?\s*syrup)\b/;
  const sweetShelfRx = /\b(frosting|icing|chocolate\s*syrup|syrup|candy|marshmallow|hot\s*fudge)\b/;
  const junkHits = low.filter(s => junkRx.test(s)).length;
  const processedSweet = low.some(s => sweetShelfRx.test(s));
  const hardBasket = junkHits >= 2 || required.length >= 5 || (junkHits >= 1 && required.length >= 4);
  const cleanBasket = junkHits === 0 && required.length <= 4;
  return { hardBasket, cleanBasket, processedSweet, junkHits };
}

/** Challenge-type intent for prompts & judging (builtin ids + label heuristics for custom types). */
function challengeTypeIsRecreateClassic(ctype){
  const id=String((ctype&&ctype.id)||"");
  const label=String((ctype&&ctype.label)||"").toLowerCase();
  if(id==="recreate") return true;
  if(/\brecreate\s+a\s+classic\b/.test(label)) return true;
  if(/\brecreate\b/.test(label)&&/\bclassic\b/.test(label)) return true;
  if(/\bhomage\b/.test(label)&&/\b(classic|dish|iconic)\b/.test(label)) return true;
  return false;
}
function challengeTypeIsElevateCheap(ctype){
  const id=String((ctype&&ctype.id)||"");
  const label=String((ctype&&ctype.label)||"").toLowerCase();
  if(id==="elevate") return true;
  if(/\belevate\b/.test(label)&&/\b(cheap|budget|store-bought|boxed|instant|frozen|diner|microwave)\b/.test(label)) return true;
  return false;
}
function challengeTypeIsSnack(ctype){
  const id=String((ctype&&ctype.id)||"");
  const label=String((ctype&&ctype.label)||"").toLowerCase();
  if(id==="snack") return true;
  if(/\bsnack\b/.test(label)) return true;
  return false;
}

/** Universal: basket-as-a-whole → flavor direction → roles (before category defaults like “protein = main”). */
function basketFlavorLeadershipBlock(ch){
  const lab=(ch.ctype&&ch.ctype.label)?String(ch.ctype.label):"this challenge";
  const id=String((ch.ctype&&ch.ctype.id)||"");
  const labelLow=String((ch.ctype&&ch.ctype.label)||"").toLowerCase();
  const isDessert=id==="dessert"||/\bdessert\b/.test(labelLow);
  const isElevate=challengeTypeIsElevateCheap(ch.ctype);
  const isRecreate=challengeTypeIsRecreateClassic(ch.ctype);
  let out=`CHEF PROCESS — FLAVOR & HIERARCHY FIRST (do this mentally before JSON):
- Banned mindset: "How do I give every ingredient equal prominence?" Better: "What is the most believable flavor direction for this entire basket under ${lab}? What should lead; what should support; what is accent-only?"
- Order: (1) Scan ALL required items together — what naturally pairs or clusters? (2) Name one clearest dish identity / flavor lane (what you'd pitch in one breath). (3) Pick ONE primary foundation. (4) Assign each REQUIRED to: PRIMARY FOUNDATION, SUPPORTING, ACCENT/GARNISH, or MINIMAL-USE — the last is for honest trace/chip/pinch when an item fights the lane, not co-equal billing.
- Anchor rule: Choose the best dish first, then fit ingredients into it. Do NOT assign roles from category alone (protein / veg / dairy) and then force a concept — especially do not default "protein ⇒ centerpiece."
- Conflicts: commit to a dominant path; limit ingredients that don't fit that path (still present, still true to the SKU).
- Rank what matters: (1) dish identity (2) flavor logic (3) realism on time (4) basket integrity — integrity means each item appears honestly, NOT equal portion for all.

`;
  if(isRecreate){
    out+=`RECREATE A CLASSIC — FLAVOR NORTH STAR Pick ONE dish a civilian could name (fish and chips, chicken parm, pad thai, etc.). Every choice must answer: "Does this still read as THAT classic to a judge?" Basket items are forced substitutions inside that frame — not an excuse to invent a new center of the plate.
- If the classic's defining cook is longer than the round allows, respect physics: pivot to "inspired by," change the cut, or use pressure — do not claim the textbook dish on a fantasy timeline.

`;
  }
  if(isElevate){
    out+=`ELEVATE A CHEAP MEAL — FLAVOR NORTH STAR: Humble recognizable food first (what a $3–$10 meal looks like), then better technique and basket items on THAT SAME DISH — not a new cuisine’s fine-dining default. If your gut says "risotto," "quinoa pilaf," or "composed entree with protein anchor," STOP — unless the cheap anchor was literally that dish class (e.g. packet rice bowl) and you named it in sentence one.
- Good pattern: "tuna salad" → seared tuna cubes folded in, edamame, maple vinaigrette, halloumi crisp instead of bland cheese slice — still reads as tuna salad.
- Bad pattern: "tuna salad" on the label, then quinoa pilaf + seared steak-cut tuna + entree plating — baseline disappeared; that is replacement.
- Jar-sauce / spaghetti night: give judges one "nostalgia" thread — tomato (paste or charred), dried herbs that read marinara, or explicit "our jar-sauce night but…" so it is not generic noodles.
- Long pasta + built sauce: finish emulsified (starchy pasta water + toss) for restaurant cling, not a thin coating from a quick toss in loose liquid.

`;
  }
  if(isDessert){
    out+=`DESSERT — LEAD WITH SWEET: Default hierarchy = PRIMARY sweet structure (shell, custard, cake, fruit, chocolate, caramel) → SUPPORTING sweet/sour bridge (e.g. compote, curd) → SUPPORTING odd produce → ACCENT/MICRO only for savory plant protein or aggressive umami. If a required item still reads savory when crisp (tempeh, etc.), shrink it until it behaves like nuts or toasted spice — not a second theme.

`;
  }
  if(challengeTypeIsSnack(ch.ctype)){
    out+=`SNACK — FLAVOR SERVES FORMAT: Valid basket pairings must be EXECUTED at bite scale. Same ingredients can win if shrunk to one pickup (toast square, mini tart, skewer): fish as flake not fillet, caramel as smear not pool, cream as micro not quenelle. Do not let good flavor logic excuse entree-weight or entree plating.

`;
  }
  return out;
}

/** Course-first ingredient roles (not “protein = centerpiece” globally). Feeds rival-chef prompt. */
function courseRoleHierarchyBlock(ch){
  const ctype=ch.ctype||{};
  const id=String(ctype.id||"");
  const label=String(ctype.label||"").toLowerCase();
  if(id==="dessert"||/\bdessert\b/.test(label)){
    return `ROLE HIERARCHY — DESSERT (context → roles → ingredients):
- Wrong default: "there is meat/cured pork in the basket, therefore it is the main." Right default: course picks the STAR. For dessert, PRIMARY = sweet backbone (ice cream/gelato, mousse, curd, tart shell, panna cotta, chocolate base, marshmallow whip, honey caramel, compote — from REQUIRED or pantry).
- Animal proteins & charcuterie (prosciutto, ham, bacon, etc.) = ACCENT or TEXTURE only: crisp shard, friable sprinkle, salted crackling on TOP, paper-thin chip garnish — NOT the conceptual center. Judges should hear the dessert first ("white chocolate ice cream with prosciutto crackling"), not "prosciutto plate with sweet notes."
- Eggs, silken tofu, and soy milk may carry PRIMARY only as the homogeneous sweet body (custard/pudding/curd/cake) — spoon must read dessert. Tempeh, seitan, firm tofu pieces: MICRO-ACCENT only (whisper, single placement); do not repeat on tart, filling, and sauce. Never let them steal the first bite from maple, pastry, or fruit.
- Odd veg (hearts of palm, tomato, etc.) = SUPPORT for bridge or acid — not a savory salad exit; pair with fewer other concepts (see EXPERIMENTAL BRIDGES in course lock).
- balance.basket must assign each REQUIRED item an explicit role label in prose: PRIMARY (sweet spine), SUPPORT (bridge/fruit/herb), ACCENT (contrast), MICRO-ACCENT (savory plant bits), one short phrase per item. If multiple sweets exist, pick ONE PRIMARY sweet story; others merge or become SUPPORT.
- Title/tagline should read as a dessert; savory REQUIRED items appear as "with …" / "finished with …" / "crackling on top," not as the dish's noun head.\n`;
  }
  if(challengeTypeIsRecreateClassic(ctype)){
    return `ROLE HIERARCHY — RECREATE A CLASSIC:
- PRIMARY = ONE named classic dish (standard menu name: e.g. fish and chips, chicken parmesan, cassoulet). The whole plate is an execution of THAT identity — recognition beats novelty.
- SUPPORTING / ACCENT = basket and pantry items mapped into the classic's usual architecture (cutlet + sauce + cheese for parm; battered fish + chips + acidic note for fish & chips; etc.). Do not dissolve the classic into a generic "composed" plate.
- BANNED: treating the challenge as "original restaurant concept" while only nodding at a cuisine. Title head noun should signal the classic ("our fish and chips…", "chicken parm from the basket…").
- TIME-HONEST NAMING: If you cannot deliver the classic's real technique on the clock, the title/tagline must signal the pivot ("bourguignon flavors on grilled short rib," "cassoulet-inspired bowl") — not "beef bourguignon" with a 25-minute pretend braise.
- balance.basket: sentence 1 MUST name the classic + one-line how the basket twists it without erasing the dish. Then tag each REQUIRED with how it maps to that classic's usual components.\n`;
  }
  if(challengeTypeIsElevateCheap(ctype)){
    return `ROLE HIERARCHY — ELEVATE A CHEAP MEAL:
- PRIMARY = the upgraded CHEAP / EVERYDAY DISH itself (same identity — better execution). The star is "ramen but actually great," "tuna salad but actually great," "boxed mac but from scratch technique," not a different restaurant dish that borrowed one basket item.

- balance.basket: sentence 1 MUST be "Cheap baseline: [specific] → elevation: [one sentence — same dish]." Sentence 2 MUST state in plain words how the plate STILL reads as that baseline ("still a tuna salad in the bowl," "still a grilled cheese you can pick up," etc.). Then tag each REQUIRED with how it serves THAT baseline.\n`;
  }
  if(id==="appetizer"||/\bappetizer\b/.test(label)){
    return `ROLE HIERARCHY — APPETIZER:
- PRIMARY = the single starter story (composed bite, veg base, tartlet, dip, broth cup). Protein/cured fish/charcuterie often ACCENT (shaving, crisp, tartare quenelle, thin slice on crostini) unless the basket is clearly protein-anchored.

  }
  if(id==="snack"||/\bsnack\b/.test(label)){

  }
  return `ROLE HIERARCHY — ENTRÉE / SAVORY MAIN (& most non-dessert challenges):

}

balance.flavor: name sweet drivers (fruit, beer malt, honey, etc.) and confirm you did not stack them blindly — one clear sweet spine max unless you explain the counterweight.

function formatTime(s){const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");}

    state.timerInterval=setInterval(()=>{
